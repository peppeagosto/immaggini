<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>EL CARTAIO Platinum - PROTECTED SYSTEM</title>
    <style>
        :root {
            --rainbow: linear-gradient(45deg, #ff0000, #ff7300, #fffb00, #48ff00, #00ffd5, #002bff, #7a00ff, #ff00c8, #ff0000);
            --gold-luxury: linear-gradient(to bottom, #fff 0%, #bf953f 50%, #8a6d3b 100%);
            --gold-btn: linear-gradient(to bottom, #bf953f, #fcf6ba, #b38728, #fbf5b7, #aa771c);
        }
        body { background: transparent !important; margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; font-family: 'Segoe UI', sans-serif; overflow: hidden; }
        
        /* CONTAINER PRINCIPALE */
        .glass-player {
            position: relative; width: 780px; height: 580px; display: flex; align-items: center; justify-content: flex-start;
            padding: 20px; z-index: 1; background: #000; border-radius: 35px; box-shadow: inset 0 0 30px rgba(255, 255, 255, 0.05);
            overflow: hidden;
        }
        
        .glass-player::before {
            content: ''; position: absolute; top: -6px; left: -6px; right: -6px; bottom: -6px; padding: 6px;
            background: var(--rainbow); background-size: 400%; -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor; mask-composite: exclude; border-radius: 40px; animation: rainbow-border 10s linear infinite; z-index: -1;
        }
        
        @keyframes rainbow-border { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
        
        /* TITOLO TOP */
        .marquee-top-box { position: absolute; top: 35px; left: 50%; transform: translateX(-50%); width: 680px; z-index: 999; background: rgba(0,0,0,0.85); border-radius: 12px; padding: 10px 0; border: 2px solid; border-image: var(--rainbow) 1; overflow: hidden; }
        .cartaio-title-text { font-family: 'Arial Black', sans-serif; font-size: 34px; font-weight: 900; letter-spacing: 5px; text-transform: uppercase; text-align: center; display: block; background: var(--gold-luxury); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

        /* PANNELLO INFO (QUADRETTINI) */
        .side-panel-left { width: 170px; display: flex; flex-direction: column; gap: 12px; z-index: 10; margin-right: 20px; }
        .info-box { position: relative; background: rgba(255,255,255,0.05); border-radius: 12px; padding: 8px; color: white; text-align: center; border: 1.5px solid transparent; background-image: linear-gradient(#000, #000), var(--rainbow); background-origin: border-box; background-clip: padding-box, border-box; background-size: 100%, 400%; animation: rainbow-border 8s linear infinite; }
        .info-box h4 { margin: 0; font-size: 9px; text-transform: uppercase; background: var(--rainbow); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .box-data { font-size: 12px; font-weight: bold; color: #fff; }

        /* ZONA VINILE */
        .turntable-zone { position: relative; width: 400px; height: 400px; display: flex; justify-content: center; align-items: center; }
        #album-art { width: 320px; height: 320px; border-radius: 50%; object-fit: cover; border: 3px solid transparent; background-image: linear-gradient(#000, #000), var(--rainbow); background-origin: border-box; background-clip: padding-box, border-box; background-size: 100%, 400%; transition: 0.5s; }
        .tonearm { position: absolute; width: 100px; height: 260px; right: -110px; top: 140px; background: url('https://xatimg.com/image/XJhVjJdCs2bN.gif'); background-size: contain; background-repeat: no-repeat; transform-origin: top right; transform: rotate(-10deg); transition: 0.8s; z-index: 100; }
        
        /* CONTROLLI */
        .footer-wrap { position: absolute; bottom: 25px; width: 100%; display: flex; flex-direction: column; align-items: center; gap: 10px; z-index: 100; }
        .controls { display: flex; gap: 15px; align-items: center; background: rgba(0,0,0,0.8); padding: 12px 30px; border-radius: 50px; border: 1px solid rgba(255,255,255,0.2); }
        .btn-gold { background: var(--gold-btn); border: 1px solid #bf953f; color: #000; padding: 10px 25px; border-radius: 8px; cursor: pointer; font-weight: 900; text-transform: uppercase; }
        
        @keyframes rotate-smooth { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    </style>
</head>
