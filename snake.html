<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>Solo Effetto Snake per Xat - Bordi Allineati</title>
<style>
/* Sfondo della pagina totale */
body {    
    margin: 0;    
    background: #050507;    
    display: flex;    
    justify-content: center;    
    align-items: center;    
    height: 100vh;    
    overflow: hidden;
    position: relative;
    box-sizing: border-box;
}

*, *::before, *::after {
    box-sizing: border-box;
}

/* Bagliore soft arcobaleno di sfondo */
body::before {
    content: "";
    position: absolute;
    width: 140vw;
    height: 140vh;
    background: conic-gradient(from 0deg, red, orange, yellow, lime, cyan, blue, purple, magenta, red);
    animation: rotazioneSfondo 25s linear infinite;
    z-index: -2;
    filter: blur(90px);
    opacity: 0.2;
}

@keyframes rotazioneSfondo {
    to { transform: rotate(360deg); }
}

/* CONTENITORE PRINCIPALE (Mantiene la chat e lo snake perfettamente sovrapposti) */
.xat-container-layout {
    position: relative;
    width: 845px;
    height: 531px;
}

/* Iframe o Chat Reale di Xat */
.xat-container-layout iframe, 
.xat-container-layout object, 
.xat-container-layout embed {
    position: absolute;
    top: 0;
    left: 0;
    width: 845px !important;
    height: 531px !important;
    border: none;
    z-index: 1; 
}

/* MASCHERA TRASPARENTE SVG SOVRAPPOSTA (Bordi precisi 845x531) */
.snake-svg-overlay {
    position: absolute;
    top: 0;
    left: 0;
    width: 845px;
    height: 531px;
    z-index: 10; 
    pointer-events: none; /* Rende lo snake cliccabile e trasparente per usare la chat */
}

/* Stile dei serpenti al neon */
.snake-line {
    fill: none;
    stroke-width: 4px;
    stroke-linecap: round;
    stroke-linejoin: round;
    /* Creato un loop armonioso lungo il perimetro totale di ~2750px */
    stroke-dasharray: 400 900; 
    animation: snakeMoveInterno 6s linear infinite;
    filter: drop-shadow(0 0 8px rgba(255, 255, 255, 0.9));
}

@keyframes snakeMoveInterno {
    0% { stroke-dashoffset: 2600; }
    100% { stroke-dashoffset: 0; }
}

/* Applica il colore arcobaleno continuo */
.rainbow-grad {
    stroke: url(#snakeRainbow);
}

/* SMILE DECORATIVI ESTERNI ALLA CHAT */
.xat-smile {
    position: absolute;
    font-size: 50px;
    user-select: none;
    z-index: -1;
    filter: drop-shadow(0 0 15px rgba(255,255,255,0.3));
}

.smile-fuoco { top: 12%; left: 12%; animation: gira 7s linear infinite; }
.smile-diavolo { top: 15%; right: 12%; animation: molleggia 4s infinite ease-in-out; }
.smile-bomba { bottom: 18%; left: 10%; animation: molleggia 5s infinite ease-in-out; }
.smile-teschio { bottom: 15%; right: 10%; animation: gira 6s linear infinite reverse; }
.smile-dollaro { top: 45%; left: 8%; animation: gira 9s linear infinite; }

@keyframes gira { to { transform: rotate(360deg); } }
@keyframes molleggia {
    0%, 100% { transform: scale(1) translateY(0); }
    50% { transform: scale(1.15) translateY(-12px); }
}
</style>
</head>
<body>

<div class="xat-smile smile-fuoco">🔥</div>
<div class="xat-smile smile-diavolo">😈</div>
<div class="xat-smile smile-bomba">💣</div>
<div class="xat-smile smile-teschio">💀</div>
<div class="xat-smile smile-dollaro">💵</div>

<div class="xat-container-layout">

    <svg class="snake-svg-overlay" viewBox="0 0 845 531" xmlns="http://www.w3.org/2000/svg">
        <defs>
            <linearGradient id="snakeRainbow" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" stop-color="#ff0000" />
                <stop offset="20%" stop-color="#ffcc00" />
                <stop offset="40%" stop-color="#00ff00" />
                <stop offset="60%" stop-color="#00ffff" />
                <stop offset="80%" stop-color="#0000ff" />
                <stop offset="100%" stop-color="#ff00ff" />
            </linearGradient>
        </defs>

        <path class="snake-line rainbow-grad" 
              d="M 2 2 L 843 2 L 843 529 L 2 529 Z" />

        <path class="snake-line rainbow-grad" style="animation-delay: -3s;"
              d="M 2 2 L 843 2 L 843 529 L 2 529 Z" />
    </svg>
</div>

</body>
</html>
