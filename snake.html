<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>Solo Effetto Snake per Xat</title>
<style>
/* Sfondo della pagina totale */
body {    
    margin: 0;    
    background: #050507;    
    display: flex;    
    justify-content: center;    
    align-items: center;    
    height: 100vh;    
    overflow: hidden;
    position: relative;
    box-sizing: border-box;
}

*, *::before, *::after {
    box-sizing: border-box;
}

/* Bagliore soft arcobaleno di sfondo (Lontano dietro la chat) */
body::before {
    content: "";
    position: absolute;
    width: 140vw;
    height: 140vh;
    background: conic-gradient(from 0deg, red, orange, yellow, lime, cyan, blue, purple, magenta, red);
    animation: rotazioneSfondo 25s linear infinite;
    z-index: -2;
    filter: blur(90px);
    opacity: 0.2;
}

@keyframes rotazioneSfondo {
    to { transform: rotate(360deg); }
}

/* CONTENITORE PRINCIPALE (Mantiene la chat e lo snake allineati) */
.xat-container-layout {
    position: relative;
    width: 645px;
    height: 431px;
}

/* QUI VA IL TUO CODICE DELLA CHAT REALE DI XAT 
   (Sia esso un iframe, un object o il div dell'applicazione)
*/
.xat-container-layout iframe, 
.xat-container-layout object, 
.xat-container-layout embed {
    position: absolute;
    top: 0;
    left: 0;
    width: 845px !important;
    height: 531px !important;
    border: none;
    z-index: 1; /* Sta sotto all'effetto snake */
}

/* MASCHERA TRASPARENTE SVG SOVRAPPOSTA (Prende le misure esatte di Xat) */
.snake-svg-overlay {
    position: absolute;
    top: 0;
    left: 0;
    width: 845px;
    height: 531px;
    z-index: 10; /* Sta sopra alla chat grigia di default */
    pointer-events: none; /* Rende lo snake invisibile ai click per farti usare la chat liberamente */
}

/* Stile dei serpenti al neon */
.snake-line {
    fill: none;
    stroke-width: 4px;
    stroke-linecap: round;
    stroke-linejoin: round;
    stroke-dasharray: 220 650; 
    animation: snakeMoveInterno 4s linear infinite;
    filter: drop-shadow(0 0 6px rgba(255, 255, 255, 0.9));
}

@keyframes snakeMoveInterno {
    0% { stroke-dashoffset: 1300; }
    100% { stroke-dashoffset: 0; }
}

/* Applica il colore arcobaleno continuo */
.rainbow-grad {
    stroke: url(#snakeRainbow);
}

/* SMILE DECORATIVI ESTERNI ALLA CHAT */
.xat-smile {
    position: absolute;
    font-size: 50px;
    user-select: none;
    z-index: -1;
    filter: drop-shadow(0 0 15px rgba(255,255,255,0.3));
}

.smile-fuoco { top: 12%; left: 12%; animation: gira 7s linear infinite; }
.smile-diavolo { top: 15%; right: 12%; animation: molleggia 4s infinite ease-in-out; }
.smile-bomba { bottom: 18%; left: 10%; animation: molleggia 5s infinite ease-in-out; }
.smile-teschio { bottom: 15%; right: 10%; animation: gira 6s linear infinite reverse; }
.smile-dollaro { top: 45%; left: 8%; animation: gira 9s linear infinite; }

@keyframes gira { to { transform: rotate(360deg); } }
@keyframes molleggia {
    0%, 100% { transform: scale(1) translateY(0); }
    50% { transform: scale(1.15) translateY(-12px); }
}
</style>
</head>
<body>

<div class="xat-smile smile-fuoco">🔥</div>
<div class="xat-smile smile-diavolo">😈</div>
<div class="xat-smile smile-bomba">💣</div>
<div class="xat-smile smile-teschio">💀</div>
<div class="xat-smile smile-dollaro">💵</div>

<div class="xat-container-layout">

    <svg class="snake-svg-overlay" viewBox="0 0 845 531" xmlns="http://www.w3.org/2000/svg">
        <defs>
            <linearGradient id="snakeRainbow" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" stop-color="#ff0000" />
                <stop offset="20%" stop-color="#ffcc00" />
                <stop offset="40%" stop-color="#00ff00" />
                <stop offset="60%" stop-color="#00ffff" />
                <stop offset="80%" stop-color="#0000ff" />
                <stop offset="100%" stop-color="#ff00ff" />
            </linearGradient>
        </defs>

        <path class="snake-line rainbow-grad" 
              d="M 12 11 
                 L 46 11 L 56 22 L 234 22 L 244 11 L 614 11 
                 A 10 10 0 0 1 624 21 
                 L 624 352 L 588 352 L 588 381 L 168 381 L 168 355 L 12 355 
                 A 6 6 0 0 1 6 349 L 6 17 A 6 6 0 0 1 12 11 Z" />

        <path class="snake-line rainbow-grad" style="animation-delay: -1.3s;"
              d="M 638 11 
                 L 833 11 
                 A 10 10 0 0 1 843 21 
                 L 843 355 L 795 355 L 795 381 L 638 381 
                 A 6 6 0 0 1 632 375 L 632 17 A 6 6 0 0 1 638 11 Z" />

        <path class="snake-line rainbow-grad" style="animation-delay: -2.6s;"
              d="M 4 412
                 L 567 412
                 A 6 6 0 0 1 573 418
                 L 573 506
                 A 6 6 0 0 1 567 512
                 L 395 512
                 L 383 500
                 L 56 500
                 L 44 512
                 L 4 512
                 Z" />
    </svg>
</div>

</body>
</html>
