<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>IL CARTAIO - ARMOR COMPACT 700x650</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&display=swap');

        :root {
            --alien-color: #ff00ff; /* Colore Neon */
            --panel-bg: rgba(255, 182, 193, 0.15); /* Rosa Trasparente */
            --armor-shape: polygon(15% 0, 85% 0, 100% 15%, 100% 85%, 85% 100%, 15% 100%, 0 85%, 0 15%);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body { 
            background: #000; 
            height: 100vh; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            font-family: 'Orbitron', sans-serif; 
            overflow: hidden;
        }

        /* STRUTTURA TOTALE LARGHEZZA CIRCA 1050px (150+700+150 + gap) */
        .main-armor-wrapper {
            display: flex;
            align-items: center;
            gap: 20px; /* Distacco tra i pezzi */
            transition: all 0.8s ease-in-out;
        }

        /* UNITA' CORAZZATA */
        .unit-frame {
            background: var(--panel-bg);
            backdrop-filter: blur(10px);
            border: 5px solid var(--alien-color);
            clip-path: var(--armor-shape);
            box-shadow: 0 0 30px var(--alien-color), inset 0 0 20px rgba(255, 255, 255, 0.1);
            position: relative;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* GIF LATERALE (PIÙ STRETTA) */
        .side-module {
            width: 250px; /* Larghezza ridotta come richiesto */
            height: 400px; /* Altezza bilanciata */
        }

        .side-module img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            filter: brightness(1.2) contrast(1.1);
        }

        /* CORE CENTRALE 700x650 */
        .central-core {
            width: 700px;
            height: 650px;
            border-width: 6px;
            box-shadow: 0 0 45px var(--alien-color);
        }

        .brand-text {
            color: var(--alien-color);
            font-size: 28px;
            font-weight: 900;
            text-shadow: 0 0 20px var(--alien-color);
            text-transform: uppercase;
            letter-spacing: 6px;
        }
    </style>
</head>
<body>

    <div class="main-armor-wrapper">
        
        <div class="unit-frame side-module">
            <img src="https://xatimg.com/image/4WwGYIVSz6xX.gif" alt="Color Flow">
        </div>

        <div class="unit-frame central-core">
            <h1 class="brand-text">Il Cartaio</h1>
        </div>

        <div class="unit-frame side-module">
            <img src="https://xatimg.com/image/4WwGYIVSz6xX.gif" alt="Color Flow">
        </div>

    </div>

</body>
</html>
