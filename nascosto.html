<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>IL CARTAIO - ARMOR ARCHITECTURE 1300</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&display=swap');

        :root {
            --alien-color: #ff00ff; /* Colore neon principale */
            /* Rosa trasparente Armor */
            --panel-bg: rgba(255, 182, 193, 0.15); 
            /* Forma geometrica della foto */
            --armor-shape: polygon(12% 0, 88% 0, 100% 15%, 100% 85%, 88% 100%, 12% 100%, 0 85%, 0 15%);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body { 
            background: #000; 
            height: 100vh; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            font-family: 'Orbitron', sans-serif; 
            overflow: hidden;
        }

        /* STRUTTURA PRINCIPALE 1300x750 */
        .main-armor-grid {
            width: 1300px;
            height: 750px;
            display: grid;
            grid-template-columns: 260px 748px 260px; /* 748 centrale come richiesto */
            gap: 16px;
            padding: 20px;
            transition: all 0.8s ease-in-out;
        }

        /* UNITA' CORAZZATA GENERICA */
        .unit-frame {
            background: var(--panel-bg);
            backdrop-filter: blur(8px);
            border: 5px solid var(--alien-color);
            clip-path: var(--armor-shape);
            box-shadow: 0 0 30px var(--alien-color), inset 0 0 20px rgba(255, 255, 255, 0.1);
            position: relative;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* CORE CENTRALE (748px) */
        .central-core {
            grid-column: 2;
            border-width: 6px;
            box-shadow: 0 0 45px var(--alien-color);
        }

        /* GIF LATERALE (DX e SX) */
        .side-module img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            filter: brightness(1.2) contrast(1.1);
        }

        /* EFFETTO GLOW SUL TESTO */
        .brand-text {
            color: var(--alien-color);
            font-size: 24px;
            font-weight: 900;
            text-shadow: 0 0 15px var(--alien-color);
            text-transform: uppercase;
            letter-spacing: 5px;
        }
    </style>
</head>
<body>

    <div class="main-armor-grid">
        
        <div class="unit-frame side-module">
            <img src="https://xatimg.com/image/4WwGYIVSz6xX.gif" alt="Color Flow">
        </div>

        <div class="unit-frame central-core">
            <h1 class="brand-text">Il Cartaio</h1>
        </div>

        <div class="unit-frame side-module">
            <img src="https://xatimg.com/image/4WwGYIVSz6xX.gif" alt="Color Flow">
        </div>

    </div>

</body>
</html>
