<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>fortunato</title>

<style>
html, body {
    margin: 0;
    padding: 0;
    background: radial-gradient(circle, #1e90ff 0%, #00bfff 30%, #000000 100%);
    overflow: hidden; 
    height: 100%;
}

/* Contenitore per le immagini */
.image-box {
    position: fixed;
    width: 240px;
    height: 520px;
    top: 50%;
    transform: translateY(-50%);
    border-radius: 20px;
    border: 14px solid #add8e6; 
    animation: glowPulse 2s infinite alternate ease-in-out;
    overflow: hidden;
    z-index: 9999;
}

.image-left { left: 10px; }
.image-right { right: 10px; }

.image-box img {
    width: 100%;
    height: 100%;
    object-fit: cover; /* Mantiene le proporzioni tagliando l'eccesso */
    display: block;
}

.video-text {
    position: absolute;
    bottom: 12px;
    left: 0;
    width: 100%;
    text-align: center;
    font-size: 24px;
    font-weight: 900;
    text-transform: uppercase;
    letter-spacing: 1px;
    background: linear-gradient(90deg, #fff, #add8e6, #fff);
    background-size: 200% auto;
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    animation: wave 3s ease-in-out infinite, shine 2s linear infinite;
    pointer-events: none;
    filter: drop-shadow(0 0 5px rgba(255,255,255,0.5));
}

@keyframes shine {
    to { background-position: 200% center; }
}

@keyframes wave {
    0%, 100% { transform: translateY(0) rotate(0deg); }
    50% { transform: translateY(-5px) rotate(2deg); }
}

@keyframes glowPulse {
    0% { box-shadow: 0 0 10px #add8e6, 0 0 5px #add8e6 inset; }
    100% { box-shadow: 0 0 40px #00bfff, 0 0 20px #00bfff inset; }
}

.floating-emoji {
    position: fixed;
    bottom: -50px;
    user-select: none;
    pointer-events: none;
    z-index: 1;
    font-weight: bold;
    animation: floatUp linear forwards;
}

@keyframes floatUp {
    0% { transform: translateY(0) rotate(0deg); opacity: 0; }
    10% { opacity: 1; }
    90% { opacity: 1; }
    100% { transform: translateY(-110vh) translateX(40px) rotate(360deg); opacity: 0; }
}
</style>
</head>

<body>

<div class="image-box image-left">
    <img src="https://xatimg.com/image/3dKGrquyrPrQ.jpg" alt="Fortunato 1">
    <div class="video-text">Fortunato</div>
</div>

<div class="image-box image-right">
    <img src="https://xatimg.com/image/3dKGrquyrPrQ.jpg" alt="Fortunato 2">
    <div class="video-text">Fortunato</div>
</div>

<script>
    const emojis = ['🎶', '🎵', '🎼', '⭐', '✨', '🎸', '🎹'];
    const colors = ['#ff0000', '#ffff00', '#39ff14'];

    function createParticle() {
        const particle = document.createElement('div');
        particle.className = 'floating-emoji';
        particle.innerText = emojis[Math.floor(Math.random() * emojis.length)];
        
        const randomColor = colors[Math.floor(Math.random() * colors.length)];
        particle.style.color = randomColor;
        particle.style.filter = `drop-shadow(0 0 8px ${randomColor})`;
        
        particle.style.left = Math.random() * 100 + "vw";
        const size = Math.random() * 25 + 20 + "px";
        particle.style.fontSize = size;
        
        const duration = Math.random() * 4 + 6;
        particle.style.animationDuration = duration + "s";

        document.body.appendChild(particle);
        setTimeout(() => { particle.remove(); }, duration * 1000);
    }

    setInterval(createParticle, 300);
</script>

</body>
</html>
