<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>GHOST-DARK3</title>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap');

        :root { 
            --radar-color: #ff0000; 
            --electric-blue: #00f2ff; 
            --radar-glow: rgba(255, 0, 0, 0.5);
            --bass-pow: 1; 
            --total-size: 600px;
            --radar-size: 460px;
            --icon-size: 40px;
            --orbit-radius: 195px;
        }

        body { 
            background: transparent; margin: 0; overflow: hidden; 
            display: flex; justify-content: center; align-items: center; 
            height: 100vh; font-family: 'Share Tech Mono', monospace; 
        }

        .system-wrapper { 
            position: relative; width: var(--total-size); height: var(--total-size); 
            display: flex; justify-content: center; align-items: center; 
            perspective: 1000px;
        }

        /* --- WUFER --- */
        .wufer-container {
            position: absolute; width: 120px; height: 120px;
            border-radius: 50%; background: #000; border: 4px solid #1a1a1a;
            box-shadow: 0 0 30px rgba(0,0,0,0.8), inset 0 0 20px #ff000033;
            z-index: 5; opacity: 0; transition: opacity 0.5s ease;
            display: flex; justify-content: center; align-items: center;
            transform: scale(var(--bass-pow));
        }
        .wufer-membrane {
            position: absolute; width: 85%; height: 85%;
            background: radial-gradient(circle, #660000 0%, #000 70%);
            border-radius: 50%;
            border: 2px solid #333;
            box-shadow: inset 0 0 15px #000;
        }
        .wufer-container.active { opacity: 1; }
        .wufer-tl { top: -20px; left: -20px; } .wufer-tr { top: -20px; right: -20px; }
        .wufer-bl { bottom: -20px; left: -20px; } .wufer-br { bottom: -20px; right: -20px; }

        /* --- RADAR BOX --- */
        .radar-box {
            position: relative; width: var(--radar-size); height: var(--radar-size);
            background: #000;
            border-radius: 50%;
            z-index: 10;
            border: 15px solid transparent;
            background-clip: padding-box;
            box-shadow: 0 0 50px rgba(0, 242, 255, 0.3), inset 0 0 60px #000;
            display: flex; justify-content: center; align-items: center;
            overflow: hidden;
        }

        .radar-box::before {
            content: ''; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%;
            background: conic-gradient(var(--electric-blue), var(--radar-color), var(--electric-blue));
            animation: rotateBorder 4s linear infinite;
            z-index: -1;
        }

        @keyframes rotateBorder { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        .sonar-layer {
            position: absolute; top:0; left:0; width:100%; height:100%;
            background-image: url('https://peppeagosto.github.io/immaggini/sonar.png');
            background-size: cover; opacity: 0.4; z-index: 4; pointer-events: none;
        }

        #ghost-video {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            object-fit: cover; opacity: 0.35; pointer-events: none; z-index: 2;
            mix-blend-mode: screen;
            transition: opacity 0.5s ease;
        }

        #c-album { 
            position: absolute; width: 100%; height: 100%; top: 0; left: 0; 
            transform: scale(var(--bass-pow));
            background-size: cover; background-position: center; 
            background-repeat: no-repeat;
            opacity: 0; z-index: 1; transition: opacity 0.8s ease;
        }
        #c-album.active { opacity: 0.8; z-index: 3; }

        .sweep {
            position: absolute; width: 50%; height: 50%; top: 50%; left: 50%;
            background: linear-gradient(55deg, var(--radar-color) 0%, transparent 60%);
            transform-origin: top left; 
            animation: radar-sweep 6s linear infinite;
            border-top: 3px solid var(--electric-blue); z-index: 11;
        }
        .sweep.paused { animation-play-state: paused !important; }

        @keyframes radar-sweep { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        .tactical-icon {
            position: absolute; width: var(--icon-size); height: var(--icon-size); 
            top: 50%; left: 50%; margin: calc(var(--icon-size) / -2);
            border-radius: 50%; border: 3px solid var(--electric-blue);
            display: flex; align-items: center; justify-content: center;
            color: #fff; font-size: 18px; cursor: pointer; z-index: 25; 
            background: rgba(0, 20, 40, 0.95); opacity: 0.8;
            transition: all 0.3s;
            box-shadow: 0 0 10px var(--electric-blue);
        }
        
        .tactical-icon:hover { opacity: 1; box-shadow: 0 0 20px var(--electric-blue); }
        .detected { opacity: 1 !important; border-color: #fff; box-shadow: 0 0 25px #fff; }
        .locked { opacity: 1 !important; background: var(--radar-color) !important; border-color: #fff !important; }

        #center-title {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            color: #fff; font-size: 14px; text-align: center; width: 85%;
            z-index: 30; text-shadow: 0 0 15px var(--radar-color);
            pointer-events: none; opacity: 0; transition: opacity 0.3s;
            background: rgba(0, 0, 0, 0.9); padding: 12px 5px; border: 2px solid var(--electric-blue);
            border-radius: 10px; text-transform: uppercase;
        }
        #center-title.active { opacity: 1; }

        .pos-1 { transform: rotate(0deg) translate(var(--orbit-radius)) rotate(0deg); }
        .pos-2 { transform: rotate(40deg) translate(var(--orbit-radius)) rotate(-40deg); }
        .pos-3 { transform: rotate(80deg) translate(var(--orbit-radius)) rotate(-80deg); }
        .pos-4 { transform: rotate(120deg) translate(var(--orbit-radius)) rotate(-120deg); }
        .pos-5 { transform: rotate(160deg) translate(var(--orbit-radius)) rotate(-160deg); }
        .pos-6 { transform: rotate(200deg) translate(var(--orbit-radius)) rotate(-200deg); }
        .pos-7 { transform: rotate(240deg) translate(var(--orbit-radius)) rotate(-240deg); }
        .pos-8 { transform: rotate(280deg) translate(var(--orbit-radius)) rotate(-280deg); }
        .pos-9 { transform: rotate(320deg) translate(var(--orbit-radius)) rotate(-320deg); }
    </style>
</head>
<body>

<div class="system-wrapper">
    <div class="wufer-container wufer-tl"><div class="wufer-membrane"></div></div>
    <div class="wufer-container wufer-tr"><div class="wufer-membrane"></div></div>
    <div class="wufer-container wufer-bl"><div class="wufer-membrane"></div></div>
    <div class="wufer-container wufer-br"><div class="wufer-membrane"></div></div>

    <div class="radar-box" id="radar-ui">
        <div class="sonar-layer"></div>
        <video id="ghost-video" autoplay loop muted playsinline>
            <source src="https://peppeagosto.github.io/immaggini/ghost.mp4" type="video/mp4">
        </video>
        <div id="c-album"></div>
        <div id="center-title">GHOST SYSTEM READY</div>
        <div class="sweep" id="main-sweep"></div>
        
        <div class="tactical-icon pos-1" id="btn-play" data-name="RADIO LIVE"><i class="fas fa-play"></i></div>
        <div class="tactical-icon pos-2" id="btn-met" data-name="CITTÀ"><i class="fas fa-map-marker-alt"></i></div>
        <div class="tactical-icon pos-3" id="btn-woo" data-name="WUFER"><i class="fas fa-bullseye"></i></div>
        <div class="tactical-icon pos-4" id="btn-oro" data-name="OROSCOPO"><i class="fas fa-star"></i></div>
        <div class="tactical-icon pos-5" id="id-cov" data-name="COPERTINA"><i class="fas fa-compact-disc"></i></div>
        <div class="tactical-icon pos-6" id="btn-dat" data-name="CALENDARIO"><i class="fas fa-calendar-alt"></i></div>
        <div class="tactical-icon pos-7" id="btn-inf" data-name="ORA ESATTA"><i class="fas fa-clock"></i></div>
        <div class="tactical-icon pos-8" id="btn-vol" data-name="VOLUME"><i class="fas fa-volume-up"></i></div>
        <div class="tactical-icon pos-9" id="btn-tit" data-name="TITOLO BRANO"><i class="fas fa-music"></i></div>
    </div>
</div>

<audio id="a" crossorigin="anonymous"></audio>

<script>
    let isPlaying = false, isPaused = false, currentSong = "Sintonizzazione...";
    let lastPingTarget = -1, volIndex = 0;
    const volLevels = [1.0, 0.6, 0.2, 0.0], volNames = ["MASSIMO", "MEDIO", "BASSO", "MUTO"];
    const audio = document.getElementById('a');
    let audioCtx, analyser, dataArray, source;

    function speak(text) {
        window.speechSynthesis.cancel();
        const msg = new SpeechSynthesisUtterance(text);
        msg.lang = 'it-IT';
        window.speechSynthesis.speak(msg);
    }

    function showCenter(text) {
        const el = $('#center-title');
        el.html(text).addClass('active');
        setTimeout(() => { el.removeClass('active'); }, 5000);
    }

    function playSonarPing() {
        if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        if (audioCtx.state === 'suspended') audioCtx.resume();
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.frequency.setValueAtTime(800, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.8);
        osc.connect(gain); gain.connect(audioCtx.destination);
        osc.start(); osc.stop(audioCtx.currentTime + 0.8);
    }

    // --- FUNZIONE OROSCOPO REALE ---
    function getZodiacSign() {
        const d = new Date(), m = d.getMonth() + 1, g = d.getDate();
        if((m==3 && g>=21)||(m==4 && g<=19)) return "ARIETE";
        if((m==4 && g>=20)||(m==5 && g<=20)) return "TORO";
        if((m==5 && g>=21)||(m==6 && g<=20)) return "GEMELLI";
        if((m==6 && g>=21)||(m==7 && g<=22)) return "CANCRO";
        if((m==7 && g>=23)||(m==8 && g<=22)) return "LEONE";
        if((m==8 && g>=23)||(m==9 && g<=22)) return "VERGINE";
        if((m==9 && g>=23)||(m==10 && g<=22)) return "BILANCIA";
        if((m==10 && g>=23)||(m==11 && g<=21)) return "SCORPIONE";
        if((m==11 && g>=22)||(m==12 && g<=21)) return "SAGITTARIO";
        if((m==12 && g>=22)||(m==1 && g<=19)) return "CAPRICORNO";
        if((m==1 && g>=20)||(m==2 && g<=18)) return "ACQUARIO";
        return "PESCI";
    }

    function updateStreamData() {
        $.getJSON('https://stm2.srvif.com:7198/stats?sid=1&json=1&callback=?', function(data) {
            if(data && data.songtitle) {
                currentSong = data.songtitle;
                const imgUrl = data.trackimg;
                const isValidImg = (imgUrl && imgUrl.trim() !== "" && imgUrl.indexOf('trackalbumart.png') === -1);

                if(isValidImg) {
                    $('#c-album').css('background-image', 'url(' + imgUrl + ')');
                    if($('#id-cov').hasClass('locked')) {
                        $('#c-album').addClass('active');
                        $('#ghost-video').css('opacity', '0');
                    }
                } else {
                    $('#c-album').removeClass('active').css('background-image', 'none');
                    $('#ghost-video').css('opacity', '0.35');
                }
            }
        });
    }

    $('#btn-play').click(function(){
        if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        if (audioCtx.state === 'suspended') audioCtx.resume();
        if (!analyser) {
            analyser = audioCtx.createAnalyser();
            source = audioCtx.createMediaElementSource(audio);
            source.connect(analyser); analyser.connect(audioCtx.destination);
            analyser.fftSize = 128; dataArray = new Uint8Array(analyser.frequencyBinCount);
            render();
        }
        $(this).toggleClass('locked');
        if($(this).hasClass('locked')){
            audio.src = 'https://stm2.srvif.com:7198/7.aac/;stream.mp3';
            audio.load();
            audio.play().then(() => {
                isPlaying = true; updateStreamData();
                speak("Ghost System Online"); showCenter("STREAM ATTIVO");
            }).catch(() => $(this).removeClass('locked'));
        } else {
            audio.pause(); audio.src = ""; isPlaying = false;
            speak("Ghost System Offline");
        }
    });

    $('#id-cov').click(function(){ 
        $(this).toggleClass('locked');
        let hasImg = $('#c-album').css('background-image') !== 'none' && $('#c-album').css('background-image') !== '';
        if($(this).hasClass('locked') && hasImg) { 
            $('#c-album').addClass('active'); 
            $('#ghost-video').css('opacity', '0'); 
            speak("Copertina"); 
        } else { 
            $('#c-album').removeClass('active'); 
            $('#ghost-video').css('opacity', '0.35'); 
            speak($(this).hasClass('locked') ? "Copertina non disponibile" : "Modalità Video");
        }
    });

    $('#btn-met').click(async function(){ 
        try {
            const r = await fetch('https://ipapi.co/json/'); const d = await r.json();
            speak("Località " + d.city); showCenter("CITTÀ: " + d.city.toUpperCase());
        } catch(e) { showCenter("ERRORE GPS"); }
    });

    $('#btn-woo').click(function(){ $(this).toggleClass('locked'); $('.wufer-container').toggleClass('active'); speak("Bass boost"); });
    
    $('#btn-oro').click(function(){ 
        const segno = getZodiacSign();
        speak("Oroscopo per il segno " + segno); 
        showCenter("SEGNO: " + segno);
    });

    $('#btn-tit').click(function(){ updateStreamData(); speak(currentSong); showCenter(currentSong); });
    
    $('#btn-dat').click(function(){ 
        const dt = new Date().toLocaleDateString('it-IT', { weekday: 'long', day: 'numeric', month: 'long' });
        speak(dt); showCenter(dt.toUpperCase());
    });

    $('#btn-inf').click(function(){ 
        let ora = new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}); 
        speak("Ore " + ora); showCenter("ORA: " + ora); 
    });

    $('#btn-vol').click(function(){
        volIndex = (volIndex + 1) % volLevels.length;
        audio.volume = volLevels[volIndex];
        speak("Volume " + volNames[volIndex]);
        showCenter("VOL: " + volNames[volIndex]);
    });

    function render() {
        requestAnimationFrame(render);
        if(!isPlaying) { document.documentElement.style.setProperty('--bass-pow', 1); return; }
        analyser.getByteFrequencyData(dataArray);
        let vol = (dataArray[0] + dataArray[1] + dataArray[2]) / 3 / 255;
        document.documentElement.style.setProperty('--bass-pow', 1 + (vol * 0.5));
    }

    function checkScan() {
        if (isPlaying || isPaused) return; 
        const sweep = $('#main-sweep');
        const matrix = sweep.css('transform');
        if (matrix === 'none') return;
        const values = matrix.split('(')[1].split(')')[0].split(',');
        const angle = Math.round(Math.atan2(values[1], values[0]) * (180 / Math.PI));
        const norm = angle < 0 ? angle + 360 : angle;
        const targets = [0, 40, 80, 120, 160, 200, 240, 280, 320];
        const b_ids = ['#btn-play', '#btn-met', '#btn-woo', '#btn-oro', '#id-cov', '#btn-dat', '#btn-inf', '#btn-vol', '#btn-tit'];
        let hit = -1;
        targets.forEach((t, i) => { if (Math.abs(norm - t) < 5) hit = i; });
        if (hit !== -1 && hit !== lastPingTarget) {
            isPaused = true; lastPingTarget = hit;
            const icon = $(b_ids[hit]);
            sweep.addClass('paused'); icon.addClass('detected');
            playSonarPing(); showCenter(icon.attr('data-name'));
            setTimeout(() => { icon.removeClass('detected'); sweep.removeClass('paused'); isPaused = false; }, 2500); 
        }
        if (hit === -1) lastPingTarget = -1;
    }

    setInterval(checkScan, 50);
    setInterval(updateStreamData, 10000);
</script>
</body>
</html>
