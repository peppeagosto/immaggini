<style type="text/css">
  /* Contenitore principale dello scroller */
  .scroller-master-ultra {
    width: 800px;
    background: rgba(0, 0, 0, 0.6); /* Sfondo semi-trasparente più scuro */
    padding: 25px 0; /* Più padding per gestire lo zoom esagerato */
    border-top: 3px solid #ff4500;
    border-bottom: 3px solid #ff4500;
    overflow: hidden;
    font-family: 'Arial Black', sans-serif;
    box-sizing: border-box; /* Assicura che il padding non rompa la larghezza */
  }

  /* Stile delle immagini */
  .zoomin-list-ultra {
    display: flex;
    align-items: center;
  }

  .zoomin-list-ultra img {
    height: 160px;
    width: 250px;
    margin: 0 15px; /* Più margine tra le foto */
    border: 4px solid #fff;
    border-radius: 20px; /* Bordi più arrotondati */
    box-shadow: 0 8px 20px rgba(0,0,0,0.9);
    transition: all 0.3s ease-out; /* Transizione più rapida ed aggressiva */
    cursor: pointer;
    position: relative; /* Necessario per lo z-index */
  }

  /* 🚀 EFFETTO ZOOM ESAGERATO AL PASSAGGIO DEL MOUSE 🚀 */
  .zoomin-list-ultra img:hover {
    transform: scale(1.6); /* Ingrandisce del 60%! Molto evidente */
    border-color: #ff4500;
    box-shadow: 0 0 35px #ff4500; /* Bagliore più potente */
    z-index: 999; /* Sempre sopra a tutto */
  }

  /* Testo sopra le immagini */
  .scroller-title-ultra {
    color: #fff;
    text-align: center;
    font-size: 16px;
    margin-bottom: 15px;
    text-transform: uppercase;
    letter-spacing: 3px;
    text-shadow: 2px 2px 4px #000;
  }
</style>

<div class="scroller-master-ultra">
  <div class="scroller-title-ultra">🔥 I Miei Player V3 - Mega Zoom Attivo 🔥</div>
  
  <marquee behavior="alternate" direction="left" scrollamount="5" onmouseover="this.stop();" onmouseout="this.start();">

      <img src="https://images.unsplash.com/photo-1493225255756-d9584f8606e9?w=500" title="Mega Player 04">
      <img src="https://images.unsplash.com/photo-1511671782779-c97d3d27a1d4?w=500" title="Mega Player 05">
      <img src="https://images.unsplash.com/photo-1514525253361-bee8718a300a?w=500" title="Mega Player 06">
      <img src="https://images.unsplash.com/photo-1459749411177-042180ce673c?w=500" title="Mega Player 07">

</div>
