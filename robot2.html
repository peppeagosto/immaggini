
<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Radio Robot Dynamic Interface</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700&display=swap');
        
        body { background-color: #000; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; overflow: hidden; }

        .radio-container-850 { 
            width: 850px; height: 480px; 
            border-radius: 30px; position: relative; overflow: hidden; 
            font-family: 'Orbitron', sans-serif; border: 4px solid #333; 
        }

        /* Video di Sfondo */
        #video-bg {
            position: absolute; top: 50%; left: 50%;
            min-width: 100%; min-height: 100%;
            transform: translate(-50%, -50%);
            z-index: 1; object-fit: cover;
        }

        /* ANIMAZIONE COVER: Segue il robot avanti e indietro */
        @keyframes walkSync {
            0% { transform: scale(1) translateX(0); }
            50% { transform: scale(1.1) translateX(10px); } /* Si ingrandisce e si sposta quando il robot si avvicina */
            100% { transform: scale(1) translateX(0); }
        }

        .tv-screen {
            position: absolute;
            top: 120px; left: 50%;
            width: 260px; height: 160px; 
            margin-left: -130px; /* Centra lo schermo */
            z-index: 10; border-radius: 10px;
            overflow: hidden; border: 3px solid rgba(255,255,255,0.2);
            background: #000;
            animation: walkSync 6s ease-in-out infinite; /* Sincronizza il tempo con l'animazione del video */
        }

        .art-gambe { width: 100%; height: 100%; background-size: cover; background-position: center; }

        /* EQ FINE: Il robot ci cammina sopra */
        #canvas-eq { 
            position: absolute; bottom: 80px; left: 50%;
            transform: translateX(-50%);
            z-index: 5; background: rgba(0,0,0,0.2); 
            border-bottom: 2px solid #00ffff;
        }

        /* Controlli Verticali */
        .vertical-controls {
            position: absolute; left: 20px; top: 80px;
            display: flex; flex-direction: column; align-items: center;
            z-index: 100; background: rgba(0,0,0,0.8); padding: 10px; border-radius: 15px;
        }

        #volume-slider { appearance: none; width: 80px; transform: rotate(-90deg); margin: 40px 0; background: #555; height: 4px; }
        .neon-btn { width: 40px; height: 40px; border-radius: 50%; cursor: pointer; border: none; margin: 5px 0; }
        .play-color { background: #00ff00; box-shadow: 0 0 10px #00ff00; }
        .stop-color { background: #ff0000; box-shadow: 0 0 10px #ff0000; }

        .song-marquee { 
            position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
            width: 500px; background: rgba(0,0,0,0.9); padding: 5px; border-radius: 5px; z-index: 100;
        }
        .rbow { background: linear-gradient(to right, #00ffff, #ff00ff); -webkit-background-clip: text; color: transparent; font-size: 12px; }
    </style>
</head>
<body>

<div class="radio-container-850">
    <video autoplay muted loop playsinline id="video-bg">
        <source src="https://peppeagosto.github.io/immaggini/robot.mp4" type="video/mp4">
    </video>

    <audio id="radio-stream" crossorigin="anonymous">
        <source src="https://stm2.srvif.com:7198/;" type="audio/mpeg">
    </audio>

    <div class="vertical-controls">
        <button class="neon-btn play-color" onclick="initAudio()"></button>
        <input type="range" id="volume-slider" min="0" max="1" step="0.1" oninput="changeVolume(this.value)">
        <button class="neon-btn stop-color" onclick="stopAudio()"></button>
    </div>

    <div class="tv-screen">
        <div class="art-gambe" id="cover-art"></div>
    </div>

    <canvas id="canvas-eq" width="600" height="30"></canvas>

    <div class="song-marquee">
        <marquee><span id="title-gambe" class="rbow">IN ATTESA DEL ROBOT...</span></marquee>
    </div>
</div>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script>
let audioCtx, analyser, dataArray, source, isInitialized = false;

function updateInfo() {
    $.getJSON("https://stm2.srvif.com:7198/stats?sid=1&json=1&callback=?", function(data) {
        if (data && data.songtitle) {
            $('#title-gambe').text(data.songtitle);
            $.getJSON("https://itunes.apple.com/search?term=" + encodeURIComponent(data.songtitle) + "&limit=1&callback=?", function(res) {
                const img = res.results[0] ? res.results[0].artworkUrl100.replace('100x100', '600x600') : '';
                $('#cover-art').css('background-image', 'url(' + img + ')');
            });
        }
    });
}

function initAudio() {
    const audio = document.getElementById('radio-stream');
    if (isInitialized) { audio.play(); return; }
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    analyser = audioCtx.createAnalyser();
    source = audioCtx.createMediaElementSource(audio);
    source.connect(analyser);
    analyser.connect(audioCtx.destination);
    analyser.fftSize = 128;
    dataArray = new Uint8Array(analyser.frequencyBinCount);
    const canvas = document.getElementById('canvas-eq');
    const ctx = canvas.getContext('2d');

    function draw() {
        requestAnimationFrame(draw);
        analyser.getByteFrequencyData(dataArray);
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        let barWidth = canvas.width / dataArray.length;
        for(let i = 0; i < dataArray.length; i++) {
            let barHeight = (dataArray[i] / 255) * canvas.height;
            ctx.fillStyle = `cyan`;
            ctx.fillRect(i * barWidth, canvas.height - barHeight, barWidth - 1, barHeight);
        }
    }
    draw();
    audio.play();
    isInitialized = true;
    updateInfo();
    setInterval(updateInfo, 10000);
}

function stopAudio() { document.getElementById('radio-stream').pause(); }
function changeVolume(val) { document.getElementById('radio-stream').volume = val; }
</script>
</body>
</html>
