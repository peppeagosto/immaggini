<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <title>IL CARTAIO - MP4 + GLITCH</title>
  <style>
    body {
      margin: 0;
      /* Sfondo scuro per far risaltare i neon e le sfumature nere dei video */
      background: #0a0a0a; 
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      overflow: hidden;
      font-family: sans-serif;
    }

    /* CONTENITORE PRINCIPALE */
    .container {
      display: flex;
      justify-content: space-between; /* <-- Spinge gli elementi ai bordi estremi */
      align-items: center;
      width: 100%;
      padding: 0 15px; /* <-- Lascia giusto "un filo" di spazio (15px) dai bordi del monitor */
      box-sizing: border-box; /* Evita che il padding crei barre di scorrimento */
    }

    /* STILE BASE PER TUTTI I VIDEO */
    .video-wrapper {
      position: relative;
      border-radius: 22px;
      overflow: hidden;
      background: #000; /* Evita sfondi trasparenti sotto al video */
    }

    /* =========================================
       I BORDI SFUMATI (Vignettatura nera)
       ========================================= */
    .video-wrapper::after {
      content: "";
      position: absolute;
      inset: 0;
      /* Crea una cornice sfumata scura all'interno del riquadro */
      box-shadow: inset 0 0 50px 25px rgba(10, 10, 10, 0.95);
      pointer-events: none;
      z-index: 5; /* Deve stare sopra al video ma sotto ai testi */
    }

    /* =========================================
       LATERALI (DX e SX)
       ========================================= */
    .left, .right {
      width: 270px;
      height: 484px;
      border: 2px solid rgba(0, 255, 255, 0.4);
      box-shadow: 0 0 20px rgba(0, 255, 255, 0.2);
    }

    /* =========================================
       CENTRO - EFFETTO GLITCH E NEON
       ========================================= */
    .center {
      width: 410px;
      height: 550px;
      border: 3px solid #00f3ff;
      box-shadow: 0 0 25px #00f3ff, inset 0 0 30px #00f3ff;
      animation: signalLoss 6s infinite;
      z-index: 10;
    }

    /* Effetto linee di scansione (Scanlines) sul video centrale */
    .center::before {
      content: "";
      position: absolute;
      inset: 0;
      background: repeating-linear-gradient(
        0deg,
        rgba(0, 0, 0, 0.15),
        rgba(0, 0, 0, 0.15) 2px,
        transparent 2px,
        transparent 4px
      );
      pointer-events: none;
      z-index: 6; /* Si posiziona sopra la sfumatura nera */
    }

    /* IL TAG VIDEO */
    .side-video {
      width: 100%;
      height: 100%;
      /* "cover" riempie lo spazio senza deformare. 
         Se il video ti sembra troppo tagliato, cambialo in "contain" */
      object-fit: cover; 
      display: block;
    }

    /* Testo sopra i video */
    .video-text {
      position: absolute;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 25px;
      color: #fff5c0;
      text-shadow: 0 0 15px black, 0 0 25px magenta;
      z-index: 10;
      font-weight: bold;
      letter-spacing: 2px;
    }

    /* =========================================
       ANIMAZIONE GLITCH AGGIORNATA
       ========================================= */
    @keyframes signalLoss {
      0% { opacity: 1; transform: skewX(0deg); filter: hue-rotate(0deg); }
      5% { opacity: 0.8; transform: skewX(-3deg) scale(1.02); filter: hue-rotate(90deg) invert(0.2); }
      6% { opacity: 1; transform: skewX(0deg) scale(1); filter: hue-rotate(0deg); }
      30% { opacity: 1; }
      31% { opacity: 0.3; }
      33% { opacity: 1; filter: brightness(1.8) contrast(2.5); }
      34% { opacity: 1; filter: brightness(1) contrast(1); }
      70% { transform: translate(3px, -3px); filter: drop-shadow(-5px 0 0 red) drop-shadow(5px 0 0 cyan); }
      72% { transform: translate(0, 0); filter: none; }
      100% { opacity: 1; transform: none; }
    }
  </style>
</head>
<body>

  <div class="container">
    
    <div class="video-wrapper left">
      <video class="side-video" autoplay loop muted playsinline>
        <source src="https://peppeagosto.github.io/immaggini/sx1.mp4" type="video/mp4">
      </video>
      <div class="video-text">DIABLO</div>
    </div>

    <div class="video-wrapper center">
      <video class="side-video" autoplay loop muted playsinline>
        <source src="https://peppeagosto.github.io/immaggini/dx.mp4" type="video/mp4">
      </video>
    </div>

    <div class="video-wrapper right">
      <video class="side-video" autoplay loop muted playsinline>
        <source src="https://peppeagosto.github.io/immaggini/sx1.mp4" type="video/mp4">
      </video>
      <div class="video-text">CARTAIO</div>
    </div>

  </div>
