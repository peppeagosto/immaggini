<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<style>
    @import url('https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700&family=Old+Standard+TT:ital@1&display=swap');
    
    :root { 
        --glow: #ff4500; 
        --hot: #ff8c00; 
        --grad: linear-gradient(to bottom, #ff0000, #ff8c00, #ffff00); 
    }

    body {
        background: transparent; margin: 0; display: flex; justify-content: center;
        align-items: center; width: 800px; height: 760px; overflow: hidden; font-family: 'Cinzel', serif;
    }

    /* Schermo di blocco se manomettono la GIF */
    #security-lock {
        display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
        background: black; color: red; z-index: 9999; justify-content: center;
        align-items: center; font-family: 'Cinzel Decorative'; font-size: 30px; text-align: center;
    }

    .fire-text { background: var(--grad); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-weight: bold; }

    .infernal-wall {
        display: grid; grid-template-columns: 190px 320px 190px; grid-template-rows: 155px 155px;
        gap: 45px; align-items: center; justify-content: center; width: 800px;
    }

    .sculpted-frame {
        width: 185px; height: 145px; background: radial-gradient(circle, #2a0800 0%, #000 100%);
        position: relative; border: 11px solid #2a1f16;
        border-image: conic-gradient(from 45deg, var(--glow), #a67c52 25%, var(--glow) 50%, #a67c52 75%, var(--glow)) 20;
        box-shadow: 0 0 20px var(--glow), inset 0 0 25px #000;
        display: flex; flex-direction: column; justify-content: center; align-items: center;
    }

    /* ANIMAZIONI QUADRETTI */
    .box-sx-1 { animation: breath 4s infinite ease-in-out; } 
    .box-sx-2 { animation: swing 5s infinite ease-in-out; }
    .box-dx-1 { animation: float 6s infinite ease-in-out; }
    .box-dx-2 { animation: pulseGlow 3s infinite ease-in-out; }

    @keyframes breath { 0%, 100% { transform: rotate(-1deg) scale(1); } 50% { transform: rotate(-1deg) scale(1.05); } }
    @keyframes swing { 0%, 100% { transform: rotate(1deg); } 50% { transform: rotate(-3deg); } }
    @keyframes float { 0%, 100% { transform: rotate(1deg) translateY(0); } 50% { transform: rotate(1deg) translateY(-15px); } }
    @keyframes pulseGlow { 0%, 100% { box-shadow: 0 0 15px var(--glow); transform: rotate(-1deg); } 50% { box-shadow: 0 0 45px var(--hot); transform: rotate(-1deg) scale(1.03); } }

    .main-altar {
        grid-column: 2; grid-row: 1 / 3; width: 300px; height: 580px;
        background: rgba(10, 2, 0, 0.98); border: 18px solid #a67c52;
        border-image: repeating-linear-gradient(45deg, #411000, var(--glow) 10%, var(--hot) 20%) 25;
        box-shadow: 0 0 90px #000, 0 0 25px var(--glow); padding: 20px; 
        display: flex; flex-direction: column; align-items: center; position: relative;
    }

    #scroller-area { margin-top: 130px; width: 100%; border-bottom: 3px solid var(--hot); padding-bottom: 5px; }
    #log { width: 100%; height: 70px; background: rgba(0,0,0,0.85); font-size: 10px; border: 1px solid #411000; margin-top: 15px; overflow: hidden;}
</style>
</head>
<body>

<div id="security-lock">ACCESSO NEGATO<br>PORTALE MANOMESSO</div>

<div class="infernal-wall" id="main-content">
    <div class="sculpted-frame box-sx-1">
        <div class="label fire-text" style="font-size: 10px;">METEO</div>
        <div class="data fire-text" id="temp">--°C</div>
    </div>
    <div class="sculpted-frame box-sx-2">
        <div class="fire-text" id="sign" style="font-size: 10px;">PESCI</div>
        <div class="data fire-text" style="font-size: 11px;">FATO ATTIVO</div>
    </div>
    
    <div class="main-altar">
        <div style="font-family:'Cinzel Decorative'; font-size: 30px; text-shadow: 0 0 15px red; position: absolute; top: 30px;" class="fire-text">Il Cartaio</div>
        
        <div id="scroller-area">
            <marquee id="track-marquee" direction="left" behavior="alternate" scrollamount="5" class="fire-text" style="font-style: italic; font-size: 18px;">
                CARICAMENTO...
            </marquee>
        </div>

        <div id="log"></div>

        <div style="margin-top: auto; width: 100%; display: flex; justify-content: space-between; align-items: center;">
            <button onclick="toggle()" id="exeBtn" style="background:#2a0800; border:1px solid var(--glow); color:white; cursor:pointer; padding:8px 15px;">OPEN</button>
            <div id="clock" class="fire-text" style="font-size: 15px;">00:00:00</div>
        </div>
    </div>

    <div class="sculpted-frame box-dx-1">
        <div class="fire-text" style="font-size: 10px;">TERRITORIO</div>
        <div id="city" class="data fire-text">...</div>
    </div>
    <div class="sculpted-frame box-dx-2">
        <img id="el-diablo-gif" src="https://xatimg.com/image/XzTOUFUQMvkJ.png" style="width:130px; height:100px; object-fit:cover; border:2px solid var(--glow);">
    </div>
</div>

<audio id="audio" crossorigin="anonymous" src="https://stream.zeno.fm/ylkruiq5e4fvv"></audio>

<script>
    const audio = document.getElementById("audio");
    const log = document.getElementById('log');
    const marquee = document.getElementById('track-marquee');
    const diabloGif = document.getElementById('el-diablo-gif');
    const mainContent = document.getElementById('main-content');
    const lockScreen = document.getElementById('security-lock');
    
    // --- LOGICA DI PROTEZIONE ---
    const ORIGINAL_GIF = "https://xatimg.com/image/XzTOUFUQMvkJ.png";
    
    function checkSecurity() {
        if (diabloGif.src !== ORIGINAL_GIF) {
            mainContent.style.display = "none";
            lockScreen.style.display = "flex";
            audio.pause();
        }
    }
    // Controlla ogni 2 secondi se qualcuno ha cambiato la GIF
    setInterval(checkSecurity, 2000);

    function addLog(msg) {
        const div = document.createElement('div');
        div.className = "fire-text"; div.style.padding = "2px";
        div.innerText = `[${new Date().toLocaleTimeString()}] ${msg}`;
        log.prepend(div);
    }

    async function updateTitles() {
        try {
            const r = await fetch("https://zenoplay.zenomedia.com/api/zenofm/nowplaying/ylkruiq5e4fvv?t=" + Date.now());
            const d = await r.json();
            if(d.title && d.title.toUpperCase() !== currentTitle) {
                marquee.innerText = d.title.toUpperCase();
                addLog("TITOLO: " + d.title.toUpperCase());
            }
        } catch(e) {}
    }

    function toggle() {
        if (audio.paused) { audio.play(); document.getElementById('exeBtn').innerText="CLOSE"; }
        else { audio.pause(); document.getElementById('exeBtn').innerText="OPEN"; }
    }

    setInterval(updateTitles, 10000);
    setInterval(() => { document.getElementById('clock').innerText = new Date().toLocaleTimeString(); }, 1000);
</script>
</body>
</html>
