<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<style>
    @import url('https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700&display=swap');
    
    body { background: transparent; margin: 0; display: flex; justify-content: center; align-items: center; width: 800px; height: 760px; overflow: hidden; }

    /* SCHERMO DI BLOCCO UMILIANTE */
    #security-lock {
        display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
        background: black; color: #ff0000; z-index: 9999; flex-direction: column;
        justify-content: center; align-items: center; font-family: 'Cinzel Decorative'; 
        text-align: center; border: 20px solid #ff0000;
    }

    .fire-text { background: linear-gradient(to bottom, #ff0000, #ff8c00, #ffff00); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-weight: bold; }
    
    .main-altar {
        width: 300px; height: 580px; background: rgba(10, 2, 0, 0.98); border: 18px solid #a67c52;
        box-shadow: 0 0 25px #ff4500; display: flex; flex-direction: column; align-items: center; position: relative;
    }

    #scroller-area { margin-top: 130px; width: 100%; border-bottom: 3px solid #ff8c00; }
</style>
</head>
<body>

<div id="security-lock">
    <h1 style="font-size: 40px; margin-bottom: 10px;">ACCESSO NEGATO</h1>
    <p style="font-size: 20px; color: white;">NO COPIARE DAL CARTAIO CRETINO FATTELI DA SOLO</p>
    <p style="font-size: 18px; color: #666; font-style: italic;">DON'T COPY FROM CARTAIO IDIOT, DO IT YOURSELF</p>
</div>

<div id="main-content">
    <div class="main-altar">
        <div style="font-family:'Cinzel Decorative'; font-size: 30px; position: absolute; top: 30px;" class="fire-text">Il Cartaio</div>
        <div id="scroller-area">
            <marquee behavior="alternate" direction="left" scrollamount="5" class="fire-text" style="font-size: 18px;">SEGNALE ATTIVO...</marquee>
        </div>
        <img id="el-diablo-gif" src="https://xatimg.com/image/XzTOUFUQMvkJ.png" style="width:130px; height:100px; margin-top:200px; border:2px solid red;">
    </div>
</div>

<audio id="trap-sound" src="https://www.myinstants.com/media/sounds/evil-laugh.mp3"></audio>

<script>
    const diabloGif = document.getElementById('el-diablo-gif');
    const lockScreen = document.getElementById('security-lock');
    const mainContent = document.getElementById('main-content');
    const trapSound = document.getElementById('trap-sound');
    
    const ORIGINAL_GIF = "https://xatimg.com/image/XzTOUFUQMvkJ.png";
    let isLocked = false;

    function checkSecurity() {
        if (diabloGif.src !== ORIGINAL_GIF && !isLocked) {
            isLocked = true;
            mainContent.style.display = "none";
            lockScreen.style.display = "flex";
            
            // Suona la risata per 5 secondi poi si ferma
            trapSound.play();
            setTimeout(() => {
                trapSound.pause();
                trapSound.currentTime = 0;
            }, 5000); 
        }
    }

    setInterval(checkSecurity, 1000);
</script>
</body>
</html>
