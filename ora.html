<html lang="it">
<head>
  <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
  <title>IL CARTAIO - OFFICIAL</title>
  <style>
    body { margin: 0; background: transparent; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
    .container { position: relative; width: 1308px; height: 484px; }
    .wrapper { position: absolute; overflow: hidden; border-radius: 22px; width: 270px; height: 484px; }

    /* ANIMAZIONI */
    @keyframes rainbow-bg { 0% { background-position: 0% 50%; } 100% { background-position: 200% 50%; } }
    @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0; } 100% { opacity: 1; } }

    /* BORDO ARCOBALENO */
    .wrapper::after {
      content: ""; position: absolute; top: 0; left: 0; width: 100%; height: 100%; box-sizing: border-box; border: 9px solid transparent; border-radius: 22px;
      background: linear-gradient(90deg, #ff0000, #ffaa00, #ffff00, #00ff00, #00ffff, #0000ff, #ff00ff, #ff0000) border-box;
      -webkit-mask: linear-gradient(#fff 0 0) padding-box, linear-gradient(#fff 0 0); -webkit-mask-composite: destination-out;
      mask-composite: exclude; background-size: 200%; animation: rainbow-bg 3s linear infinite; z-index: 10; pointer-events: none;
    }

    .testo-arcobaleno { background: linear-gradient(90deg, #ff0000, #ffaa00, #ffff00, #00ffaa, #00aaff, #aa00ff, #ff0000); background-size: 200%; -webkit-background-clip: text; -webkit-text-fill-color: transparent; animation: rainbow-bg 3s linear infinite; }

    /* PANNELLI */
    .left { left: -20px; background: radial-gradient(circle, #2a2a2a 0%, #050505 100%); backdrop-filter: blur(15px); display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; }
    .right { right: -20px; background: linear-gradient(145deg, #1a1a1a, #000000); display: flex; flex-direction: column; justify-content: center; align-items: center; }

    /* STILE SX */
    .orario-grande { font-family: 'Arial Black', sans-serif; font-size: 55px; font-weight: 900; margin-bottom: 5px; }
    .data-info { font-family: 'Arial', sans-serif; font-size: 16px; color: #fff; margin-top: 10px; text-transform: uppercase; letter-spacing: 1px; }
    .citta-box { font-weight: bold; color: #00ffff; margin-top: 5px; }

    .side-video { width: 90%; height: 80%; object-fit: cover; opacity: 0.85; padding: 9px; border-radius: 22px; z-index: 2; }
    
    /* COMANDI */
    .comandi-container { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); text-align: center; z-index: 20; }
    .btn-ascolta { background: rgba(0, 0, 0, 0.7); border: 2px solid #fff; border-radius: 12px; padding: 10px 20px; color: white; font-weight: bold; cursor: pointer; }
    .label-text { position: absolute; bottom: 25px; font-family: 'Arial', sans-serif; font-size: 20px; font-weight: bold; text-transform: uppercase; }
  </style>
</head>
<body>

<div class="container">
  <div class="wrapper left">
    <div id="orario-grande" class="orario-grande testo-arcobaleno">00:00</div>
    <div class="data-info">
      <div id="data-estesa">...</div>
      <div id="citta-reale" class="citta-box">Torino, IT</div>
    </div>
    <div class="label-text testo-arcobaleno">IL CARTAIO</div>
  </div>

  <div class="wrapper right">
    <video id="video-ragazze" class="side-video" autoplay loop muted playsinline>
      <source src="https://i.imgur.com/iikk9At.mp4" type="video/mp4">
    </video>
  </div>
</div>

<div class="comandi-container">
  <button id="tasto-audio" class="btn-ascolta">ON AUDIO</button>
</div>

<script>
  // AGGIORNAMENTO DATI
  function updateData() {
    const now = new Date();
    // Ora
    document.getElementById('orario-grande').innerText = now.toLocaleTimeString('it-IT', {hour: '2-digit', minute:'2-digit'});
    // Data
    const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
    document.getElementById('data-estesa').innerText = now.toLocaleDateString('it-IT', options);
  }
  
  setInterval(updateData, 1000);
  updateData();

  // AUDIO LOGIC
  const videoRagazze = document.getElementById('video-ragazze');
  const tastoAudio = document.getElementById('tasto-audio');
  tastoAudio.addEventListener('click', () => {
    videoRagazze.muted = !videoRagazze.muted;
    tastoAudio.innerText = videoRagazze.muted ? "ON AUDIO" : "OFF AUDIO";
  });
</script>

</body>
</html>
