
<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Xat Bubbles Dynamic - Scia Mouse</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            transition: background 5s ease-in-out;
            background-color: #000;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .ghost-container {
            position: absolute;
            z-index: 0; 
            width: 80%; 
            max-width: 600px; 
            opacity: 0.15; 
            filter: grayscale(1) blur(2px);
            pointer-events: none;
            user-select: none;
        }

        .ghost-container img {
            width: 100%;
            height: auto;
            display: block;
        }

        canvas {
            display: block;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }
    </style>
</head>
<body id="bgBody">

<div class="ghost-container">
    <img src="https://xatimg.com/image/0NnjOulN3Caa.jpg" alt="Ghost Demon">
</div>

<canvas id="bubbleCanvas"></canvas>

<script>
    const canvas = document.getElementById('bubbleCanvas');
    const ctx = canvas.getContext('2d');
    const body = document.getElementById('bgBody');

    // --- CONFIGURAZIONE SFONDI ---
    const backgrounds = [
        "radial-gradient(circle, #333 0%, #111 30%, #000 100%)",
        "radial-gradient(circle, #ff4d4d 0%, #b30000 60%, #330000 100%)",
        "radial-gradient(circle, #ff944d 0%, #e65c00 60%, #4d1f00 100%)",
        "radial-gradient(circle, #ffff66 0%, #ffd700 60%, #665200 100%)",
        "radial-gradient(circle, #4d94ff 0%, #005ce6 60%, #002b80 100%)"
    ];
    
    let currentBgIndex = 0;
    function updateBg() {
        body.style.background = backgrounds[currentBgIndex];
        currentBgIndex = (currentBgIndex + 1) % backgrounds.length;
    }
    updateBg();
    setInterval(updateBg, 10000); 

    // --- LOGICA BOLLE E SCIA ---
    const emojis = ['😀', '😎', '🤩', '✨', '🔥', '🎶', '⭐', '🎸', '💎', '🚀'];
    const colors = ['#ffffff', '#add8e6', '#00bfff', '#ffff00', '#39ff14', '#ff00ff'];
    let bubbles = [];
    let trail = []; // Array per la scia del mouse
    const bubbleCount = 65;

    function resize() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resize);
    resize();

    // Classe per le bolle che risalgono
    class Bubble {
        constructor() { this.init(); }
        init() {
            this.x = Math.random() * canvas.width;
            this.y = canvas.height + Math.random() * 200;
            this.size = Math.random() * 30 + 15;
            this.speedY = Math.random() * 1.2 + 0.6;
            this.speedX = (Math.random() - 0.5) * 1;
            this.emoji = emojis[Math.floor(Math.random() * emojis.length)];
            this.color = colors[Math.floor(Math.random() * colors.length)];
            this.opacity = Math.random() * 0.5 + 0.5;
            this.glow = Math.random() * 15 + 10;
        }
        update() {
            this.y -= this.speedY;
            this.x += this.speedX;
            if (this.y < -50) this.init();
        }
        draw() {
            ctx.save();
            ctx.globalAlpha = this.opacity;
            ctx.shadowBlur = this.glow;
            ctx.shadowColor = this.color;
            ctx.font = `${this.size}px Arial`;
            ctx.textAlign = 'center';
            ctx.fillText(this.emoji, this.x, this.y);
            ctx.restore();
        }
    }

    // Classe per la scia del puntatore
    class TrailParticle {
        constructor(x, y) {
            this.x = x;
            this.y = y;
            this.size = Math.random() * 8 + 2;
            this.speedX = (Math.random() - 0.5) * 3;
            this.speedY = (Math.random() - 0.5) * 3;
            this.life = 1.0; // Vita della particella (da 1 a 0)
            this.decay = Math.random() * 0.02 + 0.015;
            this.color = colors[Math.floor(Math.random() * colors.length)];
        }
        update() {
            this.x += this.speedX;
            this.y += this.speedY;
            this.life -= this.decay;
        }
        draw() {
            ctx.save();
            ctx.globalAlpha = this.life;
            ctx.fillStyle = this.color;
            ctx.shadowBlur = 10;
            ctx.shadowColor = this.color;
            ctx.beginPath();
            ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
            ctx.fill();
            ctx.restore();
        }
    }

    // Evento movimento mouse
    window.addEventListener('mousemove', (e) => {
        for(let i=0; i<3; i++) { // Crea 3 particelle a ogni movimento
            trail.push(new TrailParticle(e.clientX, e.clientY));
        }
    });

    // Supporto Touch per mobile
    window.addEventListener('touchmove', (e) => {
        const touch = e.touches[0];
        for(let i=0; i<3; i++) {
            trail.push(new TrailParticle(touch.clientX, touch.clientY));
        }
    });

    function setup() {
        bubbles = [];
        for (let i = 0; i < bubbleCount; i++) bubbles.push(new Bubble());
    }

    function loop() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        
        // Disegna Bolle
        bubbles.forEach(p => { p.update(); p.draw(); });

        // Disegna e pulisci scia
        for (let i = 0; i < trail.length; i++) {
            trail[i].update();
            trail[i].draw();
            if (trail[i].life <= 0) {
                trail.splice(i, 1);
                i--;
            }
        }
        
        requestAnimationFrame(loop);
    }

    setup();
    loop();
</script>

</body>
</html>
