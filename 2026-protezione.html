<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>EL CARTAIO - TOTAL NEON SYNC</title>
    <style>
        :root {
            --rainbow: linear-gradient(45deg, #ff0000, #ff7300, #fffb00, #48ff00, #00ffd5, #002bff, #7a00ff, #ff00c8, #ff0000);
            --accent: #00f2ff;
            --btn-grad: linear-gradient(to right, #00f2ff, #ff00c8);
        }
        body { background: transparent !important; margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; font-family: 'Arial Black', sans-serif; overflow: hidden; }

        .main-chassis {
            position: relative; width: 730px; height: 630px;
            background: radial-gradient(circle at center, #1a1a20 0%, #050505 100%);
            border-radius: 30px; padding: 15px;
            display: grid; grid-template-columns: 180px 1fr 180px; gap: 10px;
            border: 2px solid rgba(255,255,255,0.1);
            box-shadow: 0 0 30px var(--accent), inset 0 0 50px #000;
            z-index: 1;
        }

        .main-chassis::after {
            content: ''; position: absolute; inset: -3px; border-radius: 33px;
            padding: 3px; background: var(--rainbow); background-size: 400%;
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor; mask-composite: exclude; animation: rb-move 8s linear infinite;
            z-index: -1;
        }

        .display-top {
            grid-column: 1 / 4; height: 65px; background: rgba(0,0,0,0.9);
            border: 2px solid var(--accent); border-radius: 12px;
            overflow: hidden; position: relative; display: flex; align-items: center;
        }

        .marquee-box { display: flex; width: 100%; white-space: nowrap; animation: bounce-scroll 10s ease-in-out infinite alternate; }
        
        /* TESTO SFUMATO NEON/RAINBOW */
        .rainbow-text {
            font-size: 28px; font-weight: 900; text-transform: uppercase;
            background: var(--rainbow); background-size: 200%;
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            animation: rb-move 3s linear infinite; padding: 0 50px;
        }

        @keyframes bounce-scroll { 0% { transform: translateX(55%); } 100% { transform: translateX(-55%); } }

        .box { background: rgba(255,255,255,0.03); border: 1.5px solid var(--accent); border-radius: 10px; padding: 8px; text-align: center; }
        .box h4 { margin: 0; font-size: 8px; color: #bf953f; }
        
        /* SFUMATURA APPLICATA AI TESTI DEI BOX */
        .box span { 
            font-size: 11px; font-weight: bold; display: block; margin-top: 3px; 
            background: var(--btn-grad); -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 2px rgba(0,0,0,0.5));
        }

        .turntable { position: relative; display: flex; justify-content: center; align-items: center; }
        .vinyl { width: 280px; height: 280px; border-radius: 50%; border: 6px solid #0a0a0a; box-shadow: 0 0 30px var(--accent); overflow: hidden; background: #000; z-index: 5; }
        #album-art { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; }

        .arm {
            position: absolute; width: 110px; height: 260px; right: -55px; top: 45px;
            background: url('https://xatimg.com/image/XJhVjJdCs2bN.gif'); background-size: contain;
            background-repeat: no-repeat; transform-origin: top right;
            transform: rotate(-25deg); transition: 1.5s cubic-bezier(0.45, 0.05, 0.55, 0.95); z-index: 100;
        }

        .woofer-pro {
            width: 95px; height: 95px; border-radius: 50%;
            background: #080808; border: 3px solid #222;
            box-shadow: 0 0 15px var(--accent);
            display: flex; align-items: center; justify-content: center;
            position: relative;
        }
        
        .cone {
            width: 75px; height: 75px; border-radius: 50%;
            background: repeating-radial-gradient(circle, #111 0, #111 4px, #000 5px, #000 7px);
            display: flex; align-items: center; justify-content: center;
            box-shadow: inset 0 0 20px #000;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .woofer-pro::before {
            content: ''; position: absolute; width: 100%; height: 100%;
            border-radius: 50%;
            border: 2px dotted var(--accent);
            opacity: 0.6;
        }

        .cap { width: 22px; height: 22px; border-radius: 50%; background: radial-gradient(circle, #333, #000); border: 1px solid #444; box-shadow: 0 0 10px var(--accent); z-index: 10; }

        .control-bar { grid-column: 1 / 4; display: flex; align-items: center; justify-content: space-between; background: rgba(0,0,0,0.9); border-radius: 40px; padding: 8px 25px; border: 2px solid var(--accent); }
        
        .btn { 
            background: var(--btn-grad); 
            border: none; 
            padding: 10px 25px; 
            border-radius: 8px; 
            font-weight: 900; 
            cursor: pointer; 
            font-size: 13px; 
            color: #fff; 
            text-shadow: 0 0 5px #000;
            box-shadow: 0 0 10px rgba(0, 242, 255, 0.5);
            transition: 0.3s;
        }
        .btn:hover { transform: scale(1.1); box-shadow: 0 0 20px var(--accent); }

        input[type=range] { -webkit-appearance: none; width: 140px; height: 8px; background: var(--btn-grad); border-radius: 5px; box-shadow: 0 0 10px var(--accent); }
        input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; width: 20px; height: 20px; background: #fff; border-radius: 50%; cursor: pointer; border: 2px solid var(--accent); }

        @keyframes rb-move { 0% { background-position: 0% 50%; } 100% { background-position: 200% 50%; } }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div class="main-chassis" id="player">
    <div class="display-top">
        <div class="marquee-box">
            <span id="scroll-text" class="rainbow-text">EL CARTAIO - TOTAL NEON SYNC</span>
        </div>
    </div>

    <div class="side-panel" style="display:flex; flex-direction:column; gap:8px; justify-content:center;">
        <div class="box"><h4>CLOCK</h4><span id="clock">00:00:00</span></div>
        <div class="box"><h4>SINGER</h4><span id="artist">---</span></div>
        <div class="box"><h4>SONG</h4><span id="song">---</span></div>
    </div>

    <div class="turntable">
        <div class="vinyl" id="v-box"><img id="album-art" src="https://xatimg.com/image/or3rbqD5I3rS.png"></div>
        <div id="arm" class="arm"></div>
    </div>

    <div style="display: flex; gap: 8px;">
        <div class="side-panel" style="display:flex; flex-direction:column; gap:8px; justify-content:center;">
            <div class="box"><h4>CITY</h4><span id="city">...</span></div>
            <div class="box"><h4>USER</h4><span id="ip" style="font-size:9px;">...</span></div>
            <div class="box"><h4>SHIELD</h4><span id="shield-text" style="color:#48ff00; font-size:9px; background:none; -webkit-text-fill-color: initial;">ENCRYPTED</span></div>
        </div>
        <div style="display: flex; flex-direction: column; gap: 10px; justify-content: center;">
            <div style="width:20px; height:20px; border-radius:50%; background:#00f2ff; cursor:pointer; border:1px solid white;" onclick="setT('#00f2ff')"></div>
            <div style="width:20px; height:20px; border-radius:50%; background:#ff00c8; cursor:pointer; border:1px solid white;" onclick="setT('#ff00c8')"></div>
            <div style="width:20px; height:20px; border-radius:50%; background:var(--rainbow); background-size:200%; cursor:pointer; border:1px solid white;" onclick="setT('rb')"></div>
        </div>
    </div>

    <div class="control-bar">
        <div class="woofer-pro" id="wl"><div class="cone"><div class="cap"></div></div></div>
        <button class="btn" onclick="play()">PLAY</button>
        <input type="range" id="vol" min="0" max="1" step="0.01" value="0.8">
        <button class="btn" onclick="stop()">STOP</button>
        <div class="woofer-pro" id="wr"><div class="cone"><div class="cap"></div></div></div>
    </div>
</div>

<script>
    const _Z = "ylkruiq5e4fvv";
    const p = new Audio("https://stream.zeno.fm/" + _Z);
    p.crossOrigin = "anonymous";
    let ctx, aly, dat;

    function play() {
        if(!ctx) {
            ctx = new (window.AudioContext || window.webkitAudioContext)();
            aly = ctx.createAnalyser();
            const s = ctx.createMediaElementSource(p);
            s.connect(aly); aly.connect(ctx.destination);
            aly.fftSize = 64; dat = new Uint8Array(aly.frequencyBinCount);
            loop();
        }
        p.play(); ctx.resume();
        document.getElementById('album-art').style.animation = "spin 4s linear infinite";
        document.getElementById('arm').style.transform = "rotate(15deg)";
    }

    function stop() {
        p.pause();
        document.getElementById('album-art').style.animation = "none";
        document.getElementById('arm').style.transform = "rotate(-25deg)";
    }

    function loop() {
        requestAnimationFrame(loop);
        if(!p.paused) {
            aly.getByteFrequencyData(dat);
            let b = dat[2]/60;
            document.getElementById('wl').style.transform = `scale(${1 + b*0.15})`;
            document.getElementById('wr').style.transform = `scale(${1 + b*0.15})`;
        }
    }

    function setT(c) {
        if(c==='rb') { document.getElementById('player').style.animation = "rb-move 4s linear infinite"; }
        else { document.documentElement.style.setProperty('--accent', c); document.getElementById('player').style.animation = "none"; }
    }

    async function sync() {
        try {
            const r = await fetch("https://zenoplay.zenomedia.com/api/zenofm/nowplaying/"+_Z+"?t="+Date.now());
            const d = await r.json();
            if(d.title) {
                document.getElementById('scroll-text').innerText = "EL CARTAIO - " + d.title.toUpperCase();
                document.getElementById('artist').innerText = (d.artist || "EL CARTAIO").toUpperCase();
                document.getElementById('song').innerText = (d.title.split('-')[1] || d.title).toUpperCase();
                
                if(d.artwork) {
                    document.getElementById('album-art').src = d.artwork;
                } else {
                    const search = await fetch(`https://itunes.apple.com/search?term=${encodeURIComponent(d.title)}&entity=song&limit=1`);
                    const res = await search.json();
                    if(res.results.length > 0) {
                        document.getElementById('album-art').src = res.results[0].artworkUrl100.replace('100x100', '600x600');
                    }
                }
            }
        } catch(e) {}
    }
    setInterval(sync, 15000); sync();

    setInterval(() => { document.getElementById('clock').innerText = new Date().toLocaleTimeString(); }, 1000);
    fetch('https://ipapi.co/json/').then(r => r.json()).then(d => {
        document.getElementById('city').innerText = d.city;
        document.getElementById('ip').innerText = d.ip;
    });
    document.getElementById('vol').oninput = function() { p.volume = this.value; };
</script>
</body>
</html>
