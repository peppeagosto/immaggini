<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>EL CARTAIO PLATINUM V30 - ALIEN EDITION</title>
    <style>
        :root {
            --rainbow: linear-gradient(45deg, #ff0000, #ff7300, #fffb00, #48ff00, #00ffd5, #002bff, #7a00ff, #ff00c8, #ff0000);
            --gold-luxury: linear-gradient(to bottom, #fff 0%, #bf953f 50%, #8a6d3b 100%);
            --gold-btn: linear-gradient(to bottom, #bf953f, #fcf6ba, #b38728, #fbf5b7, #aa771c);
            --accent: #00f2ff;
            --glow: 0 0 20px #00f2ff;
        }
        body { background: transparent !important; margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; font-family: 'Segoe UI', sans-serif; overflow: hidden; }
        
        .glass-player {
            position: relative; width: 850px; height: 620px; display: flex; align-items: center; justify-content: flex-start;
            padding: 25px; z-index: 1; background: radial-gradient(circle at center, #111 0%, #000 100%); 
            border-radius: 40px; box-shadow: inset 0 0 50px rgba(0,0,0,1), 0 0 30px var(--accent);
            overflow: hidden; transition: 0.5s;
        }
        
        /* EFFETTO BATTITO (GLOW BEAT) */
        .player-active { animation: glow-pulse 1.5s infinite ease-in-out; }
        @keyframes glow-pulse { 0% { box-shadow: 0 0 20px var(--accent); } 50% { box-shadow: 0 0 50px var(--accent); } 100% { box-shadow: 0 0 20px var(--accent); } }

        .glass-player::before {
            content: ''; position: absolute; top: -6px; left: -6px; right: -6px; bottom: -6px; padding: 6px;
            background: var(--rainbow); background-size: 400%; -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor; mask-composite: exclude; border-radius: 45px; animation: rainbow-border 10s linear infinite; z-index: -1;
        }

        .marquee-top-box { position: absolute; top: 30px; left: 50%; transform: translateX(-50%); width: 750px; height: 65px; z-index: 999; background: rgba(0,0,0,0.9); border-radius: 15px; border: 2px solid var(--accent); overflow: hidden; display: flex; align-items: center; justify-content: center; }
        .cartaio-title-text { font-family: 'Arial Black', sans-serif; font-size: 32px; font-weight: 900; letter-spacing: 5px; text-transform: uppercase; text-align: center; position: absolute; width: 100%; background: var(--gold-luxury); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .lightning-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: url('https://xatimg.com/image/9M6oVfN1C7Uf.gif'); background-size: 250px; pointer-events: none; z-index: 2; mix-blend-mode: color-dodge; opacity: 0.8; }

        /* 🔴 COLORI SELECTION (DESTRA) */
        .color-selector { position: absolute; right: 25px; top: 50%; transform: translateY(-50%); display: flex; flex-direction: column; gap: 12px; z-index: 1000; }
        .dot { width: 24px; height: 24px; border-radius: 50%; border: 2px solid #fff; cursor: pointer; transition: 0.3s; }

        /* 📊 6 INFO BOX (RETTANGOLINI) */
        .side-panel-left { width: 190px; display: flex; flex-direction: column; gap: 8px; z-index: 10; margin-left: 10px; }
        .info-box { background: rgba(0,0,0,0.7); border-radius: 10px; padding: 8px; color: white; text-align: center; border: 1.5px solid var(--accent); box-shadow: inset 0 0 5px var(--accent); }
        .info-box h4 { margin: 0; font-size: 9px; text-transform: uppercase; color: #bf953f; }
        .box-text { font-size: 11px; font-weight: bold; white-space: nowrap; overflow: hidden; }

        /* CD VINILE */
        .turntable-zone { position: relative; width: 450px; height: 450px; display: flex; justify-content: center; align-items: center; }
        #album-art { width: 350px; height: 350px; border-radius: 50%; object-fit: cover; border: 5px solid #111; box-shadow: 0 0 30px var(--accent); }
        .tonearm { position: absolute; width: 130px; height: 300px; right: -70px; top: 110px; background: url('https://xatimg.com/image/XJhVjJdCs2bN.gif'); background-size: contain; background-repeat: no-repeat; transform-origin: top right; transform: rotate(-18deg); transition: 1s; z-index: 100; filter: drop-shadow(0 0 5px var(--accent)); }
        
        .footer-wrap { position: absolute; bottom: 25px; width: 100%; display: flex; flex-direction: column; align-items: center; gap: 10px; z-index: 100; }
        .controls { display: flex; gap: 15px; align-items: center; background: rgba(0,0,0,0.9); padding: 12px 30px; border-radius: 50px; border: 2px solid var(--accent); }
        .btn-gold { background: var(--gold-btn); border: 1px solid #bf953f; color: #000; padding: 10px 22px; border-radius: 8px; cursor: pointer; font-weight: 900; text-transform: uppercase; }

        @keyframes rotate-smooth { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        @keyframes rainbow-border { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
        .hidden-text { opacity: 0; transform: scale(0.8); }
        .visible-text { opacity: 1; transform: scale(1); }
    </style>
</head>
<body>

    <div id="cartaio-player" class="glass-player">
        <div class="marquee-top-box">
            <div id="lightning" class="lightning-overlay"></div>
            <span id="main-title" class="cartaio-title-text visible-text">EL CARTAIO PLATINUM V30</span>
            <span id="track-info" class="cartaio-title-text hidden-text">WAITING SATELLITE...</span>
        </div>

        <div class="side-panel-left">
            <div class="info-box"><h4>Clock System</h4><div id="clock-text" class="box-text">00:00:00</div></div>
            <div class="info-box"><h4>Singer Name</h4><div id="artist-name" class="box-text" style="color:var(--accent);">---</div></div>
            <div class="info-box"><h4>Track Title</h4><div id="song-title" class="box-text">---</div></div>
            <div class="info-box"><h4>Your City</h4><div id="city-text" class="box-text" style="color:#48ff00;">Locating...</div></div>
            <div class="info-box"><h4>User Info</h4><div id="ip-text" class="box-text" style="font-size:9px;">Scanning...</div></div>
            <div class="info-box"><h4>Alien Shield</h4><div style="color:yellow; font-size:10px;">ACTIVE PROTECT</div></div>
        </div>

        <div class="turntable-zone">
            <img id="album-art" src="https://xatimg.com/image/or3rbqD5I3rS.png">
            <div id="arm" class="tonearm"></div>
        </div>

        <div class="color-selector">
            <div class="dot" style="background:#00f2ff;" onclick="changeTheme('hue-rotate(0deg)', '#00f2ff')"></div>
            <div class="dot" style="background:#ff00c8;" onclick="changeTheme('hue-rotate(290deg)', '#ff00c8')"></div>
            <div class="dot" style="background:#48ff00;" onclick="changeTheme('hue-rotate(120deg)', '#48ff00')"></div>
            <div class="dot" style="background:#fffb00;" onclick="changeTheme('hue-rotate(60deg)', '#fffb00')"></div>
            <div class="dot" style="background:#ff7300;" onclick="changeTheme('hue-rotate(30deg)', '#ff7300')"></div>
        </div>

        <div class="footer-wrap">
            <div class="controls">
                <button id="playBtn" class="btn-gold" onclick="togglePlay()">PLAY</button>
                <input type="range" id="volRange" min="0" max="1" step="0.01" value="0.8" style="width:120px;">
                <button class="btn-gold" onclick="stopRadio()">STOP</button>
            </div>
        </div>
    </div>

<script>
(function() {
    const _ZID = "ylkruiq5e4fvv";
    const _OWNER = "peppeagosto"; 
    const _IMG = "or3rbqD5I3rS";
    const _player = new Audio("https://stream.zeno.fm/" + _ZID);
    _player.crossOrigin = "anonymous";

    function checkSecurity() {
        const url = window.location.href;
        const img = document.getElementById('album-art').src;
        const isIllegal = !url.includes(_OWNER) && !url.includes("xat.com") && !url.includes("w3schools") && !url.includes("file:") && url !== "about:blank";
        if (isIllegal) {
            _player.pause();
            document.body.innerHTML = '<div style="background:#000; color:red; height:100vh; width:100vw; display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center;"><h1>🚨 PLAYER RUBATO 🚨</h1><h2>PROPRIETÀ DI EL CARTAIO</h2></div>';
            throw new Error("LOCK");
        }
    }
    setInterval(checkSecurity, 4000);

    // FUNZIONE CITTÀ
    async function getUserLoc() {
        try {
            const r = await fetch('https://ipapi.co/json/');
            const d = await r.json();
            document.getElementById('city-text').innerText = d.city + " (" + d.country_code + ")";
            document.getElementById('ip-text').innerText = d.ip;
        } catch(e) { document.getElementById('city-text').innerText = "Alien Space"; }
    }
    getUserLoc();

    window.changeTheme = function(f, c) {
        document.documentElement.style.setProperty('--accent', c);
        document.getElementById('cartaio-player').style.boxShadow = `inset 0 0 50px #000, 0 0 30px ${c}`;
        document.getElementById('lightning').style.filter = f;
        document.querySelectorAll('.info-box').forEach(b => b.style.borderColor = c);
    };

    window.togglePlay = function() {
        if (_player.paused) {
            _player.play();
            document.getElementById('album-art').style.animation = "rotate-smooth 4s linear infinite";
            document.getElementById('arm').style.transform = "rotate(22deg)";
            document.getElementById('cartaio-player').classList.add('player-active');
            document.getElementById('playBtn').innerText = "STOP";
        } else { stopRadio(); }
    };

    window.stopRadio = function() {
        _player.pause();
        document.getElementById('album-art').style.animation = "none";
        document.getElementById('arm').style.transform = "rotate(-18deg)";
        document.getElementById('cartaio-player').classList.remove('player-active');
        document.getElementById('playBtn').innerText = "PLAY";
    };

    setInterval(() => { document.getElementById('clock-text').innerText = new Date().toLocaleTimeString('it-IT'); }, 1000);

    async function sync() {
        try {
            const r = await fetch("https://zenoplay.zenomedia.com/api/zenofm/nowplaying/" + _ZID + "?t=" + Date.now());
            const d = await r.json();
            if (d.title) {
                document.getElementById('track-info').innerText = d.title.toUpperCase();
                document.getElementById('artist-name').innerText = (d.artist || "EL CARTAIO").toUpperCase();
                document.getElementById('song-title').innerText = (d.title.split(" - ")[1] || d.title).toUpperCase();
                if (d.artwork) document.getElementById('album-art').src = d.artwork;
            }
        } catch (e) {}
    }
    setInterval(sync, 15000); sync();

    let s = true;
    setInterval(() => {
        const m = document.getElementById('main-title'), t = document.getElementById('track-info');
        m.className = s ? 'cartaio-title-text hidden-text' : 'cartaio-title-text visible-text';
        t.className = s ? 'cartaio-title-text visible-text' : 'cartaio-title-text hidden-text';
        s = !s;
    }, 7000);
})();
</script>
</body>
</html>
