<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<style>
    /* Trasparenza totale */
    html, body { 
        background: transparent !important; 
        margin: 0; 
        padding: 0;
        overflow: hidden; 
        width: 100%;
    }

    .lory-marquee-container {
        width: 100%;
        padding: 10px 0;
        overflow: hidden;
        position: relative;
        background: transparent;
    }

    .marquee-row {
        display: flex;
        width: max-content;
        /* Inizia da 100% (destra fuori schermo) e arriva a -50% del contenuto */
        animation: scorrimento 25s linear infinite;
        will-change: transform;
        align-items: center;
    }

    .driver-card {
        display: flex;
        align-items: center;
        flex-shrink: 0;
        margin-left: 50px; /* Spazio tra la fine del giro e la nuova macchina */
    }

    .driver-card img {
        width: 130px; 
        height: 100px;
        border-radius: 10px;
        border: 2px solid #fff;
        object-fit: cover;
        box-shadow: 0 0 15px rgba(255, 255, 255, 0.4);
    }

    .rope {
        width: 45px; 
        height: 1px;
        background: rgba(255, 255, 255, 0.7);
        box-shadow: 0 0 3px white;
        flex-shrink: 0;
    }

    .card-dj {
        width: 110px;
        margin: 0 12px;
        display: flex;
        flex-direction: column;
        align-items: center;
        flex-shrink: 0;
    }

    .card-dj img {
        width: 80px;
        height: 80px;
        border-radius: 50%;
        border: 2px solid #fff;
        object-fit: cover;
    }

    .card-dj span {
        font-size: 11px;
        font-family: 'Arial Black', sans-serif;
        font-weight: 900;
        text-transform: uppercase;
        margin-top: 5px;
        background: linear-gradient(90deg, #ff0000, #fffb00, #00ffd5, #7a00ff);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
    }

    /* Animazione che copre tutta la larghezza */
    @keyframes scorrimento {
        0% { transform: translateX(100vw); } /* Parte da destra fuori dallo schermo */
        100% { transform: translateX(-100%); } /* Esce completamente a sinistra */
    }
</style>
</head>
<body>

<div class="lory-marquee-container">
    <div class="marquee-row">
        
        <div class="driver-card">
            <img src="https://xatimg.com/image/jsOsxpbqJhKX.gif">
            <div class="rope"></div>
        </div>
        <div class="card-dj"><img src="https://xatimg.com/image/2gSKS392WGsA.jpg"><span>ROSALIA</span></div>
        <div class="card-dj"><img src="https://xatimg.com/image/TIRy1ncyBLxs.jpg"><span>MANUELA</span></div>
        <div class="card-dj"><img src="https://xatimg.com/image/o9IvXbicXLLE.jpg"><span>LUNA</span></div>
        <div class="card-dj"><img src="https://xatimg.com/image/zYqnr0Jjlv7u.jpg"><span>AURORA</span></div>
        <div class="card-dj"><img src="https://xatimg.com/image/x0gkWvMK3nvh.jpg"><span>VALENTINA</span></div>
        <div class="card-dj"><img src="https://xatimg.com/image/q6LHVczfFBeZ.jpg"><span>GIADA</span></div>
        <div class="card-dj"><img src="https://xatimg.com/image/xseLcaaxCvVJ.jpg"><span>ELISA</span></div>
        <div class="card-dj"><img src="https://xatimg.com/image/OK37QyaxZcOP.jpg"><span>SOFIA</span></div>

    </div>
</div>

</body>
</html>
