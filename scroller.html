<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<style>
    /* Trasparenza totale */
    html, body { 
        background: transparent !important; 
        margin: 0; 
        padding: 0;
        overflow: hidden; 
        width: 100%;
    }

    .lory-marquee-container {
        width: 100%;
        padding: 20px 0; /* Aumentato il padding verticale per ospitare elementi più grandi */
        overflow: hidden;
        position: relative;
        background: transparent;
    }

    .marquee-row {
        display: flex;
        width: max-content;
        /* Inizia da 100% (destra fuori schermo) e arriva a -50% del contenuto */
        animation: scorrimento 25s linear infinite;
        will-change: transform;
        align-items: center;
    }

    .driver-card {
        display: flex;
        align-items: center;
        flex-shrink: 0;
        margin-left: 60px; /* Spazio tra la fine del giro e la nuova macchina, aumentato */
    }

    .driver-card img {
        width: 180px; /* Aumentata la larghezza della GIF (prima era 130px) */
        height: 140px; /* Aumentata l'altezza della GIF (prima era 100px) */
        border-radius: 15px; /* Angoli leggermente più arrotondati */
        border: 3px solid #fff; /* Bordo leggermente più spesso */
        object-fit: cover;
        box-shadow: 0 0 20px rgba(255, 255, 255, 0.5); /* Ombra più pronunciata */
    }

    .rope {
        width: 60px; /* Lunghezza della corda aumentata (prima era 45px) */
        height: 2px; /* Spessore della corda aumentato (prima era 1px) */
        background: rgba(255, 255, 255, 0.8);
        box-shadow: 0 0 4px white;
        flex-shrink: 0;
    }

    .card-dj {
        width: 150px; /* Larghezza della card aumentata (prima era 110px) */
        margin: 0 15px; /* Spazio tra le card aumentato */
        display: flex;
        flex-direction: column;
        align-items: center;
        flex-shrink: 0;
    }

    .card-dj img {
        width: 120px; /* Diametro delle foto DJ aumentato (prima era 80px) */
        height: 120px; /* Altezza delle foto DJ aumentata */
        border-radius: 50%;
        border: 3px solid #fff; /* Bordo più spesso */
        object-fit: cover;
        box-shadow: 0 0 15px rgba(255, 255, 255, 0.3); /* Aggiunta ombra alle foto */
    }

    .card-dj span {
        font-size: 14px; /* Dimensione del font aumentata (prima era 11px) */
        font-family: 'Arial Black', sans-serif;
        font-weight: 900;
        text-transform: uppercase;
        margin-top: 8px; /* Spazio sopra il nome aumentato */
        background: linear-gradient(90deg, #ff0000, #fffb00, #00ffd5, #7a00ff);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
    }

    /* Animazione che copre tutta la larghezza */
    @keyframes scorrimento {
        0% { transform: translateX(100vw); } /* Parte da destra fuori dallo schermo */
        100% { transform: translateX(-100%); } /* Esce completamente a sinistra */
    }
</style>
</head>
<body>

<div class="lory-marquee-container">
    <div class="marquee-row">
        
        <div class="driver-card">
            <img src="https://xatimg.com/image/jsOsxpbqJhKX.gif">
            <div class="rope"></div>
        </div>
        <div class="card-dj"><img src="https://xatimg.com/image/2gSKS392WGsA.jpg"><span>ROSALIA</span></div>
        <div class="card-dj"><img src="https://xatimg.com/image/TIRy1ncyBLxs.jpg"><span>MANUELA</span></div>
        <div class="card-dj"><img src="https://xatimg.com/image/o9IvXbicXLLE.jpg"><span>LUNA</span></div>
        <div class="card-dj"><img src="https://xatimg.com/image/zYqnr0Jjlv7u.jpg"><span>AURORA</span></div>
        <div class="card-dj"><img src="https://xatimg.com/image/x0gkWvMK3nvh.jpg"><span>VALENTINA</span></div>
        <div class="card-dj"><img src="https://xatimg.com/image/q6LHVczfFBeZ.jpg"><span>GIADA</span></div>
        <div class="card-dj"><img src="https://xatimg.com/image/xseLcaaxCvVJ.jpg"><span>ELISA</span></div>
        <div class="card-dj"><img src="https://xatimg.com/image/OK37QyaxZcOP.jpg"><span>SOFIA</span></div>

    </div>
</div>

</body>
</html>
