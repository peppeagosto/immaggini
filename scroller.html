<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<style>
    body { 
        background: transparent; 
        margin: 0; 
        padding: 0;
        overflow: hidden; 
        font-family: 'Arial Black', sans-serif;
    }

    .lory-marquee-container {
        width: 100%;
        padding: 15px 0;
        overflow: hidden;
        position: relative;
        white-space: nowrap;
    }

    .marquee-row {
        display: flex;
        width: max-content;
        animation: scorrimento 20s linear infinite; /* Velocità ottimizzata per 9 elementi */
        will-change: transform;
        align-items: center;
    }

    .driver-card {
        display: flex;
        align-items: center;
        flex-shrink: 0;
        margin-left: 20px;
    }

    .driver-card img {
        width: 130px; 
        height: 100px;
        border-radius: 10px;
        border: 2px solid #fff;
        object-fit: cover;
        box-shadow: 0 0 15px rgba(255, 255, 255, 0.5);
    }

    .rope {
        width: 40px; 
        height: 1px;
        background: rgba(255, 255, 255, 0.8);
        box-shadow: 0 0 3px white;
        flex-shrink: 0;
    }

    .card-dj {
        width: 120px;
        margin: 0 10px;
        display: flex;
        flex-direction: column;
        align-items: center;
        flex-shrink: 0;
    }

    .card-dj img {
        width: 85px;
        height: 85px;
        border-radius: 50%;
        border: 3px solid #fff;
        object-fit: cover;
        box-shadow: 0 0 10px rgba(255, 255, 255, 0.3);
        margin-bottom: 5px;
    }

    .card-dj span {
        font-size: 11px;
        font-weight: 900;
        text-transform: uppercase;
        text-align: center;
        background: linear-gradient(90deg, #ff0000, #ff7300, #fffb00, #48ff00, #00ffd5, #002bff, #7a00ff);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        display: block;
    }

    @keyframes scorrimento {
        0% { transform: translateX(0); }
        100% { transform: translateX(-50%); }
    }
</style>
</head>
<body>

<div class="lory-marquee-container">
    <div class="marquee-row">
