<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <title>2 OFFICIAL - Smart Auto-Timer 3 Loops</title>
  <style>
    body { 
      margin: 0;
      background: transparent; 
      display: flex; 
      justify-content: center; 
      align-items: center; 
      height: 100vh; 
      overflow: hidden; 
      font-family: Arial, sans-serif;
    }
    
    .container { 
      position: relative; 
      display: flex;
      justify-content: space-between; 
      align-items: center; 
      width: 100%; 
      height: 100vh; 
      padding: 0 20px; 
      box-sizing: border-box;
    }
    
    .colonna-sx {
      display: flex;
      flex-direction: column;
      justify-content: center;
    }
    
    .colonna-dx {
      position: relative; 
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 99999;
    }

    .wrapper { 
      position: relative; 
      overflow: hidden; 
      border-radius: 22px;
      width: 270px; 
      height: 484px; 
      box-shadow: 0 10px 30px rgba(0,0,0,0.8);
    }

    @keyframes rainbow-bg { 0% { background-position: 0% 50%; } 100% { background-position: 200% 50%; } }
    @keyframes pulsante { 0% { transform: scale(1); opacity: 0.7; } 50% { transform: scale(1.05); opacity: 1; } 100% { transform: scale(1); opacity: 0.7; } }
    .pulsing { animation: pulsante 2s ease-in-out infinite; }

    .wrapper::after {
      content: ""; position: absolute; top: 0; left: 0;
      width: 100%; height: 100%; box-sizing: border-box; border: 9px solid transparent; border-radius: 22px;
      background: linear-gradient(90deg, #ff0000, #ffaa00, #ffff00, #00ff00, #00ffff, #0000ff, #ff00ff, #ff0000) border-box;
      -webkit-mask: linear-gradient(#fff 0 0) padding-box, linear-gradient(#fff 0 0);
      -webkit-mask-composite: destination-out;
      mask-composite: exclude; background-size: 200%; animation: rainbow-bg 3s linear infinite; z-index: 10; pointer-events: none;
    }

    .testo-arcobaleno { background: linear-gradient(90deg, #ff0000, #ffaa00, #ffff00, #00ffaa, #00aaff, #aa00ff, #ff0000); background-size: 200%; -webkit-background-clip: text; -webkit-text-fill-color: transparent; animation: rainbow-bg 3s linear infinite; }

    .left { 
      background-image: url('https://xatimg.com/image/Vpj4ZaEINzqz.jpg');
      background-size: cover; 
      background-position: center;
      display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center;
    }
    
    .right { 
      background: transparent; 
      display: flex; 
      flex-direction: column; 
      justify-content: flex-end; 
      align-items: center; 
    }

    .saluto-testo { font-family: 'Arial Black', sans-serif; font-size: 20px; font-weight: 900; margin-bottom: 5px; text-transform: uppercase; }
    .orario-grande { font-family: 'Arial Black', sans-serif; font-size: 55px; font-weight: 900; margin-bottom: 5px; }
    
    .testo-dinamico-video { 
      margin-bottom: 25px; 
      font-family: 'Arial Black', sans-serif; 
      font-size: 16px; 
      color: #fff; 
      text-transform: uppercase; 
      letter-spacing: 2px; 
      z-index: 5; 
      background: rgba(0, 0, 0, 0.5); 
      padding: 10px 20px;
      border-radius: 15px;
      text-shadow: 2px 2px 4px rgba(0,0,0,0.8); 
      box-shadow: 0 0 15px rgba(0,0,0,0.5); 
    }
    
    .side-video { 
      width: 100%; 
      height: 100%; 
      object-fit: cover; 
      opacity: 1; 
      padding: 0; 
      border-radius: 22px; 
      z-index: 1; 
      position: absolute; 
      top: 0; 
      left: 0;
      pointer-events: auto; 
    }
    
    .btn-ascolta { 
      position: absolute; 
      top: -35px; 
      background: rgba(0, 0, 0, 0.9); 
      border: 2px solid #00ffff; 
      border-radius: 8px; 
      padding: 6px 14px; 
      color: white; 
      font-family: 'Arial Black', sans-serif; 
      font-size: 12px; 
      cursor: pointer; 
      text-transform: uppercase; 
      box-shadow: 0 0 10px rgba(0, 255, 255, 0.4); 
      transition: all 0.3s ease; 
      pointer-events: auto;
    }
    .btn-ascolta:hover { background: rgba(0, 255, 255, 0.2); transform: scale(1.05); }
  </style>
</head>
<body>

<div class="container">
  <div class="colonna-sx">
    <div class="wrapper left">
      <div id="saluto-fisso" class="saluto-testo testo-arcobaleno">...</div>
      <div id="orario-grande" class="orario-grande testo-arcobaleno">00:00</div>
      <div class="data-info" style="color:#fff">
        <div id="data-estesa">...</div>
        <div id="citta-visitatore" class="citta-box" style="color:#00ffff; font-weight:bold;">Caricamento città...</div>
      </div>
    </div>
  </div>

  <div class="colonna-dx">
    <button id="tasto-audio" class="btn-ascolta">ON AUDIO</button>
    <div class="wrapper right">
      <video id="video-ragazze" class="side-video" autoplay loop playsinline muted>
        <source id="video-source" src="" type="video/mp4">
      </video>
      <div id="testo-sotto-video" class="testo-dinamico-video pulsing">...</div>
    </div>
  </div>
</div>

<script>
  const videoRagazze = document.getElementById('video-ragazze');
  const videoSource = document.getElementById('video-source');
  const testoSottoVideo = document.getElementById('testo-sotto-video');
  const tastoAudio = document.getElementById('tasto-audio');
  const cittaVisitatore = document.getElementById('citta-visitatore');
  
  let lastSaluto = "";
  let timerSigla; // Ripristinato il timer ma ora è super intelligente

  // --- API CITTÀ ---
  function rilevaCitta() {
    fetch('https://get.geojs.io/v1/ip/geo.json')
      .then(response => response.json())
      .then(data => {
        if (data.city && data.country) {
          cittaVisitatore.innerText = data.city + ", " + data.country;
        } else {
          cittaVisitatore.innerText = "Città non trovata";
        }
      })
      .catch(error => {
        console.log("Errore API città:", error);
        cittaVisitatore.innerText = "Ospite Online"; 
      });
  }

  rilevaCitta();

  // --- LOGICHE ORARIO E CALCOLATORE AUTOMATICO 3 GIRI ---
  function updateData() {
    const now = new Date();
    const hour = now.getHours();
    
    document.getElementById('orario-grande').innerText = now.toLocaleTimeString('it-IT', {hour: '2-digit', minute:'2-digit'});
    document.getElementById('data-estesa').innerText = now.toLocaleDateString('it-IT', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });

    let saluto = "";
    let testoVisivo = ""; 
    let prossimoVideo = "";

    if (hour >= 6 && hour < 12) {
      saluto = "BUONGIORNO";
      testoVisivo = "BUONGIORNO!"; 
      prossimoVideo = "https://i.imgur.com/ybUBxzW.mp4";
    } else if (hour >= 12 && hour < 18) {
      saluto = "BUON POMERIGGIO";
      testoVisivo = "BUON POMERIGGIO!"; 
      prossimoVideo = "https://i.imgur.com/EeEhEd9.mp4";
    } else if (hour >= 18 && hour <= 23) {
      saluto = "BUONASERA";
      testoVisivo = "BUONASERA!"; 
      prossimoVideo = "https://i.imgur.com/M44McxJ.mp4";
    } else {
      saluto = "BUONANOTTE";
      testoVisivo = "DOLCE NOTTE A TUTTI I VISITATORI"; 
      prossimoVideo = "https://i.imgur.com/M44McxJ.mp4"; // Cambialo quando fai il video nuovo
    }
    
    if (saluto !== lastSaluto) {
      document.getElementById('saluto-fisso').innerText = saluto;
      testoSottoVideo.innerText = testoVisivo;
      lastSaluto = saluto;

      if (videoSource.getAttribute('src') !== prossimoVideo) {
        videoSource.src = prossimoVideo;
        videoRagazze.load(); 
        videoRagazze.currentTime = 0; 
        
        videoRagazze.muted = false;
        tastoAudio.innerText = "OFF AUDIO";
        
        videoRagazze.play().catch(e => {
          console.log("Autoplay bloccato.");
          videoRagazze.muted = true;
          tastoAudio.innerText = "ON AUDIO";
          videoRagazze.play();
        });
        
        // --- LA MAGIA: LEGGE LA DURATA E MOLTIPLICA PER 3 ---
        videoRagazze.onloadedmetadata = () => {
          let durataSingola = videoRagazze.duration; 
          
          // Se per qualche motivo strano il browser non legge la durata, si fissa a 15 secondi di sicurezza
          if (!durataSingola || isNaN(durataSingola)) {
            durataSingola = 15;
          }

          let tempoTreGiri = (durataSingola * 3) * 1000; // I secondi esatti trasformati in millisecondi per 3 giri

          clearTimeout(timerSigla); 
          
          timerSigla = setTimeout(() => {
            // Esattamente alla fine del terzo giro, entra in muto. Il video continua fluido.
            videoRagazze.muted = true; 
            tastoAudio.innerText = "ON AUDIO";
          }, tempoTreGiri); 
        };
      }
    }
  }
  
  updateData();
  setInterval(updateData, 1000);
  
  tastoAudio.addEventListener('click', () => {
    videoRagazze.muted = !videoRagazze.muted;
    tastoAudio.innerText = videoRagazze.muted ? "ON AUDIO" : "OFF AUDIO";
  });
</script>
</body>
</html>
