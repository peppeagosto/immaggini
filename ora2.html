<html lang="it">
<head>
  <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
  <title>2 OFFICIAL</title>
  <style>
    body { margin: 0; background: transparent; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
    .container { position: relative; width: 1308px; height: 484px; }
    .wrapper { position: absolute; overflow: hidden; border-radius: 22px; width: 270px; height: 484px; }

    /* ANIMAZIONI */
    @keyframes rainbow-bg { 0% { background-position: 0% 50%; } 100% { background-position: 200% 50%; } }
    @keyframes pulsante {
      0% { transform: scale(1); opacity: 0.7; }
      50% { transform: scale(1.05); opacity: 1; }
      100% { transform: scale(1); opacity: 0.7; }
    }
    .pulsing { animation: pulsante 2s ease-in-out infinite; }

    /* BORDO ARCOBALENO */
    .wrapper::after {
      content: ""; position: absolute; top: 0; left: 0; width: 100%; height: 100%; box-sizing: border-box; border: 9px solid transparent; border-radius: 22px;
      background: linear-gradient(90deg, #ff0000, #ffaa00, #ffff00, #00ff00, #00ffff, #0000ff, #ff00ff, #ff0000) border-box;
      -webkit-mask: linear-gradient(#fff 0 0) padding-box, linear-gradient(#fff 0 0); -webkit-mask-composite: destination-out;
      mask-composite: exclude; background-size: 200%; animation: rainbow-bg 3s linear infinite; z-index: 10; pointer-events: none;
    }

    .testo-arcobaleno { background: linear-gradient(90deg, #ff0000, #ffaa00, #ffff00, #00ffaa, #00aaff, #aa00ff, #ff0000); background-size: 200%; -webkit-background-clip: text; -webkit-text-fill-color: transparent; animation: rainbow-bg 3s linear infinite; }

    /* PANNELLI */
    .left { left: -20px; background: radial-gradient(circle, #2a2a2a 0%, #050505 100%); backdrop-filter: blur(15px); display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; }
    .right { right: -20px; background: linear-gradient(145deg, #1a1a1a, #000000); display: flex; flex-direction: column; justify-content: center; align-items: center; }

    /* STILE TESTI */
    .saluto-testo { font-family: 'Arial Black', sans-serif; font-size: 20px; font-weight: 900; margin-bottom: 5px; text-transform: uppercase; }
    .orario-grande { font-family: 'Arial Black', sans-serif; font-size: 55px; font-weight: 900; margin-bottom: 5px; }
    
    /* TESTO DINAMICO SOTTO VIDEO */
    .testo-dinamico-video { 
      margin-top: 15px; font-family: 'Arial Black', sans-serif; font-size: 18px; 
      color: #fff; text-transform: uppercase; letter-spacing: 2px; text-shadow: 0 0 10px rgba(255,255,255,0.5);
    }

    .side-video { width: 90%; height: 75%; object-fit: cover; opacity: 0.85; padding: 9px; border-radius: 22px; z-index: 2; }
    .comandi-container { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); z-index: 9999; }
    .btn-ascolta { background: rgba(0, 0, 0, 0.7); border: 2px solid #fff; border-radius: 12px; padding: 10px 20px; color: white; font-weight: bold; cursor: pointer; text-transform: uppercase; }
  </style>
</head>
<body>

<div class="container">
  <div class="wrapper left">
    <div id="saluto-fisso" class="saluto-testo testo-arcobaleno">BENVENUTO</div>
    <div id="orario-grande" class="orario-grande testo-arcobaleno">00:00</div>
    <div class="data-info" style="color:#fff">
      <div id="data-estesa">...</div>
      <div class="citta-box" style="color:#00ffff; font-weight:bold;">Torino, IT</div>
    </div>
  </div>

  <div class="wrapper right">
    <video id="video-ragazze" class="side-video" autoplay loop playsinline muted>
      <source id="video-source" src="" type="video/mp4">
    </video>
    <div id="testo-sotto-video" class="testo-dinamico-video pulsing">...</div>
  </div>

  <div class="comandi-container">
    <button id="tasto-audio" class="btn-ascolta">ON AUDIO</button>
  </div>
</div>

<script>
  const videoRagazze = document.getElementById('video-ragazze');
  const videoSource = document.getElementById('video-source');
  const testoSottoVideo = document.getElementById('testo-sotto-video');
  let lastSaluto = "";

  function updateData() {
    const now = new Date();
    const hour = now.getHours();
    
    let saluto = "";
    let testoVisivo = "";
    let prossimoVideo = "";

    if (hour >= 6 && hour < 12) {
      saluto = "BUONGIORNO";
      testoVisivo = "BUONGIORNO!";
      prossimoVideo = "https://i.imgur.com/ybUBxzW.mp4";
    } else if (hour >= 12 && hour < 18) {
      saluto = "BUON POMERIGGIO";
      testoVisivo = "BUON POMERIGGIO!";
      prossimoVideo = "https://i.imgur.com/EeEhEd9.mp4";
    } else {
      saluto = "BUONASERA";
      testoVisivo = "BUONASERA!";
      prossimoVideo = "https://i.imgur.com/M44McxJ.mp4";
    }
    
    // Aggiorna solo se cambia l'ora (evita refresh continui)
    if (saluto !== lastSaluto) {
      testoSottoVideo.innerText = testoVisivo;
      document.getElementById('saluto-fisso').innerText = saluto;
      lastSaluto = saluto;
    }

    if (videoSource.getAttribute('src') !== prossimoVideo) {
      videoSource.src = prossimoVideo;
      videoRagazze.load(); 
    }

    document.getElementById('orario-grande').innerText = now.toLocaleTimeString('it-IT', {hour: '2-digit', minute:'2-digit'});
    document.getElementById('data-estesa').innerText = now.toLocaleDateString('it-IT', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
  }
  
  setInterval(updateData, 1000);
  updateData();

  const tastoAudio = document.getElementById('tasto-audio');
  tastoAudio.addEventListener('click', () => {
    videoRagazze.muted = !videoRagazze.muted;
    tastoAudio.innerText = videoRagazze.muted ? "ON AUDIO" : "OFF AUDIO";
  });
</script>
</body>
</html>
