<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <title>2 OFFICIAL - Timer & Night Logic</title>
  <style>
    body { margin: 0; background: transparent; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; font-family: Arial, sans-serif; }
    .container { position: relative; display: flex; justify-content: space-between; align-items: flex-end; width: 100%; height: 100vh; padding: 0 20px 20px 20px; box-sizing: border-box; }
    .colonna-sx { display: flex; flex-direction: column; justify-content: flex-end; }
    .colonna-dx { display: flex; flex-direction: column; align-items: center; gap: 15px; z-index: 99999; }
    .wrapper { position: relative; overflow: hidden; border-radius: 22px; width: 270px; height: 484px; box-shadow: 0 10px 30px rgba(0,0,0,0.8); }
    @keyframes rainbow-bg { 0% { background-position: 0% 50%; } 100% { background-position: 200% 50%; } }
    @keyframes pulsante { 0% { transform: scale(1); opacity: 0.7; } 50% { transform: scale(1.05); opacity: 1; } 100% { transform: scale(1); opacity: 0.7; } }
    .pulsing { animation: pulsante 2s ease-in-out infinite; }
    .wrapper::after { content: ""; position: absolute; top: 0; left: 0; width: 100%; height: 100%; box-sizing: border-box; border: 9px solid transparent; border-radius: 22px; background: linear-gradient(90deg, #ff0000, #ffaa00, #ffff00, #00ff00, #00ffff, #0000ff, #ff00ff, #ff0000) border-box; -webkit-mask: linear-gradient(#fff 0 0) padding-box, linear-gradient(#fff 0 0); -webkit-mask-composite: destination-out; mask-composite: exclude; background-size: 200%; animation: rainbow-bg 3s linear infinite; z-index: 10; pointer-events: none; }
    .testo-arcobaleno { background: linear-gradient(90deg, #ff0000, #ffaa00, #ffff00, #00ffaa, #00aaff, #aa00ff, #ff0000); background-size: 200%; -webkit-background-clip: text; -webkit-text-fill-color: transparent; animation: rainbow-bg 3s linear infinite; }
    .left { background: radial-gradient(circle, #2a2a2a 0%, #050505 100%); backdrop-filter: blur(15px); display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; }
    .right { background: linear-gradient(145deg, #1a1a1a, #000000); display: flex; flex-direction: column; justify-content: center; align-items: center; }
    .saluto-testo { font-family: 'Arial Black', sans-serif; font-size: 20px; font-weight: 900; margin-bottom: 5px; text-transform: uppercase; }
    .orario-grande { font-family: 'Arial Black', sans-serif; font-size: 55px; font-weight: 900; margin-bottom: 5px; }
    .testo-dinamico-video { margin-top: 15px; font-family: 'Arial Black', sans-serif; font-size: 16px; color: #fff; text-transform: uppercase; letter-spacing: 2px; text-shadow: 0 0 10px rgba(255,255,255,0.5); }
    .side-video { width: 90%; height: 75%; object-fit: cover; opacity: 0.85; padding: 9px; border-radius: 22px; z-index: 2; pointer-events: auto; }
    /* BOTTONE SPOSTATO PIU' IN BASSO PER NON ESSERE TAGLIATO */
    .btn-ascolta { background: rgba(0, 0, 0, 0.9); border: 2px solid #00ffff; border-radius: 12px; padding: 12px 25px; color: white; font-family: 'Arial Black', sans-serif; font-size: 15px; cursor: pointer; text-transform: uppercase; box-shadow: 0 0 15px rgba(0, 255, 255, 0.4); transition: all 0.3s ease; margin-top: 40px; pointer-events: auto; }
    .btn-ascolta:hover { background: rgba(0, 255, 255, 0.2); transform: scale(1.05); }
  </style>
</head>
<body>
<div class="container">
  <div class="colonna-sx">
    <div class="wrapper left">
      <div id="saluto-fisso" class="saluto-testo testo-arcobaleno">BENVENUTO</div>
      <div id="orario-grande" class="orario-grande testo-arcobaleno">00:00</div>
      <div class="data-info" style="color:#fff">
        <div id="data-estesa">...</div>
        <div class="citta-box" style="color:#00ffff; font-weight:bold;">Torino, IT</div>
      </div>
    </div>
  </div>
  <div class="colonna-dx">
    <button id="tasto-audio" class="btn-ascolta">OFF AUDIO</button>
    <div class="wrapper right">
      <video id="video-ragazze" class="side-video" autoplay loop playsinline>
        <source id="video-source" src="" type="video/mp4">
      </video>
      <div id="testo-sotto-video" class="testo-dinamico-video pulsing">...</div>
    </div>
  </div>
</div>
<script>
  const video = document.getElementById('video-ragazze');
  const source = document.getElementById('video-source');
  const txt = document.getElementById('testo-sotto-video');
  const btn = document.getElementById('tasto-audio');
  
  // Timer sigla: dopo 2 minuti (120000ms) mette in mute
  setTimeout(() => { video.muted = true; btn.innerText = "ON AUDIO"; }, 120000);

  function updateData() {
    const now = new Date();
    const h = now.getHours();
    let sal, txtV, vid;
    if (h >= 6 && h < 12) { sal="BUONGIORNO"; txtV="BUONGIORNO!"; vid="https://i.imgur.com/ybUBxzW.mp4"; }
    else if (h >= 12 && h < 18) { sal="BUON POMERIGGIO"; txtV="BUON POMERIGGIO!"; vid="https://i.imgur.com/EeEhEd9.mp4"; }
    else if (h >= 18 && h < 24) { sal="BUONASERA"; txtV="BUONASERA!"; vid="https://i.imgur.com/M44McxJ.mp4"; }
    else { sal="BUONANOTTE"; txtV="BUONANOTTE!"; vid="https://i.imgur.com/TUA_URL_BUONANOTTE.mp4"; } // AGGIUNGI QUI IL LINK NOTTE
    
    document.getElementById('saluto-fisso').innerText = sal;
    txt.innerText = txtV;
    if (source.src !== vid) { source.src = vid; video.load(); }
    document.getElementById('orario-grande').innerText = now.toLocaleTimeString('it-IT', {hour: '2-digit', minute:'2-digit'});
    document.getElementById('data-estesa').innerText = now.toLocaleDateString('it-IT', { weekday: 'long', month: 'long', day: 'numeric' });
  }
  setInterval(updateData, 1000);
  updateData();

  btn.addEventListener('click', () => {
    video.muted = !video.muted;
    btn.innerText = video.muted ? "ON AUDIO" : "OFF AUDIO";
  });
</script>
</body>
</html>
