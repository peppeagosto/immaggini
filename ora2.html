
<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <title>2 OFFICIAL - Smart Auto-Timer</title>
  <style>
    body { 
      margin: 0; 
      background: transparent; 
      display: flex; 
      justify-content: center; 
      align-items: flex-start; 
      height: 100vh; 
      overflow: hidden; 
      font-family: Arial, sans-serif; 
    }
    
    .container { 
      display: flex; 
      justify-content: space-between; 
      width: 100vw; 
      padding: 100px 20px 30px; 
      box-sizing: border-box; 
    }
    
    .colonna {
      display: flex; 
      flex-direction: column; 
      align-items: center;
    }

    .wrapper { 
      position: relative; overflow: hidden; border-radius: 22px; width: 270px; height: 484px; 
      box-shadow: 0 10px 30px rgba(0,0,0,0.8); display: flex; flex-direction: column; 
      justify-content: center; align-items: center; text-align: center; 
    }
    
    .wrapper::after { 
      content: ""; position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
      box-sizing: border-box; border: 9px solid transparent; border-radius: 22px; 
      background: linear-gradient(90deg, #ff0000, #ffaa00, #ffff00, #00ff00, #00ffff, #0000ff, #ff00ff, #ff0000) border-box; 
      -webkit-mask: linear-gradient(#fff 0 0) padding-box, linear-gradient(#fff 0 0); 
      -webkit-mask-composite: destination-out; mask-composite: exclude; 
      background-size: 200%; animation: rainbow-bg 3s linear infinite; pointer-events: none; 
    }
    @keyframes rainbow-bg { 0% { background-position: 0% 50%; } 100% { background-position: 200% 50%; } }
    
    .left { 
      background-image: url('https://xatimg.com/image/Vpj4ZaEINzqz.jpg'); 
      background-size: cover; background-position: center; 
    }
    
    .side-video { 
      width: 100%; height: 100%; object-fit: cover; position: absolute; top: 0; left: 0; 
    }
    
    .testo-dinamico { 
      position: absolute; bottom: 20px; width: 80%; z-index: 5; background: rgba(0, 0, 0, 0.6); 
      padding: 10px; border-radius: 15px; color: #fff; font-size: 14px; font-weight: bold; 
    }

    /* CLASSE GIF PLAY */
    .play-btn {
      position: absolute;
      top: -58px;   
      right:  100px; 
      width: 60px;
      cursor: pointer;
      z-index: 290;
      transition: transform 0.2s;
    }
    
    .play-btn:hover {
      transform: scale(1.1); 
    }

    /* CLASSE PER IL TESTO ARCOBALENO PULSANTE */
    .testo-arcobaleno {
      background: linear-gradient(90deg, #ff0000, #ffaa00, #ffff00, #00ff00, #00ffff, #0000ff, #ff00ff, #ff0000);
      background-size: 200% auto;
      color: transparent !important;
      -webkit-background-clip: text !important;
      background-clip: text !important;
      -webkit-text-fill-color: transparent !important;
      display: inline-block; 
      animation: scorri-colori 3s linear infinite, pulsa-testo 1.5s ease-in-out infinite;
    }

    @keyframes scorri-colori {
      0% { background-position: 0% center; }
      100% { background-position: 200% center; }
    }

    @keyframes pulsa-testo {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.08); } 
    }
  </style>
</head>
<body>

<div class="container">
  
  <div class="colonna">
    <div class="wrapper left">
      <div id="saluto-fisso" class="testo-arcobaleno" style="font-size:20px; font-weight:900;">...</div>
      <div id="orario-grande" class="testo-arcobaleno" style="font-size:55px; font-weight:900; margin: 10px 0;">00:00</div>
      <div id="citta-visitatore" class="testo-arcobaleno" style="font-weight:bold;">CARICAMENTO...</div>
    </div>
  </div>

  <div class="colonna">
    
    <div style="position: relative;">
      
      <div class="wrapper" style="background:#000;">
        <video id="video-ragazze" class="side-video" loop playsinline autoplay muted>
          <source id="video-source" src="" type="video/mp4">
        </video>
        <div id="testo-sotto-video" class="testo-dinamico testo-arcobaleno">BENVENUTO!</div>
      </div>
      
      <img src="https://xatimg.com/image/6gunJFri4oTA.gif" alt="PLAY" class="play-btn" onclick="videoControl()">
      
    </div>
  </div>

</div>

<script>
  const video = document.getElementById('video-ragazze');
  const source = document.getElementById('video-source');
  const cittaEl = document.getElementById('citta-visitatore');
  const saludoEl = document.getElementById('saluto-fixed'); // Nota: corretto un piccolo ID sotto per uniformità
  const salutoFissoEl = document.getElementById('saluto-fisso');
  const testoEl = document.getElementById('testo-sotto-video');
  let citta = "AMICO";

  // FUNZIONE DI AVVIO AUTOMATICO SILENZIOSO (Esegui all'apertura)
  function autoPlayMuted() {
    video.muted = true;
    video.volume = 0.0;
    
    let playPromise = video.play();
    if (playPromise !== undefined) {
      playPromise.then(_ => {
        console.log("Autoplay Muted avviato con successo.");
        
        // MODIFICATO QUI: Dopo 10 secondi esatti azzera/mantiene il volume e avvia la sintesi vocale
        setTimeout(() => {
            video.muted = true;
            video.volume = 0.0; 
            
            const messaggio = "Ciao da " + citta + ", " + salutoFissoEl.innerText;
            const sintesi = new SpeechSynthesisUtterance(messaggio);
            sintesi.lang = 'it-IT';
            window.speechSynthesis.speak(sintesi);
        }, 10000); // <-- Gestione dei 10 secondi richiesti
        
        // Dopo 20 secondi totali ferma e resetta il video
        setTimeout(() => {
            video.pause();
            video.currentTime = 0;
        }, 20000);

      }).catch(err => {
        console.log("Autoplay iniziale bloccato dal browser, attesa interazione:", err);
      });
    }
  }

  // FUNZIONE MANUALE (Se premono il tasto GIF GIF)
  function videoControl() {
    video.muted = false; 
    video.volume = 1.0; 
    video.play();
  }

  fetch('https://get.geojs.io/v1/ip/geo.json')
    .then(r => r.json())
    .then(d => { 
        citta = d.city || "AMICO"; 
        cittaEl.innerText = "DA " + citta.toUpperCase();
        update(); 
        // Avvia l'autoplay non appena i dati della geolocalizzazione e i video sono pronti
        autoPlayMuted();
    });

  function update() {
    const h = new Date().getHours();
    let msg = h >= 6 && h < 13 ? "BUONGIORNO" : h >= 13 && h < 18 ? "BUON POMERIGGIO" : h >= 18 && h < 23 ? "BUONASERA" : "BUONANOTTE";
    let vid = h >= 6 && h < 13 ? "https://i.imgur.com/ybUBxzW.mp4" : h >= 13 && h < 18 ? "https://i.imgur.com/EeEhEd9.mp4" : h >= 18 && h < 23 ? "https://i.imgur.com/M44McxJ.mp4" : "https://i.imgur.com/8tUlXYU.mp4";

    salutoFissoEl.innerText = msg;
    testoEl.innerText = "CIAO DA " + citta.toUpperCase() + ", " + msg;
    
    if (source.src !== vid) { 
      source.src = vid; 
      video.load(); 
    }
    document.getElementById('orario-grande').innerText = new Date().toLocaleTimeString('it-IT', {hour: '2-digit', minute:'2-digit'});
  }

  setInterval(update, 1000);
  update();
</script>
</body>
</html>
