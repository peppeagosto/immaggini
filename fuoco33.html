<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>EL CARTAIO - GIF VERTICAL ONLY</title>

<style>
html,body{
    margin:0;
    padding:0;
    background: transparent;
}

/* CONTENITORI SNERLI (180px) */
.gif-box{
    position:fixed;
    width:180px;
    height:520px; /* Altezza verticale come avevi chiesto */
    top:50%;
    transform:translateY(-50%);
    border-radius:14px;
    border:2px solid #ff0000;
    box-shadow:0 0 20px #ff0000, 0 0 40px #ffff00;
    overflow:hidden;
    z-index:9999;
    background: #000;
}

/* POSIZIONE SX E DX */
.gif-left{left:10px;}
.gif-right{right:10px;}

/* IMMAGINE GIF A TUTTA ALTEZZA */
.gif-full {
    width: 100%;
    height: 100%;
    position: relative;
}

.gif-full img {
    width: 100%;
    height: 100%;
    object-fit: cover; /* Fa sì che la gif riempia bene tutto il rettangolo verticale */
    display: block;
}

/* TESTO ANIMATO IN BASSO */
.video-text{
    position:absolute;
    bottom:12px;
    left:0;
    width:100%;
    text-align:center;
    color:#fff;
    font-size:20px;
    font-weight:bold;
    text-shadow:0 0 8px #fff, 0 0 15px #ff0000;
    pointer-events:none;
    animation:wave 3s ease-in-out infinite;
    z-index: 10;
}

@keyframes wave{
    0%{transform:translateY(0) rotate(0deg);}
    25%{transform:translateY(-4px) rotate(-1deg);}
    50%{transform:translateY(0) rotate(0deg);}
    75%{transform:translateY(4px) rotate(1deg);}
    100%{transform:translateY(0) rotate(0deg);}
}
</style>
</head>

<body>

<div class="gif-box gif-left">
    <div class="gif-full">
        <img src="https://xatimg.com/image/tSOWKvlwm7qk.gif" alt="GIF VERTICALE SX">
        <div class="video-text">EL  DIABLO</div>
    </div>
</div>

<div class="gif-box gif-right">
    <div class="gif-full">
        <img src="https://xatimg.com/image/tSOWKvlwm7qk.gif" alt="GIF VERTICALE DX">
        <div class="video-text">EL CARTAIO</div>
    </div>
</div>

</body>
</html>
