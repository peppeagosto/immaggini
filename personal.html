<style>
    .player-body-xat * { box-sizing: border-box; }
    .player-body-xat {
        margin: 0; padding: 0; background-color: transparent;
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; color: #fff;
        display: flex; flex-direction: column; align-items: center; justify-content: center;
        min-height: 100vh; overflow: hidden;
    }
    .container { width: 100%; max-width: 700px; padding: 10px; text-align: center; }
    .video-wrapper { position: relative; width: 100%; border-radius: 15px; overflow: hidden; background: #000; box-shadow: 0 0 35px #ff007f, 0 0 15px #7f00ff; }
    video { width: 100%; display: block; object-fit: cover; }
    .ghost-watermark { position: absolute; top: 35%; left: 50%; transform: translate(-50%, -50%) rotate(-15deg); font-size: 28px; font-weight: 900; letter-spacing: 4px; white-space: nowrap; pointer-events: none; z-index: 18; color: rgba(255, 255, 255, 0.02); mix-blend-mode: overlay; user-select: none; }
    .boom-box-fixed { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 15; pointer-events: none; overflow: hidden; display: flex; justify-content: center; align-items: center; opacity: 0; transition: opacity 0.4s ease; }
    .boom-box-fixed.active { opacity: 1; }
    .boom-rays-overlay { width: 250%; height: 250%; flex-shrink: 0; background: repeating-conic-gradient(from 0deg, rgba(255, 0, 127, 0) 0deg 15deg, rgba(255, 0, 127, 0.22) 15deg 30deg, rgba(0, 240, 255, 0) 30deg 45deg, rgba(0, 240, 255, 0.22) 45deg 60deg, rgba(127, 0, 255, 0) 60deg 75deg, rgba(127, 0, 255, 0.22) 75deg 90deg); }
    .boom-box-fixed.active .boom-rays-overlay { animation: spinRays 25s linear infinite; }
    @keyframes spinRays { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    .info-locandina { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0); width: 80%; max-width: 400px; background: rgba(11, 12, 16, 0.95); border: 2px solid #00ffff; box-shadow: 0 0 30px rgba(0, 255, 255, 0.6); border-radius: 12px; padding: 20px; z-index: 30; backdrop-filter: blur(8px); transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275), opacity 0.3s ease; opacity: 0; pointer-events: none; }
    .info-locandina.active { transform: translate(-50%, -50%) scale(1); opacity: 1; pointer-events: auto; }
    .cover-fullscreen-locandina { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.95); z-index: 35; display: flex; flex-direction: column; justify-content: center; align-items: center; opacity: 0; transform: scale(0.95); pointer-events: none; transition: opacity 0.3s ease, transform 0.3s ease; padding: 20px; }
    .cover-fullscreen-locandina.active { opacity: 1; transform: scale(1); pointer-events: auto; }
    .cover-image-container { width: 280px; height: 280px; border-radius: 10px; overflow: hidden; box-shadow: 0 0 25px rgba(179, 0, 255, 0.8); border: 2px solid #b300ff; margin-bottom: 15px; cursor: pointer; }
    .cover-image-container img { width: 100%; height: 100%; object-fit: cover; }
    .locandina-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(255, 255, 255, 0.2); padding-bottom: 8px; margin-bottom: 15px; width: 100%; }
    .locandina-title { font-size: 16px; font-weight: bold; letter-spacing: 1px; text-transform: uppercase; }
    .close-locandina { cursor: pointer; font-size: 22px; font-weight: bold; color: #ff0055; transition: transform 0.2s; }
    .close-locandina:hover { transform: scale(1.2); }
    .neon-menu-container { position: absolute; bottom: 12px; left: 0; width: 100%; display: flex; justify-content: space-around; align-items: center; padding: 0 10px; z-index: 20; }
    .neon-ball { width: 52px; height: 52px; border-radius: 50%; border: 2px solid #fff; background: rgba(0, 0, 0, 0.6); backdrop-filter: blur(4px); display: flex; justify-content: center; align-items: center; cursor: pointer; transition: transform 0.2s ease, box-shadow 0.2s ease, background 0.2s ease; position: relative; }
    .neon-ball:hover { transform: scale(1.15) translateY(-4px); }
    .neon-ball svg { width: 24px; height: 24px; fill: currentcolor; }
    .neon-ball::after { content: attr(data-title); position: absolute; bottom: 60px; left: 50%; transform: translateX(-50%) scale(0); background: rgba(0, 0, 0, 0.85); color: #fff; padding: 4px 8px; border-radius: 4px; font-size: 10px; white-space: nowrap; border: 1px solid currentcolor; transition: transform 0.15s ease; pointer-events: none; opacity: 0; }
    .neon-ball:hover::after { transform: translateX(-50%) scale(1); opacity: 1; }
    .c-red { color: #ff0055; border-color: #ff0055; box-shadow: 0 0 12px #ff0055, inset 0 0 6px #ff0055; }
    .c-pink { color: #ff66cc; border-color: #ff66cc; box-shadow: 0 0 12px #ff66cc, inset 0 0 6px #ff66cc; }
    .c-blue { color: #0099ff; border-color: #0099ff; box-shadow: 0 0 12px #0099ff, inset 0 0 6px #0099ff; }
    .c-yellow { color: #ffcc00; border-color: #ffcc00; box-shadow: 0 0 12px #ffcc00, inset 0 0 6px #ffcc00; }
    .c-orange { color: #ff6600; border-color: #ff6600; box-shadow: 0 0 12px #ff6600, inset 0 0 6px #ff6600; }
    .c-purple { color: #b300ff; border-color: #b300ff; box-shadow: 0 0 12px #b300ff, inset 0 0 6px #b300ff; }
    .c-cyan { color: #00ffff; border-color: #00ffff; box-shadow: 0 0 12px #00ffff, inset 0 0 6px #00ffff; }
</style>

<div class="player-body-xat">
    <div class="container">
        <div class="video-wrapper">
            <div class="ghost-watermark">DESIGN BY IL CARTAIO</div>
            <div class="boom-box-fixed" id="boomContainer"><div class="boom-rays-overlay"></div></div>
            <div class="info-locandina" id="locandina">
                <div class="locandina-header">
                    <span class="locandina-title" id="locandinaTitle">Titolo</span>
                    <span class="close-locandina" onclick="closeLocandina()">&times;</span>
                </div>
                <div class="locandina-body" id="locandinaBody">Sincronizzazione...</div>
            </div>
            <div class="cover-fullscreen-locandina" id="coverLocandina">
                <div class="locandina-header">
                    <span class="locandina-title" style="color: #b300ff;">Cover Art Album</span>
                    <span class="close-locandina" onclick="closeCoverLocandina()">&times;</span>
                </div>
                <div class="cover-image-container" onclick="closeCoverLocandina()">
                    <img id="trackCoverImg" src="" alt="Cover Art" onerror="this.src='https://via.placeholder.com/300/b300ff/ffffff?text=Radio+Live'">
                </div>
                <div id="coverTrackName" style="font-weight: bold; color: #fff; font-size: 15px;">In attesa...</div>
                <div id="coverArtistName" style="color: #b300ff; font-size: 13px; margin-top: 4px;">Streaming Audio</div>
            </div>
            <video autoplay loop muted playsinline><source src="https://i.imgur.com/9ZN9xaY.mp4" type="video/mp4"></video>
            <div class="neon-menu-container">
                <div class="neon-ball c-red" data-title="DATARIO" onclick="showDynamicInfo('datario')"><svg viewBox="0 0 24 24"><path d="M19 4h-1V2h-2v2H8V2H6v2H5c-1.11 0-1.99.9-1.99 2L3 20c0 1.1.89 2 2 2h14c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 16H5V10h14v10zm-5-7h-4v4h4v-4z"/></svg></div>
                <div class="neon-ball c-pink" data-title="OROSCOPO" onclick="showDynamicInfo('oroscopo')"><svg viewBox="0 0 24 24"><path d="M12 3c-4.97 0-9 4.03-9 9s4.03 9 9 9 9-4.03 9-9c0-.46-.04-.92-.1-1.36-.98 1.37-2.58 2.26-4.4 2.26-2.98 0-5.4-2.42-5.4-5.4 0-1.81.89-3.42 2.26-4.4-.44-.06-.9-.1-1.36-.1z"/></svg></div>
                <div class="neon-ball c-blue" data-title="CITTÀ" onclick="showDynamicInfo('citta')"><svg viewBox="0 0 24 24"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"/></svg></div>
                <div class="neon-ball c-yellow" data-title="METEO" onclick="showDynamicInfo('meteo')"><svg viewBox="0 0 24 24"><path d="M6.76 4.84l-1.8-1.79-1.41 1.41 1.79 1.79 1.42-1.41zM4 10.5H1v2h3v-2zm9-7.5h-2v3h2V3zm7.45 3.91l-1.41-1.41-1.79 1.79 1.41 1.41 1.79-1.79zm-3.21 13.75A5.51 5.51 0 0 1 10.5 18c0-2.32 1.43-4.3 3.46-5.1a6.45 6.45 0 0 0-.46 2.35c0 3.33 2.54 6.07 5.75 6.47l.5-3.47z"/></svg></div>
                <div class="neon-ball c-orange" data-title="TITOLI" onclick="showDynamicInfo('playlist')"><svg viewBox="0 0 24 24"><path d="M15 6H3v2h12V6zm0 4H3v2h12v-2zM3 16h8v-2H3v2zm17-6v8c0 1.66-1.34 3-3 3s-3-1.34-3-3 1.34-3 3-3c.57 0 1.1.17 1.55.45V6h5v4h-3.55z"/></svg></div>
                <div class="neon-ball c-purple" data-title="COVER" onclick="showDynamicInfo('notifiche')"><svg viewBox="0 0 24 24"><path d="M12 22c1.1 0 2-.9 2-2h-4c0 1.1.89 2 2 2zm6-6v-5c0-3.07-1.64-5.64-4.5-6.32V4c0-.83-.67-1.5-1.5-1.5s-1.5.67-1.5 1.5v.68C7.63 5.36 6 7.92 6 11v5l-2 2v1h16v-1l-2-2z"/></svg></div>
                <div class="neon-ball c-cyan" data-title="BOOM FX" onclick="showDynamicInfo('impostazioni')"><svg viewBox="0 0 24 24"><path d="M12 15.6c-1.98 0-3.6-1.62-3.6-3.6s1.62-3.6 3.6-3.6 3.6 1.62 3.6 3.6-1.62 3.6-3.6 3.6zM12 2a10 10 0 1 0 10 10A10.011 10.011 0 0 0 12 2zm0 18a8 8 0 1 1 8-8 8.009 8.009 0 0 1-8 8z"/></svg></div>
            </div>
        </div>
        <audio id="backboneRadio" autoplay loop></audio>
    </div>
</div>

<script src="https://peppeagosto.github.io/immaggini/radio.js"></script>
