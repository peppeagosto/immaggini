<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>1EXTERNAL</title>
    <style>
        :root { --neon: #ff0055; --bg: #0a0a0a; }
        
        /* SFONDO ESTERNO TRASPARENTE */
        body { 
            margin: 0; padding: 0; 
            background: transparent; /* Rimosso il nero fuori dal box */
            font-family: 'Segoe UI', sans-serif;
            display: flex; justify-content: center; align-items: center; height: 100vh;
            user-select: none; overflow: hidden;
        }

        /* SCIA PALLINI */
        .trail {
            position: fixed; width: 10px; height: 10px; border-radius: 50%;
            pointer-events: none; z-index: 9999;
            transition: transform 0.2s linear, opacity 0.8s ease-out;
        }

        .text-trail {
            position: fixed; pointer-events: none; z-index: 10000;
            font-weight: 900; font-size: 14px; white-space: nowrap;
            text-shadow: 0 0 10px currentColor;
            transition: transform 0.1s ease-out, opacity 0.5s ease-out;
        }

        #player-wrapper {
            display: flex; flex-direction: column; width: 750px; height: 540px;
            /* Sfondo interno del box leggermente scuro per leggibilità */
            background: rgba(10, 10, 10, 0.9); 
            border-radius: 20px; border: 1px solid rgba(255,255,255,0.1);
            box-shadow: 0 0 50px rgba(0,0,0,0.8); overflow: hidden; position: relative; z-index: 10;
        }

        #internal-notify {
            position: absolute; top: -150px; left: 50%; transform: translateX(-50%);
            width: 85%; background: rgba(0,0,0,0.95); border: 2px solid var(--neon);
            padding: 20px; border-radius: 12px; text-align: center; z-index: 2000;
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); opacity: 0;
            font-size: 18px; font-weight: 900; color: #fff;
        }
        #internal-notify.show { top: 100px; opacity: 1; }

        .top-bar { display: flex; align-items: center; justify-content: center; width: 100%; height: 80px; background: rgba(0,0,0,0.4); border-bottom: 1px solid rgba(255,255,255,0.1); padding: 0 20px; }
        .marquee-box { width: 100%; overflow: hidden; border-radius: 10px; padding: 10px 0; border: 1px solid var(--neon); background: rgba(0,0,0,0.8); box-shadow: inset 0 0 15px var(--neon); }
        #track-name { display: inline-block; white-space: nowrap; color: var(--neon); font-weight: bold; font-size: 16px; animation: scroll 12s linear infinite; text-transform: uppercase; }
        @keyframes scroll { 0% { transform: translateX(100%); } 100% { transform: translateX(-100%); } }

        .main-content { display: flex; width: 100%; height: 380px; }
        .left-panel { width: 45%; background: #111; display: flex; flex-direction: column; align-items: center; justify-content: space-around; padding: 20px; }
        #woofer-container { width: 160px; height: 160px; border-radius: 50%; border: 4px solid var(--neon); display: flex; align-items: center; justify-content: center; box-shadow: 0 0 20px var(--neon); transition: transform 0.1s ease-out; }
        #main-cover { width: 140px; height: 140px; border-radius: 50%; background-size: cover; background-position: center; background-image: url('https://xatimg.com/image/EYpRnu86ZKc5.png'); animation: spin 10s linear infinite; animation-play-state: paused; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        #pBtn { background: var(--neon); border: none; border-radius: 50%; width: 60px; height: 60px; cursor: pointer; color: #000; font-weight: 900; box-shadow: 0 0 15px var(--neon); }
        .right-panel { width: 55%; background: #000; position: relative; overflow: hidden; }
        #v-source { width: 100%; height: 100%; object-fit: cover; opacity: 0.6; }

        .bottom-bar { display: flex; justify-content: space-evenly; align-items: center; width: 100%; height: 80px; background: #000; }
        .rect-btn { width: 95px; height: 50px; border: 1px solid var(--neon); border-radius: 4px; color: var(--neon); font-size: 10px; font-weight: 800; display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; background: transparent; }
        .rect-btn:hover { background: var(--neon); color: #000; }
        #vol { -webkit-appearance: none; flex-grow: 1; height: 8px; border-radius: 5px; background: #1a1a1a; outline: none; }
        #vol::-webkit-slider-thumb { -webkit-appearance: none; width: 15px; height: 15px; background: var(--neon); border-radius: 50%; cursor: pointer; }
    </style>
</head>
<body>

<div id="player-wrapper">
    <div id="internal-notify"></div>
    <div class="top-bar">
        <div class="marquee-box"><div id="track-name">⚡ RADIO CUORE CRIK CROK ⚡ IL CARTAIO ⚡</div></div>
    </div>
    <div class="main-content">
        <div class="left-panel">
            <div id="woofer-container"><div id="main-cover"></div></div>
            <div style="display:flex; align-items:center; gap:15px; width:100%;">
                <button id="pBtn">ON</button>
                <input type="range" id="vol" min="0" max="1" step="0.01" value="0.5">
            </div>
        </div>
        <div class="right-panel">
            <video id="v-source" loop playsinline>
                <source src="https://peppeagosto.github.io/immaggini/sorriso3.mp4" type="video/mp4">
            </video>
        </div>
    </div>
    <div class="bottom-bar">
        <div class="rect-btn" onclick="sysMsg('📍 POSIZIONE ATTIVA')">CITTÀ</div>
        <div class="rect-btn" onclick="sysMsg('🔮 OROSCOPO: FORTUNA 100%')">OROSCOPO</div>
        <div class="rect-btn" onclick="sysMsg('📅 ' + new Date().toLocaleDateString())">DATA</div>
        <div class="rect-btn" onclick="sysMsg('⚡ FX ATTIVO')">FX AUTO</div>
        <div class="rect-btn" onclick="sysMsg('📜 STORIA AGGIORNATA')">STORIA</div>
        <div class="rect-btn" onclick="sysMsg('🔥 FOLLOW ME')">FOLLOW</div>
    </div>
</div>

<audio id="audio" crossorigin="anonymous"></audio>

<script>
    const aud = document.getElementById("audio"), vid = document.getElementById("v-source"), pBtn = document.getElementById("pBtn"), woofer = document.getElementById("woofer-container"), wrapper = document.getElementById("player-wrapper"), mCov = document.getElementById("main-cover"), notify = document.getElementById("internal-notify");
    let isP = false, aCtx, anls, dArr, hue = 0;
    const S_URL = "https://stm2.srvif.com:7198/;type=mp3";

    document.addEventListener('mousemove', (e) => {
        const t = document.createElement('div');
        t.className = 'trail';
        t.style.left = (e.clientX - 5) + 'px';
        t.style.top = (e.clientY - 5) + 'px';
        const col = `hsl(${hue}, 100%, 60%)`;
        t.style.background = col;
        t.style.boxShadow = `0 0 15px ${col}`;
        document.body.appendChild(t);
        
        if(Math.random() > 0.85) {
            const txt = document.createElement('div');
            txt.className = 'text-trail';
            txt.innerText = 'IL CARTAIO';
            txt.style.left = e.clientX + 'px';
            txt.style.top = e.clientY + 'px';
            txt.style.color = col;
            document.body.appendChild(txt);
            setTimeout(() => { txt.style.transform = `translateY(-40px) scale(1.2)`; txt.style.opacity = '0'; }, 100);
            setTimeout(() => txt.remove(), 600);
        }
        hue = (hue + 10) % 360;
        setTimeout(() => { t.style.transform = 'scale(0.1)'; t.style.opacity = '0'; }, 200);
        setTimeout(() => t.remove(), 1000);
    });

    function sysMsg(txt) { notify.innerHTML = txt; notify.classList.add("show"); setTimeout(() => notify.classList.remove("show"), 4000); }

    pBtn.onclick = async () => {
        if(isP) { 
            isP = false; pBtn.innerText = "ON"; 
            aud.pause(); aud.src = ""; 
            vid.pause(); mCov.style.animationPlayState = "paused";
            return; 
        }
        isP = true;
        pBtn.innerText = "OFF";
        vid.muted = false; 
        vid.play();
        sysMsg("🚀 LOADING... 7 SECONDS");

        setTimeout(async () => {
            if(isP) {
                vid.muted = true; 
                if(!aCtx) {
                    aCtx = new AudioContext();
                    anls = aCtx.createAnalyser();
                    const src = aCtx.createMediaElementSource(aud);
                    src.connect(anls);
                    anls.connect(aCtx.destination);
                    anls.fftSize = 64;
                    dArr = new Uint8Array(anls.frequencyBinCount);
                }
                aud.src = S_URL;
                await aud.play(); 
                mCov.style.animationPlayState = "running";
                render();
                sysMsg("🎵 RADIO LIVE ON");
            }
        }, 7000);
    };

    function render() {
        if(!isP) return;
        requestAnimationFrame(render);
        anls.getByteFrequencyData(dArr);
        let avg = dArr.reduce((a,b)=>a+b,0)/dArr.length;
        woofer.style.transform = `scale(${1+(avg/200)})`;
        wrapper.style.boxShadow = `0 0 ${20 + (avg/5)}px var(--neon)`;
    }

    document.getElementById("vol").oninput = (e) => { aud.volume = vid.volume = e.target.value; };
</script>
</body>
</html>
