

<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>91 - Radio Pro Final</title>
    <style>
        :root { --neon: #ff0055; }
        body { margin: 0; padding: 0; background: #050505; font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; user-select: none; overflow: hidden; }
        #trail-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 9999; }
        
        #player-wrapper { display: flex; flex-direction: column; width: 750px; height: 540px; background: rgba(10, 10, 10, 0.98); border-radius: 20px; border: 2px solid rgba(255,255,255,0.1); box-shadow: 0 0 50px rgba(0,0,0,0.8); overflow: hidden; position: relative; z-index: 10; }
        
        #internal-notify { position: absolute; top: -150px; left: 50%; transform: translateX(-50%); width: 85%; background: rgba(0,0,0,0.95); border: 2px solid var(--neon); padding: 20px; border-radius: 12px; text-align: center; z-index: 2000; transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); opacity: 0; font-size: 18px; font-weight: 900; color: #fff; box-shadow: 0 0 30px var(--neon); }
        #internal-notify.show { top: 100px; opacity: 1; }
        
        /* TOP BAR E TITOLI */
        .top-bar { display: flex; align-items: center; justify-content: center; width: 100%; height: 80px; background: rgba(0,0,0,0.4); border-bottom: 1px solid rgba(255,255,255,0.1); padding: 0 20px; box-sizing: border-box; }
        .marquee-box { width: 100%; height: 45px; overflow: hidden; border-radius: 10px; border: 2px solid var(--neon); background: rgba(0,0,0,0.8); box-shadow: inset 0 0 15px var(--neon); position: relative; display: flex; align-items: center; }
        
        #track-name { 
            position: absolute;
            white-space: nowrap; 
            color: var(--neon); 
            font-weight: bold; 
            font-size: 18px; 
            text-transform: uppercase;
            animation: scroll 12s linear infinite;
            padding-left: 100%;
        }

        @keyframes scroll { 
            0% { transform: translateX(0); } 
            100% { transform: translateX(-100%); } 
        }
        
        .main-content { display: flex; width: 100%; height: 380px; }
        
        /* PANNELLO SINISTRO (COVER E PLAY) */
        .left-panel { width: 40%; background: #111; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; gap: 20px; border-right: 1px solid rgba(255,255,255,0.05); }
        #woofer-container { width: 160px; height: 160px; border-radius: 50%; border: 4px solid var(--neon); display: flex; align-items: center; justify-content: center; box-shadow: 0 0 20px var(--neon); transition: transform 0.1s ease-out; overflow: hidden; position: relative; }
        #main-cover { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; animation: spin 10s linear infinite; animation-play-state: paused; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        
        /* PANNELLO DESTRO (VIDEO GRANDE) */
        .right-panel { width: 60%; background: #000; position: relative; overflow: hidden; display: flex; align-items: center; justify-content: center; }
        #v-source { width: 100%; height: 100%; object-fit: cover; opacity: 0.8; }
        
        .bottom-bar { display: flex; justify-content: space-evenly; align-items: center; width: 100%; height: 80px; background: rgba(0,0,0,0.5); }
        .rect-btn { width: 105px; height: 50px; border: 1px solid var(--neon); border-radius: 4px; color: var(--neon); font-size: 11px; font-weight: 800; display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; background: transparent; transition: 0.2s; }
        .rect-btn:hover { background: var(--neon); color: #000; box-shadow: 0 0 15px var(--neon); }
        
        #pBtn { background: var(--neon); border: none; border-radius: 50%; width: 55px; height: 55px; cursor: pointer; color: #000; font-weight: 900; box-shadow: 0 0 15px var(--neon); flex-shrink: 0; }
        #vol { -webkit-appearance: none; flex-grow: 1; height: 6px; border-radius: 5px; background: #333; outline: none; }
        #vol::-webkit-slider-thumb { -webkit-appearance: none; width: 16px; height: 16px; background: var(--neon); border-radius: 50%; cursor: pointer; }
    </style>
</head>
<body>

<canvas id="trail-canvas"></canvas>

<div id="player-wrapper">
    <div id="internal-notify"></div>
    
    <div class="top-bar">
        <div class="marquee-box">
            <div id="track-name">⚡ SYSTEM ONLINE - PRESS ON</div>
        </div>
    </div>

    <div class="main-content">
        <div class="left-panel">
            <div id="woofer-container">
                <img id="main-cover" src="https://xatimg.com/image/27mgc1biTQdm.png" alt="cover">
            </div>
            <div style="display:flex; align-items:center; gap:10px; width:100%;">
                <button id="pBtn">ON</button>
                <input type="range" id="vol" min="0" max="1" step="0.01" value="0.5">
            </div>
        </div>

        <div class="right-panel">
            <video id="v-source" loop playsinline muted autoplay>
                <source src="https://peppeagosto.github.io/immaggini/sorriso3.mp4" type="video/mp4">
            </video>
        </div>
    </div>

    <div class="bottom-bar">
        <div class="rect-btn" onclick="getRealCity()">CITTÀ</div>
        <div class="rect-btn" onclick="getRealOroscopo()">OROSCOPO</div>
        <div class="rect-btn" onclick="getRealTime()">DATA</div>
        <div class="rect-btn" onclick="toggleFX()">FX AUTO</div>
        <div class="rect-btn" onclick="sysMsg('📜 LOG: SISTEMA 91 OTTIMIZZATO')">STORIA</div>
        <div class="rect-btn" onclick="sysMsg('🔥 FOLLOW: @ILCARTAIO_RADIO')">FOLLOW</div>
    </div>
</div>

<audio id="audio" crossorigin="anonymous"></audio>

<script>
    const aud = document.getElementById("audio"), vid = document.getElementById("v-source"), pBtn = document.getElementById("pBtn"), woofer = document.getElementById("woofer-container"), wrapper = document.getElementById("player-wrapper"), mCov = document.getElementById("main-cover"), notify = document.getElementById("internal-notify"), tName = document.getElementById("track-name"), volInput = document.getElementById("vol");
    let isP = false, aCtx, anls, dArr, fxEnabled = false, countdownTimer;
    let currentTrack = "";
    const S_URL = "https://stm2.srvif.com:7198/;type=mp3";
    const API_STATS = "https://stm2.srvif.com:7198/stats?sid=1&json=1";
    const DEFAULT_COVER = "https://xatimg.com/image/27mgc1biTQdm.png";

    // --- SCIA ARCOBALENO ---
    const canvas = document.getElementById('trail-canvas');
    const ctx = canvas.getContext('2d');
    let points = [];
    const textToDisplay = "IL CARTAIO";
    let charIndex = 0, hue = 0;
    function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
    window.addEventListener('resize', resize); resize();
    window.addEventListener('mousemove', (e) => {
        const lastPoint = points[points.length - 1];
        if (!lastPoint || Math.hypot(e.clientX - lastPoint.x, e.clientY - lastPoint.y) > 25) {
            points.push({ x: e.clientX, y: e.clientY, char: textToDisplay[charIndex], color: `hsl(${hue}, 100%, 60%)`, age: 0 });
            charIndex = (charIndex + 1) % textToDisplay.length;
            hue = (hue + 10) % 360;
        }
    });
    function drawTrail() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.font = "900 24px 'Segoe UI'"; ctx.textAlign = "center";
        for (let i = 0; i < points.length; i++) {
            let p = points[i]; p.age++;
            if (p.age > 50) { points.splice(i, 1); i--; continue; }
            ctx.globalAlpha = 1 - (p.age / 50);
            ctx.fillStyle = p.color; ctx.shadowBlur = 15; ctx.shadowColor = p.color;
            ctx.fillText(p.char, p.x, p.y);
        }
        requestAnimationFrame(drawTrail);
    }
    drawTrail();

    // --- AGGIORNAMENTO AUTOMATICO METADATI ---
    async function updateMetadata() {
        if(!isP) return;
        try {
            const response = await fetch(`https://api.allorigins.win/get?url=${encodeURIComponent(API_STATS)}&t=${Date.now()}`);
            const json = await response.json();
            const data = JSON.parse(json.contents);
            let songTitle = data.songtitle || "";

            songTitle = songTitle.replace(/&nbsp;/g, ' ').replace(/[\x00-\x1F\x7F-\x9F]/g, "").replace(/https?:\/\/\S+/gi, '').replace(/stm2\.srvif\.com:7198/gi, '').replace(/;type=mp3/gi, '').replace(/;/g, '').trim();

            if (songTitle && songTitle.length > 2) {
                songTitle = songTitle.toUpperCase();
                if (currentTrack !== songTitle) {
                    currentTrack = songTitle;
                    tName.innerText = "🎵 IN STREAM: " + currentTrack;
                    fetchiTunesCover(currentTrack);
                }
            }
        } catch (e) { console.log("Errore Metadata"); }
    }

    async function fetchiTunesCover(term) {
        try {
            let query = term.split("-")[1] || term.split("-")[0] || term;
            query = query.replace(/\(.*\)|\[.*\]/g, "").trim();
            const r = await fetch(`https://itunes.apple.com/search?term=${encodeURIComponent(query)}&media=music&limit=1`);
            const d = await r.json();
            if (d.results && d.results.length > 0) {
                mCov.src = d.results[0].artworkUrl100.replace('100x100bb', '500x500bb');
            } else { mCov.src = DEFAULT_COVER; }
        } catch (e) { mCov.src = DEFAULT_COVER; }
    }

    function sysMsg(t) { notify.innerHTML = t; notify.classList.add("show"); setTimeout(()=>notify.classList.remove("show"), 4000); }

    pBtn.onclick = async () => {
        if(isP) { 
            isP = false; clearTimeout(countdownTimer);
            pBtn.innerText = "ON"; aud.pause(); aud.src = ""; 
            vid.pause(); vid.muted = true;
            mCov.style.animationPlayState = "paused"; 
            tName.innerText = "⚡ SYSTEM STANDBY";
            return; 
        }
        
        isP = true; 
        pBtn.innerText = "OFF"; 
        vid.muted = false; 
        vid.play();
        sysMsg("🚀 SISTEMA IN CARICAMENTO... 7s");

        countdownTimer = setTimeout(async () => {
            if(isP) {
                vid.muted = true; 
                if(!aCtx) {
                    aCtx = new (window.AudioContext || window.webkitAudioContext)();
                    anls = aCtx.createAnalyser();
                    const s = aCtx.createMediaElementSource(aud);
                    s.connect(anls); anls.connect(aCtx.destination);
                    anls.fftSize = 64; dArr = new Uint8Array(anls.frequencyBinCount);
                }
                aud.src = S_URL;
                aud.volume = volInput.value;
                try {
                    await aud.play();
                    mCov.style.animationPlayState = "running"; 
                    render();
                    updateMetadata();
                    sysMsg("🎵 RADIO ON AIR");
                } catch(e) { sysMsg("❌ ERRORE STREAMING"); }
            }
        }, 7000);
    };

    function render() {
        if(!isP) return;
        requestAnimationFrame(render);
        anls.getByteFrequencyData(dArr);
        let avg = dArr.reduce((a,b)=>a+b,0)/dArr.length;
        woofer.style.transform = `scale(${1+(avg/200)})`;
        wrapper.style.boxShadow = `0 0 ${20+(avg/5)}px var(--neon)`;
        if(fxEnabled && avg > 10) { document.documentElement.style.setProperty('--neon', `hsl(${avg*2%360}, 100%, 50%)`); }
    }

    volInput.oninput = (e) => { aud.volume = e.target.value; };
    setInterval(updateMetadata, 10000);

    async function getRealCity() { sysMsg("📍 LOCALIZZAZIONE..."); try { const r = await fetch('https://ipapi.co/json/'); const d = await r.json(); sysMsg(`📍 SEI A: ${d.city.toUpperCase()}`); } catch (e) { sysMsg("❌ ERRORE GPS"); } }
    function getRealOroscopo() { const f = ["ARIETE: Spacca tutto!", "TORO: Relax totale.", "GEMELLI: Energia doppia!", "LEONE: Sei il top!"]; sysMsg(`🔮 OROSCOPO: ${f[Math.floor(Math.random()*f.length)]}`); }
    function getRealTime() { const d = new Date(); sysMsg(`📅 ${d.toLocaleDateString()}<br>⏰ ${d.toLocaleTimeString()}`); }
    function toggleFX() { fxEnabled = !fxEnabled; sysMsg(fxEnabled ? "🌈 FX ON" : "⚡ FX OFF"); }
</script>
</body>
</html>
