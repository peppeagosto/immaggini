<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>EL DIABLO - Vertical Stretch</title>
<style>
body{
  margin:0;
  background:transparent;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  overflow:hidden;
}
.container{
  position:relative;
  width:1308px;
  height:550px; /* Aumentato per ospitare i video più alti */
  display: flex;
  align-items: center;
  justify-content: center;
}

/* ===== VIDEO LATERALI - ALTEZZA ALLUNGATA A 520PX ===== */
.video-wrapper{
  position:absolute;
  width:270px;
  height:520px; /* Altezza allungata come richiesto */
  z-index:2;
  border-radius:20px;
  box-sizing: border-box;
  border: 8px solid transparent;
  background: 
    linear-gradient(black, black) padding-box, 
    conic-gradient(red, orange, yellow, lime, cyan, blue, violet, red) border-box;
}
.left{left:0}
.right{right:0}

.side-video{
  width:100%;
  height:100%;
  object-fit:cover;
  border-radius:12px;
  display: block;
}

/* ===== AREA CENTRALE ===== */
.center-area{
  position:absolute;
  left:280px;
  right:280px;
  top:0;
  bottom:0;
  display:flex;
  justify-content:center;
  align-items:center;
}

/* ===== BOX CENTRALE - SNAKE 25PX + DOPPIO GLOW ===== */
.center-box {
  position: relative;
  width: 420px;
  border-radius: 20px;
  padding: 25px; 
  filter: drop-shadow(0 0 20px rgba(0, 206, 209, 0.9)) 
          drop-shadow(0 0 40px rgba(135, 206, 235, 0.7));
  overflow: hidden;
  display: flex;
  justify-content: center;
  align-items: center;
}

.center-box img {
  width: 100%;
  display: block;
  border-radius: 10px;
  position: relative;
  z-index: 5;
}

/* Animazione Snake Turchese/Celestino */
.center-box::before {
  content: "";
  position: absolute;
  width: 150%;
  height: 150%;
  background: conic-gradient(transparent, #00ced1, #87ceeb, transparent 25%);
  animation: rotateSnake 3s linear infinite;
}

.center-box::after {
  content: "";
  position: absolute;
  width: 150%;
  height: 150%;
  background: conic-gradient(transparent, #87ceeb, #00ced1, transparent 25%);
  animation: rotateSnake 3s linear infinite;
  animation-delay: -1.5s;
}

.inner-mask {
  position: absolute;
  inset: 25px;
  background: black;
  border-radius: 10px;
  z-index: 2;
}

@keyframes rotateSnake {
  100% { transform: rotate(360deg); }
}

/* TESTO VIDEO */
.video-text{
  position:absolute;
  bottom:15px;
  left:50%;
  transform:translateX(-50%);
  font-size:25px;
  font-family:Trebuchet MS;
  font-weight:bold;
  z-index:10;
  background:linear-gradient(90deg,red,orange,yellow,lime,cyan,blue,violet,red);
  background-size:400% 100%;
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  animation: rainbowText 3s linear infinite;
}

@keyframes rainbowText{
  0%{background-position:0%}
  100%{background-position:100%}
}
</style>
</head>
<body>

<div class="container">
  <div class="video-wrapper left">
    <video class="side-video" autoplay loop muted playsinline>
      <source src="https://peppeagosto.github.io/immaggini/ribelle.mp4">
    </video>
    <div class="video-text">ANGEL</div>
  </div>

  <div class="video-wrapper right">
    <video class="side-video" autoplay loop muted playsinline>
      <source src="https://peppeagosto.github.io/immaggini/ribelle.mp4">
    </video>
    <div class="video-text">PATTY</div>
  </div>

  <div class="center-area">
    <div class="center-box">
      <div class="inner-mask"></div>
      <img src="https://xatimg.com/image/lwVGx7c3n5P8.jpg" alt="Foto Centrale">
    </div>
  </div>
</div>

</body>
</html>
