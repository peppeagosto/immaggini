<html lang="it">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>IL CARTAIO DIAVOLETTE</title>
<style>
  body, html {
    margin: 0;
    padding: 0;
    height: 100vh;
    background: transparent;
    display: flex;
    justify-content: center;
    align-items: center;
    overflow: hidden;
  }

  .container {
    position: relative;
    width: 1308px;
    height: 486px;
    display: flex;
    justify-content: center;
    align-items: center;
  }

  /* VIDEO LATERALI - PULITI SENZA BORDO PESANTE */
  video.side-video {
    position: absolute;
    top: 0;
    width: 280px;
    height: 486px;
    object-fit: cover;
    border-radius: 10px;
    z-index: 1;
    opacity: 0.8;
  }

  .left-video { left: 0; }
  .right-video { right: 0; }

  /* VIDEO CENTRALE - BORDO 8PX E DOPPIO GLOW */
  .center-video-wrapper {
    position: absolute;
    width: 728px;
    height: 486px;
    z-index: 10;
    /* Bordo 8px richiesto */
    border: 8px solid #00f2ff;
    border-radius: 15px;
    box-sizing: border-box;
    /* DOPPIO GLOW: uno esterno forte e uno interno */
    box-shadow: 
      0 0 40px rgba(0, 242, 255, 0.9), 
      0 0 80px rgba(0, 100, 255, 0.7),
      inset 0 0 30px rgba(0, 242, 255, 0.6);
    overflow: hidden;
    animation: doubleGlowPulse 3s infinite alternate ease-in-out;
  }

  .center-video-wrapper video {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }

  @keyframes doubleGlowPulse {
    0% {
      box-shadow: 0 0 30px rgba(0, 242, 255, 0.7), 0 0 60px rgba(0, 100, 255, 0.5), inset 0 0 20px rgba(0, 242, 255, 0.4);
      border-color: #00d9ff;
    }
    100% {
      box-shadow: 0 0 60px rgba(0, 242, 255, 1), 0 0 120px rgba(0, 100, 255, 0.9), inset 0 0 40px rgba(0, 242, 255, 0.8);
      border-color: #00ffff;
    }
  }

  /* GHOST IMAGE SOPRA IL VIDEO CENTRALE */
  img.center-image {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 100%;
    height: 100%;
    object-fit: contain;
    pointer-events: none;
    z-index: 11;
    animation: ghostFade 5s infinite ease-in-out;
  }

  @keyframes ghostFade {
    0%, 100% { opacity: 0; }
    50% { opacity: 0.6; }
  }
</style>
</head>
<body>

<div class="container">
  <video class="side-video left-video" autoplay loop muted playsinline>
    <source src="https://peppeagosto.github.io/immaggini/ribelle.mp4" type="video/mp4" />
  </video>

  <div class="center-video-wrapper">
    <video autoplay loop muted playsinline>
       <source src="https://peppeagosto.github.io/immaggini/ribelle.mp4" type="video/mp4" />
    </video>
    <img class="center-image" src="https://xatimg.com/image/yWO6Q0ABtylV.jpg" alt="Ghost" />
  </div>

  <video class="side-video right-video" autoplay loop muted playsinline>
    <source src="https://peppeagosto.github.io/immaggini/ribelle.mp4" type="video/mp4" />
  </video>
</div>

</body>
</html>
