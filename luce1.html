
<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
    <title>il cartaio:</title>
    
    <style type="text/css">
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body, html {
            height: 100%;
            width: 100%;
            overflow: hidden; /* Mantieni hidden per l'effetto scena, cambia in auto se necessario */
            background: transparent; 
            font-family: 'Segoe UI', Roboto, sans-serif;
            cursor: crosshair;
        }

        .bg-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(to bottom, rgba(0, 255, 0, 0.3) 0%, rgba(0, 50, 0, 0.7) 100%);
            z-index: 1;
            pointer-events: none;
            transition: 1.5s ease-in-out;
        }

        .stage-area {
            position: absolute;
            top: 0; left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10;
        }

        .theme-nav {
            position: absolute;
            top: 40px;
            width: 90%;
            max-width: 800px;
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 15px;
            z-index: 9999;
        }

        .theme-nav span {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            cursor: pointer;
            background: radial-gradient(circle at 35% 35%, #fff 0%, var(--c1) 40%, var(--c2) 100%);
            border: 1px solid rgba(255,255,255,0.5);
            box-shadow: 0 5px 15px rgba(0,0,0,0.8);
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .theme-nav span:hover {
            transform: scale(1.3) translateY(-5px);
        }

        .center-title {
            font-size: 16vw; 
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: -2px;
            text-shadow: 0 10px 20px rgba(0,0,0,1);
            white-space: nowrap;
            z-index: 50; 
            cursor: grab; 
            user-select: none; 
            position: absolute; 
        }

        .rainbow {
            background: linear-gradient(to right, #FF0000, #FF00FF, #0000FF, #00FFFF, #00FF00, #FFFF00, #FF0000);
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: rainbow-anim 4s linear infinite;
        }

        @keyframes rainbow-anim { to { background-position: 200% center; } }

        .scia-magica {
            position: fixed;
            width: 25px;
            height: 25px;
            border-radius: 50%;
            pointer-events: none;
            z-index: 10000;
            animation: dissolvenzaScia 0.6s linear forwards;
            mix-blend-mode: screen;
        }

        @keyframes dissolvenzaScia {
            0% { transform: translate(-50%, -50%) scale(1); opacity: 1; }
            100% { transform: translate(-50%, -50%) scale(0.1); opacity: 0; }
        }

        .particle {
            position: absolute;
            bottom: -20px;
            width: 6px;
            height: 6px;
            background: rgba(255, 255, 255, 0.6);
            border-radius: 50%;
            animation: rise linear infinite;
            z-index: 2;
            pointer-events: none;
        }

        @keyframes rise {
            0% { transform: translateY(0) scale(0.5); opacity: 0; }
            20% { opacity: 0.8; }
            100% { transform: translateY(-100vh) scale(2); opacity: 0; }
        }
    </style>
</head>
<body oncontextmenu="return false;" onselectstart="return false;">

    <div class="bg-overlay" id="overlay"></div>

    <div class="stage-area">
        <div class="theme-nav">
            <span style="--c1:#00ff00; --c2:#004400;" onclick="applyTheme('rgba(0,255,0,0.3)','rgba(0,50,0,0.7)', '#00ff00')"></span> 
            <span style="--c1:#0000ff; --c2:#000033;" onclick="applyTheme('rgba(0,0,255,0.3)','rgba(0,0,50,0.7)', '#0000ff')"></span> 
            <span style="--c1:#ff0000; --c2:#440000;" onclick="applyTheme('rgba(255,0,0,0.3)','rgba(50,0,0,0.7)', '#ff0000')"></span> 
            <span style="--c1:#00ffff; --c2:#004444;" onclick="applyTheme('rgba(0,255,255,0.3)','rgba(0,50,50,0.7)', '#00ffff')"></span> 
            <span style="--c1:#ff00ff; --c2:#440044;" onclick="applyTheme('rgba(255,0,255,0.3)','rgba(50,0,50,0.7)', '#ff00ff')"></span> 
            <span style="--c1:#ffff00; --c2:#444400;" onclick="applyTheme('rgba(255,255,0,0.3)','rgba(50,50,0,0.7)', '#ffff00')"></span>
        </div>

        <div class="center-title rainbow" id="draggable-text">IL CARTAIO</div>
    </div>

    <script>
        let coloreSciaMouse = '#00ff00';

        function applyTheme(topColor, bottomColor, glowColor) {
            const bg = document.getElementById('overlay');
            bg.style.background = `linear-gradient(to bottom, ${topColor} 0%, ${bottomColor} 100%)`;
            coloreSciaMouse = glowColor;
        }

        // Effetto scia
        document.addEventListener('mousemove', function(e) {
            const scia = document.createElement('div');
            scia.className = 'scia-magica';
            scia.style.left = e.clientX + 'px';
            scia.style.top = e.clientY + 'px';
            scia.style.background = `radial-gradient(circle, #ffffff 10%, ${coloreSciaMouse} 60%, transparent 100%)`;
            document.body.appendChild(scia);
            setTimeout(() => { scia.remove(); }, 600);
        });

        // Logica trascinamento
        const testoDrag = document.getElementById('draggable-text');
        let isDragging = false, offsetX = 0, offsetY = 0;

        testoDrag.addEventListener('mousedown', function(e) {
            isDragging = true;
            const rect = testoDrag.getBoundingClientRect();
            offsetX = e.clientX - rect.left;
            offsetY = e.clientY - rect.top;
        });

        document.addEventListener('mousemove', function(e) {
            if (isDragging) {
                testoDrag.style.left = (e.clientX - offsetX) + 'px';
                testoDrag.style.top = (e.clientY - offsetY) + 'px';
            }
        });

        document.addEventListener('mouseup', () => isDragging = false);

        // Particelle
        function createParticles() {
            for (let i = 0; i < 40; i++) {
                let particle = document.createElement('div');
                particle.classList.add('particle');
                particle.style.left = Math.random() * 100 + 'vw';
                particle.style.animationDuration = (Math.random() * 4 + 3) + 's';
                particle.style.animationDelay = Math.random() * 5 + 's';
                document.body.appendChild(particle);
            }
        }
        createParticles();
    </script>
</body>
</html>
