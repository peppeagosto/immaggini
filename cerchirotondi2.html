<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
    <title>EL DIABLO:</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="IE=Edge">
    
    <style type="text/css">
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: flex-start; 
            padding-top: 60px; 
            font-family: 'Segoe UI', Roboto, sans-serif;
            transition: background 0.4s ease-in-out; 
            background: #00ced1; 
        }

        .main-scaler {
            position: relative;
            transform: scale(min(1, calc(100vw / 1580), calc(100vh / 950)));
            transform-origin: top center;
            display: flex;
            justify-content: center; 
            align-items: center;     
            z-index: 10;
            width: 1580px; 
            height: auto;
            pointer-events: none;
        }

        .stage-area {
            position: relative;
            width: 828px; 
            height: 486px;
            margin-top: 39px;
            margin-left: auto;  
            margin-right: auto; 
            
            /* MODIFICA: Ho messo la foto al posto del nero, centrata e adattata */
            background: url('https://xatimg.com/image/1tnZcTJHdFxT.jpg') no-repeat center center;
            background-size: cover; 
            
            pointer-events: auto; 
            border-radius: 18px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
        }

        .theme-nav-horizontal {
            position: absolute;
            top: -45px; 
            left: 10px;
            right: 10px;
            height: 50px; 
            display: flex;
            flex-direction: row;
            justify-content: space-between; 
            align-items: center;
            z-index: 999999; 
            pointer-events: auto; 
            opacity: 0;
            transition: opacity 0.3s ease-in-out;
        }

        .theme-nav-horizontal:hover {
            opacity: 1;
        }

        .theme-nav-horizontal span {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            cursor: pointer;
            background: radial-gradient(circle at 35% 35%, #fff 0%, var(--c1) 40%, var(--c2) 100%);
            border: 1px solid rgba(255,255,255,0.5);
            box-shadow: 0 5px 15px rgba(0,0,0,0.8), inset 0 -2px 5px rgba(0,0,0,0.5);
            transition: transform 0.2s;
            flex-shrink: 0;
            user-select: none;
            -webkit-user-select: none;
            pointer-events: auto; 
        }

        .theme-nav-horizontal span:hover {
            transform: scale(1.25); 
        }
    </style>
</head>
<body oncontextmenu="return false;">

    <div class="main-scaler">
        
        <div class="stage-area">
            
            <div class="theme-nav-horizontal">
                <span style="--c1:#00ff00; --c2:#004400;" onclick="changeBg('#00ff00')"></span> 
                <span style="--c1:#0000ff; --c2:#000033;" onclick="changeBg('#0000ff')"></span> 
                <span style="--c1:#ff0000; --c2:#440044;" onclick="changeBg('#ff0000')"></span> 
                <span style="--c1:#00ffff; --c2:#004444;" onclick="changeBg('#00ffff')"></span> 
                <span style="--c1:#ff00ff; --c2:#440044;" onclick="changeBg('#ff00ff')"></span> 
                
                <span style="--c1:#ffff00; --c2:#444400;" onclick="changeBg('#ffff00')"></span>
                <span style="--c1:#00ffff; --c2:#008080;" onclick="changeBg('#00ced1')"></span>
                <span style="--c1:#ff8800; --c2:#442200;" onclick="changeBg('#ff8800')"></span>
                <span style="--c1:#8800ff; --c2:#220044;" onclick="changeBg('#8800ff')"></span>
                <span style="--c1:#00ff88; --c2:#004422;" onclick="changeBg('#00ff88')"></span>
            </div>

        </div>

    </div>

    <script>
        function changeBg(color) {
            document.body.style.background = color;
        }
    </script>

</body>
</html>
