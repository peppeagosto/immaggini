<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
    <title>EL DIABLO:</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="IE=Edge">
    
    <style type="text/css">
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: flex-start; 
            padding-top: 60px; 
            font-family: 'Segoe UI', Roboto, sans-serif;
            transition: background 0.4s ease-in-out; 
            background: #fff; 
        }

        .main-scaler {
            position: relative;
            transform: scale(min(1, calc(100vw / 1580), calc(100vh / 950)));
            transform-origin: top center;
            display: flex;
            justify-content: center; 
            align-items: center;     
            z-index: 10;
            width: 1580px; 
            height: auto;
            pointer-events: none;
        }

        /* STILE PER I VIDEO AI LATI */
        .side-video {
            width: 380px;       
            height: 486px;      
            object-fit: cover;  
            pointer-events: auto; 
            border-radius: 18px;  
            box-shadow: 0 10px 25px rgba(0,0,0,0.3); 
        }

        .stage-area {
            position: relative;
            width: 828px; 
            height: 486px;
            margin-top: 39px;
            margin-left: 380px;  
            margin-right: 380px; 
            background: rgba(0, 0, 0, 0.05); 
            pointer-events: auto; 
        }

        /* Contenitore orizzontale bottoni (Invisibile di base) */
        .theme-nav-horizontal {
            position: absolute;
            top: -45px; 
            left: 10px;
            right: 10px;
            height: 50px; /* Aumentato leggermente per facilitare il rilevamento del mouse */
            display: flex;
            flex-direction: row;
            justify-content: space-between; 
            align-items: center;
            z-index: 999999; 
            pointer-events: auto; 
            
            /* Effetto a scomparsa */
            opacity: 0;
            transition: opacity 0.3s ease-in-out;
        }

        /* Mostra i cerchietti quando passi il mouse sopra il contenitore */
        .theme-nav-horizontal:hover {
            opacity: 1;
        }

        .theme-nav-horizontal span {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            cursor: pointer;
            background: radial-gradient(circle at 35% 35%, #fff 0%, var(--c1) 40%, var(--c2) 100%);
            border: 1px solid rgba(255,255,255,0.5);
            box-shadow: 0 5px 15px rgba(0,0,0,0.8), inset 0 -2px 5px rgba(0,0,0,0.5);
            transition: transform 0.2s;
            flex-shrink: 0;
            user-select: none;
            -webkit-user-select: none;
            pointer-events: auto; 
        }

        .theme-nav-horizontal span:hover {
            transform: scale(1.25); /* Un pizzico di zoom in più quando ci sei proprio sopra */
        }
    </style>
</head>
<body oncontextmenu="return false;">

    <div class="main-scaler">
        
        <video id="video-dx" class="side-video" autoplay loop muted playsinline>
            <source src="https://peppeagosto.github.io/immaggini/cenerentola.mp4" type="video/mp4">
            Il tuo browser non supporta i video.
        </video>

        <div class="stage-area">
            
            <div class="theme-nav-horizontal">
                <span style="--c1:#00ff00; --c2:#004400;" onclick="changeBg('#00ff00')"></span> 
                <span style="--c1:#0000ff; --c2:#000033;" onclick="changeBg('#0000ff')"></span> 
                <span style="--c1:#ff0000; --c2:#440044;" onclick="changeBg('#ff0000')"></span> 
                <span style="--c1:#00ffff; --c2:#004444;" onclick="changeBg('#00ffff')"></span> 
                <span style="--c1:#ff00ff; --c2:#440044;" onclick="changeBg('#ff00ff')"></span> 
                
                <span style="--c1:#ffff00; --c2:#444400;" onclick="changeBg('#ffff00')"></span>
                <span style="--c1:#ffffff; --c2:#333333;" onclick="changeBg('#ffffff')"></span>
                <span style="--c1:#ff8800; --c2:#442200;" onclick="changeBg('#ff8800')"></span>
                <span style="--c1:#8800ff; --c2:#220044;" onclick="changeBg('#8800ff')"></span>
                <span style="--c1:#00ff88; --c2:#004422;" onclick="changeBg('#00ff88')"></span>
            </div>

        </div>

        <video id="video-sx" class="side-video" autoplay loop muted playsinline>
            <source src="https://peppeagosto.github.io/immaggini/cenerentola.mp4" type="video/mp4">
            Il tuo browser non supporta i video.
        </video>

    </div>

    <script>
        function changeBg(color) {
            document.body.style.background = color;
        }
    </script>

</body>
</html>
