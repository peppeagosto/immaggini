<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
    @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700&display=swap');
    * { box-sizing: border-box; cursor: none; }
    body { background: transparent !important; display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100vh; margin: 0; overflow: hidden; font-family: 'Orbitron', sans-serif; }
    
    @keyframes rainbow { 0% { border-color: red; } 33% { border-color: yellow; } 66% { border-color: blue; } 100% { border-color: violet; } }
    @keyframes rainbow-bg { 0% { background-color: rgba(255,0,0,0.1); } 50% { background-color: rgba(0,0,255,0.1); } 100% { background-color: rgba(255,255,0,0.1); } }
    @keyframes rainbow-flash { 0% { background: red; } 33% { background: green; } 66% { background: blue; } 100% { background: yellow; } }
    @keyframes scroll-text { from { transform: translateX(100%); } to { transform: translateX(-100%); } }

    .nvidia-skin { width: 380px; height: 380px; border-radius: 50%; position: relative; transition: all 1s ease; display: flex; align-items: center; justify-content: center; border: 3px solid; animation: rainbow 5s infinite; overflow: hidden; }
    .active.nvidia-skin { width: 850px; height: 850px; border-radius: 20px; animation: rainbow 5s infinite, rainbow-bg 10s infinite; border: 4px solid; }

    #video-intro { width: 100%; height: 100%; object-fit: cover; position: absolute; z-index: 20; }
    .active-content { display: none; width: 100%; height: 100%; opacity: 0; transition: opacity 2s; flex-direction: column; align-items: center; padding-top: 20px; }
    .active .active-content { display: flex; opacity: 1; }

    .marquee-container { width: 90%; height: 50px; background: linear-gradient(to bottom, #002395 50%, #FFD700 50%); border: 3px solid #fff; border-radius: 5px; margin-bottom: 20px; display: flex; align-items: center; justify-content: center; overflow: hidden; }
    #track-title { color: #fff; font-weight: bold; text-shadow: 2px 2px 4px #000; text-transform: uppercase; white-space: nowrap; animation: scroll-text 15s linear infinite; }

    .media-box { width: 500px; height: 300px; border: 2px solid; border-radius: 10px; object-fit: cover; margin-top: 10px; }

    /* CERCHIETTI SOCIAL: Aggiunto flex-direction column e text-align per far andare a capo le scritte lunghe */
    .social-circle { width: 70px; height: 70px; border-radius: 50%; position: absolute; border: 3px solid; animation: rainbow 5s infinite; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; line-height: 1.2; font-size: 8px; color: #fff; font-weight: bold; cursor: pointer; transition: opacity 0.3s, transform 0.2s, box-shadow 0.3s; text-decoration: none; opacity: 0.75; }
    .social-circle.on { opacity: 1; box-shadow: 0 0 20px #fff, inset 0 0 10px #fff; }
    
    .s-sx1 { left: 40px; top: 120px; background: linear-gradient(45deg, #ff0000, #ff8000); }
    .s-sx2 { left: 40px; top: 250px; background: linear-gradient(45deg, #ffff00, #80ff00); }
    .s-sx3 { left: 40px; top: 380px; background: linear-gradient(45deg, #00ff80, #00ffff); }
    .s-sx4 { left: 40px; top: 510px; background: linear-gradient(45deg, #8000ff, #ff00ff); }
    .s-dx1 { right: 40px; top: 120px; background: linear-gradient(45deg, #ff0080, #ff0000); }
    .s-dx2 { right: 40px; top: 250px; background: linear-gradient(45deg, #0000ff, #0088ff); }
    .s-dx3 { right: 40px; top: 380px; background: linear-gradient(45deg, #ff8000, #ffff00); }
    .s-dx4 { right: 40px; top: 510px; background: linear-gradient(45deg, #00ff00, #00ffff); }

    /* PULSANTI NEON INFERIORI */
    .btn { width: 60px; height: 60px; border-radius: 50%; cursor: pointer; font-weight: bold; font-size: 24px; transition: 0.2s; background: #000; }
    
    .btn-play { border: 3px solid #00ff00; color: #00ff00; box-shadow: 0 0 20px #00ff00, inset 0 0 10px #00ff00; text-shadow: 0 0 10px #00ff00; }
    .btn-play:active { background: #00ff00; color: #000; box-shadow: 0 0 30px #00ff00; }
    
    .btn-stop { border: 3px solid #ff0000; color: #ff0000; box-shadow: 0 0 20px #ff0000, inset 0 0 10px #ff0000; text-shadow: 0 0 10px #ff0000; }
    .btn-stop:active { background: #ff0000; color: #000; box-shadow: 0 0 30px #ff0000; }

    /* SLIDER ARCOBALENO NEON */
    input[type=range] { -webkit-appearance: none; width: 150px; height: 10px; border-radius: 5px; background: linear-gradient(to right, #ff0000, #ff00ff, #00ffff, #00ff00, #ffff00, #ff0000); outline: none; box-shadow: 0 0 15px rgba(255, 255, 255, 0.4); cursor: pointer; }
    input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; width: 22px; height: 22px; border-radius: 50%; background: #fff; cursor: pointer; box-shadow: 0 0 15px #00ffff, 0 0 5px #fff; }

    .flash-mode { animation: rainbow-flash 0.1s infinite !important; }
    #cursor-text { position: fixed; pointer-events: none; color: #f0ff00; font-family: 'Orbitron', sans-serif; font-size: 14px; font-weight: bold; text-shadow: 2px 2px 4px #000; z-index: 9999; }
</style>
</head>
<body>

<div id="cursor-text">UŽIVAJTE U MUZICI</div>

<div class="nvidia-skin" id="skin">
    <video id="video-intro" src="https://peppeagosto.github.io/immaggini/loreta2.mp4" autoplay muted playsinline></video>
    <div class="active-content">
        <div class="marquee-container"><div id="track-title">CONNETTITI...</div></div>

        <a class="social-circle s-sx1" onclick="toggleState(this, 'https://www.serverm.com/')">SERVER.M</a>
        <a class="social-circle s-sx2" onclick="toggleState(this, 'https://www.facebook.com/server.m69')">FACEBOOK</a>
        <a class="social-circle s-sx3" onclick="toggleState(this, 'https://player.srvif.com/player-moderno/7620/')">MODERN</a>
        <div class="social-circle s-sx4" id="wufer-circle" onclick="toggleState(this)">WUFER</div>

        <a class="social-circle s-dx1" onclick="toggleState(this, 'https://teams.microsoft.com/')">TEAMS</a>
        <a class="social-circle s-dx2" onclick="toggleState(this, 'https://xat.com/dianashpirti')">XAT</a>
        <div class="social-circle s-dx3" id="boja-circle" onclick="toggleState(this)">BOJA</div>
        
        <div class="social-circle s-dx4" id="listeners-circle" onclick="toggleState(this)">ASCOLTI<br>...</div>

        <img id="cover-dynamic" class="media-box" style="display:none;">
        <video id="video-center" src="https://peppeagosto.github.io/immaggini/loreta1.mp4" class="media-box" autoplay muted playsinline loop></video>

        <div class="controls" style="position: absolute; bottom: 50px; display: flex; gap: 30px; align-items: center;">
            <button class="btn btn-play" onclick="playSystem()">▶</button>
            <input type="range" min="0" max="1" step="0.1" value="1" oninput="document.getElementById('radio-stream').volume = this.value">
            <button class="btn btn-stop" onclick="stopSystem()">■</button>
        </div>
    </div>
</div>

<button id="start" onclick="go()" style="margin-top:20px; cursor:pointer; font-family: 'Orbitron'; font-weight: bold; border: 2px solid #fff; background: #000; color: #fff; padding: 10px 20px; border-radius: 10px; box-shadow: 0 0 10px #fff;">AVVIA SISTEMA</button>

<audio id="radio-stream" preload="none" crossorigin="anonymous">
    <source src="https://stm2.srvif.com:7620/;" type="audio/mpeg">
</audio>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script>
let wuferActive = false;
let bojaActive = false;
let isAnimating = false;
let currentTrack = ""; 

const audio = document.getElementById('radio-stream');
const ctx = new (window.AudioContext || window.webkitAudioContext)();
const source = ctx.createMediaElementSource(audio);
const analyser = ctx.createAnalyser();
source.connect(analyser);
analyser.connect(ctx.destination);
analyser.fftSize = 256;
const dataArray = new Uint8Array(analyser.frequencyBinCount);

function toggleState(el, url) {
    const isActive = el.classList.contains('on');

    if (isActive) {
        el.classList.remove('on');
        if (el.id === 'wufer-circle') {
            wuferActive = false;
            document.querySelectorAll('.social-circle').forEach(c => c.style.transform = 'scale(1)');
        }
        if (el.id === 'boja-circle') {
            bojaActive = false;
            $('#boja-circle').removeClass('flash-mode');
        }
    } else {
        el.classList.add('on');
        if (el.id === 'wufer-circle') wuferActive = true;
        if (el.id === 'boja-circle') bojaActive = true;
        if (url) window.open(url, '_blank'); 
    }
}

document.addEventListener('mousemove', (e) => {
    $('#cursor-text').css({left: (e.clientX + 20) + 'px', top: (e.clientY + 20) + 'px'});
});

function animate() {
    isAnimating = true;
    analyser.getByteFrequencyData(dataArray);
    let sum = dataArray.reduce((a, b) => a + b);
    let scale = 1 + (sum / 15000); 
    
    if (wuferActive) {
        document.querySelectorAll('.social-circle').forEach(c => {
            c.style.transform = `scale(${scale})`;
        });
    } else {
        document.querySelectorAll('.social-circle').forEach(c => {
            if (c.classList.contains('on')) {
                c.style.transform = `scale(1.05)`;
            } else {
                c.style.transform = `scale(1)`;
            }
        });
    }
    
    if (bojaActive && sum > 5000) {
        $('#boja-circle').addClass('flash-mode'); 
    } else {
        $('#boja-circle').removeClass('flash-mode');
    }
    
    if (!audio.paused) requestAnimationFrame(animate);
    else isAnimating = false;
}

function updateRadioMetadata() {
    $.getJSON("https://stm2.srvif.com:7620/stats?sid=1&json=1&callback=?", function(data) {
        if (data) {
            // Aggiorna il numero degli ascoltatori in tempo reale
            if (data.currentlisteners !== undefined) {
                document.getElementById('listeners-circle').innerHTML = "ASCOLTI<br>" + data.currentlisteners;
            }

            // Aggiorna il titolo della canzone
            let newTrack = data.songtitle;
            if (newTrack && newTrack !== currentTrack) {
                currentTrack = newTrack;
                document.getElementById('track-title').innerText = "IN ONDA: " + currentTrack;
                
                // Aggiorna la copertina
                $.getJSON("https://itunes.apple.com/search?term=" + encodeURIComponent(currentTrack) + "&limit=1&callback=?", function(res) {
                    const imgEl = document.getElementById('cover-dynamic');
                    const videoEl = document.getElementById('video-center');

                    if (res.results && res.results.length > 0) {
                        const coverUrl = res.results[0].artworkUrl100.replace('100x100bb', '500x500bb');
                        imgEl.src = coverUrl;
                        imgEl.style.display = 'block';
                        videoEl.style.display = 'none'; 
                    } else {
                        imgEl.style.display = 'none';
                        videoEl.style.display = 'block';
                    }
                });
            }
        }
    });
}

setInterval(updateRadioMetadata, 10000);

function playSystem() { audio.play(); if(!isAnimating) animate(); updateRadioMetadata(); }
function stopSystem() { audio.pause(); document.querySelectorAll('.social-circle').forEach(c => c.style.transform = `scale(1)`); }
function go() { document.getElementById('start').style.display = 'none'; document.getElementById('skin').classList.add('active'); document.getElementById('video-intro').style.display = 'none'; ctx.resume(); updateRadioMetadata(); }
</script>
</body>
</html>
