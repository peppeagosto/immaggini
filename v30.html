<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>TERMINAL INFERNO - V29 PROTECTED</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Creepster&family=Metal+Mania&display=swap');
        :root { --inf-red: #ff1a00; --inf-orange: #ff5e00; --horror-font: 'Creepster', cursive; }
        body { background: transparent; margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; font-family: 'Courier New', monospace; }
        
        .main-terminal { 
            width: 780px; height: 720px; background: rgba(0, 0, 0, 0.96); 
            display: grid; grid-template-columns: 280px 1fr; grid-template-rows: 80px 1fr 100px; 
            position: relative; padding: 15px; border: 2px solid var(--inf-red); box-shadow: 0 0 50px rgba(255, 26, 0, 0.5); 
        }

        .glow-box { position: relative; background: rgba(5, 0, 0, 0.98); margin: 8px; overflow: hidden; border: 1px solid rgba(255, 94, 0, 0.2); }
        .glow-box::before, .main-terminal::before {
            content: ""; position: absolute; inset: -10px; border: 8px solid transparent;
            background: conic-gradient(from var(--a), transparent 40%, var(--inf-red), var(--inf-orange), transparent 100%) border-box;
            -webkit-mask: linear-gradient(#fff 0 0) padding-box, linear-gradient(#fff 0 0); -webkit-mask-composite: destination-out; mask-composite: exclude;
            animation: rotateGlow 2.5s linear infinite; filter: blur(1px) drop-shadow(0 0 15px var(--inf-red));
        }
        @property --a { syntax: '<angle>'; initial-value: 0deg; inherits: false; }
        @keyframes rotateGlow { to { --a: 360deg; } }

        .header { grid-column: 1 / 3; display: flex; align-items: center; padding: 0 20px; gap: 15px; }
        .gate-status { font-family: 'Metal Mania', cursive; font-size: 20px; color: #fff; }
        #track-marquee { font-family: var(--horror-font) !important; font-size: 30px; color: var(--inf-orange); text-shadow: 0 0 15px var(--inf-red); }
        .monitor-left { display: flex; flex-direction: column; gap: 5px; }
        .info-zone { height: 210px; padding: 12px; font-size: 13px; color: #fff; font-family: 'Metal Mania'; line-height: 1.5; }
        .cover-zone { flex-grow: 1; display: flex; justify-content: center; align-items: center; overflow: hidden; }
        #coverArt { width: 100%; height: 100%; object-fit: cover; }
        .console-main { display: flex; flex-direction: column; gap: 10px; }
        .log-window { height: 120px; padding: 10px; font-size: 11px; color: var(--inf-orange); overflow-y: auto; scrollbar-width: none; border-top: 1px solid var(--inf-red); }
        .visualizer-area { flex-grow: 1; display: flex; gap: 2px; align-items: flex-end; padding: 10px; }
        .bar { flex: 1; background: linear-gradient(to top, var(--inf-red), var(--inf-orange), #fff); height: 5px; transition: height 0.05s ease; }
        
        .footer { grid-column: 1 / 3; display: flex; align-items: center; padding: 0 25px; gap: 20px; }
        .btn { background: rgba(255, 26, 0, 0.3); border: 2px solid var(--inf-red); color: #fff; padding: 10px 25px; cursor: pointer; font-family: var(--horror-font); font-size: 20px; z-index: 1000; transition: 0.3s; }
        
        /* 🔊 SLIDER VOLUME FIX 🔊 */
        #volRange { 
            -webkit-appearance: none; flex-grow: 1; height: 12px; 
            background: rgba(255, 26, 0, 0.3); border: 1px solid var(--inf-red); 
            border-radius: 10px; outline: none; position: relative; z-index: 2000; cursor: pointer;
        }
        #volRange::-webkit-slider-thumb { -webkit-appearance: none; width: 22px; height: 22px; background: #fff; border: 2px solid var(--inf-red); border-radius: 50%; cursor: pointer; box-shadow: 0 0 10px var(--inf-red); }
        
        #clock { color: var(--inf-orange); font-size: 18px; font-family: 'Metal Mania'; margin-left: auto; }
        #lockdown { display: none; position: fixed; inset: 0; background: black; color: red; z-index: 99999; justify-content: center; align-items: center; text-align: center; font-family: 'Metal Mania'; font-size: 40px; border: 20px solid red; }
    </style>
</head>
<body>

<div id="lockdown">🚨 VIOLAZIONE SISTEMA 🚨<br>ACCESSO NEGATO<br>TERMINALE BLOCCATO</div>

<div class="main-terminal" id="terminal">
    <div class="header glow-box">
        <div class="gate-status">CANCELLO: <span id="status" style="color:var(--inf-red)">LOCKED</span></div>
        <div style="flex-grow:1; overflow:hidden;">
            <marquee id="track-marquee" direction="left" scrollamount="7">SINTONIZZAZIONE ABISSO...</marquee>
        </div>
    </div>

    <div class="monitor-left">
        <div class="info-zone glow-box">
            [IDENTIFICAZIONE]<br>
            CITTÀ: <span id="city" style="color:var(--inf-orange)">...</span><br>
            METEO: <span id="weather" style="color:var(--inf-orange)">...</span> | <span id="temp" style="color:var(--inf-orange)">...</span><br>
            <hr style="border:0; border-top:1px solid var(--inf-red); margin:5px 0;">
            [OROSCOPO]<br>
            SEGNO: <span id="sign" style="color:var(--inf-orange)">...</span><br>
            DESTINO: <span id="fate" style="color:white; font-size:11px;">ANALISI...</span>
        </div>
        <div class="cover-zone glow-box">
            <img src="https://xatimg.com/image/OfPr406rB1UZ.gif" id="coverArt">
        </div>
    </div>

    <div class="console-main">
        <div class="log-window glow-box" id="log">
            [SYS] INFERNO_V29_COMPLETE ONLINE.<br>
            [SYS] STATUS: PRONTO.
        </div>
        <div class="visualizer-area glow-box" id="visualizer"></div>
    </div>

    <div class="footer glow-box">
        <button class="btn" id="exeBtn">OPEN_GATE</button>
        <input type="range" id="volRange" min="0" max="1" step="0.01" value="0.8">
        <div id="clock">00:00:00</div>
    </div>
</div>

<audio id="audio" crossorigin="anonymous" src="https://stream.zeno.fm/ylkruiq5e4fvv"></audio>

<script>
    const audio = document.getElementById("audio");
    const exeBtn = document.getElementById('exeBtn');
    const log = document.getElementById('log');
    const visualizer = document.getElementById('visualizer');
    const marquee = document.getElementById('track-marquee');
    const volSlider = document.getElementById('volRange');
    
    let audioCtx, analyser, dataArray, isPlaying = false, currentTitle = "";

    // 🔒 PROTEZIONE INFESSATA 🔒
    const ORIG_ID = "ylkruiq5e4fvv";
    const ORIG_IMG = "https://xatimg.com/image/OfPr406rB1UZ.gif";

    setInterval(() => {
        const img = document.getElementById("coverArt");
        const stream = audio.src;
        if (!img || img.getAttribute('src') !== ORIG_IMG || !stream.includes(ORIG_ID)) {
            audio.pause();
            document.getElementById('terminal').style.display = 'none';
            document.getElementById('lockdown').style.display = 'flex';
        }
    }, 1000);

    function addLog(msg, color = "var(--inf-orange)") {
        const time = new Date().toLocaleTimeString();
        log.innerHTML += `<br><span style="color:${color}">[${time}] ${msg}</span>`;
        log.scrollTop = log.scrollHeight;
    }

    function initAudio() {
        if (audioCtx) return;
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        analyser = audioCtx.createAnalyser();
        const source = audioCtx.createMediaElementSource(audio);
        source.connect(analyser); analyser.connect(audioCtx.destination);
        analyser.fftSize = 128;
        dataArray = new Uint8Array(analyser.frequencyBinCount);
        visualizer.innerHTML = '';
        for(let i=0; i<45; i++) {
            let b = document.createElement('div');
            b.className = 'bar';
            visualizer.appendChild(b);
        }
    }

    exeBtn.onclick = () => {
        initAudio();
        if (audio.paused) {
            audioCtx.resume(); audio.play(); isPlaying = true;
            exeBtn.innerText = "CLOSE";
            document.getElementById('status').innerText = "OPEN";
            document.getElementById('status').style.color = "#00ff41";
            addLog("PORTALE APERTO.", "white");
            renderBars();
        } else {
            audio.pause(); isPlaying = false;
            exeBtn.innerText = "OPEN_GATE";
            document.getElementById('status').innerText = "LOCKED";
            document.getElementById('status').style.color = "var(--inf-red)";
        }
    };

    function renderBars() {
        if(!isPlaying) return;
        requestAnimationFrame(renderBars);
        analyser.getByteFrequencyData(dataArray);
        const bars = document.getElementsByClassName('bar');
        for(let i=0; i<bars.length; i++) { 
            let h = (dataArray[i]/255)*100;
            bars[i].style.height = h > 5 ? h + '%' : '5px'; 
        }
    }

    // --- SLIDER VOLUME FISSA ---
    volSlider.addEventListener('input', (e) => {
        audio.volume = e.target.value;
        if (Math.round(e.target.value * 10) % 2 === 0) {
            addLog("VOLUME: " + Math.round(e.target.value * 100) + "%");
        }
    });

    async function getInfo() {
        try {
            const r = await fetch("https://ipapi.co/json/");
            const d = await r.json();
            document.getElementById("city").innerText = d.city.toUpperCase();
            const wr = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${d.latitude}&longitude=${d.longitude}&current_weather=true`);
            const wd = await wr.json();
            document.getElementById("temp").innerText = wd.current_weather.temperature + "°C";
            document.getElementById("weather").innerText = "INFERNALE";
        } catch(e) { document.getElementById("city").innerText = "THE ABYSS"; }
    }

    async function updateTitles() {
        try {
            const r = await fetch("https://zenoplay.zenomedia.com/api/zenofm/nowplaying/" + ORIG_ID + "?t=" + Date.now());
            const d = await r.json();
            if(d.title && d.title.toUpperCase() !== currentTitle) {
                currentTitle = d.title.toUpperCase();
                marquee.innerText = currentTitle;
                addLog("SEGNALE: " + currentTitle, "white");
            }
        } catch(e) {}
    }

    getInfo();
    setInterval(updateTitles, 12000); updateTitles();
    setInterval(() => { document.getElementById('clock').innerText = new Date().toLocaleTimeString(); }, 1000);
</script>
</body>
</html>
