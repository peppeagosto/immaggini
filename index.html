<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>IL CARTAIO - COMPACT 650 EDITION</title>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --main-color: #ff0000; --beat-scale: 1; }
        body { background: transparent; margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; font-family: 'Arial Black', sans-serif; overflow: hidden; user-select: none; }
        
        /* 📏 MISURA COMPATTA 650x650 */
        .system-container { position: relative; width: 650px; height: 650px; display: flex; justify-content: center; align-items: center; }
        
        /* 🎲 DADO 3D - RIDOTTO PER 650px */
        .cube-station { 
            position: absolute; width: 180px; height: 180px; perspective: 1000px; z-index: 10; 
            top: 50%; left: 50%; transform: translate(-50%, -50%) scale(var(--beat-scale)); 
            transition: transform 0.05s linear;
        }
        .cube { width: 100%; height: 100%; position: relative; transform-style: preserve-3d; animation: rotateCube 15s linear infinite; }
        .face { position: absolute; width: 180px; height: 180px; background: #000; border: 3px solid #fff; box-shadow: 0 0 calc(30px * var(--beat-scale)) var(--main-color), inset 0 0 15px var(--main-color); }
        .face img { width: 100%; height: 100%; object-fit: cover; }
        
        @keyframes rotateCube { 0% { transform: rotateX(0deg) rotateY(0deg); } 100% { transform: rotateX(360deg) rotateY(360deg); } }
        .front { transform: rotateY(0deg) translateZ(90px); } .back { transform: rotateY(180deg) translateZ(90px); }
        .right { transform: rotateY(90deg) translateZ(90px); } .left { transform: rotateY(-90deg) translateZ(90px); }
        .top { transform: rotateX(90deg) translateZ(90px); } .bottom { transform: rotateX(-90deg) translateZ(90px); }

        /* 🎡 ORBITA COMPATTA */
        .orbit-wrapper { position: absolute; width: 100%; height: 100%; animation: rotateOrbit 45s linear infinite; z-index: 20; }
        @keyframes rotateOrbit { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        .satellite-orbit { position: absolute; width: 85px; height: 85px; top: 50%; left: 50%; margin-top: -42.5px; margin-left: -42.5px; cursor: pointer; transition: transform 0.05s linear; }
        
        .beat-pulse { 
            width: 100%; height: 100%; border-radius: 50%; border: 2px solid #fff; 
            display: flex; flex-direction: column; justify-content: center; align-items: center; 
            color: #fff; text-align: center; 
            background: radial-gradient(circle, var(--main-color) 0%, rgba(0,0,0,1) 85%);
            box-shadow: 0 0 calc(15px * var(--beat-scale)) var(--main-color);
        }
        .beat-pulse span { font-size: 9px; font-weight: 900; animation: counterRotate 45s linear infinite; text-transform: uppercase; }
        @keyframes counterRotate { from { transform: rotate(0deg); } to { transform: rotate(-360deg); } }
        
        /* Satelliti distanziati su raggio 250px (totale 500px diametro) */
        .sat-1 { transform: rotate(0deg) translate(250px); } .sat-2 { transform: rotate(45deg) translate(250px); } 
        .sat-3 { transform: rotate(90deg) translate(250px); } .sat-4 { transform: rotate(135deg) translate(250px); }
        .sat-5 { transform: rotate(180deg) translate(250px); } .sat-6 { transform: rotate(225deg) translate(250px); } 
        .sat-7 { transform: rotate(270deg) translate(250px); } .sat-8 { transform: rotate(315deg) translate(250px); }

        #overlay-display { position: absolute; bottom: 10px; width: 500px; height: 60px; background: rgba(0,0,0,0.95); border: 2px solid var(--main-color); border-radius: 15px; z-index: 100; color: #fff; display: none; align-items: center; justify-content: center; font-size: 13px; box-shadow: 0 0 20px var(--main-color); padding: 0 15px; text-align: center; font-weight: bold; }
        #trap-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000 url('https://xatimg.com/image/gEdhe045MGxO.png') no-repeat center; background-size: contain; z-index: 9999; display: none; }
    </style>
</head>
<body oncontextmenu="return false;">

<div id="trap-screen" onclick="triggerSatellite('trap')"></div>

<div class="system-container" id="main-ui">
    <div class="orbit-wrapper">
        <div class="satellite-orbit sat-1" onclick="triggerSatellite('musica')"><div class="beat-pulse"><span><i class="fas fa-play"></i><br>PLAY/STOP</span></div></div>
        <div class="satellite-orbit sat-2" onclick="triggerSatellite('esplosione')"><div class="beat-pulse"><span><i class="fas fa-bolt"></i><br>ESPLOSIONE</span></div></div>
        <div class="satellite-orbit sat-3" onclick="triggerSatellite('data')"><div class="beat-pulse"><span><i class="fas fa-calendar-day"></i><br>DATA</span></div></div>
        <div class="satellite-orbit sat-4" onclick="triggerSatellite('ora')"><div class="beat-pulse"><span><i class="fas fa-clock"></i><br>ORARIO</span></div></div>
        <div class="satellite-orbit sat-5" onclick="triggerSatellite('ascolti')"><div class="beat-pulse"><span><i class="fas fa-headphones"></i><br>ASCOLTI</span></div></div>
        <div class="satellite-orbit sat-6" onclick="triggerSatellite('oroscopo')"><div class="beat-pulse"><span><i class="fas fa-magic"></i><br>OROSCOPO</span></div></div>
        <div class="satellite-orbit sat-7" onclick="triggerSatellite('meteo')"><div class="beat-pulse"><span><i class="fas fa-cloud-sun"></i><br>METEO</span></div></div>
        <div class="satellite-orbit sat-8" onclick="triggerSatellite('trap')"><div class="beat-pulse"><span><i class="fas fa-user-secret"></i><br>CARTAIO</span></div></div>
    </div>

    <div class="cube-station"><div class="cube">
        <div class="face front"><img class="coverArt" src="https://xatimg.com/image/CEDNlCTtyyH5.jpg"></div>
        <div class="face back"><img class="coverArt" src="https://xatimg.com/image/CEDNlCTtyyH5.jpg"></div>
        <div class="face right"><img class="coverArt" src="https://xatimg.com/image/CEDNlCTtyyH5.jpg"></div>
        <div class="face left"><img class="coverArt" src="https://xatimg.com/image/CEDNlCTtyyH5.jpg"></div>
        <div class="face top"><img class="coverArt" src="https://xatimg.com/image/CEDNlCTtyyH5.jpg"></div>
        <div class="face bottom"><img class="coverArt" src="https://xatimg.com/image/CEDNlCTtyyH5.jpg"></div>
    </div></div>
    
    <div id="overlay-display"></div>
</div>

<audio id="audio" crossorigin="anonymous"></audio>

<script>
    const radioID = 'ylkruiq5e4fvv';
    const audio = document.getElementById("audio");
    let isPlaying = false, explosionInterval = null, clockInterval = null, last_song = "";
    let audioCtx, analyser, dataArray, source;
    const colors = ['#FF0000', '#00FF00', '#00FFFF', '#FF00FF', '#FFFF00', '#FF8000', '#00FF80', '#0080FF', '#8000FF', '#FF0080', '#FF3300', '#33FF00', '#0033FF', '#FFFFFF'];

    function initAudio() {
        if (!audioCtx) {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            analyser = audioCtx.createAnalyser();
            source = audioCtx.createMediaElementSource(audio);
            source.connect(analyser);
            analyser.connect(audioCtx.destination);
            analyser.fftSize = 64; 
            dataArray = new Uint8Array(analyser.frequencyBinCount);
            renderFrame();
        }
    }

    function renderFrame() {
        requestAnimationFrame(renderFrame);
        if (!isPlaying) return;
        analyser.getByteFrequencyData(dataArray);
        let bass = dataArray[1] || 0; 
        let scale = 1 + (bass / 255) * 0.40; 
        document.documentElement.style.setProperty('--beat-scale', scale);
        let dist = 250 + (bass / 5);
        $('.satellite-orbit').each(function(i) {
            let angle = i * 45;
            $(this).css('transform', `rotate(${angle}deg) translate(${dist}px)`);
        });
    }

    function triggerSatellite(tipo) {
        const display = $('#overlay-display');
        initAudio(); 

        if(tipo === 'musica') {
            if(!isPlaying) {
                audio.src = "https://stream.zeno.fm/" + radioID;
                audio.load(); audio.play(); isPlaying = true;
                if(audioCtx.state === 'suspended') audioCtx.resume();
            } else {
                audio.pause(); isPlaying = false;
                document.documentElement.style.setProperty('--beat-scale', 1);
                display.fadeOut();
            }
            return;
        }

        if(tipo === 'esplosione') {
            if(explosionInterval) { 
                clearInterval(explosionInterval); explosionInterval = null; 
                document.documentElement.style.setProperty('--main-color', '#ff0000'); 
            } else { 
                explosionInterval = setInterval(() => { 
                    document.documentElement.style.setProperty('--main-color', colors[Math.floor(Math.random()*colors.length)]); 
                }, 500); 
            }
            return;
        }

        if(tipo === 'trap') { $('#trap-screen').fadeToggle(300); $('#main-ui').fadeToggle(300); return; }

        clearInterval(clockInterval);
        if(display.is(':visible') && display.data('current') === tipo) {
            display.fadeOut(300); display.data('current', '');
        } else {
            display.data('current', tipo);
            updateOverlayContent(tipo);
            display.css('display', 'flex').hide().fadeIn(400);
            if(tipo === 'ora') clockInterval = setInterval(() => updateOverlayContent('ora'), 1000);
        }
    }

    async function updateOverlayContent(tipo) {
        const display = $('#overlay-display');
        const now = new Date();
        let txt = "";

        if(tipo === 'data') txt = "📅 " + now.toLocaleDateString('it-IT', { weekday: 'short', day: '2-digit', month: 'short', year: 'numeric' }).toUpperCase();
        if(tipo === 'ora') txt = "⏰ ORA: " + now.toLocaleTimeString('it-IT');
        if(tipo === 'ascolti') txt = "🎧 ASCOLTI: " + ($('#listeners_val').val() || "0");
        if(tipo === 'meteo') {
            try {
                const res = await fetch('https://ipapi.co/json/');
                const data = await res.json();
                txt = "🌍 METEO " + data.city.toUpperCase() + ": 24°C";
            } catch(e) { txt = "🌍 METEO DISPONIBILE"; }
        }
        if(tipo === 'oroscopo') {
            const signs = ["CAPRICORNO", "ACQUARIO", "PESCI", "ARIETE", "TORO", "GEMELLI", "CANCRO", "LEONE", "VERGINE", "BILANCIA", "SCORPIONE", "SAGITTARIO"];
            const sign = (now.getDate() > [19, 18, 20, 19, 20, 20, 22, 22, 22, 22, 21, 21][now.getMonth()]) ? signs[(now.getMonth() + 1) % 12] : signs[now.getMonth()];
            txt = "✨ OROSCOPO [" + sign + "]: ENERGIA AL TOP!";
        }
        display.text(txt);
    }

    async function updateMeta(){
        try {
            const r = await fetch(`https://zenoplay.zenomedia.com/api/zenofm/nowplaying/${radioID}?t=${Date.now()}`);
            const d = await r.json();
            if(d.title && d.title !== last_song) {
                last_song = d.title;
                const it = await fetch(`https://itunes.apple.com/search?term=${encodeURIComponent(d.title)}&limit=1`);
                const j = await it.json();
                $('.coverArt').attr('src', j.results?.[0]?.artworkUrl100.replace("100x100", "600x600") || "https://xatimg.com/image/CEDNlCTtyyH5.jpg");
            }
            if(!$('#listeners_val').length) $('body').append('<input type="hidden" id="listeners_val">');
            $('#listeners_val').val(d.listeners || 0);
        } catch(e) {}
    }
    setInterval(updateMeta, 10000); updateMeta();
</script>
</body>
</html>
