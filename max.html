<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <title>EL DIABLO</title>
  <style>
    body {
      margin: 0;
      background: #020617; /* Sfondo scuro Blue Moon */
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      overflow: hidden;
      font-family: 'Impact', sans-serif;
    }

    .container {
      position: relative;
      width: 1308px;
      height: 484px;
    }

    /* ===== CONTENITORE VIDEO (RETTANGOLI DX E SX) ===== */
    .video-wrapper {
      position: absolute;
      width: 270px;
      height: 484px;
      overflow: hidden;
      z-index: 2; /* Sopra al canvas per sicurezza sui bordi */
      background: transparent;
      border-radius: 20px;
    }
    
    .left { left: 0; }
    .right { right: 0; }

    /* ===== BORDI BLUE MOON ===== */
    .video-wrapper::before {
      content: "";
      position: absolute;
      inset: 0;
      padding: 4px;
      border-radius: 20px;
      /* Gradiente circolare con i toni della luna blu */
      background: conic-gradient(
        #1e3a8a, #3b82f6, #60a5fa, #0f172a, #1e3a8a
      );
      -webkit-mask:
        linear-gradient(#fff 0 0) content-box,
        linear-gradient(#fff 0 0);
      -webkit-mask-composite: xor;
      mask-composite: exclude;
      filter: drop-shadow(0 0 15px rgba(59, 130, 246, 0.6));
      pointer-events: none;
    }

    /* ===== VIDEO ===== */
    .side-video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      border-radius: 16px;
    }

    /* ===== TESTO SUI VIDEO (MAX - BLU ELETTRICO + BIANCO) ===== */
    .video-text {
      position: absolute;
      bottom: 8px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 28px; /* Leggermente più grande per dare impatto a "MAX" */
      font-family: 'Trebuchet MS', sans-serif;
      font-weight: bold;
      letter-spacing: 2px;
      z-index: 3;
      /* Sfumatura lineare da Blu Elettrico (#0041ff) a Bianco (#ffffff) */
      background: linear-gradient(90deg, #0041ff, #ffffff, #0041ff);
      background-size: 400% 100%;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      animation: moonText 4s linear infinite;
      filter: drop-shadow(0 0 8px rgba(0, 65, 255, 0.6));
    }

    @keyframes moonText {
      0% { background-position: 0%; }
      100% { background-position: 100%; }
    }

    /* ===== AREA CENTRALE CON CANVAS ===== */
    .center-area {
      position: absolute;
      left: 280px;
      right: 280px;
      top: 0;
      bottom: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 1;
      overflow: hidden;
    }

    #canvas {
      display: block;
      width: 100%;
      height: 100%;
      background-color: transparent;
    }
  </style>
</head>
<body>

<div class="container">
  <div class="video-wrapper left">
    <video class="side-video" autoplay loop muted playsinline>
      <source src="https://peppeagosto.github.io/immaggini/max.html">
    </video>
    <div class="video-text">MAX</div>
  </div>

  <div class="video-wrapper right">
    <video class="side-video" autoplay loop muted playsinline>
      <source src="https://peppeagosto.github.io/immaggini/max.html">
    </video>
    <div class="video-text">MAX</div>
  </div>

  <div class="center-area">
    <canvas id="canvas"></canvas>
  </div>
</div>

<script>
    const canvas = document.getElementById("canvas");
    const ctx = canvas.getContext("2d");
    
    let centerRect = canvas.parentElement.getBoundingClientRect();
    let cw = canvas.width = centerRect.width;
    let ch = canvas.height = centerRect.height;

    const txt = "RADIO BLEU MOON";
    const fontSize = 65; 
    let rays = [];
    let charIndex = 0;
    let hue = 0;
    let lastCharTime = 0;
    const charDelay = 800; 

    const mainTextCanvas = document.createElement("canvas");
    const mtCtx = mainTextCanvas.getContext("2d");
    mainTextCanvas.width = cw;
    mainTextCanvas.height = ch;

    class Ray {
        constructor(x, y, color) {
            this.x = x;
            this.y = y;
            this.color = color;
            this.l = 0;
            this.maxL = Math.random() * 80 + 20;
            this.angle = Math.random() * Math.PI * 2;
            this.vx = Math.cos(this.angle) * Math.random() * 5;
            this.vy = Math.sin(this.angle) * Math.random() * 5;
            this.opacity = 1;
        }

        update() {
            this.l += 2;
            this.opacity *= 0.92;
            return this.opacity < 0.05;
        }

        draw() {
            ctx.beginPath();
            ctx.strokeStyle = this.color;
            ctx.globalAlpha = this.opacity;
            ctx.lineWidth = 2;
            ctx.moveTo(this.x, this.y);
            ctx.lineTo(this.x + this.vx * this.l, this.y + this.vy * this.l);
            ctx.stroke();
        }
    }

    function getLetterPositions(char, xOffset) {
        const tempCanvas = document.createElement("canvas");
        const tempCtx = tempCanvas.getContext("2d");
        tempCanvas.width = cw;
        tempCanvas.height = ch;
        
        tempCtx.font = `bold ${fontSize}px Impact`;
        tempCtx.textBaseline = "middle";
        tempCtx.fillText(char, xOffset, ch / 2);

        const imgData = tempCtx.getImageData(0, 0, cw, ch).data;
        for (let y = 0; y < ch; y += 4) {
            for (let x = 0; x < cw; x += 4) {
                const i = (y * cw + x) * 4;
                if (imgData[i + 3] > 128) {
                    const color = `hsl(${(x / 2 + hue) % 360}, 100%, 50%)`;
                    rays.push(new Ray(x, y, color));
                }
            }
        }
    }

    function drawPermanentLetter(char, xOffset) {
        mtCtx.font = `bold ${fontSize}px Impact`;
        mtCtx.textBaseline = "middle";
        let grd = mtCtx.createLinearGradient(xOffset, 0, xOffset + 40, 0);
        grd.addColorStop(0, `hsl(${hue % 360}, 100%, 50%)`);
        grd.addColorStop(1, `hsl(${(hue + 40) % 360}, 100%, 50%)`);
        
        mtCtx.fillStyle = grd;
        mtCtx.shadowBlur = 15;
        mtCtx.shadowColor = `hsl(${hue % 360}, 100%, 50%)`;
        mtCtx.fillText(char, xOffset, ch / 2);
    }

    function animate(time) {
        ctx.fillStyle = "rgba(2, 6, 23, 0.2)"; 
        ctx.fillRect(0, 0, cw, ch);
        
        hue += 1.5;
        ctx.globalAlpha = 1;
        ctx.drawImage(mainTextCanvas, 0, 0);

        if (charIndex < txt.length && time - lastCharTime > charDelay) {
            ctx.font = `bold ${fontSize}px Impact`;
            
            let totalWidth = 0;
            for(let i = 0; i < txt.length; i++) {
                totalWidth += ctx.measureText(txt[i]).width + 12;
            }
            
            let xOffset = (cw / 2) - (totalWidth / 2); 
            for(let i = 0; i < charIndex; i++) {
                xOffset += ctx.measureText(txt[i]).width + 12;
            }

            getLetterPositions(txt[charIndex], xOffset);
            drawPermanentLetter(txt[charIndex], xOffset);
            
            charIndex++;
            lastCharTime = time;
        }

        ctx.globalCompositeOperation = "lighter";
        for (let i = rays.length - 1; i >= 0; i--) {
            rays[i].draw();
            if (rays[i].update()) {
                rays.splice(i, 1);
            }
        }
        ctx.globalCompositeOperation = "source-over";

        if (charIndex >= txt.length && rays.length === 0 && time - lastCharTime > 3000) {
            charIndex = 0;
            mtCtx.clearRect(0, 0, cw, ch);
            lastCharTime = time;
        }

        requestAnimationFrame(animate);
    }

    window.addEventListener("resize", () => {
        let centerRect = canvas.parentElement.getBoundingClientRect();
        cw = canvas.width = centerRect.width;
        ch = canvas.height = centerRect.height;
        mainTextCanvas.width = cw;
        mainTextCanvas.height = ch;
    });

    requestAnimationFrame(animate);
</script>

</body>
</html>
