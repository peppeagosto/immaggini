<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <title>Teatro Smart PRO - xat Edition</title>
  <style>
    body { margin: 0; background: transparent; height: 100vh; display: flex; justify-content: center; align-items: center; font-family: Arial, sans-serif; overflow: hidden; }

    .stage { 
      position: relative; width: 740px; height: 550px; 
      background: radial-gradient(circle, #222 0%, #000 100%); 
      border: 20px solid;
      border-image: linear-gradient(45deg, #ff0000, #ff7f00, #ffff00, #00ff00, #00ffff, #0000ff, #8b00ff) 1;
      animation: border-rainbow 5s linear infinite;
      box-shadow: 0 0 30px rgba(0,0,0,0.5) inset; 
      overflow: hidden; 
    }

    @keyframes border-rainbow {
      0% { border-image-source: linear-gradient(0deg, #ff0000, #ff7f00, #ffff00, #00ff00, #00ffff, #0000ff, #8b00ff); }
      100% { border-image-source: linear-gradient(360deg, #ff0000, #ff7f00, #ffff00, #00ff00, #00ffff, #0000ff, #8b00ff); }
    }
    
    .curtain { position: absolute; top: 0; width: 50%; height: 100%; background-size: cover; z-index: 200; transition: transform 2.5s ease-in-out; }
    .curtain.left { left: 0; background-image: url('https://xatimg.com/image/g4HMHikqYKvF.png'); background-position: left; }
    .curtain.right { right: 0; background-image: url('https://xatimg.com/image/JKlA9H9jL0hY.png'); background-position: right; }
    .curtain.open.left { transform: translateX(-100%); }
    .curtain.open.right { transform: translateX(100%); }

    #locandina-overlay {
      position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0);
      width: 80%; height: 70%; background: rgba(0,0,0,0.95); border: 3px solid #0ff;
      z-index: 400; border-radius: 15px; display: flex; flex-direction: column;
      justify-content: center; align-items: center; transition: 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      color: white; text-align: center; box-shadow: 0 0 50px #0ff;
    }
    #locandina-overlay.active { transform: translate(-50%, -50%) scale(1); }
    .btn-close { position: absolute; top: 10px; right: 10px; color: red; cursor: pointer; font-weight: bold; font-size: 20px; border: 1px solid red; padding: 2px 8px; border-radius: 50%; }

    .rainbow-text, .btn-cmd span { 
      font-weight: 900; 
      background: linear-gradient(to right, #ff0000, #ff7f00, #ffff00, #00ff00, #00ffff, #0000ff, #8b00ff); 
      background-size: 400% 400%; -webkit-background-clip: text; background-clip: text; color: transparent; 
      animation: rainbow-move 5s linear infinite; filter: drop-shadow(2px 2px 2px #000); 
    }
    @keyframes rainbow-move { 0% { background-position: 0% 50%; } 100% { background-position: 100% 50%; } }
    @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
    @keyframes fall { 0% { transform: translateY(-50px) rotate(0deg); opacity: 1; } 100% { transform: translateY(600px) rotate(360deg); opacity: 0; } }
    
    .falling-note { position: absolute; z-index: 300; pointer-events: none; animation: fall 4s linear forwards; font-size: 25px; }

    #video-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 10; background: black; transition: opacity 1s; }
    #video-container.hidden { opacity: 0; visibility: hidden; }
    video { width: 100%; height: 100%; object-fit: cover; }

    #layout-container { 
      position: relative; z-index: 50; display: flex; width: 100%; height: 80%; align-items: center; justify-content: space-around; padding-top: 40px;
      opacity: 0; transition: opacity 1s ease-in;
    }
    #layout-container.visible { opacity: 1; }

    .side-icons { display: flex; flex-direction: column; gap: 15px; align-items: center; }
    .icon-circle { 
      width: 65px; height: 65px; border-radius: 50%; background-size: cover; background-position: center; 
      border: 2px solid #0ff; box-shadow: 0 0 15px #0ff; position: relative; animation: float 3s ease-in-out infinite;
      cursor: pointer;
    }
    .icon-circle span { position: absolute; bottom: -18px; width: 100%; text-align: center; font-size: 10px; font-weight: bold; pointer-events: none; }

    #album-cover { width: 260px; height: 260px; background-size: cover; background-position: center; border-radius: 20px; border: 4px solid #0ff; box-shadow: 0 0 25px #0ff; }
    .rotating { animation: rotateDisk 3s linear infinite; border-radius: 50% !important; }
    @keyframes rotateDisk { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

    .controls-panel { position: absolute; bottom: 15px; width: 100%; display: flex; justify-content: center; align-items: center; gap: 15px; z-index: 250; }
    .btn-cmd { background: rgba(0,0,0,0.8); border: 2px solid #fff; padding: 10px 25px; border-radius: 30px; cursor: pointer; }
    #vol-slider { width: 150px; cursor: pointer; accent-color: #00ffff; background: linear-gradient(to right, red, orange, yellow, green, blue, indigo, violet); height: 8px; border-radius: 5px; appearance: none; }
  </style>
</head>
<body>

<div class="stage" id="main-stage">
    <div id="locandina-overlay">
        <div class="btn-close" onclick="chiudiLocandina()">X</div>
        <h2 id="locandina-titolo" class="rainbow-text">TITOLO</h2>
        <div id="locandina-corpo" style="padding: 20px; font-size: 18px;"></div>
    </div>

    <div class="curtain left"></div>
    <div class="curtain right"></div>

    <marquee style="position:absolute; top:25px; width:100%; z-index:301; pointer-events: none;">
        <span class="rainbow-text" id="titolo-reale" style="font-size:26px;">🔴 LIVE: Sintonizzazione...</span>
    </marquee>

    <div id="video-container">
        <video id="bgVideo" playsinline>
            <source src="https://peppeagosto.github.io/immaggini/tasto-play.mp4" type="video/mp4">
        </video>
    </div>

    <div id="layout-container">
        <div class="side-icons" id="side-left">
            <div class="icon-circle" onclick="apriLocandina('oroscopo')"><span class="rainbow-text">OROSCOPO</span></div>
            <div class="icon-circle" onclick="apriLocandina('meteo')"><span class="rainbow-text">METEO</span></div>
            <div class="icon-circle" onclick="apriLocandina('storia')"><span class="rainbow-text">HISTORIA</span></div>
            <div class="icon-circle" onclick="apriLocandina('data')"><span class="rainbow-text">DATA</span></div>
        </div>
        
        <div id="album-cover"></div>
        
        <div class="side-icons" id="side-right">
            <div class="icon-circle" onclick="toggleEQ()"><span class="rainbow-text">EQ</span></div>
            <div class="icon-circle" onclick="boomColori()"><span class="rainbow-text">BOOM</span></div>
            <div class="icon-circle" onclick="cadutaNote()"><span class="rainbow-text">NOTE</span></div>
            <div class="icon-circle" onclick="toggleDisco()"><span class="rainbow-text">DISCO</span></div>
        </div>
    </div>

    <div class="controls-panel">
        <button class="btn-cmd" onclick="startShow()"><span>PLAY</span></button>
        <input type="range" id="vol-slider" min="0" max="1" step="0.1" value="0.5" oninput="audio.volume=this.value">
        <button class="btn-cmd" onclick="stopShow()"><span>STOP</span></button>
    </div>
</div>

<script>
    const radioHTML = 'https://stm2.srvif.com:7198/7.html';
    const defaultImg = 'https://xatimg.com/image/p9TX9DIpPPS5.png';
    let audio = new Audio('https://stm2.srvif.com:7198/7.aac');
    let video = document.getElementById('bgVideo');
    let cover = document.getElementById('album-cover');
    let layout = document.getElementById('layout-container');

    async function fetchTitle() {
        const proxyUrl = 'https://api.allorigins.win/raw?url=' + encodeURIComponent(radioHTML) + '&t=' + Date.now();
        try {
            const response = await fetch(proxyUrl);
            const data = await response.text();
            const parts = data.split(',');
            let title = parts[6] ? parts[6].replace(/<[^>]+>/g, '').trim() : "Musica No Stop";
            if(title === "" || title.length < 2) title = "Musica No Stop";
            document.getElementById('titolo-reale').textContent = "🔴 LIVE: " + title;

            // Cerchiamo fino a 4 risultati per "dividere" le foto negli 8 cerchietti
            fetch(`https://itunes.apple.com/search?term=${encodeURIComponent(title)}&limit=4`)
                .then(res => res.json())
                .then(json => {
                    if (json.results.length > 0) {
                        const immagini = json.results.map(r => r.artworkUrl100.replace('100x100', '600x600'));
                        updateImages(immagini);
                    } else { updateImages([defaultImg]); }
                }).catch(() => updateImages([defaultImg]));
        } catch (e) { console.log("Errore sintonizzazione"); }
    }

    function updateImages(listaUrl) {
        // Al centro mettiamo sempre la prima (la più azzeccata)
        cover.style.backgroundImage = `url('${listaUrl[0]}')`;
        
        // Distribuiamo le immagini trovate sugli 8 cerchietti
        const cerchietti = document.querySelectorAll('.icon-circle');
        cerchietti.forEach((el, index) => {
            // Usa l'operatore modulo (%) per girare tra le immagini disponibili (se sono 3, le divide sugli 8)
            const urlDaUsare = listaUrl[index % listaUrl.length];
            el.style.backgroundImage = `url('${urlDaUsare}')`;
        });
    }

    function apriLocandina(tipo) {
        const overlay = document.getElementById('locandina-overlay');
        const titolo = document.getElementById('locandina-titolo');
        const corpo = document.getElementById('locandina-corpo');
        overlay.classList.add('active');
        const adesso = new Date();

        switch(tipo) {
            case 'oroscopo':
                titolo.textContent = "OROSCOPO";
                const g = adesso.getDate();
                const m = adesso.getMonth() + 1;
                let s = "";
                // Logica esatta Segni Zodiacali
                if ((m == 3 && g >= 21) || (m == 4 && g <= 19)) s = "Ariete ♈";
                else if ((m == 4 && g >= 20) || (m == 5 && g <= 20)) s = "Toro ♉";
                else if ((m == 5 && g >= 21) || (m == 6 && g <= 21)) s = "Gemelli ♊";
                else if ((m == 6 && g >= 22) || (m == 7 && g <= 22)) s = "Cancro ♋";
                else if ((m == 7 && g >= 23) || (m == 8 && g <= 22)) s = "Leone ♌";
                else if ((m == 8 && g >= 23) || (m == 9 && g <= 22)) s = "Vergine ♍";
                else if ((m == 9 && g >= 23) || (m == 10 && g <= 23)) s = "Bilancia ♎";
                else if ((m == 10 && g >= 24) || (m == 11 && g <= 21)) s = "Scorpione ♏";
                else if ((m == 11 && g >= 22) || (m == 12 && g <= 21)) s = "Sagittario ♐";
                else if ((m == 12 && g >= 22) || (m == 1 && g <= 19)) s = "Capricorno ♑";
                else if ((m == 1 && g >= 20) || (m == 2 && g <= 18)) s = "Acquario ♒";
                else s = "Pesci ♓";
                corpo.innerHTML = `✨ Oggi 26 Aprile è tempo del <b>${s}</b>.<br><br>Le stelle dicono: La musica è la tua guida oggi!`;
                break;
            case 'meteo':
                titolo.textContent = "METEO LIVE";
                corpo.innerHTML = "🛰️ Rilevamento in corso...";
                if (navigator.geolocation) {
                    navigator.geolocation.getCurrentPosition(async (pos) => {
                        const res = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${pos.coords.latitude}&longitude=${pos.coords.longitude}&current_weather=true`);
                        const d = await res.json();
                        corpo.innerHTML = `📍 Località Rilevata<br><span style="font-size:45px;">🌡️ ${d.current_weather.temperature}°C</span><br>Sintonizzati sul relax!`;
                    }, () => { corpo.innerHTML = "Attiva il GPS per il meteo reale!"; });
                }
                break;
            case 'storia': titolo.textContent = "HISTORIA"; corpo.innerHTML = "📜 Ogni nota racconta una storia passata."; break;
            case 'data': titolo.textContent = "DATA"; corpo.innerHTML = "📅 Oggi è il " + adesso.toLocaleDateString('it-IT'); break;
        }
    }

    function chiudiLocandina() { document.getElementById('locandina-overlay').classList.remove('active'); }

    function startShow() {
        document.querySelector('.left').classList.add('open');
        document.querySelector('.right').classList.add('open');
        video.play();
        fetchTitle();
        setTimeout(() => {
            document.getElementById('video-container').classList.add('hidden');
            layout.classList.add('visible'); 
            audio.play();
        }, 8000);
    }

    function stopShow() { location.reload(); }
    function toggleDisco() { cover.classList.toggle('rotating'); }
    function toggleEQ() {
        cover.style.transition = "0.1s";
        let pulse = setInterval(() => { cover.style.transform = `scale(${1 + Math.random()*0.05})`; }, 100);
        setTimeout(() => { clearInterval(pulse); cover.style.transform = "scale(1)"; }, 2000);
    }
    function boomColori() {
        document.querySelectorAll('.icon-circle').forEach(c => {
            const col = `hsl(${Math.random()*360}, 100%, 50%)`;
            c.style.borderColor = col; c.style.boxShadow = `0 0 25px ${col}`;
        });
    }
    function cadutaNote() {
        const stage = document.getElementById('main-stage');
        for(let i=0; i<15; i++) {
            setTimeout(() => {
                const n = document.createElement('div');
                n.className = 'falling-note'; n.innerHTML = '♪';
                n.style.left = Math.random() * 700 + 'px'; n.style.top = '-30px';
                n.style.color = `hsl(${Math.random()*360}, 100%, 50%)`;
                stage.appendChild(n);
                setTimeout(() => n.remove(), 4000);
            }, i * 250);
        }
    }

    updateImages([defaultImg]);
    fetchTitle();
    setInterval(fetchTitle, 15000);
</script>
</body>
</html>
