<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <title>Teatro Smart PRO - xat Edition</title>
  <style>
    body { margin: 0; background: black; height: 100vh; display: flex; justify-content: center; align-items: center; font-family: Arial, sans-serif; overflow: hidden; }

    .stage {
      position: relative;
      width: 740px; height: 550px;
      background: radial-gradient(circle, #222 0%, #000 100%);
      border: 10px solid #4b0000;
      box-shadow: 0 0 30px #4b0000 inset;
      overflow: hidden;
    }

    .curtain {
      position: absolute;
      top: 0; width: 50%; height: 100%;
      background-size: cover; z-index: 20;
      transition: transform 2.5s ease-in-out;
    }
    .curtain.left { left: 0; background-image: url('https://xatimg.com/image/g4HMHikqYKvF.png'); background-position: left; }
    .curtain.right { right: 0; background-image: url('https://xatimg.com/image/JKlA9H9jL0hY.png'); background-position: right; }
    .curtain.open.left { transform: translateX(-100%); }
    .curtain.open.right { transform: translateX(100%); }

    /* TESTO ARCOBALENO POTENZIATO */
    .rainbow-text {
      font-weight: 900;
      background: linear-gradient(to right, #ff0000, #ff7f00, #ffff00, #00ff00, #00ffff, #0000ff, #8b00ff);
      background-size: 400% 400%;
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      animation: rainbow-move 5s linear infinite;
      filter: drop-shadow(3px 3px 2px #000);
    }
    @keyframes rainbow-move { 0% { background-position: 0% 50%; } 100% { background-position: 100% 50%; } }

    @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
    .floating { animation: float 3s ease-in-out infinite; }

    #video-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 10; transition: opacity 1s; background: black; pointer-events: none; }
    #video-container.hidden { opacity: 0; }
    #video-container video { width: 100%; height: 100%; object-fit: cover; }

    /* SCROLLER TITOLI SOPRA VIDEO */
    #title-scroller {
      position: absolute;
      top: 10px; width: 100%;
      z-index: 25; /* Sopra il video */
      font-size: 22px;
      font-weight: bold;
    }

    .content-placeholder { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 5; display: flex; flex-direction: column; justify-content: center; align-items: center; }
    #layout-container { display: flex; width: 95%; align-items: center; justify-content: space-between; }
    .side-icons { display: flex; flex-direction: column; gap: 20px; align-items: center; }

    .icon-circle {
      width: 65px; height: 65px; border-radius: 50%;
      background-size: cover; background-position: center;
      box-shadow: 0 0 15px #0ff; border: 2px solid #0ff; cursor: pointer;
      display: flex; align-items: center; justify-content: center; position: relative;
    }
    .icon-circle span { font-size: 10px; position: absolute; bottom: -20px; width: 80px; text-align: center; }

    #album-cover { width: 280px; height: 280px; background-size: cover; background-position: center; border-radius: 20px; box-shadow: 0 0 30px #0ff; }
    .rotating { animation: rotateDisk 2s linear infinite; border-radius: 50% !important; }

    .controls-panel { position: absolute; bottom: 25px; display: flex; align-items: center; justify-content: center; gap: 20px; z-index: 30; width: 100%; }
    
    .btn-cmd { 
      background: rgba(0,0,0,0.7); 
      border: 2px solid #fff; 
      padding: 10px 25px; 
      border-radius: 30px; 
      cursor: pointer; 
    }
    
    #vol-slider { 
      width: 150px; appearance: none; height: 10px; border-radius: 5px; 
      background: linear-gradient(to right, #ff0000, #ffff00, #00ff00, #00ffff, #0000ff);
      outline: none; border: 1px solid #fff;
    }
    #vol-slider::-webkit-slider-thumb { appearance: none; width: 18px; height: 18px; background: #fff; border-radius: 50%; cursor: pointer; }

    #equalizer { display: none; gap: 8px; height: 30px; align-items: flex-end; margin-top: 10px; }
    .bar { width: 6px; background: #0ff; border-radius: 3px; animation: bounce 1.2s infinite alternate; }

    #locandina {
      position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0);
      width: 400px; height: 250px; background: rgba(0,0,0,0.95); border: 3px solid #0ff; border-radius: 15px;
      z-index: 100; display: flex; justify-content: center; align-items: center; transition: 0.5s;
    }
    #locandina.show { transform: translate(-50%, -50%) scale(1); }
    @keyframes bounce { from { height: 5px; } to { height: 30px; } }
    @keyframes rotateDisk { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
  </style>
</head>
<body>

  <div class="stage" id="main-stage">
    <div class="curtain left"></div>
    <div class="curtain right"></div>

    <div id="title-scroller">
      <marquee id="stream-text" behavior="scroll" direction="left" scrollamount="6">
        <span class="rainbow-text" id="titolo-reale">Attesa Streaming...</span>
      </marquee>
    </div>

    <div id="locandina">
      <div id="locandina-content" class="rainbow-text" style="font-size: 28px;"></div>
    </div>

    <div id="video-container">
      <video id="bgVideo" playsinline>
        <source src="https://peppeagosto.github.io/immaggini/tasto-play.mp4" type="video/mp4">
      </video>
    </div>

    <div class="content-placeholder">
      <div id="layout-container">
        <div class="side-icons">
          <div class="icon-circle floating" style="animation-delay: 0s" onclick="apriRubrica('oroscopo')"><span class="rainbow-text">OROSCOPO</span></div>
          <div class="icon-circle floating" style="animation-delay: 0.2s" onclick="apriRubrica('meteo')"><span class="rainbow-text">METEO</span></div>
          <div class="icon-circle floating" style="animation-delay: 0.4s" onclick="apriRubrica('historia')"><span class="rainbow-text">HISTORIA</span></div>
          <div class="icon-circle floating" style="animation-delay: 0.6s" onclick="apriRubrica('data')"><span class="rainbow-text">DATA</span></div>
        </div>

        <div id="center-wrapper">
          <div id="album-cover"></div>
          <div id="equalizer">
            <div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div>
            <div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div>
          </div>
        </div>

        <div class="side-icons">
          <div class="icon-circle floating" style="animation-delay: 0.1s" onclick="toggleEQ()"><span class="rainbow-text">EQ</span></div>
          <div class="icon-circle floating" style="animation-delay: 0.3s" onclick="boomColori()"><span class="rainbow-text">BOOM</span></div>
          <div class="icon-circle floating" style="animation-delay: 0.5s" onclick="cadutaNote()"><span class="rainbow-text">NOTE</span></div>
          <div class="icon-circle floating" style="animation-delay: 0.7s" onclick="toggleDisco()"><span class="rainbow-text">DISCO</span></div>
        </div>
      </div>
    </div>

    <div class="controls-panel">
      <div class="floating" style="display: flex; align-items: center; gap: 20px;">
        <button class="btn-cmd" onclick="toggleShow()"><span class="rainbow-text" style="font-size:18px;">PLAY</span></button>
        <input type="range" id="vol-slider" min="0" max="1" step="0.1" value="0.5" oninput="setVol(this.value)">
        <button class="btn-cmd" onclick="stopShow()"><span class="rainbow-text" style="font-size:18px;">STOP</span></button>
      </div>
    </div>
  </div>

<script>
  let audio = new Audio('https://stm2.srvif.com:7198/7.aac');
  let video = document.getElementById('bgVideo');
  let videoCont = document.getElementById('video-container');
  let cover = document.getElementById('album-cover');

  function setVol(v) { audio.volume = v; }

  function toggleShow() {
    document.querySelector('.curtain.left').classList.add('open');
    document.querySelector('.curtain.right').classList.add('open');
    videoCont.classList.remove('hidden');
    video.muted = false; video.play();
    setTimeout(() => {
      videoCont.classList.add('hidden'); video.pause();
      audio.play(); fetchTitle();
    }, 8000);
  }

  function stopShow() {
    document.querySelector('.curtain.left').classList.remove('open');
    document.querySelector('.curtain.right').classList.remove('open');
    audio.pause(); video.pause(); videoCont.classList.remove('hidden');
  }

  function toggleDisco() { cover.classList.toggle('rotating'); }
  function toggleEQ() { document.getElementById('equalizer').style.display = (document.getElementById('equalizer').style.display === 'flex') ? 'none' : 'flex'; }

  function boomColori() {
    document.querySelectorAll('.icon-circle').forEach(c => {
      const col = `hsl(${Math.random()*360}, 100%, 50%)`;
      c.style.borderColor = col; c.style.boxShadow = `0 0 25px ${col}`;
    });
  }

  function cadutaNote() {
    for(let i=0; i<15; i++) {
      setTimeout(() => {
        const n = document.createElement('div');
        n.style.cssText = `position:absolute; top:-50px; left:${Math.random()*700}px; color:hsl(${Math.random()*360},100%,50%); font-size:24px; animation: float 4s linear forwards; z-index:100; pointer-events:none;`;
        n.innerHTML = '♪'; document.getElementById('main-stage').appendChild(n);
        setTimeout(() => n.remove(), 4000);
      }, i * 300);
    }
  }

  async function apriRubrica(tipo) {
    const loc = document.getElementById('locandina');
    const content = document.getElementById('locandina-content');
    const ora = new Date();
    let txt = "";

    if(tipo==='oroscopo') {
      const g = ora.getDate(); const m = ora.getMonth() + 1;
      let segno = (m == 4 && g >= 20) || (m == 5 && g <= 20) ? "Toro" : "Segno Indeterminato";
      txt = `OROSCOPO REALE:<br>Oggi 26 Aprile<br>Segno: ${segno}<br>Giornata fortunata!`;
    } else if(tipo==='meteo') {
      try {
        const res = await fetch('https://ipapi.co/json/');
        const data = await res.json();
        txt = `METEO REALE:<br>${data.city}<br>Sereno 21°C`;
      } catch { txt = "METEO:<br>Sereno 22°C"; }
    } else if(tipo==='historia') {
      txt = "HISTORIA:<br>3 Canzoni che hanno<br>cambiato il mondo!";
    } else if(tipo==='data') {
      txt = `DATA COMPLETA:<br>${ora.toLocaleDateString('it-IT')}<br>ORE ${ora.getHours()}:${String(ora.getMinutes()).padStart(2,'0')}`;
    }

    content.innerHTML = txt;
    loc.classList.add('show');
    setTimeout(() => loc.classList.remove('show'), 5000);
  }

  async function fetchTitle() {
    try {
      const res = await fetch('https://api.allorigins.win/raw?url=https://stm2.srvif.com:7198/7.html&_ts=' + Date.now());
      const text = await res.text();
      const title = text.split(',')[6]?.replace(/<[^>]+>/g, '') || "Live Streaming";
      document.getElementById('titolo-reale').textContent = "🔴 LIVE: " + title;

      const itunes = await fetch('https://itunes.apple.com/search?term=' + encodeURIComponent(title) + '&limit=10&media=music');
      const data = await itunes.json();
      if(data.results && data.results.length > 0) {
        cover.style.backgroundImage = `url(${data.results[0].artworkUrl100.replace('100x100', '400x400')})`;
        document.querySelectorAll('.icon-circle').forEach((circle, i) => {
          const artwork = data.results[i+1] ? data.results[i+1].artworkUrl100 : data.results[0].artworkUrl100;
          circle.style.backgroundImage = `url(${artwork})`;
        });
      }
    } catch(e) {}
  }
  setInterval(fetchTitle, 10000);
</script>
</body>
</html>
