<html lang="pt-PT"><head>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
    <title>EL DIABLO:</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="IE=Edge">
    
    <style type="text/css">
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: flex-start; 
            padding-top: 60px; 
            font-family: 'Segoe UI', Roboto, sans-serif;
            transition: background 0.4s ease-in-out, background-image 0.4s ease-in-out; 
            background: #222; 
            background-size: cover;
            background-position: center center;
            background-repeat: no-repeat;
            background-attachment: fixed;
        }

        .main-scaler {
            position: relative;
            transform: scale(min(1, calc(100vw / 1580), calc(100vh / 950)));
            transform-origin: top center;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 10;
            width: 1580px; 
            height: auto;
            pointer-events: none;
        }

        .stage-area {
            position: relative;
            width: 828px; 
            height: 486px;
            margin-top: 39px;
            background: rgba(255, 255, 255, 0.0);
            backdrop-filter: blur(5px);
            border: 2px solid rgba(255,255,255,0.0);
            border-radius: 12px;
            pointer-events: auto; 
        }

        /* Navigazione divisa in due gruppi (Colori a SX, Foto a DX) */
        .theme-nav-horizontal {
            position: absolute;
            top: -48px; 
            left: 10px;
            right: 10px;
            height: 40px; 
            display: flex;
            flex-direction: row;
            justify-content: space-between; 
            align-items: center;
            z-index: 999999; 
            pointer-events: auto; 
        }

        .nav-group {
            display: flex;
            gap: 12px; 
        }

        /* Stile unico dei cerchietti */
        .theme-nav-horizontal span {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            cursor: pointer;
            border: 1px solid rgba(255,255,255,0.6);
            box-shadow: 0 5px 15px rgba(0,0,0,0.6), inset 0 -2px 5px rgba(0,0,0,0.4);
            transition: transform 0.2s, box-shadow 0.2s;
            flex-shrink: 0;
            user-select: none;
            -webkit-user-select: none;
        }

        /* Cerchietti Colore */
        .btn-color {
            background: radial-gradient(circle at 35% 35%, #fff 0%, var(--c1) 40%, var(--c2) 100%);
        }

        /* Cerchietti Foto */
        .btn-photo {
            background-image: var(--bg-img);
            background-size: cover;
            background-position: center center;
        }

        .theme-nav-horizontal span:hover {
            transform: scale(1.2);
            box-shadow: 0 8px 20px rgba(0,0,0,0.8), inset 0 -2px 5px rgba(0,0,0,0.4);
        }
    </style>
</head>
<body oncontextmenu="return false;">

    <div class="main-scaler">
        <div class="stage-area">
            
            <div class="theme-nav-horizontal">
                <!-- GRUPPO COLORI (A SINISTRA) -->
                <div class="nav-group">
                    <span class="btn-color" style="--c1: #ff416c; --c2: #ff4b2b;" onclick="changeBgColor('#ff416c')"></span>
                    <span class="btn-color" style="--c1: #1fa2ff; --c2: #12d8fa;" onclick="changeBgColor('#1fa2ff')"></span>
                    <span class="btn-color" style="--c1: #a8ff78; --c2: #78ffd6;" onclick="changeBgColor('#a8ff78')"></span>
                    <span class="btn-color" style="--c1: #f12711; --c2: #f5af19;" onclick="changeBgColor('#f5af19')"></span>
                    <span class="btn-color" style="--c1: #b92b27; --c2: #1565c0;" onclick="changeBgColor('#6441a5')"></span>
                    <span class="btn-color" style="--c1: #ea00d9; --c2: #711c91;" onclick="changeBgColor('#ea00d9')"></span>
                    <span class="btn-color" style="--c1: #0575e6; --c2: #00f260;" onclick="changeBgColor('#00f260')"></span>
                    <span class="btn-color" style="--c1: #eef2f3; --c2: #8e9eab;" onclick="changeBgColor('#8e9eab')"></span>
                </div>

                <!-- GRUPPO FOTO (A DESTRA) -->
                <div class="nav-group">
                    <!-- Ecco la tua foto dell'angelo con il link ufficiale -->
                    <span class="btn-photo" style="--bg-img: url('https://xatimg.com/image/j8m7QBK1StNz.jpg');" onclick="changeBgPhoto('https://xatimg.com/image/j8m7QBK1StNz.jpg', true)"></span>
                    
                    <!-- Le altre foto a seguire -->
                    <span class="btn-photo" style="--bg-img: url('https://xatimg.com/image/pCva9lXFzFDR.png');" onclick="changeBgPhoto('https://xatimg.com/image/pCva9lXFzFDR.png', false)"></span>
                    <span class="btn-photo" style="--bg-img: url('https://xatimg.com/image/AFNmdplOgklT.png');" onclick="changeBgPhoto('https://xatimg.com/image/AFNmdplOgklT.png', false)"></span>
                    <span class="btn-photo" style="--bg-img: url('https://xatimg.com/image/61zGRspzOLRu.png');" onclick="changeBgPhoto('https://xatimg.com/image/61zGRspzOLRu.png', false)"></span>
                    <span class="btn-photo" style="--bg-img: url('https://xatimg.com/image/F6MK1q05ZVZF.png');" onclick="changeBgPhoto('https://xatimg.com/image/F6MK1q05ZVZF.png', false)"></span>
                    <span class="btn-photo" style="--bg-img: url('https://xatimg.com/image/JF0U2THlbfAJ.jpg');" onclick="changeBgPhoto('https://xatimg.com/image/JF0U2THlbfAJ.jpg', false)"></span>
                    <span class="btn-photo" style="--bg-img: url('https://xatimg.com/image/mTfUaLHACsYP.png');" onclick="changeBgPhoto('https://xatimg.com/image/mTfUaLHACsYP.png', false)"></span>
                    <span class="btn-photo" style="--bg-img: url('https://xatimg.com/image/vN0aaElHnepK.gif');" onclick="changeBgPhoto('https://xatimg.com/image/vN0aaElHnepK.gif', false)"></span>
                    <span class="btn-photo" style="--bg-img: url('https://xatimg.com/image/7n5AdSiAScq6.png');" onclick="changeBgPhoto('https://xatimg.com/image/7n5AdSiAScq6.png', false)"></span>
                </div>
            </div>

        </div>
    </div>

    <script>
        function changeBgColor(color) {
            document.body.style.backgroundImage = "none";
            document.body.style.backgroundColor = color;
        }

        // Funzione aggiornata per calibrare lo sfondo in base al tipo di foto
        function changeBgPhoto(url, isVertical) {
            document.body.style.backgroundImage = "url('" + url + "')";
            if (isVertical) {
                // Se è la tua foto verticale, la calibra partendo dall'alto
                document.body.style.backgroundPosition = "center top";
            } else {
                // Per le altre foto mantiene la centratura classica
                document.body.style.backgroundPosition = "center center";
            }
        }
    </script>

</body></html>
