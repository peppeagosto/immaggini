<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
    <title>EL DIABLO:</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="IE=Edge">
    
    <style type="text/css">
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: flex-start; 
            padding-top: 60px; 
            font-family: 'Segoe UI', Roboto, sans-serif;
            transition: background 0.4s ease-in-out, background-image 0.4s ease-in-out; 
            background: #fff; 
            background-size: cover;
            background-position: center;
        }

        .main-scaler {
            position: relative;
            transform: scale(min(1, calc(100vw / 1580), calc(100vh / 950)));
            transform-origin: top center;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 10;
            width: 1580px; 
            height: auto;
            pointer-events: none;
        }

        .stage-area {
            position: relative;
            width: 828px; 
            height: 486px;
            margin-top: 39px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(5px);
            border: 2px solid rgba(255,255,255,0.2);
            border-radius: 12px;
            pointer-events: auto; 
        }

        /* Navigazione divisa in due gruppi (Colori a SX, Foto a DX) */
        .theme-nav-horizontal {
            position: absolute;
            top: 10px; 
            left: 10px;
            right: 10px;
            height: 40px; 
            display: flex;
            flex-direction: row;
            justify-content: space-between; 
            align-items: center;
            z-index: 999999; 
            pointer-events: auto; 
        }

        .nav-group {
            display: flex;
            gap: 12px; 
        }

        /* Stile unico dei cerchietti */
        .theme-nav-horizontal span {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            cursor: pointer;
            border: 1px solid rgba(255,255,255,0.6);
            box-shadow: 0 5px 15px rgba(0,0,0,0.6), inset 0 -2px 5px rgba(0,0,0,0.4);
            transition: transform 0.2s, box-shadow 0.2s;
            flex-shrink: 0;
            user-select: none;
            -webkit-user-select: none;
        }

        /* Cerchietti Colore (Gradiente classico) */
        .btn-color {
            background: radial-gradient(circle at 35% 35%, #fff 0%, var(--c1) 40%, var(--c2) 100%);
        }

        /* Cerchietti Foto (Mostrano l'anteprima dell'immagine dentro la pallina) */
        .btn-photo {
            background-image: var(--bg-img);
            background-size: cover;
            background-position: center;
        }

        .theme-nav-horizontal span:hover {
            transform: scale(1.2);
            box-shadow: 0 8px 20px rgba(0,0,0,0.8), inset 0 -2px 5px rgba(0,0,0,0.4);
        }
    </style>
</head>
<body oncontextmenu="return false;">

    <div class="main-scaler">
        <div class="stage-area">
            
            <div class="theme-nav-horizontal">
                <div class="nav-group">
                    <span class="btn-color" style="--c1:#00ff00; --c2:#004400;" onclick="changeBgColor('#00ff00')"></span> 
                    <span class="btn-color" style="--c1:#0000ff; --c2:#000033;" onclick="changeBgColor('#0000ff')"></span> 
                    <span class="btn-color" style="--c1:#ff0000; --c2:#440000;" onclick="changeBgColor('#ff0000')"></span> 
                    <span class="btn-color" style="--c1:#00ffff; --c2:#004444;" onclick="changeBgColor('#00ffff')"></span> 
                    <span class="btn-color" style="--c1:#ff00ff; --c2:#440044;" onclick="changeBgColor('#ff00ff')"></span> 
                    <span class="btn-color" style="--c1:#ffff00; --c2:#444400;" onclick="changeBgColor('#ffff00')"></span>
                </div>

                <div class="nav-group">
                    <span class="btn-photo" style="--bg-img: url('https://xatimg.com/image/icUuwvTvLqrk.png');" onclick="changeBgPhoto('https://xatimg.com/image/icUuwvTvLqrk.png')"></span>
                    
                    <span class="btn-photo" style="--bg-img: url('https://xatimg.com/image/icUuwvTvLqrk.png');" onclick="changeBgPhoto('https://xatimg.com/image/icUuwvTvLqrk.png')"></span>
                    
                    <span class="btn-photo" style="--bg-img: url('https://images.unsplash.com/photo-1533174072545-7a4b6ad7a6c3?w=150');" onclick="changeBgPhoto('https://images.unsplash.com/photo-1533174072545-7a4b6ad7a6c3?w=1200')"></span>
                    <span class="btn-photo" style="--bg-img: url('https://images.unsplash.com/photo-1550684848-fac1c5b4e853?w=150');" onclick="changeBgPhoto('https://images.unsplash.com/photo-1550684848-fac1c5b4e853?w=1200')"></span>
                    <span class="btn-photo" style="--bg-img: url('https://images.unsplash.com/photo-1541701494587-cb58502866ab?w=150');" onclick="changeBgPhoto('https://images.unsplash.com/photo-1541701494587-cb58502866ab?w=1200')"></span>
                    <span class="btn-photo" style="--bg-img: url('https://images.unsplash.com/photo-1518770660439-4636190af475?w=150');" onclick="changeBgPhoto('https://images.unsplash.com/photo-1518770660439-4636190af475?w=1200')"></span>
                </div>
            </div>

        </div>
    </div>

    <script>
        function changeBgColor(color) {
            document.body.style.backgroundImage = "none";
            document.body.style.backgroundColor = color;
        }

        function changeBgPhoto(url) {
            document.body.style.backgroundImage = "url('" + url + "')";
        }
    </script>

</body>
</html>
