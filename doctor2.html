<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Orologio cartaio</title>
  <style>
    html, body {
      margin: 0; padding: 0;
      background: transparent;
      color: #eee;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
      user-select: none;
    }

    .wrapper {
      width: 550px;
      height: 550px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
    }

    h1 {
      font-size: 2rem;
      background: linear-gradient(90deg, #00ffff, #ff00ff, #ffff00, #00ffff);
      background-size: 300% 300%;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      animation: gradientShift 5s ease infinite;
      margin: 20px 0 15px;
    }

    @keyframes gradientShift {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    .sveglia-container {
      position: relative;
      width: 260px;
      height: 260px;
      border-radius: 50%;
      overflow: hidden;
      box-shadow: 0 0 15px #00ffff80;
      margin: 0 auto;
    }

    .sveglia-container video {
      position: absolute;
      top: 0; left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      z-index: 1;
      pointer-events: none;
    }

    #svegliaBtn {
      position: absolute;
      top: 90%; left: 50%;
      transform: translate(-50%, -50%);
      z-index: 2;
      padding: 8px 16px;
      background: #00ffff;
      border: none;
      border-radius: 20px;
      font-size: 14px;
      font-weight: bold;
      color: #000;
      cursor: pointer;
      box-shadow: 0 0 8px #00ffff;
      transition: background 0.3s;
      user-select: none;
    }

    #svegliaBtn:hover {
      background: #00cccc;
    }
  </style>
</head>
<body>
  <div class="wrapper">
    <h1>Orologio Parlante</h1>
    <div class="sveglia-container">
      <video id="videoParlante" src="https://peppeagosto.github.io/immaggini/doctor.mp4" playsinline></video>
      <button id="svegliaBtn">Play</button>
    </div>
  </div>

<script>
  const svegliaBtn = document.getElementById('svegliaBtn');
  const video = document.getElementById('videoParlante');

  // Impostazioni video
  video.autoplay = false;
  video.loop = false;
  video.muted = false;

  // Avvia solo il video
  svegliaBtn.addEventListener('click', () => {
    video.currentTime = 0;
    video.play();
  });
</script>

</body>
</html>
