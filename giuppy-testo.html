<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>EL CARTAIO - Rainbow Fixed</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #000;
            font-family: 'Impact', sans-serif;
        }
        canvas {
            display: block;
        }
    </style>
</head>
<body>

<canvas id="canvas"></canvas>

<script>
    const canvas = document.getElementById("canvas");
    const ctx = canvas.getContext("2d");
    let cw = canvas.width = window.innerWidth;
    let ch = canvas.height = window.innerHeight;

    const txt = "MAGIA MUSICALE";
    const fontSize = 100;
    let rays = [];
    let charIndex = 0;
    let hue = 0;
    let lastCharTime = 0;
    const charDelay = 800; 

    const mainTextCanvas = document.createElement("canvas");
    const mtCtx = mainTextCanvas.getContext("2d");
    mainTextCanvas.width = cw;
    mainTextCanvas.height = ch;

    class Ray {
        constructor(x, y, color) {
            this.x = x;
            this.y = y;
            this.color = color;
            this.l = 0;
            this.maxL = Math.random() * 80 + 20;
            this.angle = Math.random() * Math.PI * 2;
            this.vx = Math.cos(this.angle) * Math.random() * 5;
            this.vy = Math.sin(this.angle) * Math.random() * 5;
            this.opacity = 1;
        }

        update() {
            this.l += 2;
            this.opacity *= 0.92;
            return this.opacity < 0.05;
        }

        draw() {
            ctx.beginPath();
            ctx.strokeStyle = this.color;
            ctx.globalAlpha = this.opacity;
            ctx.lineWidth = 2;
            ctx.moveTo(this.x, this.y);
            ctx.lineTo(this.x + this.vx * this.l, this.y + this.vy * this.l);
            ctx.stroke();
        }
    }

    function getLetterPositions(char, xOffset) {
        const tempCanvas = document.createElement("canvas");
        const tempCtx = tempCanvas.getContext("2d");
        tempCanvas.width = cw;
        tempCanvas.height = ch;
        
        tempCtx.font = `bold ${fontSize}px Impact`;
        tempCtx.textBaseline = "middle";
        tempCtx.fillText(char, xOffset, ch / 2);

        const imgData = tempCtx.getImageData(0, 0, cw, ch).data;
        for (let y = 0; y < ch; y += 5) {
            for (let x = 0; x < cw; x += 5) {
                const i = (y * cw + x) * 4;
                if (imgData[i + 3] > 128) {
                    const color = `hsl(${(x / 2 + hue) % 360}, 100%, 50%)`;
                    rays.push(new Ray(x, y, color));
                }
            }
        }
    }

    function drawPermanentLetter(char, xOffset) {
        mtCtx.font = `bold ${fontSize}px Impact`;
        mtCtx.textBaseline = "middle";
        let grd = mtCtx.createLinearGradient(xOffset, 0, xOffset + 50, 0);
        grd.addColorStop(0, `hsl(${hue % 360}, 100%, 50%)`);
        grd.addColorStop(1, `hsl(${(hue + 40) % 360}, 100%, 50%)`);
        
        mtCtx.fillStyle = grd;
        mtCtx.shadowBlur = 15;
        mtCtx.shadowColor = `hsl(${hue % 360}, 100%, 50%)`;
        mtCtx.fillText(char, xOffset, ch / 2);
    }

    function animate(time) {
        ctx.fillStyle = "rgba(0, 0, 0, 0.2)";
        ctx.fillRect(0, 0, cw, ch);
        
        hue += 1.5;
        ctx.globalAlpha = 1;
        ctx.drawImage(mainTextCanvas, 0, 0);

        if (charIndex < txt.length && time - lastCharTime > charDelay) {
            ctx.font = `bold ${fontSize}px Impact`;
            // SPOSTAMENTO VERSO SX: Cambiato da -300 a -450
            let xOffset = (cw / 2) - 450; 
            for(let i = 0; i < charIndex; i++) {
                xOffset += ctx.measureText(txt[i]).width + 15;
            }

            getLetterPositions(txt[charIndex], xOffset);
            drawPermanentLetter(txt[charIndex], xOffset);
            
            charIndex++;
            lastCharTime = time;
        }

        ctx.globalCompositeOperation = "lighter";
        for (let i = rays.length - 1; i >= 0; i--) {
            rays[i].draw();
            if (rays[i].update()) {
                rays.splice(i, 1);
            }
        }
        ctx.globalCompositeOperation = "source-over";

        if (charIndex >= txt.length && rays.length === 0 && time - lastCharTime > 3000) {
            charIndex = 0;
            mtCtx.clearRect(0, 0, cw, ch);
            lastCharTime = time;
        }

        requestAnimationFrame(animate);
    }

    window.addEventListener("resize", () => {
        cw = canvas.width = window.innerWidth;
        ch = canvas.height = window.innerHeight;
        mainTextCanvas.width = cw;
        mainTextCanvas.height = ch;
    });
    requestAnimationFrame(animate);
</script>

</body>
</html>
