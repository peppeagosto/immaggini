<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>EL DIABLO</title>
<style>
body{
  margin:0;
  background:transparent;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  overflow:hidden;
}
.container{
  position:relative;
  width:1308px; /* Mantiene la larghezza per distanziare i due video */
  height:484px;
}

/* ===== CONTENITORE VIDEO ===== */
.video-wrapper{
  position:absolute;
  width:270px;
  height:484px;
  overflow:hidden;
  z-index:1;
  background:transparent;
  border-radius:20px;
}
.left{left:0}
.right{right:0}

/* ===== BORDI ARCOBALENO ===== */
.video-wrapper::before{
  content:"";
  position:absolute;
  inset:0;
  padding:4px;
  border-radius:20px;
  background:conic-gradient(
    red,orange,yellow,lime,cyan,blue,violet,red
  );
  -webkit-mask:
    linear-gradient(#fff 0 0) content-box,
    linear-gradient(#fff 0 0);
  -webkit-mask-composite:xor;
  mask-composite:exclude;
  filter:drop-shadow(0 0 10px rgba(255,0,255,.7));
  pointer-events:none;
}

/* ===== VIDEO ===== */
.side-video{
  width:100%;
  height:100%;
  object-fit:cover;
  border-radius:16px;
}

/* ===== TESTO ARCOBALENO VIDEO ===== */
.video-text{
  position:absolute;
  bottom:8px;
  left:50%;
  transform:translateX(-50%);
  font-size:25px;
  font-family:Trebuchet MS;
  font-weight:bold;
  z-index:2;
  white-space: nowrap;
  background:linear-gradient(90deg,red,orange,yellow,lime,cyan,blue,violet,red);
  background-size:400% 100%;
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  animation: rainbowText 3s linear infinite;
}

@keyframes rainbowText{
  0%{background-position:0%}
  100%{background-position:100%}
}
</style>
</head>
<body>

<div class="container">

  <div class="video-wrapper left">
    <video class="side-video" autoplay loop muted playsinline>
      <source src="https://peppeagosto.github.io/immaggini/alien3.mp4" type="video/mp4">
    </video>
    <div class="video-text">IL CARTAIO</div>
  </div>

  <div class="video-wrapper right">
    <video class="side-video" autoplay loop muted playsinline>
      <source src="https://peppeagosto.github.io/immaggini/alien3.mp4" type="video/mp4">
    </video>
    <div class="video-text">IL CARTAIO</div>
  </div>

</div>

</body>
</html>
