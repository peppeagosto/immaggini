<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <style>
        :root { --rb: linear-gradient(to right, #f00, #ff0, #0f0, #0ff, #f0f, #f00); }
        
        body { 
            background: transparent; 
            margin: 0; 
            font-family: 'Arial Black', sans-serif; 
            overflow: hidden; 
            height: 100vh;
            display: flex;
            justify-content: space-between; 
            align-items: flex-start;
            padding: 60px 20px 20px 20px;
            pointer-events: none; 
            box-sizing: border-box;
        }

        /* --- EFFETTO INVISIBILE AL MOUSE --- */
        .box-sx, .box-dx { 
            width: 250px; 
            pointer-events: auto; 
            display: flex; 
            flex-direction: column; 
            gap: 15px; 
            /* Nascondo i box */
            opacity: 0; 
            transition: opacity 0.5s ease-in-out;
        }

        /* Quando il mouse si avvicina (hover), diventano visibili */
        .box-sx:hover, .box-dx:hover { 
            opacity: 1; 
        }

        /* BOX DX: Allineamento a destra */
        .box-dx { align-items: flex-end; }

        .btn-custom {
            width: 220px; height: 55px; background: #000; border: 2px solid #fff; border-radius: 10px;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            cursor: pointer; box-shadow: 0 0 15px rgba(255,255,255,0.3); z-index: 9999;
        }

        .btn-text { background: var(--rb); -webkit-background-clip: text; color: transparent; text-transform: uppercase; font-weight: 900; font-size: 10px; }
        #clicca-qui-text, .btn-sub { background: var(--rb); -webkit-background-clip: text; color: transparent; text-transform: uppercase; font-weight: 900; font-size: 13px; animation: pulse 1.5s infinite; letter-spacing: 1px; }
        
        @keyframes pulse { 0%, 100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.7; transform: scale(0.95); } }

        #locandina { 
            width: 230px; background: #000; border: 3px solid #333; border-radius: 12px; padding: 8px; 
            box-shadow: 0 0 50px #000; display: none; z-index: 9998; margin-top: 10px;
        }

        .particle { position: fixed; bottom: -80px; z-index: 1; pointer-events: auto; cursor: pointer; }
        .smile-img { object-fit: contain; filter: drop-shadow(0 0 5px rgba(0,0,0,0.8)) drop-shadow(0 0 2px #000); }

        @keyframes floatUp {
            0% { transform: translateY(0) rotate(0deg); opacity: 0; }
            10% { opacity: 1; }
            100% { transform: translateY(-120vh) rotate(360deg); opacity: 0; }
        }

        .header { text-align: center; border-bottom: 2px solid #222; margin-bottom: 10px; padding-bottom: 5px; }
        #giorno-live { color: #ffff00; font-size: 12px; text-transform: uppercase; text-align: center; display: block; }
        .titolo { background: var(--rb); -webkit-background-clip: text; color: transparent; font-weight: 900; text-transform: uppercase; font-size: 11px; text-align: center; }
        
        .slot { background: #0a0a0a; border: 1px solid #222; border-radius: 25px; margin-bottom: 5px; padding: 4px; display: flex; align-items: center; gap: 6px; }
        .ora { color: #0ff; font-size: 9px; width: 35px; text-align: center; font-weight: bold; }
        .foto { width: 38px; height: 38px; border-radius: 50%; border: 2px solid #444; object-fit: cover; }
        
        .ruota-disco { animation: rotate-disco 2s linear infinite !important; border-color: #0f0 !important; box-shadow: 0 0 10px #0f0; }
        @keyframes rotate-disco { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        
        .nome { color: #ff00ff; font-size: 9px; text-transform: uppercase; font-weight: 900; flex-grow: 1; display: flex; align-items: center; }
        .led-verde { width: 8px; height: 8px; background-color: #0f0; border-radius: 50%; display: inline-block; margin-left: 5px; box-shadow: 0 0 8px #0f0; animation: blink 0.8s infinite; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }
        .testo-lama { background: var(--rb); -webkit-background-clip: text; color: transparent; font-weight: 900; text-transform: uppercase; font-size: 11px; text-align: center; padding: 15px 5px; display: block; }
    </style>
</head>
<body>

    <div class="box-sx">
        <div id="btn-anim" class="btn-custom">
            <div class="btn-text">EFFETTI XAT</div>
            <div class="btn-sub">CLICCA QUI</div>
        </div>
    </div>

    <div class="box-dx">
        <div id="btn-pali" class="btn-custom">
            <div class="btn-text">PALINSESTO DE IL CARTAIO</div>
            <div id="clicca-qui-text">CLICCA QUI</div>
        </div>

        <div id="locandina">
            <div class="header">
                <span id="giorno-live">---</span>
                <div class="titolo" id="titolo-locandina">DIRETTE RADIO LIVE</div>
            </div>
            <div id="lista-dj"></div>
        </div>
    </div>

<script>
    const smiles = [
        "https://raw.githubusercontent.com/eamxat/Images/refs/heads/main/a_(maniac)_80.webp",
        "https://xat.com/images/smoticons/u/crazypianist.png",
        "https://xat.com/images/smoticons/u/getlucky.png",
        "https://xat.com/images/smoticons/u/goldstar.png",
        "https://xat.com/images/smoticons/u/彈.png",
        "https://xat.com/images/smoticons/u/shades.png",
        "https://xat.com/images/smoticons/u/fame.png",
        "https://xat.com/images/smoticons/u/heart.png",
        "https://raw.githubusercontent.com/eamxat/Images/refs/heads/main/hi.webp"
    ];

    const heartColors = ["#ff0000", "#ff00ff", "#00ffff", "#ffff00", "#ff8800", "#00ff00"];
    let active = false;
    let interval;

    $('#btn-anim').click(function() {
        active = !active;
        if(active) {
            $(this).find('.btn-sub').text('EFFETTI: ON');
            interval = setInterval(function() {
                const rand = Math.random();
                const p = document.createElement('div');
                p.className = 'particle';
                if (rand < 0.5) {
                    const img = document.createElement('img');
                    img.src = smiles[Math.floor(Math.random() * smiles.length)];
                    img.className = 'smile-img'; img.width = 55;
                    p.appendChild(img);
                } else if (rand < 0.8) {
                    p.innerHTML = '❤';
                    p.style.color = heartColors[Math.floor(Math.random() * heartColors.length)];
                    p.style.fontSize = '40px';
                    p.style.filter = `drop-shadow(0 0 8px #000) drop-shadow(0 0 10px ${p.style.color})`;
                } else {
                    const b = document.createElement('div');
                    b.className = 'bubble-effect';
                    let s = Math.random()*25+25+'px';
                    b.style.width = s; b.style.height = s;
                    p.appendChild(b);
                }
                p.style.left = Math.random() * 90 + 'vw';
                p.style.animation = `floatUp ${Math.random()*3+4}s linear forwards`;
                document.body.appendChild(p);
                setTimeout(() => p.remove(), 7500);
            }, 400);
        } else {
            $(this).find('.btn-sub').text('CLICCA QUI');
            clearInterval(interval);
        }
    });

    $('#btn-pali').on('click', function() { $('#locandina').fadeToggle(); });

    const giorni = ["DOMENICA", "LUNEDÌ", "MARTEDÌ", "MERCOLEDÌ", "GIOVEDÌ", "VENERDÌ", "SABATO"];
    const img = [
        "https://xatimg.com/image/iQgCyJrXx59k.jpg", "https://xatimg.com/image/Pb7d1636URvg.jpg",
        "https://xatimg.com/image/iVWjQe7TNoGD.jpg", "https://xatimg.com/image/xownGDwnETzl.jpg",
        "https://xatimg.com/image/nwY3C0hFQkVZ.jpg", "https://xatimg.com/image/D5nl0rwtzO5q.jpg",
        "https://xatimg.com/image/ghXE2B3YgqbX.jpg", "https://xatimg.com/image/Ewyzp0L90szv.jpg",
        "https://xatimg.com/image/Uv2xKPe2ySt1.jpg", "https://xatimg.com/image/7gG8UEwtre1G.jpg"
    ];

    const databaseTurni = {
        "LUNEDÌ": [{h:18, n:"DJ CARLA", f:img[0]}, {h:19, n:"DJ SOFIA", f:img[1]}, {h:20, n:"DJ LUCIA", f:img[2]}, {h:21, n:"DJ GIULIA", f:img[3]}],
        "MARTEDÌ": [{h:17, n:"DJ MARCO", f:img[4]}, {h:18, n:"DJ ELENA", f:img[5]}, {h:19, n:"DJ NELLY", f:img[6]}, {h:20, n:"DJ SARA", f:img[7]}, {h:21, n:"DJ PAOLA", f:img[8]}],
        "MERCOLEDÌ": [{h:18, n:"DJ VALENTINA", f:img[9]}, {h:19, n:"DJ FABIO", f:img[0]}, {h:20, n:"DJ CHIARA", f:img[1]}, {h:21, n:"DJ MILENA", f:img[2]}],
        "GIOVEDÌ": [{h:17, n:"DJ MARTINA", f:img[3]}, {h:18, n:"DJ GIOVANNI", f:img[4]}, {h:19, n:"DJ FEDERICA", f:img[5]}, {h:20, n:"DJ ORCHIDEA", f:img[6]}, {h:21, n:"DJ BEATRICE", f:img[7]}],
        "VENERDÌ": [{h:18, n:"DJ CETTY", f:img[8]}, {h:19, n:"DJ ANNA", f:img[9]}, {h:20, n:"DJ PIERA", f:img[0]}, {h:21, n:"DJ SILVIA", f:img[1]}],
        "SABATO": [{h:17, n:"DJ CLAUDIA", f:img[2]}, {h:18, n:"DJ SIMONA", f:img[3]}, {h:19, n:"DJ STEFANY", f:img[4]}, {h:20, n:"DJ ROBERTO", f:img[5]}, {h:21, n:"DJ ALESSIA", f:img[6]}],
        "DOMENICA": "RIPOSO"
    };

    function aggiornaLive() {
        const d = new Date();
        const oggi = giorni[d.getDay()];
        let oraAttuale = d.getHours();
        $('#giorno-live').text(oggi);
        const container = $('#lista-dj').empty();
        const djsOggi = databaseTurni[oggi];
        const titoloLoc = $('#titolo-locandina');

        if (oggi === "DOMENICA") {
            titoloLoc.hide();
            container.append('<div class="testo-lama">BUONA DOMENICA DA<br>IL CARTAIO<br>DOMANI SI RIPARTE!</div>');
        } else {
            titoloLoc.show();
            if (Array.isArray(djsOggi)) {
                djsOggi.forEach((dj) => {
                    let èLive = (oraAttuale === dj.h);
                    let classeGira = èLive ? "ruota-disco" : "";
                    let statusLed = èLive ? '<span class="led-verde"></span>' : '';
                    container.append(`
                        <div class="slot">
                            <span class="ora">${dj.h}:00</span>
                            <img class="foto ${classeGira}" src="${dj.f}">
                            <div class="nome">${dj.n} ${statusLed}</div>
                        </div>`);
                });
            }
        }
    }
    setInterval(aggiornaLive, 10000);
    aggiornaLive();
</script>
</body>
</html>
