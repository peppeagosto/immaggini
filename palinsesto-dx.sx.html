<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <style>
        :root { --rb: linear-gradient(to right, #f00, #ff0, #0f0, #0ff, #f0f, #f00); }
        
        body { 
            background-color: #000; 
            margin: 0; font-family: 'Arial Black', sans-serif; 
            overflow: hidden; height: 100vh; display: flex;
            justify-content: space-between; align-items: flex-start;
            padding: 20px; pointer-events: none; box-sizing: border-box;
        }

        /* WRAPPER VISIBILI */
        .wrapper { 
            display: flex; flex-direction: column; gap: 10px; 
            pointer-events: auto; z-index: 100; 
            opacity: 1; /* Ora sono sempre visibili */
        }
        .wrapper-dx { align-items: flex-end; }

        .btn-toggle {
            width: 160px; height: 50px; background: #000; border: 2px solid #fff; border-radius: 8px;
            display: flex; align-items: center; justify-content: space-between; padding: 0 10px;
            cursor: pointer; box-shadow: 0 0 15px rgba(255,255,255,0.3);
            transition: transform 0.2s;
        }
        .btn-toggle:hover { transform: scale(1.05); border-color: #0ff; }

        .led { width: 12px; height: 12px; border-radius: 50%; border: 1px solid #fff; }
        .led-off { background: #f00; box-shadow: 0 0 10px #f00; }
        .led-on { background: #0f0; box-shadow: 0 0 10px #0f0; }

        .btn-label { 
            background: var(--rb); -webkit-background-clip: text; color: transparent; 
            font-size: 12px; font-weight: 900; text-transform: uppercase; 
        }

        #box-pali { 
            width: 230px; display: none; background: #000; border: 3px solid #333; 
            border-radius: 12px; padding: 12px; box-shadow: 0 0 50px #000; 
        }

        .slot { background: #050505; border: 1px solid #222; border-radius: 25px; margin-bottom: 5px; padding: 4px; display: flex; align-items: center; gap: 6px; }
        .ora { color: #0ff; font-size: 9px; width: 30px; text-align: center; font-weight: bold; }
        .foto { width: 35px; height: 35px; border-radius: 50%; border: 2px solid #444; object-fit: cover; }
        .nome { color: #ff00ff; font-size: 9px; text-transform: uppercase; font-weight: 900; }

        /* EFFETTI SPARSI */
        .particle { position: fixed; z-index: 1; pointer-events: none; text-align: center; }
        
        .floating-text {
            white-space: nowrap; font-size: 26px; font-weight: 900;
            background: var(--rb); -webkit-background-clip: text; color: transparent;
            text-transform: uppercase; filter: drop-shadow(0 0 10px rgba(255,255,255,0.8));
        }

        .symbol { font-size: 30px; filter: drop-shadow(0 0 8px currentColor); }
    </style>
</head>
<body>

    <div class="wrapper wrapper-sx">
        <div id="click-effetti" class="btn-toggle">
            <span class="btn-label">EFFETTI</span>
            <div id="led-effetti" class="led led-off"></div>
        </div>
    </div>

    <div class="wrapper wrapper-dx">
        <div id="click-pali" class="btn-toggle">
            <div id="led-pali" class="led led-off"></div>
            <span class="btn-label">PALINSESTO</span>
        </div>
        <div id="box-pali">
            <div style="text-align:center; margin-bottom:10px; border-bottom: 1px solid #222; padding-bottom: 5px;">
                <span style="background: var(--rb); -webkit-background-clip: text; color: transparent; font-size: 12px; font-weight: 900;">RADIO LIVE</span>
            </div>
            <div id="lista-dj"></div>
        </div>
    </div>

<script>
    let effettiAttivi = false;

    $('#click-effetti').click(function() {
        effettiAttivi = !effettiAttivi;
        $('#led-effetti').toggleClass('led-off led-on');
        if(!effettiAttivi) $('.particle').remove();
    });

    $('#click-pali').click(function() {
        $('#led-pali').toggleClass('led-off led-on');
        $('#box-pali').fadeToggle();
    });

    // LISTE ELEMENTI
    const smiles = ["clap", "hi", "hula", "hug", "mad", "cool", "confused", "redface", "tearhair", "hehe", "no"];
    const messaggi = ["LA MIA MUSICA", "IL CARTAIO"];
    const cuoriStelle = ["❤️", "🧡", "💛", "💚", "💙", "💜", "💖", "⭐", "🌟", "✨"];
    const coloriGlow = ["#ff0000", "#ff8800", "#ffff00", "#00ff00", "#00ffff", "#ff00ff"];

    function generaEffetto() {
        if (!effettiAttivi) return;
        const p = document.createElement('div');
        p.className = 'particle';
        
        const r = Math.random();

        if (r < 0.3) {
            // TESTO ARCOBALENO
            p.innerHTML = `<div class="floating-text">${messaggi[Math.floor(Math.random() * messaggi.length)]}</div>`;
        } else if (r < 0.7) {
            // CUORI E STELLE
            const simbolo = cuoriStelle[Math.floor(Math.random() * cuoriStelle.length)];
            const colore = coloriGlow[Math.floor(Math.random() * coloriGlow.length)];
            p.innerHTML = `<div class="symbol" style="color:${colore}">${simbolo}</div>`;
        } else {
            // SMILE XAT
            const smileName = smiles[Math.floor(Math.random() * smiles.length)];
            const img = document.createElement('img');
            img.src = `https://xat.com/images/smoticons/u/${smileName}.png`;
            img.width = 50;
            img.style.filter = "drop-shadow(0 0 10px #fff)";
            img.onerror = function() { this.parentElement.innerHTML = '✨'; };
            p.appendChild(img);
        }

        p.style.left = Math.random() * 90 + 'vw';
        p.style.top = Math.random() * 90 + 'vh';

        $(p).css('opacity', 0).animate({ opacity: 1, top: "-=6vh" }, 1500)
            .animate({ opacity: 0, top: "-=6vh" }, 1500, function() { $(this).remove(); });
        document.body.appendChild(p);
    }

    setInterval(generaEffetto, 600); // Più veloce per avere tanti colori

    // Palinsesto
    const djs = [
        {h:18, n:"DJ CARLA", f:"https://xatimg.com/image/iQgCyJrXx59k.jpg"},
        {h:19, n:"DJ SOFIA", f:"https://xatimg.com/image/Pb7d1636URvg.jpg"},
        {h:20, n:"DJ LUCIA", f:"https://xatimg.com/image/iVWjQe7TNoGD.jpg"}
    ];
    djs.forEach(dj => {
        $('#lista-dj').append(`<div class="slot"><span class="ora">${dj.h}:00</span><img class="foto" src="${dj.f}"><div class="nome">${dj.n}</div></div>`);
    });
</script>
</body>
</html>
