<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Player Pro - IL CARTAIO</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&display=swap" rel="stylesheet">

<style>
/* PROTEZIONE COPIA TESTO E SELEZIONE */
* {
  -webkit-user-select: none;
  -moz-user-select: none;
  -ms-user-select: none;
  user-select: none;
}

body, html {
  margin: 0;
  padding: 0;
  width: 700px !important;  
  height: 650px !important; 
  background: transparent !important;
  overflow: hidden;
  font-family: 'Orbitron', sans-serif;
}

.main-wrapper {
  width: 700px;
  height: 650px;
  position: relative;
  overflow: hidden;
  border: 1px solid rgba(255,0,0,0.2);
}

.ball {
  position: absolute;
  width: 75px;
  height: 75px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  text-align: center;
  font-size: 10px;
  font-weight: 900;
  color: white;
  cursor: pointer;
  box-shadow: 0 0 15px rgba(255,255,255,0.3);
  z-index: 999;
  text-transform: uppercase;
  border: 1px solid rgba(255,255,255,0.2);
}

.popup {
  position: absolute;
  background: transparent !important; 
  border: 2px solid #ff0000;
  border-radius: 12px;
  display: none; 
  box-shadow: 0 0 15px rgba(255, 0, 0, 0.4);
  z-index: 100;
  overflow: hidden;
}

.rainbow-text {
  background: linear-gradient(to right, #ff0000, #ffcc00, #00ff00, #00ffff, #ff00ff, #ff0000);
  background-size: 200% auto;
  color: transparent;
  -webkit-background-clip: text;
  background-clip: text;
  animation: rainbow-scroll 3s linear infinite;
  font-weight: 900;
  display: inline-block;
}

@keyframes rainbow-scroll {
  to { background-position: 200% center; }
}

#titleBox { top: 10px; left: 50%; transform: translateX(-50%); width: 450px; height: 35px; display: none; align-items: center; justify-content: center; }
.marquee-container { white-space: nowrap; overflow: hidden; width: 90%; }
#songTitle { font-size: 16px; animation: scroll-left 10s linear infinite; }
@keyframes scroll-left { 0% { transform: translateX(100%); } 100% { transform: translateX(-100%); } }
#dateBox { top: 60px; left: 10px; width: 190px; text-align: center; padding: 5px; }
#volumeBox { top: 190px; left: 10px; width: 140px; padding: 10px; text-align: center; }
#coverBox { top: 250px; left: 220px; width: 150px; height: 150px; border: none; }
#coverImg { width: 100%; height: 100%; object-fit: cover; border-radius: 10px; border: 2px solid #ff0000; }
#eqPopup { bottom: 10px; left: 50%; transform: translateX(-50%); width: 450px; height: 70px; }
#cliquiPopup { position: absolute; bottom: 80px; left: 10px; display: none; background: black; border: 2px solid #ff0000; }
</style>
</head>

<body oncontextmenu="return false;">

<div class="main-wrapper">
  <div id="ballContainer"></div>
  <div class="popup" id="titleBox"><div class="marquee-container"><div id="songTitle" class="rainbow-text">IL CARTAIO RADIO ---</div></div></div>
  <div class="popup" id="dateBox"><div id="cityInfo" class="rainbow-text" style="font-size:10px; display:block;">📍 CARICAMENTO...</div><div id="datetimeText" class="rainbow-text" style="font-size:14px; display:block;">--/--/-- --:--</div></div>
  <div class="popup" id="volumeBox"><span class="rainbow-text" style="font-size:10px;">VOLUME</span><br><input type="range" id="vol" min="0" max="1" step="0.01" value="0.7" style="width:90%; accent-color:red; cursor:pointer;"></div>
  <div class="popup" id="coverBox"><img id="coverImg" src="https://xatimg.com/image/oXrwdyo5esWu.jpg"></div>
  <div class="popup" id="eqPopup"><canvas id="canvas" width="450" height="70"></canvas></div>
  <div id="cliquiPopup" class="popup"><video id="vidAnnuncio" width="180" playsinline><source src="https://peppeagosto.github.io/immaggini/spiegazione.mp4" type="video/mp4"></video></div>
</div>

<audio id="mainAudio" crossorigin="anonymous"></audio>

<script>
// --- PROTEZIONE TASTIERA ---
document.onkeydown = function(e) {
  if (e.keyCode == 123 || (e.ctrlKey && e.shiftKey && (e.keyCode == 'I'.charCodeAt(0) || e.keyCode == 'J'.charCodeAt(0))) || (e.ctrlKey && e.keyCode == 'U'.charCodeAt(0)) || (e.ctrlKey && e.keyCode == 'C'.charCodeAt(0))) {
    return false;
  }
};

const STREAM = "https://stream.zeno.fm/ylkruiq5e4fvv";
const DEFAULT_COVER = "https://xatimg.com/image/oXrwdyo5esWu.jpg";
const audio = document.getElementById("mainAudio");
audio.src = STREAM;

const ballsData = [
  {id: 'play', t: 'Play/Stop', c: '#ffd700'},
  {id: 'title', t: 'Titoli', c: '#00f0ff'},
  {id: 'date', t: 'Datario', c: '#aa00ff'},
  {id: 'volume', t: 'Volume', c: '#ff9900'},
  {id: 'cover', t: 'Cover', c: '#33ff99'},
  {id: 'eq', t: 'EQ', c: '#9933ff'},
  {id: 'cliqui', t: 'Annuncio', c: '#ff0000'},
  {id: 'fb', t: 'FB', c: '#3b5998', url: 'https://facebook.com'}
];

const container = document.getElementById('ballContainer');
const FIXED_W = 700;
const FIXED_H = 650;

ballsData.forEach((d, i) => {
  const b = document.createElement('div');
  b.className = 'ball';
  b.style.backgroundColor = d.c;
  b.innerHTML = d.t;
  const lane = FIXED_W / ballsData.length;
  b.style.left = (i * lane + (lane/2) - 37) + 'px'; 
  let y = Math.random() * (FIXED_H - 150) + 50;
  let speed = 0.7; 
  let dir = i % 2 === 0 ? 1 : -1;
  function move() {
    y += speed * dir;
    if (y < 20 || y > (FIXED_H - 95)) dir *= -1;
    b.style.top = y + 'px';
    requestAnimationFrame(move);
  }
  move();
  b.onclick = () => handleAction(d.id, d.url);
  container.appendChild(b);
});

function handleAction(id, url) {
  if (id === 'play') audio.paused ? (audio.play(), initEQ()) : audio.pause();
  if (id === 'title') toggle('titleBox', 'flex');
  if (id === 'date') toggle('dateBox', 'block');
  if (id === 'volume') toggle('volumeBox', 'block');
  if (id === 'cover') toggle('coverBox', 'block');
  if (id === 'eq') toggle('eqPopup', 'block');
  if (id === 'fb') window.open(url, '_blank');
  if (id === 'cliqui') {
    const vPop = document.getElementById('cliquiPopup');
    const vid = document.getElementById('vidAnnuncio');
    vPop.style.display = 'block'; vid.play();
    setTimeout(() => { vPop.style.display = 'none'; vid.pause(); vid.currentTime = 0; }, 18000);
  }
}

function toggle(id, type) {
  const el = document.getElementById(id);
  el.style.display = (window.getComputedStyle(el).display === 'none') ? type : 'none';
}

fetch("https://ipapi.co/json/").then(r=>r.json()).then(d=>{
  document.getElementById("cityInfo").textContent = `📍 ${d.city || "Sconosciuta"}`;
});

setInterval(() => {
  const now = new Date();
  document.getElementById('datetimeText').textContent = now.toLocaleDateString('it-IT') + " " + now.toLocaleTimeString('it-IT');
}, 1000);

document.getElementById('vol').oninput = (e) => audio.volume = e.target.value;

let context, analyser, src, canvas, ctx, dataArray;
function initEQ() {
  if (context) return;
  context = new (window.AudioContext || window.webkitAudioContext)();
  analyser = context.createAnalyser();
  src = context.createMediaElementSource(audio);
  src.connect(analyser);
  analyser.connect(context.destination);
  analyser.fftSize = 64;
  dataArray = new Uint8Array(analyser.frequencyBinCount);
  canvas = document.getElementById('canvas');
  ctx = canvas.getContext('2d');
  renderFrame();
}

function renderFrame() {
  requestAnimationFrame(renderFrame);
  if (document.getElementById('eqPopup').style.display !== 'block') return;
  analyser.getByteFrequencyData(dataArray);
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  dataArray.forEach((v, i) => {
    ctx.fillStyle = `hsl(${i * 15}, 100%, 50%)`;
    ctx.fillRect(i * 14, canvas.height, 10, -(v / 255) * canvas.height);
  });
}

async function nowPlaying(){
  try {
    const r = await fetch("https://zenoplay.zenomedia.com/api/zenofm/nowplaying/ylkruiq5e4fvv");
    const d = await r.json();
    const songName = d.title || "Radio Live";
    document.getElementById('songTitle').innerText = songName.toUpperCase() + " --- IL CARTAIO RADIO --- ";
    const it = await fetch(`https://itunes.apple.com/search?term=${encodeURIComponent(songName)}&limit=1`);
    const j = await it.json();
    document.getElementById('coverImg').src = (j.results && j.results[0]) ? j.results[0].artworkUrl100.replace("100x100","600x600") : DEFAULT_COVER;
  } catch(e) {
    document.getElementById('coverImg').src = DEFAULT_COVER;
  }
}
setInterval(nowPlaying, 18000); nowPlaying();
</script>
</body>
</html>
