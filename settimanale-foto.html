<html lang="it">
<head>
  <meta charset="UTF-8">
  <title>IL CARTAIO - OFFICIAL</title>
  <link href="https://fonts.googleapis.com/css2?family=Nosifer&display=swap" rel="stylesheet">
  <style>
    body {
      margin: 0;
      background: transparent;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      overflow: hidden;
    }

    .container {
      position: relative;
      width: 1308px;
      height: 484px;
    }

    .wrapper, .center-area {
      position: absolute;
      overflow: hidden;
      border-radius: 22px;
    }

    /* --- PANNELLO SINISTRO --- */
    .left {
      left: 70px;
      width: 270px;
      height: 484px;
      z-index: 1;
      background: radial-gradient(circle, #e0e0e0 0%, #b8b8b8 100%);
      backdrop-filter: blur(8px);
      box-shadow: inset 0 0 30px rgba(0,0,0,0.1);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      border: 1px solid rgba(0,0,0,0.05);
    }

    /* ANIMAZIONE BATTITO CARDIACO */
    @keyframes heart-beat {
      0% { transform: scale(1); }
      14% { transform: scale(1.1); }
      28% { transform: scale(1); }
      42% { transform: scale(1.15); }
      70% { transform: scale(1); }
    }

    /* NUOVO TESTO SOPRA IN BLUNOTTE PULSANTE */
    .testo-sopra-nuovo {
      color: #191970; /* BluNotte */
      font-family: 'Arial', sans-serif;
      font-weight: 900;
      font-size: 24px;
      margin-bottom: 120px; /* Spazio dal datario */
      text-transform: uppercase;
      letter-spacing: 3px;
      animation: heart-beat 1.5s infinite ease-in-out;
    }

    /* BOX DATARIO BLUNOTTE */
    .datario-box {
      text-align: center;
      color: #191970; /* BluNotte */
      font-family: 'Arial', sans-serif;
      font-weight: 900;
      text-transform: uppercase;
      animation: heart-beat 1.5s infinite ease-in-out;
    }
    #giorno-nome { font-size: 32px; margin-bottom: 5px; }
    #data-numerica { font-size: 24px; letter-spacing: 2px; }

    /* --- PANNELLO DESTRO --- */
    .right {
      right: 70px;
      width: 270px;
      height: 484px;
      z-index: 1;
      background: linear-gradient(145deg, #444, #111); 
      box-shadow: 
        0 0 35px rgba(150, 150, 150, 0.6), 
        inset 0 0 50px rgba(200, 200, 200, 0.3);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      border: 1px solid rgba(255,255,255,0.1);
    }

    /* --- CENTRO PULITO --- */
    .center-area {
      width: 410px;
      height: 550px;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      z-index: 0;
      background: transparent;
    }

    /* IMMAGINE DESTRA */
    .side-img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      opacity: 0.8;
    }

    /* ETICHETTE NOSIFER */
    .label-text {
      position: absolute;
      bottom: 25px;
      font-family: 'Nosifer', cursive;
      font-size: 22px;
      z-index: 5;
    }
    
    .left .label-text { 
      color: #191970; /* BluNotte */
      animation: heart-beat 1.5s infinite ease-in-out; 
    }
    .right .label-text { 
      color: #ffffff; 
      text-shadow: 0 0 15px rgba(255,255,255,0.8); 
    }
  </style>
</head>
<body>

<div class="container">
  
  <div class="wrapper left">
    <div class="testo-sopra-nuovo">BluNotte</div>
    
    <div class="datario-box">
      <div id="giorno-nome"></div>
      <div id="data-numerica"></div>
    </div>
    <div class="label-text">Sogno</div>
  </div>

  <div class="center-area"></div>

  <div class="wrapper right">
    <img id="img-settimanale" src="" class="side-img">
    <div class="label-text">Sogno</div>
  </div>

</div>

<script>
  function aggiornaTutto() {
    const oraLocale = new Date();
    
    // Logica cambio ore 07:00
    const dataRiferimento = new Date(oraLocale.getTime() - (7 * 60 * 60 * 1000));
    const giornoSettimana = dataRiferimento.getDay(); 

    // Aggiorna Datario (Sinistra)
    const optionsGiorno = { weekday: 'long' };
    const optionsData = { day: '2-digit', month: '2-digit', year: 'numeric' };
    
    document.getElementById('giorno-nome').innerText = oraLocale.toLocaleDateString('it-IT', optionsGiorno);
    document.getElementById('data-numerica').innerText = oraLocale.toLocaleDateString('it-IT', optionsData);

    // Aggiorna Foto (Destra)
    const elencoFoto = [
      "https://xatimg.com/image/tuy9wPMwNvwV.jpg", // Domenica
      "https://xatimg.com/image/tuy9wPMwNvwV.jpg", // Lunedì
      "https://xatimg.com/image/tuy9wPMwNvwV.jpg", // Martedì
      "https://xatimg.com/image/tuy9wPMwNvwV.jpg", // Mercoledì
      "https://xatimg.com/image/tuy9wPMwNvwV.jpg", // Giovedì
      "https://xatimg.com/image/tuy9wPMwNvwV.jpg", // Venerdì
      "https://xatimg.com/image/tuy9wPMwNvwV.jpg"  // Sabato
    ];

    document.getElementById('img-settimanale').src = elencoFoto[giornoSettimana];
  }

  // Esecuzione
  aggiornaTutto();
  setInterval(aggiornaTutto, 60000); 
</script>

</body>
</html>
