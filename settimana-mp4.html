
<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>XAT Video Mood - Toggle ON/OFF</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body, html { 
            height: 100%; 
            width: 100%; 
            overflow: hidden; 
            background-color: #000; 
            font-family: 'Segoe UI', Arial, sans-serif;
        }

        #bg-frame {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
            z-index: 1;
        }

        /* BOX DATARIO - ALTO A SINISTRA */
        #info-sidebar {
            position: absolute;
            z-index: 10;
            top: 20px; 
            left: 20px; 
            background: rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(5px);
            padding: 15px 25px;
            border-left: 3px solid #00ffcc;
            border-radius: 8px; 
            color: #fff;
            transition: opacity 0.5s ease;
            opacity: 1;
        }

        /* ZONA DI COMANDO A DESTRA */
        #command-zone {
            position: absolute;
            z-index: 20;
            top: 0;
            right: 0;
            width: 150px;
            height: 100px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* TASTO DINAMICO ON/OFF */
        #toggle-button {
            padding: 10px 25px;
            background: rgba(0, 0, 0, 0.6);
            border: 1px solid #00ffcc;
            color: #00ffcc;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.3s ease;
            /* Invisibile di base, appare solo al passaggio del mouse nella zona */
            opacity: 0;
        }

        /* Mostra il tasto quando il mouse entra nella zona destra */
        #command-zone:hover #toggle-button {
            opacity: 1;
        }

        #clock {
            font-size: 35px;
            font-weight: 900;
            color: #00ffcc;
            display: block;
            text-shadow: 0 0 10px rgba(0, 255, 204, 0.4);
        }

        #date-box {
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
            animation: blinkingText 2.5s infinite ease-in-out;
        }

        @keyframes blinkingText {
            0% { opacity: 1; text-shadow: 0 0 5px #00ffcc; }
            50% { opacity: 0.4; text-shadow: none; }
            100% { opacity: 1; text-shadow: 0 0 5px #00ffcc; }
        }

        .day-highlight {
            font-weight: bold;
            display: block;
            color: #00ffcc;
            font-size: 14px;
        }
    </style>
</head>
<body>

    <iframe id="bg-frame" src="about:blank"></iframe>

    <div id="command-zone">
        <button id="toggle-button" onclick="toggleDatario()">OFF</button>
    </div>

    <div id="info-sidebar">
        <span id="clock">00:00</span>
        <div id="date-box">
            <div id="full-date">DATA</div>
            <div id="day-name" class="day-highlight">GIORNO</div>
        </div>
    </div>

    <script>
        const palinsesto = {
            0: "https://peppeagosto.github.io/immaggini/sorriso2.html", 
            1: "https://peppeagosto.github.io/immaggini/fiori.html", 
            2: "https://peppeagosto.github.io/immaggini/acqua.html",
            3: "https://peppeagosto.github.io/immaggini/genny.html",
            4: "https://peppeagosto.github.io/immaggini/chitarra.html",
            5: "https://peppeagosto.github.io/immaggini/ali.html",
            6: "https://peppeagosto.github.io/immaggini/faretti2025.html"
        };

        let datarioVisibile = true;

        function toggleDatario() {
            const sidebar = document.getElementById('info-sidebar');
            const btn = document.getElementById('toggle-button');

            if (datarioVisibile) {
                // SPEGNI
                sidebar.style.opacity = '0';
                btn.innerText = 'ON';
                btn.style.borderColor = '#ff4d4d';
                btn.style.color = '#ff4d4d';
                datarioVisibile = false;
            } else {
                // ACCENDI
                sidebar.style.opacity = '1';
                btn.innerText = 'OFF';
                btn.style.borderColor = '#00ffcc';
                btn.style.color = '#00ffcc';
                datarioVisibile = true;
            }
        }

        function updateUI() {
            const ora = new Date();
            const h = ora.getHours();
            const m = String(ora.getMinutes()).padStart(2, '0');
            let giorno = ora.getDay();

            if (h < 7) {
                giorno = (giorno === 0) ? 6 : giorno - 1;
            }

            const frame = document.getElementById('bg-frame');
            if (frame.src !== palinsesto[giorno]) {
                frame.src = palinsesto[giorno];
            }

            document.getElementById('clock').innerText = `${String(h).padStart(2, '0')}:${m}`;
            document.getElementById('full-date').innerText = ora.toLocaleDateString('it-IT', { day: 'numeric', month: 'long', year: 'numeric' });
            document.getElementById('day-name').innerText = ora.toLocaleDateString('it-IT', { weekday: 'long' });
        }

        updateUI();
        setInterval(updateUI, 30000);
    </script>
</body>
</html>
