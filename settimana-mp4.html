<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>XAT Video Mood - Hover Mode</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body, html { 
            height: 100%; 
            width: 100%; 
            overflow: hidden; 
            background-color: #000; 
            font-family: 'Segoe UI', Arial, sans-serif;
        }

        #bg-frame {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
            z-index: 1;
        }

        /* SIDEBAR: Di base è invisibile (opacity: 0) */
        #info-sidebar {
            position: absolute;
            z-index: 10;
            top: 35%; 
            left: 40px; 
            transform: translateY(-50%);
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(10px);
            padding: 20px;
            border-left: 5px solid #00ffcc;
            border-radius: 15px; 
            color: #fff;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            
            /* EFFETTO INVISIBILE */
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.5s ease, visibility 0.5s ease;
            pointer-events: none; /* Non blocca i click quando è invisibile */
        }

        /* MOSTRA SOLO AL PASSAGGIO DEL MOUSE */
        /* Ho aggiunto un contenitore invisibile per facilitare l'hover */
        #hover-trigger:hover #info-sidebar {
            opacity: 1;
            visibility: visible;
        }

        /* AREA DI ATTIVAZIONE: Una zona invisibile sul lato sinistro */
        #hover-trigger {
            position: absolute;
            top: 0;
            left: 0;
            width: 300px; /* Larghezza dell'area sensibile */
            height: 100%;
            z-index: 20;
        }

        #clock {
            font-size: 40px;
            font-weight: bold;
            color: #00ffcc;
            display: block;
            margin-bottom: 5px;
            text-shadow: 0 0 10px rgba(0, 255, 204, 0.5);
        }

        #date-box {
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .day-highlight {
            font-weight: bold;
            display: block;
            margin-top: 2px;
            color: #00ffcc;
        }
    </style>
</head>
<body>

    <iframe id="bg-frame" src="about:blank"></iframe>

    <div id="hover-trigger">
        <div id="info-sidebar">
            <span id="clock">00:00</span>
            <div id="date-box">
                <div id="full-date">DATA</div>
                <div id="day-name" class="day-highlight">GIORNO</div>
            </div>
        </div>
    </div>

    <script>
        const palinsesto = {
            0: "https://peppeagosto.github.io/immaggini/sorriso2.html", 
            1: "https://peppeagosto.github.io/immaggini/fiori.html", 
            2: "https://peppeagosto.github.io/immaggini/acqua.html",
            3: "https://peppeagosto.github.io/immaggini/genny.html",
            4: "https://peppeagosto.github.io/immaggini/chitarra.html",
            5: "https://peppeagosto.github.io/immaggini/ali.html",
            6: "https://peppeagosto.github.io/immaggini/faretti2025.html"
        };

        function updateUI() {
            const ora = new Date();
            const h = ora.getHours();
            const m = String(ora.getMinutes()).padStart(2, '0');
            let giorno = ora.getDay();

            // Logica cambio palinsesto alle ore 07:00
            if (h < 7) {
                giorno = (giorno === 0) ? 6 : giorno - 1;
            }

            const frame = document.getElementById('bg-frame');
            if (frame.src !== palinsesto[giorno]) {
                frame.src = palinsesto[giorno];
            }

            document.getElementById('clock').innerText = `${String(h).padStart(2, '0')}:${m}`;
            document.getElementById('full-date').innerText = ora.toLocaleDateString('it-IT', { day: 'numeric', month: 'long', year: 'numeric' });
            document.getElementById('day-name').innerText = ora.toLocaleDateString('it-IT', { weekday: 'long' });
        }

        updateUI();
        setInterval(updateUI, 30000);
    </script>
</body>
</html>
