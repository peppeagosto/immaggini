<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>XAT Video Mood - 7 Days</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body, html {
            height: 100%;
            width: 100%;
            overflow: hidden;
            background-color: #000;
            font-family: 'Segoe UI', Arial, sans-serif;
        }

        /* Sfondo: l'iframe che carica il video del giorno */
        #bg-frame {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
            z-index: 1;
        }

        /* Box info: piccolo e invisibile, appare al passaggio del mouse */
        #info-sidebar {
            position: absolute;
            z-index: 10;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(8px);
            padding: 15px;
            margin-left: 20px;
            border-left: 4px solid #00ffcc;
            border-radius: 0 10px 10px 0;
            color: #fff;
            opacity: 0; /* Invisibile */
            transition: opacity 0.4s ease-in-out;
            pointer-events: none;
        }

        /* Mostra il datario al passaggio del mouse ovunque sulla pagina */
        body:hover #info-sidebar {
            opacity: 1;
        }

        #clock {
            font-size: 35px; /* Più piccolo */
            font-weight: 900;
            display: block;
            line-height: 1;
            margin-bottom: 5px;
        }

        #date-box {
            font-size: 12px; /* Molto piccolo e pulito */
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .day-highlight {
            color: #00ffcc;
            font-weight: bold;
            display: block;
            font-size: 14px;
            margin-top: 2px;
        }
    </style>
</head>
<body>

    <iframe id="bg-frame" src=""></iframe>

    <div id="info-sidebar">
        <span id="clock">00:00</span>
        <div id="date-box">
            <span id="full-date">DATA</span>
            <span id="day-name" class="day-highlight">GIORNO</span>
        </div>
    </div>

    <script>
        // Inserisci qui i link per ogni giorno della settimana
        // Puoi usare link .html come quello che mi hai dato o link diretti .mp4
        const palinsestoVideo = {
            0: "https://peppeagosto.github.io/immaggini/sorriso2.html", 
            1: "https://peppeagosto.github.io/immaggini/fiori.html", 
            2: "https://peppeagosto.github.io/immaggini/acqua.html",
            3: "https://peppeagosto.github.io/immaggini/genny.html",
            4: "https://peppeagosto.github.io/immaggini/chitarra.html",
            5: "https://peppeagosto.github.io/immaggini/ali.html",
            6: "https://peppeagosto.github.io/immaggini/faretti2025.html"
        };

        function updateContent() {
            const oraAttuale = new Date();
            const h = oraAttuale.getHours();
            const m = String(oraAttuale.getMinutes()).padStart(2, '0');
            
            // Logica cambio alle 07:00 del mattino
            let giornoIndice = oraAttuale.getDay();
            if (h < 7) {
                giornoIndice = (giornoIndice === 0) ? 6 : giornoIndice - 1;
            }

            // Aggiorna il link del frame solo se necessario
            const frame = document.getElementById('bg-frame');
            const linkDelGiorno = palinsestoVideo[giornoIndice];
            
            if (frame.src !== linkDelGiorno) {
                frame.src = linkDelGiorno;
            }

            // Aggiorna Orologio e Datario
            document.getElementById('clock').innerText = `${String(h).padStart(2, '0')}:${m}`;
            const opzioniData = { day: 'numeric', month: 'long', year: 'numeric' };
            const opzioniGiorno = { weekday: 'long' };
            
            document.getElementById('full-date').innerText = oraAttuale.toLocaleDateString('it-IT', opzioniData);
            document.getElementById('day-name').innerText = oraAttuale.toLocaleDateString('it-IT', opzioniGiorno);
        }

        // Controllo ogni 30 secondi per essere precisi con l'orario
        setInterval(updateContent, 30000);
        updateContent();
    </script>
</body>
</html>
