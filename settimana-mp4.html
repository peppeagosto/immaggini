<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>XAT Video Mood - Split UI</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body, html { 
            height: 100%; 
            width: 100%; 
            overflow: hidden; 
            background-color: #000; 
            font-family: 'Segoe UI', Arial, sans-serif;
        }

        #bg-frame {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
            z-index: 1;
        }

        /* DATARIO A DESTRA */
        #info-sidebar {
            position: absolute;
            z-index: 10;
            top: 120px; 
            right: 20px;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(8px);
            padding: 15px 25px;
            border-radius: 12px; 
            color: #fff;
            text-align: right;
            transition: opacity 0.5s ease;
            opacity: 1;
            border: 3px solid transparent;
            background-image: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)), 
                              linear-gradient(45deg, #ff0000, #ff7f00, #ffff00, #00ff00, #0000ff, #4b0082, #8f00ff);
            background-origin: border-box;
            background-clip: padding-box, border-box;
            background-size: 200% 200%;
            animation: rainbowBorder 4s linear infinite;
        }

        /* AREA PULSANTE A SINISTRA */
        #command-zone-left {
            position: absolute;
            z-index: 20;
            top: 120px; /* Stessa altezza del datario */
            left: 20px;
            padding: 10px;
        }

        #toggle-button {
            padding: 10px 25px;
            background: rgba(0, 0, 0, 0.8);
            border: 2px solid #00ffcc;
            color: #00ffcc;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            font-size: 14px;
            text-transform: uppercase;
            transition: opacity 0.3s ease;
            opacity: 0; /* Invisibile di default */
        }

        /* MOSTRA IL TASTO QUANDO PASSI IL MOUSE SULLA ZONA SINISTRA */
        #command-zone-left:hover #toggle-button {
            opacity: 1;
        }

        @keyframes rainbowBorder {
            0% { background-position: 0% 50%, 0% 50%; }
            50% { background-position: 0% 50%, 100% 50%; }
            100% { background-position: 0% 50%, 0% 50%; }
        }

        #clock {
            font-size: 35px;
            font-weight: 900;
            display: block;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.2);
        }

        #date-box {
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .day-highlight {
            font-weight: bold;
            display: block;
            color: #00ffcc;
            font-size: 14px;
            margin-top: 5px;
        }
    </style>
</head>
<body>

    <iframe id="bg-frame" src="about:blank"></iframe>

    <div id="command-zone-left">
        <button id="toggle-button" onclick="toggleDatario()">OFF</button>
    </div>

    <div id="info-sidebar">
        <span id="clock">00:00</span>
        <div id="date-box">
            <div id="full-date">DATA</div>
            <div id="day-name" class="day-highlight">GIORNO</div>
        </div>
    </div>

    <script>
        const palinsesto = {
            0: "https://peppeagosto.github.io/immaggini/sorriso2.html", 
            1: "https://peppeagosto.github.io/immaggini/fiori.html", 
            2: "https://peppeagosto.github.io/immaggini/acqua.html",
            3: "https://peppeagosto.github.io/immaggini/genny.html",
            4: "https://peppeagosto.github.io/immaggini/chitarra.html",
            5: "https://peppeagosto.github.io/immaggini/ali.html",
            6: "https://peppeagosto.github.io/immaggini/faretti2025.html"
        };

        let datarioVisibile = true;

        function toggleDatario() {
            const sidebar = document.getElementById('info-sidebar');
            const btn = document.getElementById('toggle-button');

            if (datarioVisibile) {
                sidebar.style.opacity = '0';
                btn.innerText = 'ON';
                btn.style.borderColor = '#ff4d4d';
                btn.style.color = '#ff4d4d';
                datarioVisibile = false;
            } else {
                sidebar.style.opacity = '1';
                btn.innerText = 'OFF';
                btn.style.borderColor = '#00ffcc';
                btn.style.color = '#00ffcc';
                datarioVisibile = true;
            }
        }

        function updateUI() {
            const ora = new Date();
            const h = ora.getHours();
            const m = String(ora.getMinutes()).padStart(2, '0');
            let giorno = ora.getDay();

            if (h < 7) {
                giorno = (giorno === 0) ? 6 : giorno - 1;
            }

            const frame = document.getElementById('bg-frame');
            if (frame.src !== palinsesto[giorno]) {
                frame.src = palinsesto[giorno];
            }

            document.getElementById('clock').innerText = `${String(h).padStart(2, '0')}:${m}`;
            document.getElementById('full-date').innerText = ora.toLocaleDateString('it-IT', { day: 'numeric', month: 'long', year: 'numeric' });
            document.getElementById('day-name').innerText = ora.toLocaleDateString('it-IT', { weekday: 'long' });
        }

        updateUI();
        setInterval(updateUI, 30000);
    </script>
</body>
</html>
