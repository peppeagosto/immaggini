<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>cerchetti rotondi </title>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght=700&display=swap');
        
        body {
            background-color: transparent;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            overflow: hidden; 
        }

        /* RETTANGOLO PRINCIPALE SU MISURA XAT (700x650) */
        .main-layout-xat { 
            width: 700px;
            height: 650px; 
            background-color: #111111; 
            background-size: cover;
            background-position: center;
            border-radius: 25px; 
            position: relative; 
            overflow: hidden; 
            font-family: 'Orbitron', sans-serif; 
            border: 3px solid #00e5ff;
            box-shadow: 0 0 30px rgba(0, 229, 255, 0.4);
            z-index: 10;
            transition: background 0.5s ease, background-color 0.5s ease;
        }

        /* --- FILA SUPERIORE: 10 CAMBIA-SFONDO IN UNICA FILA PERFETTA --- */
        .bg-changer-row { 
            position: absolute; 
            top: 20px; 
            left: 50%; 
            transform: translateX(-50%);
            display: flex; 
            gap: 10px; 
            z-index: 99999 !important; 
            pointer-events: auto !important; 
        }

        .bg-circle {
            width: 34px; 
            height: 34px; 
            border-radius: 50%; 
            cursor: pointer; 
            box-sizing: border-box; 
            border: 2px solid #ffffff;
            transition: transform 0.2s, box-shadow 0.2s; 
            display: flex; 
            align-items: center; 
            justify-content: center;
            font-size: 10px; 
            font-weight: bold; 
            color: #fff; 
            text-shadow: 1px 1px 2px #000;
        }
        .bg-circle:hover { transform: scale(1.15); box-shadow: 0 0 10px #ffffff !important; }

        /* --- FILA SOTTO: FUNZIONI DIVISE A DESTRA E SINISTRA --- */
        .func-changer-left { position: absolute; top: 75px; left: 30px; display: flex; gap: 12px; z-index: 99999 !important; pointer-events: auto !important; }
        .func-changer-right { position: absolute; top: 75px; right: 30px; display: flex; gap: 12px; z-index: 99999 !important; pointer-events: auto !important; }

        .hover-circle {
            width: 58px; 
            height: 58px; 
            border-radius: 50%; 
            background: #050b0e; 
            cursor: pointer; 
            box-sizing: border-box;
            transition: transform 0.2s, filter 0.2s; 
            display: flex; 
            align-items: center; 
            justify-content: center;
        }
        .hover-circle:hover { transform: scale(1.1); filter: brightness(1.3); }

        .circle-label { 
            font-size: 8.5px; 
            font-weight: bold; 
            text-align: center; 
            display: block;
            line-height: 54px; 
            pointer-events: none; 
            width: 100%; 
            height: 100%;
        }

        /* COLORI BORDI NEON */
        .border-titles { border: 2.5px solid #ff00ff; box-shadow: 0 0 8px #ff00ff; color: #ff00ff; }
        .border-weather { border: 2.5px solid #ffaa00; box-shadow: 0 0 8px #ffaa00; color: #ffaa00; }
        .border-horoscope { border: 2.5px solid #aa00ff; box-shadow: 0 0 8px #aa00ff; color: #aa00ff; }
        .border-cover { border: 2.5px solid #00ff00; box-shadow: 0 0 8px #00ff00; color: #00ff00; }
        .border-listeners { border: 2.5px solid #ff3333; box-shadow: 0 0 8px #ff3333; color: #ff3333; }
        .border-city { border: 2.5px solid #00e5ff; box-shadow: 0 0 8px #00e5ff; color: #00e5ff; }

        /* --- CONTENITORI DISPLAY CENTRALI --- */
        .center-display-box {
            position: absolute; 
            top: 56%; 
            left: 50%; 
            transform: translate(-50%, -50%);
            width: 420px; 
            text-align: center; 
            z-index: 50; 
            display: none; 
            pointer-events: none;
        }

        /* COPERTINA NEON CENTRALE */
        .large-art-box {
            width: 200px; 
            height: 200px; 
            border-radius: 50%; 
            margin: 0 auto 15px auto; 
            position: relative; 
            padding: 7px; 
            box-sizing: border-box;
            box-shadow: 0 0 25px rgba(0, 229, 255, 0.6); 
            overflow: hidden; 
            display: flex; 
            justify-content: center; 
            align-items: center;
            will-change: transform, box-shadow; 
            transition: transform 0.1s ease-out, box-shadow 0.1s ease-out;
        }
        .large-art-box::before {
            content: ''; position: absolute; width: 150%; height: 150%;
            background: conic-gradient(from 0deg, transparent 50%, #00ffff 80%, #ff00ff 100%);
            animation: snake-spin 3s linear infinite; z-index: 0;
        }
        .large-art-box img { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; position: relative; z-index: 1; }
        @keyframes snake-spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* HEADER E TESTO RAINBOW */
        .display-header { 
            font-size: 15px; 
            color: #00e5ff; 
            letter-spacing: 3px; 
            text-shadow: 0px 3px 6px #000, 0px -1px 2px #000; 
            margin-bottom: 10px; 
            font-weight: bold;
        }
        
        .display-marquee { width: 100%; padding: 5px 0; }
        
        .rbow-text { 
            font-size: 24px; 
            font-weight: 900; 
            text-transform: uppercase;
            background: linear-gradient(to right, #00ffff, #ff00ff, #00ff00, #ffff00, #00ffff); 
            -webkit-background-clip: text; 
            color: transparent; 
            animation: rainbow-shift 3s linear infinite; 
            background-size: 200% auto; 
            display: inline-block;
            filter: drop-shadow(0px 3px 4px rgba(0,0,0,1)); 
        }
        @keyframes rainbow-shift { to { background-position: 200% center; } }

        /* CONTROLLI PANEL BOTTOM */
        .controls-panel-bottom {
            position: absolute; 
            bottom: 35px; 
            left: 50%; 
            transform: translateX(-50%);
            display: flex; 
            align-items: center; 
            justify-content: center; 
            gap: 25px;
            background: rgba(5, 12, 18, 0.95); 
            padding: 10px 32px; 
            border-radius: 30px;
            z-index: 1000; 
            border: 1px solid rgba(0,229,255,0.4); 
            backdrop-filter: blur(5px); 
            box-shadow: 0 6px 20px rgba(0,0,0,0.7);
        }
        
        .player-btn {
            background: rgba(0, 229, 255, 0.05); 
            border: 1px solid #00e5ff; 
            color: #00e5ff; 
            font-family: 'Orbitron', sans-serif; 
            font-size: 12px;
            font-weight: bold; 
            padding: 7px 20px; 
            border-radius: 8px; 
            cursor: pointer; 
            transition: all 0.3s;
        }
        .player-btn:hover, .btn-active { background-color: #00e5ff; color: #000; box-shadow: 0 0 12px #00e5ff; }
        
        .volume-box { display: flex; align-items: center; gap: 8px; }
        .vol-txt { font-size: 11px; color: #00e5ff; font-weight: bold; }
        #volume-slider { -webkit-appearance: none; width: 95px; height: 5px; background: #162229; border-radius: 3px; outline: none; cursor: pointer; }
        #volume-slider::-webkit-slider-thumb { -webkit-appearance: none; width: 13px; height: 13px; border-radius: 50%; background: #00e5ff; cursor: pointer; }
    </style>
</head>
<body>

<div id="layout-principale" class="main-layout-xat">

    <!-- CAMBIA-SFONDO SUPERIORI -->
    <div class="bg-changer-row">
        <div class="bg-circle" style="background-color: #ff00ff; box-shadow: 0 0 6px #ff00ff;" onclick="cambiaSfondo('#ff00ff', '')">1</div>
        <div class="bg-circle" style="background-color: #00e5ff; box-shadow: 0 0 6px #00e5ff;" onclick="cambiaSfondo('#00e5ff', '')">2</div>
        <div class="bg-circle" style="background-color: #00ff00; box-shadow: 0 0 6px #00ff00;" onclick="cambiaSfondo('#00ff00', '')">3</div>
        <div class="bg-circle" style="background-color: #ff3333; box-shadow: 0 0 6px #ff3333;" onclick="cambiaSfondo('#ff3333', '')">4</div>
        <div class="bg-circle" style="background-color: #ffaa00; box-shadow: 0 0 6px #ffaa00;" onclick="cambiaSfondo('#ffaa00', '')">5</div>
        <div class="bg-circle" style="background-color: #aa00ff; box-shadow: 0 0 6px #aa00ff;" onclick="cambiaSfondo('#aa00ff', '')">6</div>
        <div class="bg-circle" style="background-color: #ffff00; box-shadow: 0 0 6px #ffff00;" onclick="cambiaSfondo('#ffff00', '')">7</div>
        <div class="bg-circle" style="background-color: #0000ff; box-shadow: 0 0 6px #0000ff;" onclick="cambiaSfondo('#0000ff', '')">8</div>
        <div class="bg-circle" style="background-color: #ff0055; box-shadow: 0 0 6px #ff0055;" onclick="cambiaSfondo('#ff0055', '')">9</div>
        <div class="bg-circle" style="background-color: #111111; border: 1.5px dashed #00e5ff;" onclick="cambiaSfondo('#111111', '')">OFF</div>
    </div>

    <!-- BOTTONI FUNZIONE A SINISTRA -->
    <div class="func-changer-left">
        <div class="hover-circle border-titles" onclick="switchDisplayMoon('#display-titles'); getRealTimeTitle();"><span class="circle-label">TITOLO</span></div>
        <div class="hover-circle border-weather" onclick="switchDisplayMoon('#display-weather'); updateWeatherReal();"><span class="circle-label">METEO</span></div>
        <div class="hover-circle border-horoscope" onclick="switchDisplayMoon('#display-horoscope'); showHoroscope();"><span class="circle-label">ASTRI</span></div>
    </div>

    <!-- BOTTONI FUNZIONE A DESTRA -->
    <div class="func-changer-right">
        <div class="hover-circle border-cover" onclick="switchDisplayMoon('#display-cover');"><span class="circle-label">COVER</span></div>
        <div class="hover-circle border-listeners" onclick="switchDisplayMoon('#display-listeners'); getRealTimeListeners();"><span class="circle-label">ASCOLTI</span></div>
        <div class="hover-circle border-city" onclick="switchDisplayMoon('#display-weather'); updateWeatherReal();"><span class="circle-label">CITY</span></div>
    </div>

    <!-- STAGE CENTRALE CONTENUTI -->
    <div class="center-display-box" id="display-titles">
        <div class="display-header">IN ONDA ORA</div>
        <div class="display-marquee"><marquee behavior="scroll" direction="left" scrollamount="4"><span id="title-gambe" class="rbow-text">CARICAMENTO IN CORSO...</span></marquee></div>
    </div>
    
    <!-- METEO E CITY CONNESSI INSIEME (MOSTRA SOLO LA POSIZIONE DI CHI SI COLLEGA) -->
    <div class="center-display-box" id="display-weather">
        <div class="display-header">TUA POSIZIONE E METEO</div>
        <div id="weather-data" class="rbow-text">LOCALIZZAZIONE...</div>
    </div>
    
    <div class="center-display-box" id="display-horoscope">
        <div class="display-header">OROSCOPO SATELLITARE</div>
        <div class="display-marquee"><marquee behavior="scroll" direction="left" scrollamount="3"><span id="horoscope-text" class="rbow-text">LEGGENDO I TRANSITI PLANETARI...</span></marquee></div>
    </div>
    
    <!-- COVER DEFAULT -->
    <div class="center-display-box" id="display-cover" style="display: block;">
        <canvas id="visualizer" width="300" height="300" style="position:absolute; top:35%; left:50%; transform:translate(-50%, -50%); z-index:1; pointer-events:none;"></canvas>
        <div class="large-art-box" id="cover-art-box" style="position:relative; z-index:2;">
            <img id="cover-img-target" src="https://xatimg.com/image/rypdyBSweq2a.png" alt="Cover">
        </div>
    </div>
    
    <div class="center-display-box" id="display-listeners">
        <div class="display-header">ASCOLTI ATTIVI</div>
        <div id="listeners-data" class="rbow-text">CALCOLO UTENTI...</div>
    </div>

    <!-- CONTROLLI PANNELLO AUDIO -->
    <div class="controls-panel-bottom">
        <button class="player-btn" id="btn-play" onclick="togglePlayback();">PLAY</button>
        <div class="volume-box">
            <span class="vol-txt">VOL</span>
            <input type="range" id="volume-slider" min="0" max="1" step="0.01" value="1" oninput="changeVolume(this.value);">
        </div>
        <button class="player-btn" onclick="stopRadio();">STOP</button>
    </div>

    <audio id="radio-stream" crossorigin="anonymous">
        <source src="https://stm2.srvif.com:7198/;stream" type="audio/mpeg">
    </audio>
</div>

<script>
let isPlaying = false, isInitVis = false, audioContext, analyser, dataArray, source;

function switchDisplayMoon(targetId) {
    if ($(targetId).is(':visible')) { 
        $(targetId).fadeOut(250); 
    } else { 
        $('.center-display-box').hide(); 
        $(targetId).fadeIn(250); 
    }
}

function cambiaSfondo(colore, urlImmagine) {
    const layout = document.getElementById('layout-principale');
    if (urlImmagine !== '') { layout.style.backgroundImage = "url('" + urlImmagine + "')"; } 
    else { layout.style.backgroundImage = "none"; layout.style.backgroundColor = colore; }
    try { if(parent && parent.document && parent.document.body) { parent.document.body.style.backgroundColor = colore; } } catch(e) {}
}

function initVis() {
    if (!isInitVis) {
        try {
            audioContext = new (window.AudioContext || window.webkitAudioContext)();
            analyser = audioContext.createAnalyser(); analyser.fftSize = 128;
            source = audioContext.createMediaElementSource(document.getElementById('radio-stream'));
            source.connect(analyser); analyser.connect(audioContext.destination);
            dataArray = new Uint8Array(analyser.frequencyBinCount); isInitVis = true;
        } catch(e) {}
    }
}

function visualizeAcquario() {
    if (!isPlaying) return; requestAnimationFrame(visualizeAcquario);
    if(analyser && dataArray) {
        analyser.getByteFrequencyData(dataArray);
        let avgBass = (dataArray[0] + dataArray[1] + dataArray[2] + dataArray[3]) / 4;
        let coverBox = document.getElementById('cover-art-box');
        if(coverBox) { coverBox.style.transform = `scale(${1 + (avgBass / 255) * 0.12})`; }
    }
}

function togglePlayback() {
    const audio = document.getElementById('radio-stream'); initVis(); 
    if (audioContext && audioContext.state === 'suspended') audioContext.resume();
    audio.play(); isPlaying = true;
    document.getElementById("btn-play").classList.add("btn-active");
    getRealTimeTitle(); requestAnimationFrame(visualizeAcquario);
}

function stopRadio() {
    const audio = document.getElementById('radio-stream'); audio.pause(); isPlaying = false;
    document.getElementById("btn-play").classList.remove("btn-active");
    document.getElementById('cover-art-box').style.transform = 'scale(1)';
}

function changeVolume(v) { document.getElementById('radio-stream').volume = v; }
function getRealTimeTitle() { $.getJSON("https://stm2.srvif.com:7198/stats?sid=1&json=1&callback=?", d => { if(d && d.songtitle) $('#title-gambe').text(d.songtitle.toUpperCase()); }); }
function getRealTimeListeners() { $.getJSON("https://stm2.srvif.com:7198/stats?sid=1&json=1&callback=?", d => { if(d && d.currentlisteners) $('#listeners-data').text("UTENTI ONLINE: " + d.currentlisteners); }); }

// MOSTRA SOLO LA CITTA DI CHI SI CONNETTE IN TEMPO REALE
function updateWeatherReal() { 
    $('#weather-data').text("RILEVAMENTO POSIZIONE...");
    $.getJSON('https://get.geojs.io/v1/ip/geo.json', d => { 
        if(d && d.city) {
            $.getJSON(`https://api.open-meteo.com/v1/forecast?latitude=${d.latitude}&longitude=${d.longitude}&current_weather=true`, w => {
                $('#weather-data').html(`${d.city.toUpperCase()}<br>${Math.round(w.current_weather.temperature)}°C`);
            });
        } else {
            $('#weather-data').text("POSIZIONE NON DISPONIBILE");
        }
    }).fail(() => { $('#weather-data').text("ERRORE SATELLITE"); });
}

function showHoroscope() { $('#horoscope-text').text("LE STELLE CONFERMANO: SEI PREPARATO AL MEGLIO!"); }

setInterval(() => { if(isPlaying) getRealTimeTitle(); }, 30000);
</script>

</body>
</html>
