<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<style>
    :root { 
        --rb: linear-gradient(to right, #f00, #ff0, #0f0, #0ff, #f0f, #f00); 
    }
    
    body { background: transparent; margin: 0; font-family: 'Arial Black', sans-serif; overflow: hidden; pointer-events: none; }

    #btn-pali {
        position: fixed; right: 20px; top: 60px; width: 250px; height: 60px;
        background: #000; border: 2px solid #fff; border-radius: 10px;
        display: flex; flex-direction: column; align-items: center; justify-content: center;
        cursor: pointer; z-index: 999999; box-shadow: 0 0 15px rgba(255,255,255,0.3);
        pointer-events: auto;
    }
    
    .btn-text { background: var(--rb); -webkit-background-clip: text; color: transparent; font-size: 11px; font-weight: 900; text-transform: uppercase; }
    #on-air-text { color: yellow; font-size: 9px; font-weight: bold; animation: pulse 1.5s infinite; }

    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }

    /* LED VERDE LAMPEGGIANTE (In onda ora) */
    .led-verde {
        width: 10px; height: 10px; background-color: #0f0; border-radius: 50%;
        display: inline-block; margin-left: 10px; box-shadow: 0 0 10px #0f0;
        animation: blink 0.8s infinite;
    }

    /* LED ROSSO FISSO (Turno passato) */
    .led-rosso {
        width: 10px; height: 10px; background-color: #f00; border-radius: 50%;
        display: inline-block; margin-left: 10px; box-shadow: 0 0 8px #f00;
    }

    @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }

    #locandina {
        display: none; position: fixed; right: 10px; top: 150px; width: 280px;
        background: #000; border: 3px solid #333; border-radius: 12px; padding: 10px;
        box-shadow: 0 0 50px #000; z-index: 999998; pointer-events: auto;
    }

    .header { text-align: center; border-bottom: 2px solid #222; margin-bottom: 12px; padding-bottom: 8px; }
    #giorno-live { color: #ffff00; font-size: 14px; text-transform: uppercase; }
    .titolo { background: var(--rb); -webkit-background-clip: text; color: transparent; font-size: 13px; font-weight: 900; }

    .slot { background: #0a0a0a; border: 1px solid #222; border-radius: 30px; margin-bottom: 6px; padding: 5px; display: flex; align-items: center; gap: 8px; }
    .ora { color: #0ff; font-size: 10px; width: 45px; text-align: center; font-weight: bold; }
    .foto { width: 40px; height: 40px; border-radius: 50%; border: 1px solid #fff; object-fit: cover; }
    .nome { color: #ff00ff; font-size: 10px; text-transform: uppercase; font-weight: 900; flex-grow: 1; display: flex; align-items: center; }
</style>
</head>
<body>

    <div id="btn-pali">
        <div class="btn-text">PALINSESTO DI LORYCUORESTELLARE</div>
        <div id="on-air-text">ON AIR ---</div>
    </div>

    <div id="locandina">
        <div class="header">
            <span id="giorno-live">---</span>
            <div class="titolo">CARTAIO PALINSESTO</div>
        </div>
        <div id="lista-dj"></div>
    </div>

<script>
    const giorni = ["DOMENICA", "LUNEDÌ", "MARTEDÌ", "MERCOLEDÌ", "GIOVEDÌ", "VENERDÌ", "SABATO"];

    // DATABASE TURNI (H indica l'ora di inizio)
    const databaseTurni = {
        "MERCOLEDÌ": [
            { h: 19, label: "19:00", n: "DJ TERRY", f: "https://xatimg.com/image/6LCkmBbnRq6Z.gif" },
            { h: 21, label: "21:00", n: "SPEAKER GABRY", f: "https://xatimg.com/image/sREfmFFsu3cq.gif" },
            { h: 22, label: "22:00", n: "DJ LORY", f: "https://xatimg.com/image/T7dqsK3EyHMz.gif" }
        ]
    };

    function aggiornaLive() {
        const d = new Date();
        const oggi = giorni[d.getDay()];
        const oraAttuale = d.getHours();
        
        $('#on-air-text').text("ON AIR " + oggi);
        $('#giorno-live').text(oggi);

        const container = $('#lista-dj').empty();
        const djsOggi = databaseTurni[oggi] || [];

        if (djsOggi.length > 0) {
            djsOggi.forEach((dj, index) => {
                let statusLed = '';
                
                // Logica LED:
                // Se l'ora attuale è uguale all'ora del DJ -> VERDE LAMPEGGIANTE
                if (oraAttuale === dj.h) {
                    statusLed = '<span class="led-verde"></span>';
                } 
                // Se l'ora attuale è maggiore dell'ora del DJ -> ROSSO FISSO
                else if (oraAttuale > dj.h) {
                    statusLed = '<span class="led-rosso"></span>';
                }

                container.append(`
                    <div class="slot">
                        <span class="ora">${dj.label}</span>
                        <img class="foto" src="${dj.f}">
                        <div class="nome">${dj.n} ${statusLed}</div>
                    </div>
                `);
            });
        } else {
            container.append('<div style="color:white; font-size:10px; text-align:center; padding:10px;">IN ATTESA DI PROGRAMMAZIONE</div>');
        }
    }

    document.getElementById('btn-pali').onclick = function() {
        var loc = document.getElementById('locandina');
        loc.style.display = (loc.style.display === "block") ? "none" : "block";
    };

    setInterval(aggiornaLive, 30000); // Controlla ogni 30 secondi
    window.onload = aggiornaLive;
</script>
</body>
</html>
