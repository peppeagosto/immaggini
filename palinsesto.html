<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<style>
    :root { --rainbow: linear-gradient(to right, #ff0000, #ffff00, #00ff00, #00ffff, #ff00ff, #ff0000); }
    body { background: transparent; margin: 0; font-family: 'Arial Black', sans-serif; overflow: hidden; }

    /* TRIGGER PIÙ LARGO CON ORDINE TESTO RICHIESTO */
    .locandina-trigger {
        position: fixed; top: 45px; right: 20px; 
        width: 210px; height: 55px; /* <--- Poco poco più largo */
        background: #000; border: 3px solid #fff; border-radius: 15px;
        cursor: pointer; animation: neonGlow 6s infinite linear;
        display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 99999;
    }
    
    .mini-card {
        display: none; position: fixed; top: 45px; right: 20px; width: 245px;
        background: rgba(0, 0, 0, 0.98); border: 3px solid #fff; border-radius: 20px;
        padding: 10px; animation: neonGlow 6s infinite linear;
        flex-direction: column; gap: 5px; z-index: 999999;
    }

    @keyframes neonGlow {
        0% { border-color: #ff0000; box-shadow: 0 0 12px #ff0000; }
        33% { border-color: #00ff00; box-shadow: 0 0 12px #00ff00; }
        66% { border-color: #00ffff; box-shadow: 0 0 12px #00ffff; }
        100% { border-color: #ff0000; box-shadow: 0 0 12px #ff0000; }
    }

    .header-titles { text-align: center; }
    .main-text { background: var(--rainbow); -webkit-background-clip: text; color: transparent; font-size: 12px; text-transform: uppercase; }
    .sub-text { background: var(--rainbow); -webkit-background-clip: text; color: transparent; font-size: 18px; text-transform: uppercase; line-height: 1; }

    .display-day { color: #00ffff; font-size: 15px; text-align: center; width: 100%; text-transform: uppercase; border-bottom: 2px solid #333; padding-bottom: 3px; margin-bottom: 3px; }

    .slots-container { display: flex; flex-direction: column; gap: 5px; }
    .slot { background: rgba(255,255,255,0.05); border: 1px solid #444; border-radius: 40px 10px 10px 40px; padding: 3px; display: flex; align-items: center; gap: 8px; }
    
    .time { color: #ffff00; font-size: 9px; font-weight: bold; width: 35px; text-align: center; }
    .dj-photo { width: 38px; height: 38px; border-radius: 50%; border: 2px solid #fff; object-fit: cover; background: #222; }
    .nick-display { color: #ff00ff; font-family: 'Arial'; font-weight: 900; font-size: 12px; text-transform: uppercase; flex-grow: 1; }
</style>
</head>
<body>

    <div class="locandina-trigger" id="p-open">
        <div id="trigger-day" style="color: #00ffff; font-size: 14px; text-transform: uppercase;">---</div>
        <div style="background: var(--rainbow); -webkit-background-clip: text; color: transparent; font-weight: 900; font-size: 11px;">I MIEI DJ ❤️ CLICCA QUI</div>
    </div>

    <div class="mini-card" id="p-card">
        <div class="header-titles">
            <div class="main-text">IL CARTAIO</div>
            <div class="sub-text">PALINSESTO</div>
        </div>

        <div class="display-day" id="day-box">---</div>

        <div class="slots-container" id="dj-list"></div>
        
        <div style="text-align:center; font-size:8px; color:#555; margin-top:5px;">AUTO-UPDATE SYSTEM</div>
    </div>

<script>
    const palinsesto = {
        djs: [
            { ora: "19:00", nick: "GIOVANNA DJ", foto: "https://xatimg.com/image/B5I7efB9ycKn.jpg" },
            { ora: "20:00", nick: "MARIELLA DJ", foto: "https://xatimg.com/image/QeD4LZvpYajs.jpg" },
            { ora: "21:00", nick: "FRANCESCA DJ", foto: "https://xatimg.com/image/VrVJ173zmGwe.jpg" },
            { ora: "22:00", nick: "ROSA DJ",      foto: "https://xatimg.com/image/OZzX6RTVnL9q.jpg" },
            { ora: "23:00", nick: "ROBERTA DJ",   foto: "https://xatimg.com/image/CaYs0bVsHDCJ.jpg" },
            { ora: "24:00", nick: "DJ DIABLO",    foto: "https://xatimg.com/image/RK5PS6wShTcO.png" }
        ]
    };

    function buildPalinsesto() {
        const giorni = ["DOMENICA", "LUNEDÌ", "MARTEDÌ", "MERCOLEDÌ", "GIOVEDÌ", "VENERDÌ", "SABATO"];
        const oggi = giorni[new Date().getDay()];
        
        // Aggiorna il giorno nel trigger e nel box
        $('#trigger-day').text(oggi);
        $('#day-box').text(oggi);

        const container = $('#dj-list');
        container.empty();

        palinsesto.djs.forEach(dj => {
            container.append(`
                <div class="slot">
                    <span class="time">${dj.ora}</span>
                    <img class="dj-photo" src="${dj.foto}">
                    <span class="nick-display">${dj.nick}</span>
                </div>
            `);
        });
    }

    $('#p-open').on('click', function() {
        $(this).hide();
        $('#p-card').fadeIn().css('display', 'flex');
    });

    $(document).ready(buildPalinsesto);
</script>

</body>
</html>
