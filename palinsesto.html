<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<style>
    :root { 
        --rb: linear-gradient(to right, #f00, #ff0, #0f0, #0ff, #f0f, #f00); 
    }
    
    body { 
        background: transparent; 
        margin: 0; 
        height: 1000px; 
        width: 100%; 
        font-family: 'Arial Black', sans-serif; 
        overflow: hidden; 
        pointer-events: none; 
    }

    #btn-pali {
        position: fixed;
        right: 20px;
        top: 60px;
        width: 150px;
        height: 55px;
        background: #000;
        border: 2px solid #fff;
        border-radius: 8px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        z-index: 999999 !important;
        box-shadow: 0 0 15px rgba(255,255,255,0.3);
        transition: 0.3s;
        pointer-events: auto;
    }
    
    #btn-pali:hover { border-color: #0f4; transform: scale(1.05); }
    
    .giorno-tasto {
        color: #ffff00;
        font-size: 10px;
        text-transform: uppercase;
        margin-bottom: 2px;
        pointer-events: none;
    }

    .btn-text {
        background: var(--rb);
        -webkit-background-clip: text;
        color: transparent;
        font-size: 11px;
        font-weight: 900;
        text-transform: uppercase;
        pointer-events: none;
    }

    #locandina {
        display: none;
        position: fixed;
        right: 10px;
        top: 150px; 
        width: 220px;
        background: #000;
        border: 3px solid #333;
        border-radius: 12px;
        padding: 10px;
        box-shadow: 0 0 50px #000;
        z-index: 999998 !important;
        pointer-events: auto;
    }

    .header { text-align: center; border-bottom: 2px solid #222; margin-bottom: 12px; padding-bottom: 8px; }
    #giorno-live { color: #ffff00; font-size: 14px; text-transform: uppercase; display: block; }
    .titolo { background: var(--rb); -webkit-background-clip: text; color: transparent; font-size: 13px; font-weight: 900; }

    .slot { 
        background: #0a0a0a; border: 1px solid #222; border-radius: 30px; 
        margin-bottom: 6px; padding: 4px; display: flex; align-items: center; gap: 8px; 
    }
    .ora { color: #0ff; font-size: 8px; width: 35px; text-align: center; font-weight: bold; }
    .foto { width: 30px; height: 30px; border-radius: 50%; border: 1px solid #fff; object-fit: cover; }
    .nome { color: #ff00ff; font-size: 9px; text-transform: uppercase; font-weight: 900; }
</style>
</head>
<body>

    <div id="btn-pali">
        <div id="tasto-giorno" class="giorno-tasto">---</div>
        <div class="btn-text">I MIEI DJ</div>
    </div>

    <div id="locandina">
        <div class="header">
            <span id="giorno-live">---</span>
            <div class="titolo">CARTAIO PALINSESTO</div>
        </div>
        <div id="lista-dj"></div>
    </div>

<script>
    // 🗂️ DATABASE TURNI AGGIORNATO (LUNEDÌ -> VENERDÌ)
    const database = {
        "LUNEDÌ": [],
        "MARTEDÌ": [],
        "MERCOLEDÌ": [
            { h: "19:00", n: "DJ TERRY", f: "https://xatimg.com/image/6LCkmBbnRq6Z.gif" },
            { h: "21:00", n: "SPEACHER GABRY", f: "https://xatimg.com/image/sREfmFFsu3cq.gif" },
            { h: "22:00", n: "DJ LORY", f: "https://xatimg.com/image/T7dqsK3EyHMz.gif" }
        ],
        "GIOVEDÌ": [], // In attesa dei tuoi DJ
        "VENERDÌ": [], // In attesa dei tuoi DJ
        "SABATO": null,   // NESSUNA DIRETTA
        "DOMENICA": null  // NESSUNA DIRETTA
    };

    function aggiornaTutto() {
        const giorni = ["DOMENICA", "LUNEDÌ", "MARTEDÌ", "MERCOLEDÌ", "GIOVEDÌ", "VENERDÌ", "SABATO"];
        const d = new Date();
        const oggi = giorni[d.getDay()];
        
        $('#tasto-giorno').text(oggi);
        $('#giorno-live').text(oggi);

        const container = $('#lista-dj').empty();
        const djs = database[oggi];

        if (djs === null) {
            // Messaggio per il Sabato e la Domenica
            container.append('<div style="color:#ff0000; font-size:10px; text-align:center; font-weight:900;">WEEKEND - NESSUNA DIRETTA</div>');
        } else if (djs && djs.length > 0) {
            djs.forEach(dj => {
                container.append(`<div class="slot"><span class="ora">${dj.h}</span><img class="foto" src="${dj.f}"><span class="nome">${dj.n}</span></div>`);
            });
        } else {
            container.append('<div style="color:white; font-size:10px; text-align:center;">IN ATTESA DI PROGRAMMAZIONE</div>');
        }
    }

    document.getElementById('btn-pali').onclick = function() {
        var loc = document.getElementById('locandina');
        loc.style.display = (loc.style.display === "block") ? "none" : "block";
    };

    window.onload = aggiornaTutto;
</script>
</body>
</html>
