<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<style>
    :root { --rainbow: linear-gradient(to right, #ff0000, #ffff00, #00ff00, #00ffff, #ff00ff, #ff0000); }
    
    body { background: transparent; margin: 0; font-family: 'Arial Black', sans-serif; overflow: hidden; }

    .locandina-trigger {
        position: fixed; top: 45px; right: 20px; width: 180px; height: 60px;
        background: #000; border: 3px solid #fff; border-radius: 15px;
        cursor: pointer; animation: neonGlow 6s infinite linear;
        display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 99999;
    }
    
    .mini-card {
        display: none; position: fixed; top: 45px; right: 20px; width: 280px;
        background: rgba(0, 0, 0, 0.98); border: 4px solid #fff; border-radius: 25px;
        padding: 15px; animation: neonGlow 6s infinite linear;
        flex-direction: column; gap: 10px; z-index: 999999;
    }

    @keyframes neonGlow {
        0% { border-color: #ff0000; box-shadow: 0 0 15px #ff0000; }
        33% { border-color: #00ff00; box-shadow: 0 0 15px #00ff00; }
        66% { border-color: #00ffff; box-shadow: 0 0 15px #00ffff; }
        100% { border-color: #ff0000; box-shadow: 0 0 15px #ff0000; }
    }

    .header-titles { text-align: center; }
    .main-text { background: var(--rainbow); -webkit-background-clip: text; color: transparent; font-size: 14px; text-transform: uppercase; }
    .sub-text { background: var(--rainbow); -webkit-background-clip: text; color: transparent; font-size: 22px; text-transform: uppercase; line-height: 1; }

    .edit-day { background: transparent; border: none; color: #00ffff; font-family: 'Arial Black'; font-size: 16px; text-align: center; width: 100%; outline: none; text-transform: uppercase; border-bottom: 1px solid #333; }

    .slots-container { display: flex; flex-direction: column; gap: 8px; margin-top: 5px; }
    .slot { background: rgba(255,255,255,0.05); border: 1px solid #444; border-radius: 50px 15px 15px 50px; padding: 5px; display: flex; align-items: center; gap: 10px; position: relative; }
    
    .time { color: #ffff00; font-size: 9px; font-weight: bold; width: 35px; text-align: center; }
    
    /* FOTO DJ CLICCABILE */
    .dj-photo {
        width: 40px; height: 40px; border-radius: 50%; border: 2px solid #fff;
        object-fit: cover; background: #222; cursor: pointer; transition: 0.3s;
    }
    .dj-photo:hover { transform: scale(1.1); border-color: #ff00ff; box-shadow: 0 0 10px #ff00ff; }

    .nick-in { background: transparent; border: none; color: #ff00ff; font-family: 'Arial'; font-weight: 900; font-size: 13px; outline: none; flex-grow: 1; text-transform: uppercase; }

    .btn-save { background: #990000; border: 2px solid #ff0000; color: #fff; border-radius: 12px; padding: 10px; font-family: 'Arial Black'; font-size: 13px; cursor: pointer; text-transform: uppercase; margin-top: 5px; }
</style>
</head>
<body>

    <div class="locandina-trigger" id="p-open">
        <div style="background: var(--rainbow); -webkit-background-clip: text; color: transparent; font-weight: 900;">I MIEI DJ ❤️</div>
        <div style="font-size: 9px; color: #fff;">CLICCA PER CAMBIARE</div>
    </div>

    <div class="mini-card" id="p-card">
        <div class="header-titles">
            <div class="main-text">IL CARTAIO</div>
            <div class="sub-text">PALINSESTO</div>
        </div>

        <input type="text" id="current-day" class="edit-day" value="SABATO">

        <div class="slots-container">
            <script>
                // Generiamo i 6 slot dinamicamente per pulizia codice
                const orari = ["19:00", "20:00", "21:00", "22:00", "23:00", "24:00"];
                orari.forEach((ora, i) => {
                    document.write(`
                        <div class="slot">
                            <span class="time">${ora}</span>
                            <img class="dj-photo" id="img-${i}" src="https://via.placeholder.com/40" onclick="changeImg(${i})" title="Clicca per cambiare foto">
                            <input type="text" class="nick-in" id="n-${i}" value="DJ NOME">
                        </div>
                    `);
                });
            </script>
        </div>

        <button class="btn-save" onclick="saveData()"><i class="fas fa-save"></i> SALVA TUTTO</button>
    </div>

<script>
    $('#p-open').on('click', function() {
        $(this).hide();
        $('#p-card').fadeIn().css('display', 'flex');
    });

    // FUNZIONE PER CAMBIARE FOTO AL CLIC
    function changeImg(id) {
        const currentUrl = $('#img-' + id).attr('src');
        const newUrl = prompt("Incolla il link della nuova foto per questo DJ:", currentUrl);
        if (newUrl && newUrl.trim() !== "") {
            $('#img-' + id).attr('src', newUrl);
        }
    }

    function load() {
        const saved = JSON.parse(localStorage.getItem('palinsesto_foto_v1')) || {};
        if(saved.day) $('#current-day').val(saved.day);
        for(let i=0; i<6; i++) {
            if(saved['nick'+i]) $('#n-'+i).val(saved['nick'+i]);
            if(saved['url'+i]) $('#img-'+i).attr('src', saved['url'+i]);
        }
    }

    function saveData() {
        let data = { day: $('#current-day').val().toUpperCase() };
        for(let i=0; i<6; i++) {
            data['nick'+i] = $('#n-'+i).val().toUpperCase();
            data['url'+i] = $('#img-'+i).attr('src');
        }
        localStorage.setItem('palinsesto_foto_v1', JSON.stringify(data));
        alert("MODIFICHE SALVATE CON SUCCESSO!");
    }

    $(document).ready(load);
</script>

</body>
</html>

</body>
</html>
