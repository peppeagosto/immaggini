<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<style>
    :root { --rainbow: linear-gradient(to right, #ff0000, #ffff00, #00ff00, #00ffff, #ff00ff, #ff0000); }
    
    body { 
        background: transparent; 
        margin: 0; 
        font-family: 'Arial Black', sans-serif; 
        overflow: hidden; 
    }

    /* LOCANDINA SPOSTATA GIÙ DI 45PX */
    .locandina-trigger {
        position: fixed;
        top: 45px; /* <--- SCESA DI 45 PIXEL */
        right: 20px;
        width: 180px;
        height: 60px;
        background: #000;
        border: 3px solid #fff;
        border-radius: 15px;
        cursor: pointer;
        animation: neonGlow 6s infinite linear;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        z-index: 99999;
        transition: 0.4s;
    }
    
    .locandina-trigger:hover { transform: scale(1.05); border-color: #00ffff; }

    .locandina-text {
        background: var(--rainbow);
        -webkit-background-clip: text;
        color: transparent;
        font-size: 14px;
        font-weight: 900;
        text-transform: uppercase;
        margin: 0;
    }

    /* IL RETTANGOLO SI APRE IN BASSO A DESTRA */
    .mini-card {
        display: none;
        position: fixed;
        bottom: 20px; /* <--- ORA SI APRE IN BASSO */
        right: 20px;
        width: 500px; 
        background: rgba(0, 0, 0, 0.98);
        border: 4px solid #fff;
        border-radius: 25px;
        padding: 15px;
        animation: neonGlow 6s infinite linear;
        flex-direction: column;
        gap: 10px;
        box-sizing: border-box;
        z-index: 999999;
    }

    @keyframes neonGlow {
        0% { border-color: #ff0000; box-shadow: 0 0 15px #ff0000; }
        33% { border-color: #00ff00; box-shadow: 0 0 15px #00ff00; }
        66% { border-color: #00ffff; box-shadow: 0 0 15px #00ffff; }
        100% { border-color: #ff0000; box-shadow: 0 0 15px #ff0000; }
    }

    .header-titles { text-align: center; margin-bottom: 5px; }
    .main-text { background: var(--rainbow); -webkit-background-clip: text; color: transparent; font-size: 20px; text-transform: uppercase; margin: 0; }
    .sub-text { background: var(--rainbow); -webkit-background-clip: text; color: transparent; font-size: 28px; text-transform: uppercase; margin: 0; line-height: 1; }

    .day-selector { text-align: center; border-bottom: 2px solid #333; padding-bottom: 5px; }
    .edit-day { background: transparent; border: none; color: #00ffff; font-family: 'Arial Black'; font-size: 18px; text-align: center; width: 100%; outline: none; text-transform: uppercase; }

    .slots-container { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .slot { background: rgba(255,255,255,0.05); border: 1px solid #444; border-radius: 10px; padding: 5px 10px; display: flex; align-items: center; justify-content: space-between; }
    .time { color: #ffff00; font-size: 11px; font-weight: bold; width: 45px; }
    .nick-in { background: transparent; border: none; color: #ff00ff; font-family: 'Arial'; font-weight: 900; font-size: 13px; text-align: right; outline: none; width: 100%; }

    .btn-save { background: #990000; border: 2px solid #ff0000; color: #fff; border-radius: 12px; padding: 10px; font-family: 'Arial Black'; font-size: 14px; cursor: pointer; text-transform: uppercase; transition: 0.3s; }
    .btn-save:hover { background: #ff0000; }

    .close-btn { position: absolute; top: 10px; right: 15px; color: #ff0000; cursor: pointer; font-size: 20px; z-index: 10; }
</style>
</head>
<body>

    <div class="locandina-trigger" id="p-open">
        <div class="locandina-text">I MIEI DJ ❤️</div>
        <div style="font-size: 10px; color: #00ffff; font-weight: bold;">CLICCA PER INFO</div>
    </div>

    <div class="mini-card" id="p-card">
        <i class="fas fa-times-circle close-btn" id="p-close"></i>
        
        <div class="header-titles">
            <div class="main-text">I MIEI DJ</div>
            <div class="sub-text">PALINSESTO</div>
        </div>

        <div class="day-selector">
            <input type="text" id="current-day" class="edit-day" value="DOMENICA">
        </div>

        <div class="slots-container">
            <div class="slot"><span class="time">19:00</span><input type="text" class="nick-in" value="GIOVANNA DJ"></div>
            <div class="slot"><span class="time">20:00</span><input type="text" class="nick-in" value="MARIELLA DJ"></div>
            <div class="slot"><span class="time">21:00</span><input type="text" class="nick-in" value="FRANCESCA DJ"></div>
            <div class="slot"><span class="time">22:00</span><input type="text" class="nick-in" value="ROSA DJ"></div>
            <div class="slot"><span class="time">23:00</span><input type="text" class="nick-in" value="ROBERTA DJ"></div>
            <div class="slot"><span class="time">24:00</span><input type="text" class="nick-in" value="ANNA DJ"></div>
        </div>

        <button class="btn-save" onclick="saveData()"><i class="fas fa-save"></i> I DJ DEL CARTAIO</button>
    </div>

<script>
    $('#p-open').on('click', function() {
        $(this).hide();
        $('#p-card').fadeIn().css('display', 'flex');
    });

    $('#p-close').on('click', function() {
        $('#p-card').hide();
        $('#p-open').fadeIn();
    });

    function load() {
        const saved = JSON.parse(localStorage.getItem('user_pal_v1')) || {};
        if(saved.day) $('#current-day').val(saved.day);
        $('.nick-in').each(function(index) {
            if(saved['nick'+index]) $(this).val(saved['nick'+index]);
        });
    }

    function saveData() {
        let data = { day: $('#current-day').val().toUpperCase() };
        $('.nick-in').each(function(index) {
            data['nick'+index] = $(this).val().toUpperCase();
        });
        localStorage.setItem('user_pal_v1', JSON.stringify(data));
        alert("GRAZIE DELLA VISITA!");
    }

    $(document).ready(load);
</script>

</body>
</html>
