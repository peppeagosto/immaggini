<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<style>
    :root { 
        --rb: linear-gradient(to right, #f00, #ff0, #0f0, #0ff, #f0f, #f00); 
    }
    
    body { 
        background: transparent; 
        margin: 0; 
        height: 1000px; /* Aumentato per sicurezza */
        width: 100%; 
        font-family: 'Arial Black', sans-serif; 
        overflow: hidden; 
        pointer-events: none; /* Rende il corpo trasparente ai click... */
    }

    /* TASTO RETTANGOLINO - CLICCABILE SEMPRE */
    #btn-pali {
        position: fixed;
        right: 20px;
        top: 16px; 
        width: 150px;
        height: 55px;
        background: #000;
        border: 2px solid #fff;
        border-radius: 8px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        z-index: 999999 !important; /* Forza il livello più alto */
        box-shadow: 0 0 15px rgba(255,255,255,0.3);
        transition: 0.3s;
        pointer-events: auto; /* ...ma riattiva i click solo sul tasto */
    }
    
    #btn-pali:hover { border-color: #0f4; transform: scale(1.05); }
    
    .giorno-tasto {
        color: #ffff00;
        font-size: 10px;
        text-transform: uppercase;
        margin-bottom: 2px;
        pointer-events: none;
    }

    .btn-text {
        background: var(--rb);
        -webkit-background-clip: text;
        color: transparent;
        font-size: 11px;
        font-weight: 900;
        text-transform: uppercase;
        pointer-events: none;
    }

    /* LOCANDINA */
    #locandina {
        display: none;
        position: fixed;
        right: 20px;
        top: 150px; 
        width: 260px;
        background: #000;
        border: 3px solid #333;
        border-radius: 12px;
        padding: 12px;
        box-shadow: 0 0 50px #000;
        z-index: 999998 !important;
        pointer-events: auto; /* Riattiva i click sulla locandina */
    }

    .header { text-align: center; border-bottom: 2px solid #222; margin-bottom: 12px; padding-bottom: 8px; }
    #giorno-live { color: #ffff00; font-size: 14px; text-transform: uppercase; display: block; }
    .titolo { background: var(--rb); -webkit-background-clip: text; color: transparent; font-size: 15px; font-weight: 900; }

    .slot { 
        background: #0a0a0a; border: 1px solid #222; border-radius: 30px; 
        margin-bottom: 6px; padding: 4px; display: flex; align-items: center; gap: 10px; 
    }
    .ora { color: #0ff; font-size: 9px; width: 35px; text-align: center; font-weight: bold; }
    .foto { width: 35px; height: 35px; border-radius: 50%; border: 1px solid #fff; object-fit: cover; }
    .nome { color: #ff00ff; font-size: 10px; text-transform: uppercase; font-weight: 900; }

</style>
</head>
<body>

    <div id="btn-pali">
        <div id="tasto-giorno" class="giorno-tasto">---</div>
        <div class="btn-text">I MIEI DJ</div>
    </div>

    <div id="locandina">
        <div class="header">
            <span id="giorno-live">---</span>
            <div class="titolo">CARTAIO PALINSESTO</div>
        </div>
        <div id="lista-dj"></div>
    </div>

<script>
    const database = {
        "LUNEDÌ": [
            { h: "19:00", n: "GIOVANNA DJ", f: "https://xatimg.com/image/B5I7efB9ycKn.jpg" },
            { h: "20:00", n: "MARIELLA DJ", f: "https://xatimg.com/image/QeD4LZvpYajs.jpg" },
            { h: "21:00", n: "FRANCESCA DJ", f: "https://xatimg.com/image/VrVJ173zmGwe.jpg" },
            { h: "22:00", n: "ROSA DJ", f: "https://xatimg.com/image/OZzX6RTVnL9q.jpg" },
            { h: "23:00", n: "ROBERTA DJ", f: "https://xatimg.com/image/CaYs0bVsHDCJ.jpg" },
            { h: "24:00", n: "DJ DIABLO", f: "https://xatimg.com/image/RK5PS6wShTcO.png" }
        ],
        "MARTEDÌ": [
            { h: "19:00", n: "ROBERTA DJ", f: "https://xatimg.com/image/CaYs0bVsHDCJ.jpg" },
            { h: "20:00", n: "GIOVANNA DJ", f: "https://xatimg.com/image/B5I7efB9ycKn.jpg" },
            { h: "21:00", n: "MARIELLA DJ", f: "https://xatimg.com/image/QeD4LZvpYajs.jpg" },
            { h: "22:00", n: "FRANCESCA DJ", f: "https://xatimg.com/image/VrVJ173zmGwe.jpg" },
            { h: "23:00", n: "ROSA DJ", f: "https://xatimg.com/image/OZzX6RTVnL9q.jpg" },
            { h: "24:00", n: "DJ DIABLO", f: "https://xatimg.com/image/RK5PS6wShTcO.png" }
        ],
        "MERCOLEDÌ": [], "GIOVEDÌ": [], "VENERDÌ": [], "SABATO": [], "DOMENICA": []
    };

    function aggiornaTutto() {
        const giorni = ["DOMENICA", "LUNEDÌ", "MARTEDÌ", "MERCOLEDÌ", "GIOVEDÌ", "VENERDÌ", "SABATO"];
        const oggi = giorni[new Date().getDay()];
        $('#tasto-giorno').text(oggi);
        $('#giorno-live').text(oggi);

        const djs = (database[oggi] && database[oggi].length > 0) ? database[oggi] : database["LUNEDÌ"];
        const container = $('#lista-dj').empty();

        djs.forEach(dj => {
            container.append(`<div class="slot"><span class="ora">${dj.h}</span><img class="foto" src="${dj.f}"><span class="nome">${dj.n}</span></div>`);
        });
    }

    // Usiamo Javascript puro per il click per evitare conflitti
    document.getElementById('btn-pali').onclick = function() {
        var loc = document.getElementById('locandina');
        if (loc.style.display === "block") {
            loc.style.display = "none";
        } else {
            loc.style.display = "block";
        }
    };

    window.onload = aggiornaTutto;
</script>
</body>
</html>
