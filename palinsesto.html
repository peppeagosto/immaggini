<!DOCTYPE html>
<html>
<head>
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<style>
    :root { --rb: linear-gradient(to right, #f00, #ff0, #0f0, #0ff, #f0f, #f00); --b: 1; }
    body { background: transparent; margin: 0; height: 680px; width: 700px; display: flex; align-items: center; justify-content: center; font-family: 'Arial Black', sans-serif; }

    /* CONSOLE TESTUALE LATERALE (Z-INDEX ALTO PER ESSERE SEMPRE CLICCABILE) */
    .console-links {
        position: absolute; left: 20px; top: 100px; width: 220px;
        background: rgba(0,0,0,0.9); border: 2px solid #0ff; border-radius: 15px;
        padding: 15px; z-index: 9999; box-shadow: 0 0 15px #0ff;
    }

    .cmd-text {
        display: block; color: #fff; text-decoration: none; font-size: 13px;
        margin: 10px 0; cursor: pointer; text-transform: uppercase;
        border-bottom: 1px solid #333; padding-bottom: 5px; transition: 0.3s;
    }
    .cmd-text:hover { color: #0f4; text-shadow: 0 0 10px #0f4; }
    .neon-title { background: var(--rb); -webkit-background-clip: text; color: transparent; font-size: 16px; text-align: center; margin-bottom: 15px; }

    /* RADAR CENTRALE */
    .radar-main {
        position: relative; width: 400px; height: 400px;
        background: #000; border: 5px solid #222; border-radius: 50%;
        overflow: hidden; box-shadow: 0 0 30px #000;
    }

    /* PALLONI / WOOFER */
    .ball {
        position: absolute; width: 120px; height: 120px; border-radius: 50%;
        background: radial-gradient(circle, #f00, #000); opacity: 0;
        transform: scale(calc(var(--b) * 1.5)); transition: 0.1s;
    }
    .ball.on { opacity: 0.8; }
    .tl { top: -20px; left: -20px; } .tr { top: -20px; right: -20px; }
    .bl { bottom: -20px; left: -20px; } .br { bottom: -20px; right: -20px; }

    /* GIF E VIDEO */
    #display-area { position: absolute; inset: 10px; border-radius: 50%; overflow: hidden; z-index: 5; opacity: 0; }
    #display-area.on { opacity: 0.7; }
    #video-player { width: 100%; height: 100%; border: none; display: none; }

    .sweep {
        position: absolute; width: 50%; height: 50%; top: 50%; left: 50%;
        background: linear-gradient(60deg, #0f4, transparent);
        transform-origin: 0 0; animation: rot 4s linear infinite;
        border-top: 2px solid #0f4; z-index: 10; pointer-events: none; /* TRASPARENTE AI CLICK */
    }
    @keyframes rot { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<div class="console-links">
    <div class="neon-title">MEDIA COMMAND</div>
    <span class="cmd-text" onclick="startRadio()">🔊 ATTIVA RADIO (ON/OFF)</span>
    <span class="cmd-text" onclick="startWoofer()">🔥 BOOST 5000W</span>
    <span class="cmd-text" onclick="startUccio()">🎬 UCCIO DE SANTIS TV</span>
    <span class="cmd-text" onclick="startPluto()">📺 PLUTO TV CINEMA</span>
    <span class="cmd-text" onclick="location.reload()">🔄 RESET SISTEMA</span>
</div>

<div class="radar-main">
    <div class="ball tl"></div><div class="ball tr"></div>
    <div class="ball bl"></div><div class="ball br"></div>
    
    <div id="display-area">
        <img id="gif-rosy" src="https://xatimg.com/image/9FrlYTqB6x3U.gif" width="100%">
        <iframe id="video-player" src="" allow="autoplay"></iframe>
    </div>

    <div class="sweep"></div>
</div>

<audio id="m" crossorigin="anonymous"></audio>

<script>
    let isR = 0, isW = 0, ctx, an, d;
    const au = document.getElementById('m');
    const v = document.getElementById('video-player');
    const g = document.getElementById('gif-rosy');
    const da = document.getElementById('display-area');

    function startRadio() {
        if(!ctx){
            ctx=new(window.AudioContext||window.webkitAudioContext)();
            an=ctx.createAnalyser();ctx.createMediaElementSource(au).connect(an);
            an.connect(ctx.destination);an.fftSize=32;d=new Uint8Array(16);loop();
        }
        if(!isR){
            au.src="https://stream.zeno.fm/ylkruiq5e4fvv"; au.play(); isR=1;
            da.style.opacity="1"; g.style.display="block"; v.style.display="none";
        } else { au.pause(); isR=0; da.style.opacity="0"; }
    }

    function startWoofer() {
        isW = !isW;
        $('.ball').toggleClass('on', isW);
    }

    function startUccio() {
        au.pause(); isR=0;
        da.style.opacity="1"; g.style.display="none";
        v.src="https://www.youtube.com/embed/5WyXJc3buWI?autoplay=1";
        v.style.display="block";
    }

    function startPluto() {
        au.pause(); isR=0;
        da.style.opacity="1"; g.style.display="none";
        v.src="https://pluto.tv/it/live-tv/pluto-tv-cinema-italiano-it";
        v.style.display="block";
    }

    function loop(){
        requestAnimationFrame(loop); if(!isR)return;
        an.getByteFrequencyData(d);
        document.documentElement.style.setProperty('--b', 1 + d[1]/130);
    }
</script>
</body>
</html>
