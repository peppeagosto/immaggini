<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<style>
    :root { --rainbow: linear-gradient(to right, #ff0000, #ffff00, #00ff00, #00ffff, #ff00ff, #ff0000); }
    
    body { 
        background: transparent; 
        margin: 0; 
        font-family: 'Arial Black', sans-serif; 
        display: flex; 
        justify-content: flex-end; 
        align-items: flex-end; 
        height: 100vh; 
        overflow: hidden; 
        padding: 20px;
        box-sizing: border-box;
    }

    /* IL PULSANTE INIZIALE (TRIANGOLINO/TAB) */
    .trigger-tab {
        background: #000;
        border: 2px solid #fff;
        border-radius: 15px 15px 0 15px;
        padding: 10px 20px;
        color: #fff;
        cursor: pointer;
        animation: neonGlow 6s infinite linear;
        display: flex;
        align-items: center;
        gap: 10px;
        transition: 0.3s;
        z-index: 999;
    }
    
    .trigger-tab:hover { transform: scale(1.1); }

    /* IL RETTANGOLO (NASCOSTO DI DEFAULT) */
    .mini-card {
        display: none; /* Nasconde all'inizio */
        width: 500px; 
        background: rgba(0, 0, 0, 0.98);
        border: 4px solid #fff;
        border-radius: 25px;
        padding: 15px;
        animation: neonGlow 6s infinite linear;
        flex-direction: column;
        gap: 10px;
        box-sizing: border-box;
        position: relative;
    }

    @keyframes neonGlow {
        0% { border-color: #ff0000; box-shadow: 0 0 20px #ff0000; }
        33% { border-color: #00ff00; box-shadow: 0 0 20px #00ff00; }
        66% { border-color: #00ffff; box-shadow: 0 0 20px #00ffff; }
        100% { border-color: #ff0000; box-shadow: 0 0 20px #ff0000; }
    }

    .title {
        text-align: center;
        background: var(--rainbow);
        -webkit-background-clip: text;
        color: transparent;
        font-size: 26px;
        text-transform: uppercase;
        margin: 0;
        letter-spacing: 2px;
    }

    .day-selector { text-align: center; border-bottom: 2px solid #333; padding-bottom: 5px; }
    
    .edit-day {
        background: transparent; border: none; color: #00ffff;
        font-family: 'Arial Black'; font-size: 18px; text-align: center;
        width: 100%; outline: none; text-transform: uppercase;
    }

    .slots-container { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }

    .slot {
        background: rgba(255,255,255,0.05); border: 1px solid #444;
        border-radius: 10px; padding: 5px 10px; display: flex;
        align-items: center; justify-content: space-between;
    }

    .time { color: #ffff00; font-size: 11px; font-weight: bold; width: 45px; }
    
    .nick-in {
        background: transparent; border: none; color: #ff00ff;
        font-family: 'Arial'; font-weight: 900; font-size: 13px;
        text-align: right; outline: none; width: 100%;
    }

    .btn-save {
        background: #990000; border: 2px solid #ff0000; color: #fff;
        border-radius: 12px; padding: 10px; font-family: 'Arial Black';
        font-size: 12px; cursor: pointer; text-transform: uppercase;
    }

    /* TESTO ARCOBALENO PER IL PULSANTE */
    .rainbow-text {
        background: var(--rainbow);
        -webkit-background-clip: text;
        color: transparent;
        font-weight: bold;
    }

    .close-btn {
        position: absolute; top: 10px; right: 15px;
        color: #ff0000; cursor: pointer; font-size: 20px;
    }
</style>
</head>
<body>

    <div class="trigger-tab" id="p89-open">
        <span class="rainbow-text">I MIEI DJ ❤️</span>
        <i class="fas fa-chevron-up" style="color: #00ffff;"></i>
    </div>

    <div class="mini-card" id="p89-card">
        <i class="fas fa-times-circle close-btn" id="p89-close"></i>
        <div class="title">PALINSESTO</div>

        <div class="day-selector">
            <input type="text" id="current-day" class="edit-day" value="DOMENICA">
        </div>

        <div class="slots-container">
            <div class="slot"><span class="time">19:00</span><input type="text" class="nick-in" value="GIOVANNA DJ"></div>
            <div class="slot"><span class="time">20:00</span><input type="text" class="nick-in" value="MARIELLA DJ"></div>
            <div class="slot"><span class="time">21:00</span><input type="text" class="nick-in" value="FRANCESCA DJ"></div>
            <div class="slot"><span class="time">22:00</span><input type="text" class="nick-in" value="ROSA DJ"></div>
            <div class="slot"><span class="time">23:00</span><input type="text" class="nick-in" value="ROBERTA DJ"></div>
            <div class="slot"><span class="time">24:00</span><input type="text" class="nick-in" value="ANNA DJ"></div>
        </div>

        <button class="btn-save" onclick="saveData()"><i class="fas fa-save"></i> SALVA I MIEI DJ</button>
    </div>

<script>
    // Funzioni per Aprire e Chiudere
    $('#p89-open').click(function() {
        $(this).hide();
        $('#p89-card').css('display', 'flex');
    });

    $('#p89-close').click(function() {
        $('#p89-card').hide();
        $('#p89-open').show();
    });

    function load() {
        const saved = JSON.parse(localStorage.getItem('p89_mini_hub')) || {};
        if(saved.day) $('#current-day').val(saved.day);
        $('.nick-in').each(function(index) {
            if(saved['nick'+index]) $(this).val(saved['nick'+index]);
        });
    }

    function saveData() {
        let data = { day: $('#current-day').val().toUpperCase() };
        $('.nick-in').each(function(index) {
            data['nick'+index] = $(this).val().toUpperCase();
        });
        localStorage.setItem('p89_mini_hub', JSON.stringify(data));
        alert("GRAZIE DELLA VISITA!");
    }

    $(document).ready(load);
</script>

</body>
</html>
