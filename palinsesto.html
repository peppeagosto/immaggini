<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<style>
    :root { --rainbow: linear-gradient(to right, #ff0000, #ffff00, #00ff00, #00ffff, #ff00ff, #ff0000); }
    
    /* CAMBIATO ALLINEAMENTO PER SPINGERE IN BASSO */
    body { 
        background: transparent; 
        margin: 0; 
        font-family: 'Arial Black', sans-serif; 
        display: flex; 
        justify-content: center; 
        align-items: flex-end; /* Spinge tutto in fondo */
        height: 100vh; 
        overflow: hidden; 
        padding-bottom: 20px; /* Distanza dal bordo inferiore */
        box-sizing: border-box;
    }

    .mini-card {
        width: 500px; 
        background: rgba(0, 0, 0, 0.95);
        border: 4px solid #fff;
        border-radius: 25px;
        padding: 15px;
        animation: neonGlow 6s infinite linear;
        display: flex;
        flex-direction: column;
        gap: 10px;
        box-sizing: border-box;
    }

    @keyframes neonGlow {
        0% { border-color: #ff0000; box-shadow: 0 0 20px #ff0000; }
        33% { border-color: #00ff00; box-shadow: 0 0 20px #00ff00; }
        66% { border-color: #00ffff; box-shadow: 0 0 20px #00ffff; }
        100% { border-color: #ff0000; box-shadow: 0 0 20px #ff0000; }
    }

      .title {
        text-align: center;
        background: var(--rainbow);
        -webkit-background-clip: text;
        color: transparent;
        font-size: 26px;
        text-transform: uppercase;
        margin: 0;
        letter-spacing: 2px;
    }

    .day-selector {
        text-align: center;
        border-bottom: 2px solid #333;
        padding-bottom: 5px;
    }
     .edit-day {
        background: transparent;
        border: none;
        color: #00ffff;
        font-family: 'Arial Black';
        font-size: 18px;
        text-align: center;
        width: 100%;
        outline: none;
        text-transform: uppercase;
    }

    .slots-container {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 8px;
    }

    .slot {
        background: rgba(255,255,255,0.05);
        border: 1px solid #444;
        border-radius: 10px;
        padding: 5px 10px;
        display: flex;
        align-items: center;
        justify-content: space-between;
    }

    .time { color: #ffff00; font-size: 11px; font-weight: bold; width: 45px; }
    
    .nick-in {
        background: transparent;
        border: none;
        color: #ff00ff;
        font-family: 'Arial';
        font-weight: 900;
        font-size: 13px;
        text-align: right;
        outline: none;
        width: 100%;
    }
    .nick-in:focus { color: #fff; }

    .btn-save {
        background: #000;
        border: 2px solid #00ff00;
        color: #00ff00;
        border-radius: 12px;
        padding: 8px;
        font-family: 'Arial Black';
        font-size: 12px;
        cursor: pointer;
        transition: 0.3s;
        text-transform: uppercase;
    }
    .btn-save:hover { background: #00ff00; color: #000; }
</style>
</head>
<body>

<div class="mini-card">
    <div class="-title">PALINSESTO</div>

    <div class="day-selector">
        <input type="text" id="current-day" class="edit-day" value="LUNEDÌ" title="Cambia Giorno">
    </div>

    <div class="slots-container">
        <div class="slot"><span class="time">19:00</span><input type="text" class="nick-in" value="ferdy DJ"></div>
        <div class="slot"><span class="time">20:00</span><input type="text" class="nick-in" value="tonyDJ"></div>
        <div class="slot"><span class="time">21:00</span><input type="text" class="nick-in" value="NICK DJ"></div>
        <div class="slot"><span class="time">22:00</span><input type="text" class="nick-in" value="NICK DJ"></div>
        <div class="slot"><span class="time">23:00</span><input type="text" class="nick-in" value="NICK DJ"></div>
        <div class="slot"><span class="time">24:00</span><input type="text" class="nick-in" value="NICK DJ"></div>
    </div>

    <button class="btn-save" onclick="saveData()"><i class="fas fa-save"></i> SALVA PALINSESTO GIORNALIERO</button>
</div>

<script>
    function load() {
        const saved = JSON.parse(localStorage.getItem('p89_mini_hub')) || {};
        if(saved.day) $('#current-day').val(saved.day);
        $('.nick-in').each(function(index) {
            if(saved['nick'+index]) $(this).val(saved['nick'+index]);
        });
    }

    function saveData() {
        let data = {
            day: $('#current-day').val().toUpperCase(),
        };
        $('.nick-in').each(function(index) {
            data['nick'+index] = $(this).val().toUpperCase();
        });
        localStorage.setItem('p89_mini_hub', JSON.stringify(data));
        alert("PALINSESTO GIORNALIERO SALVATO!");
    }

    $(document).ready(load);
</script>

</body>
</html>
