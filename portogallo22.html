<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>EL DIABLO</title>

<link href="https://fonts.googleapis.com/css2?family=Courier+Prime:wght@700&display=swap" rel="stylesheet">

<style>
html, body {
    margin: 0;
    padding: 0;
    background: transparent !important;
    overflow: hidden; 
    height: 100%;
    font-family: sans-serif;
}

body::before {
    content: "";
    position: absolute;
    width: 100%;
    height: 100%;
    background-image: 
        radial-gradient(white, rgba(255,255,255,.2) 2px, transparent 40px),
        radial-gradient(white, rgba(255,255,255,.15) 1px, transparent 30px),
        radial-gradient(white, rgba(255,255,255,.1) 2px, transparent 40px);
    background-size: 550px 550px, 350px 350px, 250px 250px;
    background-position: 0 0, 40px 60px, 130px 270px;
    opacity: 0.4;
    z-index: 0;
    animation: backgroundTwinkle 10s linear infinite;
}

@keyframes backgroundTwinkle {
    from { transform: translateY(0); }
    to { transform: translateY(-100px); }
}

.shooting-star {
    position: absolute;
    left: 50%;
    top: 0;
    width: 4px;
    height: 4px;
    background: linear-gradient(-45deg, #00bfff, rgba(0, 0, 255, 0));
    border-radius: 999px;
    filter: drop-shadow(0 0 6px #00bfff);
    animation: shoot 5s ease-out infinite;
    z-index: 1;
    opacity: 0;
}

.shooting-star:nth-child(2) {
    left: 30%;
    animation-delay: 2s;
    animation-duration: 4s;
}

.shooting-star:nth-child(3) {
    left: 80%;
    animation-delay: 4.5s;
    animation-duration: 6s;
}

@keyframes shoot {
    0% { transform: rotate(-45deg) translateX(0) scale(0); opacity: 0; }
    50% { opacity: 1; }
    100% { transform: rotate(-45deg) translateX(-1000px) scale(1); opacity: 0; }
}

/* Posizione corretta fin dall'inizio (58% meno metà altezza del box) */
.video-box {
    position: fixed;
    width: 240px;
    height: 520px;
    top: calc(58% - 260px);
    border-radius: 20px;
    overflow: hidden;
    z-index: 9999;
    padding: 12px;
    background: linear-gradient(135deg, #00bfff, #ff00ff, #39ff14, #00bfff);
    background-size: 300% 300%;
}

.video-left {
    left: 15px;
    animation: gradientBorder 4s ease infinite, floatLeft 6s ease-in-out infinite;
}

.video-right {
    right: 15px;
    animation: gradientBorder 4s ease infinite, floatRight 6s ease-in-out infinite;
    animation-delay: 1.5s;
}

.video-box-inner {
    width: 100%;
    height: 100%;
    border-radius: 12px;
    overflow: hidden;
    position: relative;
}

.video-box video {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
}

.video-text {
    position: absolute;
    bottom: 12px;
    left: 0;
    width: 100%;
    text-align: center;
    font-size: 24px;
    font-weight: 900;
    text-transform: uppercase;
    letter-spacing: 1px;
    background: linear-gradient(90deg, #ff00ff, #00bfff, #39ff14, #ff00ff);
    background-size: 200% auto;
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    animation: shine 2s linear infinite, wave 3s ease-in-out infinite;
    pointer-events: none;
    filter: drop-shadow(0 0 5px rgba(0, 191, 255, 0.6));
}

@keyframes gradientBorder {
    0% { background-position: 0% 50%; box-shadow: 0 0 15px rgba(0, 191, 255, 0.5); }
    50% { background-position: 100% 50%; box-shadow: 0 0 30px rgba(255, 0, 255, 0.8); }
    100% { background-position: 0% 50%; box-shadow: 0 0 15px rgba(0, 191, 255, 0.5); }
}

/* Animazioni semplificate e fluide senza sbalzi di posizione */
@keyframes floatLeft {
    0% { transform: translateY(0px); }
    50% { transform: translateY(-15px); }
    100% { transform: translateY(0px); }
}

@keyframes floatRight {
    0% { transform: translateY(0px); }
    50% { transform: translateY(15px); }
    100% { transform: translateY(0px); }
}

@keyframes shine {
    to { background-position: 200% center; }
}

@keyframes wave {
    0%, 100% { transform: translateY(0) rotate(0deg); }
    50% { transform: translateY(-5px) rotate(2deg); }
}

.center-container {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    text-align: center;
    z-index: 10;
    width: 480px;
    height: 380px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    background: transparent !important;
}

.orbit-zone {
    position: relative;
    width: 100%;
    height: 180px;
}

.welcome-orbit {
    position: absolute;
    width: 100%;
    left: 0;
    font-family: 'Courier Prime', monospace;
    font-size: 24px; 
    font-weight: bold;
    text-transform: uppercase;
    text-align: center;
    border-right: 3px solid #ff00ff; 
    white-space: normal; 
    display: inline-block;
    
    background: linear-gradient(90deg, #ff9100, #ff00ff, #39ff14, #00bfff, #ff9100);
    background-size: 300% auto;
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    
    animation: 
        shine 4s linear infinite, 
        rotateAround 8s linear infinite,
        blinkCursor 0.6s step-end infinite alternate;
    filter: drop-shadow(0 0 8px rgba(255, 255, 255, 0.6));
}

@keyframes blinkCursor {
    from, to { border-color: transparent; }
    50% { border-color: #ff00ff; }
}

@keyframes rotateAround {
    0% { transform: translate(0, 0) scale(1); }
    25% { transform: translate(40px, 45px) scale(1.05); }
    50% { transform: translate(0, 90px) scale(1); }
    75% { transform: translate(-40px, 45px) scale(1.05); }
    100% { transform: translate(0, 0) scale(1); }
}

.radio-title {
    font-size: 32px;
    font-weight: 900;
    text-transform: uppercase;
    letter-spacing: 2px;
    margin-top: 25px;
    background: linear-gradient(90deg, #ff0000, #ffff00, #39ff14, #00bfff, #ff00ff, #ff0000);
    background-size: 400% auto;
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    animation: rainbowShift 6s linear infinite;
    filter: drop-shadow(0 0 12px rgba(0, 240, 255, 0.6));
}

@keyframes rainbowShift {
    0% { background-position: 0% center; }
    100% { background-position: 400% center; }
}

.owner-heart {
    position: fixed;
    z-index: 10000;
    width: 150px;
    height: 150px;
    display: flex;
    justify-content: center;
    align-items: center;
    cursor: pointer;
    user-select: none;
    transition: transform 0.1s linear;
}

.heart-shape {
    position: absolute;
    width: 110px;
    height: 110px;
    background: linear-gradient(135deg, #ff0000, #ff00ff, #00bfff, #39ff14, #ffff00, #ff0000);
    background-size: 300% 300%;
    animation: rainbowShift 4s linear infinite;
    transform: rotate(-45deg);
    border-radius: 5px;
    box-shadow: 0 0 25px rgba(255, 0, 255, 0.7);
    z-index: 1;
}

.heart-shape::before,
.heart-shape::after {
    content: "";
    position: absolute;
    width: 110px;
    height: 110px;
    background: inherit;
    border-radius: 50%;
}

.heart-shape::before { top: -55px; left: 0; }
.heart-shape::after { top: 0; left: 55px; }

.heart-text {
    position: relative;
    z-index: 2;
    color: #ffffff;
    font-size: 18px;
    font-weight: 900;
    text-transform: uppercase;
    text-shadow: 0 2px 5px rgba(0,0,0,0.8), 0 0 10px #fff;
    text-align: center;
    pointer-events: none;
}

.explode {
    animation: explosionEffect 0.5s forwards ease-out !important;
}

.fade-in-heart {
    animation: heartFadeIn 0.5s forwards ease-in !important;
}

@keyframes explosionEffect {
    0% { transform: scale(1); opacity: 1; filter: brightness(1) blur(0px); }
    50% { transform: scale(2.5); opacity: 0.8; filter: brightness(5) blur(2px); }
    100% { transform: scale(0); opacity: 0; }
}

@keyframes heartFadeIn {
    0% { transform: scale(0); opacity: 0; }
    100% { transform: scale(1); opacity: 1; }
}

.kiss-gif-container {
    position: fixed;
    z-index: 10000;
    width: 120px;
    height: 120px;
    display: none;
    user-select: none;
    pointer-events: none;
    filter: drop-shadow(0 0 15px rgba(255, 20, 147, 0.8));
}

.kiss-gif-container img {
    width: 100%;
    height: 100%;
    object-fit: contain;
}

.floating-kiss {
    animation: bounceAndFloat 3.5s ease-in-out infinite alternate;
}

@keyframes bounceAndFloat {
    0% { transform: translateY(0) scale(1) rotate(0deg); }
    50% { transform: translateY(-10px) scale(1.05) rotate(3deg); }
    100% { transform: translateY(10px) scale(0.98) rotate(-3deg); }
}

.sparkle {
    position: fixed;
    pointer-events: none;
    z-index: 9998;
    border-radius: 50%;
    animation: foxTailFade 1.8s forwards cubic-bezier(0.05, 0.7, 0.1, 1);
}

@keyframes foxTailFade {
    0% { 
        transform: scale(1.4) rotate(0deg) translate(0, 0); 
        opacity: 1; 
        filter: brightness(1.3);
    }
    40% {
        opacity: 0.9;
    }
    100% { 
        transform: scale(0) rotate(360deg) translate(var(--mx), var(--my)); 
        opacity: 0; 
    }
}

.sparkle-heart {
    position: fixed;
    font-size: 25px;
    color: #ff1493;
    z-index: 9999;
    pointer-events: none;
    animation: flyAway 2s forwards ease-out;
}

@keyframes flyAway {
    0% { transform: translate(0, 0) scale(1); opacity: 1; }
    100% { transform: translate(var(--tx), var(--ty)) scale(0); opacity: 0; }
}
</style>
</head>

<body>

<div class="shooting-star"></div>
<div class="shooting-star"></div>
<div class="shooting-star"></div>

<!-- Video Sinistra con Nik "Oliveira" -->
<div class="video-box video-left">
    <div class="video-box-inner">
        <video autoplay loop muted playsinline>
            <source src="https://peppeagosto.github.io/immaggini/portogallo1.mp4" type="video/mp4">
            Il tuo browser non supporta il tag video.
        </video>
        <div class="video-text">Oliveira</div>
    </div>
</div>

<div class="center-container">
    <div class="orbit-zone">
        <div id="typewriterText" class="welcome-orbit"></div>
    </div>
    <div class="radio-title">RadioVieiraAmigosUnidosOficial</div>
</div>

<!-- Video Destra con Nik "An@bel@" -->
<div class="video-box video-right">
    <div class="video-box-inner">
        <video autoplay loop muted playsinline>
            <source src="https://peppeagosto.github.io/immaggini/portogallo2.mp4" type="video/mp4">
            Il tuo browser non supporta il tag video.
        </video>
        <div class="video-text">𝐀𝐧@𝐛𝐞𝐥@</div>
    </div>
</div>

<div id="ownerHeart" class="owner-heart">
    <div class="heart-shape"></div>
    <div class="heart-text">Oliveira</div>
</div>

<div id="kissGifContainer" class="kiss-gif-container">
    <img src="https://xatimg.com/image/hLFxe1VhWLXu.gif" alt="Bacio">
</div>

<script>
    const textElement = document.getElementById('typewriterText');
    const textToType = "Deseja-vos uma boa escuta e agradece a vossa visita";
    let charIndex = 0;
    let isDeleting = false;

    function typewriterEffect() {
        if (!isDeleting && charIndex <= textToType.length) {
            textElement.textContent = textToType.substring(0, charIndex);
            charIndex++;
            setTimeout(typewriterEffect, 100);
        } else if (isDeleting && charIndex >= 0) {
            textElement.textContent = textToType.substring(0, charIndex);
            charIndex--;
            setTimeout(typewriterEffect, 40);
        } else if (charIndex > textToType.length) {
            isDeleting = true;
            setTimeout(typewriterEffect, 3000);
        } else if (charIndex < 0) {
            isDeleting = false;
            charIndex = 0;
            setTimeout(typewriterEffect, 500);
        }
    }

    typewriterEffect();

    const heart = document.getElementById('ownerHeart');
    const kissGif = document.getElementById('kissGifContainer');
    
    let posX = Math.random() * (window.innerWidth - 180) + 15;
    let posY = Math.random() * (window.innerHeight - 180) + 15;
    
    let speedX = 3.3;
    let speedY = 3.3;
    
    let activeElement = heart;
    let isHeartActive = true;
    let currentSize = 150; 
    let heartSparkleInterval = null;

    function moveElement() {
        const width = window.innerWidth;
        const height = window.innerHeight;

        posX += speedX;
        posY += speedY;

        if (posX <= 15 || posX >= (width - currentSize - 15)) {
            speedX = -speedX;
            posX = Math.max(15, Math.min(posX, width - currentSize - 15));
        }
        if (posY <= 15 || posY >= (height - currentSize - 15)) {
            speedY = -speedY;
            posY = Math.max(15, Math.min(posY, height - currentSize - 15));
        }

        activeElement.style.left = posX + 'px';
        activeElement.style.top = posY + 'px';

        const centerX = posX + (currentSize / 2);
        const centerY = posY + (currentSize / 2);
        for (let i = 0; i < 8; i++) {
            createSparkleTrail(centerX, centerY);
        }

        requestAnimationFrame(moveElement);
    }

    requestAnimationFrame(moveElement);

    function runStateCycle() {
        isHeartActive = true;
        currentSize = 150;
        heart.style.display = 'flex';
        heart.classList.remove('explode');
        heart.classList.add('fade-in-heart');
        activeElement = heart;

        if (heartSparkleInterval) {
            clearInterval(heartSparkleInterval);
        }

        setTimeout(() => {
            heart.classList.remove('fade-in-heart');
            heart.classList.add('explode');
            
            setTimeout(() => {
                heart.style.display = 'none';
                isHeartActive = false;
                currentSize = 120;
                
                kissGif.style.left = posX + 'px';
                kissGif.style.top = posY + 'px';
                kissGif.style.display = 'block';
                kissGif.classList.add('floating-kiss');
                activeElement = kissGif;
                
                heartSparkleInterval = setInterval(createSparkleHeart, 500);

                setTimeout(() => {
                    kissGif.style.display = 'none';
                    kissGif.classList.remove('floating-kiss');
                    runStateCycle();
                }, 10000); 

            }, 500); 
        }, 5000); 
    }

    runStateCycle();

    function createSparkleTrail(x, y) {
        const sparkle = document.createElement('div');
        sparkle.className = 'sparkle';
        
        const colors = [
            '#ff0055', '#39ff14', '#00bfff', '#ffff00', '#ff00ff', 
            '#00ffcc', '#ff9900', '#ffffff'
        ];
        const randomColor = colors[Math.floor(Math.random() * colors.length)];
        
        const size = Math.random() * 12 + 3; 
        sparkle.style.width = size + 'px';
        sparkle.style.height = size + 'px';
        sparkle.style.background = randomColor;
        sparkle.style.filter = `drop-shadow(0 0 ${Math.random() * 10 + 5}px ${randomColor})`;
        
        sparkle.style.left = x + (Math.random() - 0.5) * 35 + 'px';
        sparkle.style.top = y + (Math.random() - 0.5) * 35 + 'px';
        
        const dragX = -speedX * 18 + (Math.random() - 0.5) * 80;
        const dragY = -speedY * 18 + (Math.random() * 50) + 20; 
        
        sparkle.style.setProperty('--mx', dragX + 'px');
        sparkle.style.setProperty('--my', dragY + 'px');
        
        document.body.appendChild(sparkle);
        
        setTimeout(() => { sparkle.remove(); }, 1800);
    }

    function createSparkleHeart() {
        if (isHeartActive) return;
        const heartSparkle = document.createElement('div');
        heartSparkle.className = 'sparkle-heart';
        heartSparkle.innerHTML = '❤️';
        
        heartSparkle.style.left = (posX + 50) + 'px';
        heartSparkle.style.top = (posY + 30) + 'px';
        
        const tx = (Math.random() - 0.5) * 180;
        const ty = (Math.random() - 0.5) * 180 - 80; 
        heartSparkle.style.setProperty('--tx', tx + 'px');
        heartSparkle.style.setProperty('--ty', ty + 'px');
        
        document.body.appendChild(heartSparkle);
        
        setTimeout(() => { heartSparkle.remove(); }, 2000);
    }
</script>

</body>
</html>
