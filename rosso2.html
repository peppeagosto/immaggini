<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>rosso22 - Spaced Layout</title>
<style>
body {
  margin: 0;
  height: 100vh;
  display: flex;
  justify-content: center; /* Centra il gruppo */
  align-items: center;
  gap: 40px; /* DISTANZA TRA I VIDEO: aumentala o dimunuiscila qui */
  font-family: 'Arial', sans-serif;
  overflow: hidden;
  background: linear-gradient(135deg, #ff0000, #ff3300, #ff6600, #ff9900, #6600ff, #ffffff);
  background-size: 400% 400%;
  animation: bgAnim 15s ease infinite;
}

@keyframes bgAnim {
  0% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
  100% { background-position: 0% 50%; }
}

/* Video ai lati */
.side-video {
  height: 360px;
  width: auto;
  object-fit: cover;
  border-radius: 10px;
  flex-shrink: 0; /* Impedisce che si rimpiccioliscano troppo */
}

/* Contenitore centrale */
#contenitore {
  width: 484px;
  height: 380px;
  position: relative;
  border-radius: 15px;
  background: transparent;
  overflow: hidden;
  flex-shrink: 0;
}

/* Video Centrale (Imgur) */
.center-video {
  width: 100%;
  height: 100%;
  object-fit: cover;
  opacity: 0;
  animation: fadeIn 6s ease-in forwards;
}

@keyframes fadeIn {
  from { opacity: 0; }
  to { opacity: 1; }
}

/* Bordo animato */
#contenitore::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0; bottom: 0;
  padding: 5px;
  border-radius: 15px;
  background: linear-gradient(270deg, #ff0000, #ff7300, #fffb00, #48ff00, #00ffd5, #002bff, #7a00ff, #ff00c8, #ff0000);
  background-size: 400% 400%;
  animation: rainbowBorder 10s linear infinite;
  -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
  -webkit-mask-composite: xor;
  mask-composite: exclude;
  z-index: 2;
  pointer-events: none;
}

@keyframes rainbowBorder {
  0% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
  100% { background-position: 0% 50%; }
}
</style>
</head>
<body>

  <video class="side-video" id="videoLeft" src="https://peppeagosto.github.io/immaggini/rosso22.mp4" autoplay loop muted playsinline></video>

  <div id="contenitore">
    <video class="center-video" src="https://peppeagosto.github.io/immaggini/imgur.mp4" autoplay loop muted playsinline></video>
  </div>

  <video class="side-video" id="videoRight" src="https://peppeagosto.github.io/immaggini/rosso22.mp4" autoplay loop muted playsinline></video>

</body>
</html>
