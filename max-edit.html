<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Centrato xat</title>
    <style>
        /* Reset totale per garantire la trasparenza su xat */
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: transparent !important;
            overflow: hidden;
        }

        /* Container calibrato per la inner box di xat */
        .video-container {
            width: 100%;
            max-width: 728px; /* Larghezza standard xat */
            height: 480px;    /* Altezza precisa per lo sfondo piccolo */
            margin: 0 auto;   /* Centra perfettamente in orizzontale */
            
            /* Spinge il video verso il basso per saltare la barra superiore di xat */
            margin-top: 54px; 
            
            display: flex;
            justify-content: center;
            align-items: center;
            background: transparent;
        }

        /* Stile del video (mantiene le proporzioni della ragazza) */
        video {
            width: 100%;
            height: 100%;
            object-fit: cover; /* Taglia i lati senza distorcere o allungare l'immagine */
            display: block;
            background: transparent;
        }
    </style>
</head>
<body>

    <div class="video-container">
        <video autoplay loop muted playsinline>
            <source src="https://peppeagosto.github.io/immaggini/roberta.mp4" type="video/mp4">
            Il tuo browser non supporta il tag video.
        </video>
    </div>

</body>
</html>
