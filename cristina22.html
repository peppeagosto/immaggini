<!DOCTYPE html>
<html lang="it">
<head>
     <meta charset="UTF-8">
     <title>il cartaio</title>
     <style>
         * { margin: 0; padding: 0; box-sizing: border-box; }
         
         body, html {
             height: 100%;
             width: 100%;
             overflow: hidden;
             background-color: #000;
             font-family: 'Segoe UI', Arial, sans-serif;
         }

         #bg-frame {
             position: fixed;
             top: 0;
             left: 0;
             width: 100%;
             height: 100%;
             border: none;
             z-index: 1;
         }

         /* DATARIO A DESTRA */
         #info-sidebar {
             position: absolute;
             z-index: 10;
             top: 120px;
             right: 20px;
             background: rgba(0, 0, 0, 0.4);
             backdrop-filter: blur(10px);
             padding: 20px;
             border-radius: 12px;
             transition: opacity 1s ease-in-out;
             opacity: 1;
             border: 1px solid rgba(255, 255, 255, 0.1);
             min-width: 280px;
         }

         .rainbow-text {
             background-image: linear-gradient(45deg, #ff0000, #ff7f00, #ffff00, #00ff00, #0000ff, #4b0082, #8f00ff);
             background-size: 200% auto;
             color: transparent;
             -webkit-background-clip: text;
             background-clip: text;
             animation: rainbowShift 4s linear infinite;
         }

         @keyframes rainbowShift {
             to { background-position: 200% center; }
         }

         .date-table {
             width: 100%;
             border-collapse: collapse;
             margin-top: 10px;
         }

         .date-table td {
             padding: 8px 12px;
             border: 1px solid rgba(255, 255, 255, 0.1);
             text-align: center;
             text-transform: uppercase;
             font-size: 14px;
             letter-spacing: 1px;
             font-weight: bold;
         }

         #clock {
             font-size: 50px;
             font-weight: 900;
             display: block;
             text-align: center;
             margin-bottom: 5px;
         }

         #command-zone-left {
             position: absolute;
             z-index: 20;
             bottom: 30px;
             left: 20px;
             padding: 10px;
         }

         #toggle-button {
             padding: 12px 30px;
             background: rgba(0, 0, 0, 0.8);
             border: 2px solid #00ffcc;
             color: #00ffcc;
             border-radius: 50px;
             cursor: pointer;
             font-weight: bold;
             font-size: 12px;
             text-transform: uppercase;
             transition: all 0.3s ease;
             opacity: 0;
         }

         #command-zone-left:hover #toggle-button {
             opacity: 1;
         }
     </style>
</head>
<body>

     <iframe id="bg-frame" src="about:blank"></iframe>

     <div id="command-zone-left">
         <button id="toggle-button" onclick="toggleDatarioManual()">OFF</button>
     </div>

     <div id="info-sidebar">
         <span id="clock" class="rainbow-text">00:00</span>
         <table class="date-table">
             <tr>
                 <td id="day-name" class="rainbow-text">GIORNO</td>
                 <td id="full-date" class="rainbow-text">DATA</td>
             </tr>
         </table>
     </div>

     <script>
         const palinsesto = {
             0: "https://peppeagosto.github.io/immaggini/sorriso2.html",
             1: "https://peppeagosto.github.io/immaggini/fiori.html",
             2: "https://peppeagosto.github.io/immaggini/acqua.html",
             3: "https://peppeagosto.github.io/immaggini/genny.html",
             4: "https://peppeagosto.github.io/immaggini/chitarra.html",
             5: "https://peppeagosto.github.io/immaggini/ali.html",
             6: "https://peppeagosto.github.io/immaggini/fleva.html"
         };

         let manualOverride = false;

         function setDatario(show) {
             const sidebar = document.getElementById('info-sidebar');
             const btn = document.getElementById('toggle-button');
             if (show) {
                 sidebar.style.opacity = '1';
                 btn.innerText = 'OFF';
                 btn.style.borderColor = '#00ffcc';
                 btn.style.color = '#00ffcc';
             } else {
                 sidebar.style.opacity = '0';
                 btn.innerText = 'ON';
                 btn.style.borderColor = '#ff4d4d';
                 btn.style.color = '#ff4d4d';
             }
         }

         function toggleDatarioManual() {
             const sidebar = document.getElementById('info-sidebar');
             const isVisible = sidebar.style.opacity !== '0';
             setDatario(!isVisible);
             manualOverride = true; 
             // Dopo 30 secondi dal comando manuale, riprende l'automatismo
             setTimeout(() => { manualOverride = false; }, 30000);
         }

         function updateUI() {
             const ora = new Date();
             const h = ora.getHours();
             const m = ora.getMinutes();
             const s = ora.getSeconds();

             // Aggiornamento Orologio e Video
             document.getElementById('clock').innerText = `${String(h).padStart(2, '0')}:${String(m).padStart(2, '0')}`;
             const videoIndex = h % 7;
             const frame = document.getElementById('bg-frame');
             if (frame.src !== palinsesto[videoIndex]) {
                 frame.src = palinsesto[videoIndex];
             }

             // Aggiornamento Data
             const opzioniData = { day: '2-digit', month: 'short', year: 'numeric' };
             document.getElementById('full-date').innerText = ora.toLocaleDateString('it-IT', opzioniData).replace('.', '');
             const opzioniGiorno = { weekday: 'long' };
             document.getElementById('day-name').innerText = ora.toLocaleDateString('it-IT', opzioniGiorno).replace('.', '');

             // LOGICA AUTOMATICA
             if (!manualOverride) {
                 // Appare solo per i primi 15 secondi ogni 5 minuti (es. 10:00, 10:05, 10:10...)
                 if (m % 5 === 0 && s < 15) {
                     setDatario(true);
                 } else {
                     setDatario(false);
                 }
             }
         }

         // Esegui subito e poi ogni secondo per precisione
         setInterval(updateUI, 1000);
         updateUI();
     </script>
</body>
</html>
