<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>V66.1</title>
<style>
    @import url('https://fonts.googleapis.com/css2?family=Creepster&family=Metal+Mania&display=swap');

    :root {
        --inf-red: #ff1a00;
        --inf-orange: #ff5e00;
        --horror-font: 'Creepster', cursive;
    }

    body { background: transparent; margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; font-family: 'Courier New', monospace; }

    #security-lock {
        display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
        background: #000; color: var(--inf-red); z-index: 9999; flex-direction: column;
        justify-content: center; align-items: center; font-family: var(--horror-font); 
        text-align: center; border: 15px solid var(--inf-red);
    }

    .main-terminal {
        width: 780px; height: 720px; background: rgba(0, 0, 0, 0.96);
        display: grid; grid-template-columns: 280px 1fr; grid-template-rows: 80px 1fr 100px;
        position: relative; padding: 15px; border: 2px solid var(--inf-red);
        box-shadow: 0 0 50px rgba(255, 26, 0, 0.5);
    }

    .glow-box { position: relative; background: rgba(5, 0, 0, 0.98); margin: 8px; overflow: hidden; border: 1px solid rgba(255, 94, 0, 0.2); }
    .glow-box::before, .main-terminal::before {
        content: ""; position: absolute; inset: -6px; border: 8px solid transparent;
        background: conic-gradient(from var(--a), transparent 40%, var(--inf-red), var(--inf-orange), transparent 100%) border-box;
        -webkit-mask: linear-gradient(#fff 0 0) padding-box, linear-gradient(#fff 0 0); -webkit-mask-composite: destination-out; mask-composite: exclude;
        animation: rotateGlow 2.5s linear infinite; filter: blur(1px) drop-shadow(0 0 15px var(--inf-red));
    }

    @property --a { syntax: '<angle>'; initial-value: 0deg; inherits: false; }
    @keyframes rotateGlow { to { --a: 360deg; } }

    .header { grid-column: 1 / 3; display: flex; align-items: center; padding: 0 20px; gap: 15px; }
    #track-marquee { font-family: var(--horror-font) !important; font-size: 30px; color: var(--inf-orange); text-shadow: 0 0 15px var(--inf-red); }

    .monitor-left { display: flex; flex-direction: column; gap: 5px; }
    .info-zone { height: 210px; padding: 12px; font-size: 13px; color: #fff; font-family: 'Metal Mania'; line-height: 1.5; }
    .cover-zone { flex-grow: 1; display: flex; justify-content: center; align-items: center; overflow: hidden; }
    #coverArt { width: 100%; height: 100%; object-fit: cover; }

    .console-main { display: flex; flex-direction: column; gap: 10px; }
    .log-window { height: 120px; padding: 10px; font-size: 11px; color: var(--inf-orange); overflow-y: auto; scrollbar-width: none; border-top: 1px solid var(--inf-red); }
    .visualizer-area { flex-grow: 1; display: flex; gap: 2px; align-items: flex-end; padding: 10px; }
    .bar { flex: 1; background: linear-gradient(to top, var(--inf-red), var(--inf-orange), #fff); height: 5px; }

    .footer { grid-column: 1 / 3; display: flex; align-items: center; padding: 0 25px; gap: 20px; }
    
    .btn { background: rgba(255, 26, 0, 0.3); border: 2px solid var(--inf-red); color: #fff; padding: 10px 20px; cursor: pointer; font-family: var(--horror-font); font-size: 18px; z-index: 100; transition: 0.3s; width: 100px; }
    .btn:hover { background: var(--inf-red); box-shadow: 0 0 20px var(--inf-red); }
    
    #volRange { -webkit-appearance: none; flex-grow: 1; height: 10px; background: rgba(255, 26, 0, 0.3); border: 1px solid var(--inf-red); border-radius: 5px; outline: none; margin: 0 15px; }
    #volRange::-webkit-slider-thumb { -webkit-appearance: none; width: 20px; height: 20px; background: var(--inf-orange); border: 2px solid #fff; border-radius: 50%; cursor: pointer; box-shadow: 0 0 10px var(--inf-red); }

    #clock { color: var(--inf-orange); font-size: 18px; font-family: 'Metal Mania'; width: 100px; text-align: right; }
</style>
</head>
<body>

<div id="security-lock">
    <h1 style="font-size: 60px; margin: 0;">ACCESS DENIED</h1>
    <p style="font-size: 24px; color: #fff;">NO COPIARE DAL CARTAIO CRETINO FATTELI DA SOLO</p>
</div>

<div class="main-terminal" id="terminal-body">
    <div class="header glow-box">
        <div style="flex-grow:1; overflow:hidden;">
            <marquee id="track-marquee" direction="left" behavior="alternate" scrollamount="7">SINTONIZZAZIONE ABISSO...</marquee>
        </div>
    </div>

    <div class="monitor-left">
        <div class="info-zone glow-box">
            [IDENTIFICAZIONE]<br>
            CITTÀ: <span id="city" style="color:var(--inf-orange)">RICERCA...</span><br>
            METEO: <span id="temp" style="color:var(--inf-orange)">--°C</span> | <span id="weather" style="color:var(--inf-orange)">...</span><br>
            <hr style="border:0; border-top:1px solid var(--inf-red); margin:5px 0;">
            [OROSCOPO]<br>
            SEGNO: <span id="sign" style="color:var(--inf-orange)">...</span><br>
            DESTINO: <span id="fate" style="color:white; font-size:11px;">ANALISI...</span>
        </div>
        <div class="cover-zone glow-box">
            <img src="https://xatimg.com/image/OfPr406rB1UZ.gif" id="coverArt">
        </div>
    </div>

    <div class="console-main">
        <div class="log-window glow-box" id="log">[SYS] GHOST_PROTECTION ACTIVE.<br>[SYS] CONTROLLI ALLINEATI.</div>
        <div class="visualizer-area glow-box" id="visualizer"></div>
    </div>

    <div class="footer glow-box">
        <button class="btn" id="exeBtn">PLAY</button>
        <input type="range" id="volRange" min="0" max="1" step="0.01" value="0.8">
        <button class="btn" id="stopBtn" style="background:rgba(255,0,0,0.5)">STOP</button>
        <div id="clock">00:00:00</div>
    </div>
</div>

<audio id="audio" crossorigin="anonymous" src="https://stream.zeno.fm/ylkruiq5e4fvv"></audio>
<audio id="alarm-sound" src="https://www.soundjay.com/buttons/sounds/beep-01a.mp3" loop></audio>

<script>

    const audio = document.getElementById("audio");
    const log = document.getElementById('log');
    const visualizer = document.getElementById('visualizer');
    const marquee = document.getElementById('track-marquee');
    const volRange = document.getElementById('volRange');
    let audioCtx, analyser, dataArray, isPlaying = false, currentTitle = "";

    function addLog(msg) {
        log.innerHTML += `<br>[${new Date().toLocaleTimeString()}] ${msg}`;
        log.scrollTop = log.scrollHeight;
    }

    async function getSensors() {
        try {
            const r = await fetch("https://ipapi.co/json/");
            const d = await r.json();
            document.getElementById("city").innerText = d.city.toUpperCase();
            const wr = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${d.latitude}&longitude=${d.longitude}&current_weather=true`);
            const wd = await wr.json();
            document.getElementById("temp").innerText = wd.current_weather.temperature + "°C";
            document.getElementById("weather").innerText = "INFERNALE";
        } catch(e) { document.getElementById("city").innerText = "THE ABYSS"; }
    }

    function getZodiac() {
        const d = new Date().getDate(), m = new Date().getMonth() + 1;
        let s = "", f = "";
        if ((m==3 && d>=21) || (m==4 && d<=19)) {s="ARIETE"; f="Fuoco nelle vene.";}
        else if ((m==4 && d>=20) || (m==5 && d<=20)) {s="TORO"; f="Forza bruta oggi.";}
        else if ((m==5 && d>=21) || (m==6 && d<=20)) {s="GEMELLI"; f="Caos favorevole.";}
        else if ((m==6 && d>=21) || (m==7 && d<=22)) {s="CANCRO"; f="Maree oscure.";}
        else if ((m==7 && d>=23) || (m==8 && d<=22)) {s="LEONE"; f="Ruggisci forte.";}
        else if ((m==8 && d>=23) || (m==9 && d<=22)) {s="VERGINE"; f="Calcolo perfetto.";}
        else if ((m==9 && d>=23) || (m==10 && d<=22)) {s="BILANCIA"; f="Equilibrio instabile.";}
        else if ((m==10 && d>=23) || (m==11 && d<=21)) {s="SCORPIONE"; f="Mistero fatale.";}
        else if ((m==11 && d>=22) || (m==12 && d<=21)) {s="SAGITTARIO"; f="Mira infuocata.";}
        else if ((m==12 && d>=22) || (m==1 && d<=19)) {s="CAPRICORNO"; f="Scalata epica.";}
        else if ((m==1 && d>=20) || (m==2 && d<=18)) {s="ACQUARIO"; f="Vento di rivolta.";}
        else {s="PESCI"; f="Abissi sognanti.";}
        document.getElementById("sign").innerText = s;
        document.getElementById("fate").innerText = f;
    }

    function startVisualizer() {
        if (!audioCtx) {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            analyser = audioCtx.createAnalyser();
            const source = audioCtx.createMediaElementSource(audio);
            source.connect(analyser); analyser.connect(audioCtx.destination);
            analyser.fftSize = 256; dataArray = new Uint8Array(analyser.frequencyBinCount);
            visualizer.innerHTML = '';
            for(let i=0; i<45; i++) { let b = document.createElement('div'); b.className = 'bar'; visualizer.appendChild(b); }
        }
    }

    document.getElementById('exeBtn').onclick = () => {
        startVisualizer();
        if (audio.paused) { 
            audio.play(); isPlaying = true; document.getElementById('exeBtn').innerText = "CLOSE";
            addLog("GATE OPENED");
            requestAnimationFrame(function render() {
                if(!isPlaying) return;
                requestAnimationFrame(render);
                analyser.getByteFrequencyData(dataArray);
                const bars = document.getElementsByClassName('bar');
                for(let i=0; i<bars.length; i++) { bars[i].style.height = (dataArray[i]/255)*100 + '%'; }
            });
        } else {
            audio.pause(); isPlaying = false; document.getElementById('exeBtn').innerText = "PLAY";
            addLog("GATE CLOSED");
        }
    };

    document.getElementById('stopBtn').onclick = () => {
        audio.pause(); audio.currentTime = 0; isPlaying = false;
        document.getElementById('exeBtn').innerText = "PLAY";
        addLog("STREAM TERMINATED");
    };

    volRange.oninput = (e) => { audio.volume = e.target.value; };

    async function updateTitles() {
        try {
            const r = await fetch("https://zenoplay.zenomedia.com/api/zenofm/nowplaying/ylkruiq5e4fvv?t=" + Date.now());
            const d = await r.json();
            if(d.title && d.title.toUpperCase() !== currentTitle) {
                currentTitle = d.title.toUpperCase(); marquee.innerText = currentTitle;
                addLog("SIGNAL: " + currentTitle);
            }
        } catch(e) {}
    }

    getSensors(); getZodiac();
    setInterval(updateTitles, 10000); updateTitles();
    setInterval(() => { document.getElementById('clock').innerText = new Date().toLocaleTimeString(); }, 1000);
</script>
</body>
