<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>EL DIABLO</title>
<style>
body{
  margin:0;
  background:transparent;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  overflow:hidden;
}
.container{
  position:relative;
  width:1308px;
  height:484px;
}

/* ===== CONTENITORE VIDEO (270px) ===== */
.video-wrapper{
  position:absolute;
  width:270px;
  height:484px;
  overflow:hidden;
  z-index:1;
  background:transparent;
  border-radius:20px;
}
.left{left:0}
.right{right:0}

.video-wrapper::before{
  content:"";
  position:absolute;
  inset:0;
  padding:4px;
  border-radius:20px;
  background:conic-gradient(red,orange,yellow,lime,cyan,blue,violet,red);
  -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
  -webkit-mask-composite:xor;
  mask-composite:exclude;
  filter:drop-shadow(0 0 10px rgba(255,0,255,.7));
  pointer-events:none;
}

.side-video{
  width:100%;
  height:100%;
  object-fit:cover;
  border-radius:16px;
}

/* TESTO VIDEO LATERALE */
.video-text{
  position:absolute;
  bottom:8px;
  left:50%;
  transform:translateX(-50%);
  font-size:25px;
  font-family:Trebuchet MS;
  font-weight:bold;
  z-index:2;
  background:linear-gradient(90deg,red,orange,yellow,lime,cyan,blue,violet,red);
  background-size:400% 100%;
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  animation: rainbowText 3s linear infinite;
}

@keyframes rainbowText{
  0%{background-position:0%}
  100%{background-position:100%}
}

/* ===== AREA CENTRALE ===== */
.center-area{
  position:absolute;
  left:270px;
  right:270px;
  top:0;
  bottom:0;
  display:flex;
  justify-content:center;
  align-items:center;
  z-index:0;
}

.center-box{
  position:relative;
  width:300px; 
  text-align: center;
  animation: fadeLoop 6s ease-in-out infinite;
  filter:drop-shadow(0 0 20px rgba(255,0,0,0.6));
}

.center-box img{
  width:100%;
  height: auto;
  display:block;
  border-radius:20px;
  border: 2px solid rgba(255,255,255,0.15);
}

/* ===== TESTO EL DIABLO CON COLORI FOTO + 3D ===== */
.center-title{
  position:absolute;
  bottom:15px;
  left:50%;
  transform:translateX(-50%);
  width: 100%;
  font-size:35px;
  font-family:Trebuchet MS;
  font-weight:900;
  letter-spacing:1px;
  
  /* Gradiente basato sui colori della foto (Rosso/Arancio/Giallo) */
  background: linear-gradient(to bottom, #ff0000, #ff8c00, #ffd700);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;

  /* Effetto 3D Argento come contorno */
  filter: drop-shadow(0 1px 0 #fff) 
          drop-shadow(0 2px 0 #9b9b9b)
          drop-shadow(0 4px 5px rgba(0,0,0,0.8));
  
  pointer-events:none;
}

@keyframes fadeLoop{
  0%{opacity:0; transform: scale(0.98);}
  20%{opacity:1; transform: scale(1);}
  80%{opacity:1; transform: scale(1);}
  100%{opacity:0; transform: scale(0.98);}
}
</style>
</head>
<body>

<div class="container">

  <div class="video-wrapper left">
    <video class="side-video" autoplay loop muted playsinline>
      <source src="https://peppeagosto.github.io/immaggini/cuffie2.mp4" type="video/mp4">
    </video>
    <div class="video-text">ELCARTAIO</div>
  </div>

  <div class="center-area">
    <div class="center-box">
       <img src="https://xatimg.com/image/2FGZ5Q2ZNHc5.jpg" alt="Logo">
       <div class="center-title">ANONYMOUS</div>
    </div>
  </div>

  <div class="video-wrapper right">
    <video class="side-video" autoplay loop muted playsinline>
      <source src="https://peppeagosto.github.io/immaggini/cuffie2.mp4" type="video/mp4">
    </video>
    <div class="video-text">EL DIABLO
  </div>
  
</div>

</body>
</html>
