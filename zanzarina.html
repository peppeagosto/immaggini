<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>ZANZARINA</title>
<style>
body {
  margin: 0;
  background: transparent;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  overflow: hidden;
}

.container {
  position: relative;
  width: 1308px;
  height: 484px;
}

/* ===== CONTENITORI LATERALI (FOTO PNG) ===== */
.side-wrapper {
  position: absolute;
  width: 270px;
  height: 484px;
  overflow: hidden;
  z-index: 2;
  background: transparent;
  border-radius: 20px;
}
.left { left: 0; }
.right { right: 0; }

/* ===== BORDI ARCOBALENO ===== */
.side-wrapper::before {
  content: "";
  position: absolute;
  inset: 0;
  padding: 4px;
  border-radius: 20px;
  background: conic-gradient(red, orange, yellow, lime, cyan, blue, violet, red);
  -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
  -webkit-mask-composite: xor;
  mask-composite: exclude;
  filter: drop-shadow(0 0 10px rgba(255, 0, 255, .7));
  pointer-events: none;
}

.side-img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  border-radius: 16px;
}

/* ===== TESTO ARCOBALENO SULLE FOTO ===== */
.side-text {
  position: absolute;
  bottom: 8px;
  left: 50%;
  transform: translateX(-50%);
  font-size: 25px;
  font-family: 'Trebuchet MS';
  font-weight: bold;
  z-index: 3;
  background: linear-gradient(90deg, red, orange, yellow, lime, cyan, blue, violet, red);
  background-size: 400% 100%;
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  animation: rainbowText 3s linear infinite;
  white-space: nowrap; /* Mantiene tutto su una linea */
}

@keyframes rainbowText {
  0% { background-position: 0%; }
  100% { background-position: 100%; }
}

/* ===== AREA CENTRALE (VIDEO MP4) ===== */
.center-area {
  position: absolute;
  left: 280px; 
  right: 280px;
  top: 0;
  bottom: 0;
  display: flex;
  justify-content: center;
  align-items: center;
  z-index: 1;
}

.center-video-box {
  position: relative;
  width: 100%;
  height: 100%;
  filter: drop-shadow(0 0 25px rgba(255, 0, 0, .4));
}

.center-video-box video {
  width: 100%;
  height: 100%;
  object-fit: cover; 
  border-radius: 20px;
}

/* ===== TESTO CENTRALE ARCOBALENO SFUMATO ===== */
.center-title {
  position: absolute;
  bottom: 20px;
  left: 50%;
  transform: translateX(-50%);
  width: 100%; /* Occupa larghezza per centrare bene il testo */
  text-align: center;
  font-size: 45px;
  font-family: 'Trebuchet MS';
  font-weight: 900;
  letter-spacing: 2px;
  white-space: nowrap; /* Forza il testo su una sola linea */
  
  /* Effetto Arcobaleno Sfumato */
  background: linear-gradient(90deg, #ff0000, #ff7f00, #ffff00, #00ff00, #0000ff, #4b0082, #8b00ff);
  background-size: 200% auto;
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  animation: rainbowShift 4s linear infinite;
  
  /* Ombra leggera per leggibilità sul video */
  filter: drop-shadow(2px 2px 4px rgba(0,0,0,0.5));
  z-index: 4;
}

@keyframes rainbowShift {
  0% { background-position: 0% center; }
  100% { background-position: 200% center; }
}
</style>
</head>
<body>

<div class="container">

  <div class="side-wrapper left">
    <img src="https://xatimg.com/image/PDpggxw5zKW2.jpg" class="side-img" alt="foto">
    <div class="side-text">BENVENUTI</div>
  </div>

  <div class="center-area">
    <div class="center-video-box">
      <video autoplay loop muted playsinline>
        <source src="https://peppeagosto.github.io/immaggini/fiorello.mp4" type="video/mp4">
      </video>
      <div class="center-title">Alessandro Fiorello</div>
    </div>
  </div>

  <div class="side-wrapper right">
    <img src="https://xatimg.com/image/PDpggxw5zKW2.jpg" class="side-img" alt="foto">
    <div class="side-text">napoliprimaedopolive</div>
  </div>

</div>

</body>
</html>
