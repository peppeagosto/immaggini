

<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
<style>
    :root { --rb: linear-gradient(to right, #f00, #ff0, #0f0, #0ff, #f0f, #f00); --b: 1; --neon: #0f4; }
    
    body { 
        background: transparent; 
        margin: 0; 
        height: 680px; 
        width: 700px; 
        display: flex; 
        align-items: center; 
        justify-content: flex-start;
        font-family: 'Arial Black', sans-serif; 
        overflow: hidden; 
    }

    /* TELECOMANDO LATERALE */
    .tv-remote {
        position: relative; 
        margin-left: 15px;
        width: 190px; 
        background: rgba(0,0,0,0.95); 
        border: 2px solid var(--neon); 
        border-radius: 10px;
        padding: 12px; 
        z-index: 9999; 
        box-shadow: 0 0 20px rgba(0,255,68,0.3);
        display: flex; 
        flex-direction: column; 
        gap: 8px;
    }

    .tv-channel {
        background: #111; 
        border: 1px solid #333; 
        border-radius: 5px;
        padding: 10px; 
        color: #fff; 
        font-size: 10px; 
        cursor: pointer;
        display: flex; 
        align-items: center; 
        justify-content: space-between; 
        transition: 0.2s;
        text-transform: uppercase;
        font-weight: bold;
    }
    .tv-channel:hover { background: var(--neon); color: #000; }

    .remote-title { 
        background: var(--rb); 
        -webkit-background-clip: text; 
        color: transparent; 
        font-size: 15px; 
        text-align: center; 
        margin-bottom: 10px; 
        border-bottom: 1px solid #333; 
        padding-bottom: 8px; 
    }

    /* MONITOR RETTANGOLARE */
    .monitor-cinema {
        position: relative; 
        width: 460px; 
        height: 260px; 
        background: #000; 
        border: 4px solid #222; 
        border-radius: 5px;
        margin-left: 25px; 
        box-shadow: 0 0 50px #000;
        z-index: 1;
    }

    /* WOOFER PALLONI 5000W */
    .woofer {
        position: absolute; 
        width: 110px; 
        height: 110px;
        background: radial-gradient(circle, #f00 0%, #000 80%); 
        border-radius: 20px;
        opacity: 0;
        transform: scale(calc(var(--b) * 1.5)); 
        transition: 0.05s; 
        z-index: -1;
        pointer-events: none; 
    }
    .woofer.active { opacity: 0.9; }
    
    .tl { top: -45px; left: -45px; } .tr { top: -45px; right: -45px; } 
    .bl { bottom: -45px; left: -45px; } .br { bottom: -45px; right: -45px; }

    #screen { 
        position: absolute; 
        inset: 0; 
        overflow: hidden; 
        z-index: 5; 
        background: #000; 
        pointer-events: auto; 
    }
    #video-frame { width: 100%; height: 100%; border: none; display: none; }
    #radio-gif { width: 100%; height: 100%; object-fit: cover; display: none; }
</style>
</head>
<body>

<div class="tv-remote">
    <div class="remote-title">CARTAIO MEDIA</div>
    
    <div class="tv-channel" onclick="changeChan('pluto_cinema')">PLUTO CINEMA <i class="fas fa-film"></i></div>
    <div class="tv-channel" onclick="changeChan('pluto_serie')">PLUTO SERIE TV <i class="fas fa-tv"></i></div>
    <div class="tv-channel" onclick="changeChan('youtube')">CARICA YOUTUBE <i class="fab fa-youtube"></i></div>
    
    <div class="tv-channel" onclick="changeChan('radio')" style="color:var(--neon); border-color:var(--neon); margin-top:10px;">RADIO ZENO <i class="fas fa-broadcast-tower"></i></div>
    <div class="tv-channel" onclick="location.reload()" style="font-size: 8px; opacity: 0.5;">RESTART <i class="fas fa-sync"></i></div>
</div>

<div class="monitor-cinema">
    <div class="woofer tl"></div><div class="woofer tr"></div>
    <div class="woofer bl"></div><div class="woofer br"></div>
    
    <div id="screen">
        <iframe id="video-frame" src="" allow="autoplay; fullscreen"></iframe>
        <img id="radio-gif" src="https://xatimg.com/image/9FrlYTqB6x3U.gif">
    </div>
</div>

<audio id="audio-live" crossorigin="anonymous"></audio>

<script>
    let radioOn = false, ctx, an, d;
    const frame = document.getElementById('video-frame');
    const rGif = document.getElementById('radio-gif');
    const audio = document.getElementById('audio-live');

    function changeChan(type) {
        if (ctx && ctx.state === 'suspended') ctx.resume();
        audio.pause(); radioOn = false;
        rGif.style.display = "none";
        frame.style.display = "block";
        $('.woofer').removeClass('active');

        if(type === 'pluto_cinema') {
            frame.src = "https://pluto.tv/it/live-tv/pluto-tv-cinema-italiano-it";
        } else if(type === 'pluto_serie') {
            frame.src = "https://pluto.tv/it/live-tv/pluto-tv-serie-it";
        } else if(type === 'youtube') {
            let ytLink = prompt("Incolla il link YouTube:");
            if(ytLink && ytLink.includes('v=')) {
                let id = ytLink.split('v=')[1].split('&')[0];
                frame.src = "https://www.youtube.com/embed/" + id + "?autoplay=1";
            }
        } else if(type === 'radio') {
            startRadio();
        }
    }

    function startRadio() {
        if(!ctx){
            ctx=new(window.AudioContext||window.webkitAudioContext)();
            an=ctx.createAnalyser();
            const source = ctx.createMediaElementSource(audio);
            source.connect(an); an.connect(ctx.destination);
            an.fftSize=32; d=new Uint8Array(16); loop();
        }
        frame.style.display = "none"; frame.src = "";
        rGif.style.display = "block";
        audio.src = "https://stream.zeno.fm/ylkruiq5e4fvv";
        audio.play().catch(e => console.log("Azione richiesta"));
        radioOn = true;
        $('.woofer').addClass('active');
    }

    function loop(){
        requestAnimationFrame(loop); 
        if(!radioOn) return;
        an.getByteFrequencyData(d);
        document.documentElement.style.setProperty('--b', 1 + d[1]/125);
    }
</script>
</body>
</html>
