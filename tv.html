<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <style>
        :root { --rainbow: linear-gradient(to right, #f00, #ff0, #0f0, #0ff, #f0f, #f00); }
        body { background: transparent; margin: 0; font-family: 'Arial Black', sans-serif; overflow: hidden; }

        /* TRIGGER HUB - SOLO TESTO */
        .hub-trigger {
            position: fixed; top: 45px; right: 20px; 
            width: 220px; height: 60px; 
            background: #000; border: 3px solid #fff; border-radius: 15px;
            cursor: pointer; animation: neonGlow 6s infinite linear;
            display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 99999;
        }
        
        /* CARD MULTIMEDIALE */
        .hub-card {
            display: none; position: fixed; top: 45px; right: 20px; width: 300px;
            background: rgba(0, 0, 0, 0.95); border: 3px solid #fff; border-radius: 20px;
            padding: 15px; animation: neonGlow 6s infinite linear;
            flex-direction: column; gap: 12px; z-index: 999999;
        }

        @keyframes neonGlow {
            0% { border-color: #f00; box-shadow: 0 0 15px #f00; }
            33% { border-color: #0f0; box-shadow: 0 0 15px #0f0; }
            66% { border-color: #0ff; box-shadow: 0 0 15px #0ff; }
            100% { border-color: #f00; box-shadow: 0 0 15px #f00; }
        }

        .text-neon { background: var(--rainbow); -webkit-background-clip: text; color: transparent; font-weight: 900; text-align: center; }

        /* LINK TESTUALI CATTIVI */
        .link-cmd {
            color: #fff; font-size: 14px; text-transform: uppercase; cursor: pointer;
            padding: 10px; border-bottom: 1px solid #333; transition: 0.3s;
            display: flex; justify-content: space-between; align-items: center;
        }
        .link-cmd:hover { color: #0f4; background: rgba(0,255,68,0.1); border-radius: 8px; }
        .link-cmd i { font-size: 18px; }

        /* PLAYER VIDEO */
        #media-box {
            width: 100%; height: 180px; border: 2px solid #444; border-radius: 10px;
            display: none; margin-top: 5px; background: #000;
        }
        
        .close-hub { color: #f44; font-size: 11px; text-align: center; margin-top: 10px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

    <div class="hub-trigger" id="h-open">
        <div style="color: #0ff; font-size: 15px;">IL CARTAIO HUB</div>
        <div class="text-neon" style="font-size: 12px;">VEDI VIDEO E TV ❤️ CLICCA</div>
    </div>

    <div class="hub-card" id="h-card">
        <div class="text-neon" style="font-size: 18px; margin-bottom: 5px;">COMMAND CENTER</div>
        
        <div class="link-cmd" onclick="loadMedia('yt')">
            <span>UCCIO DE SANTIS SHOW</span>
            <i class="fab fa-youtube" style="color:#f00"></i>
        </div>

        <div class="link-cmd" onclick="loadMedia('pluto')">
            <span>GUARDA PLUTO TV</span>
            <i class="fas fa-tv" style="color:#ff0"></i>
        </div>

        <div class="link-cmd" onclick="loadMedia('custom')">
            <span>LINK PERSONALIZZATO</span>
            <i class="fas fa-link" style="color:#0ff"></i>
        </div>

        <iframe id="media-box" src="" frameborder="0" allow="autoplay; encrypted-media" allowfullscreen></iframe>

        <div class="close-hub" onclick="closeHub()">CHIUDI SISTEMA X</div>
    </div>

<script>
    const videoUccio = "https://www.youtube.com/embed/5WyXJc3buWI?autoplay=1";
    const tvPluto = "https://pluto.tv/it/live-tv/pluto-tv-cinema-italiano-it";

    function loadMedia(tipo) {
        let player = $('#media-box');
        player.hide();
        
        if(tipo === 'yt') {
            player.attr('src', videoUccio).fadeIn();
        } else if(tipo === 'pluto') {
            player.attr('src', tvPluto).fadeIn();
        } else if(tipo === 'custom') {
            let userLink = prompt("Incolla il link YouTube qui:");
            if(userLink && userLink.includes('v=')) {
                let id = userLink.split('v=')[1].split('&')[0];
                player.attr('src', "https://www.youtube.com/embed/" + id + "?autoplay=1").fadeIn();
            }
        }
    }

    function closeHub() {
        $('#media-box').attr('src', '').hide();
        $('#h-card').fadeOut();
        $('#h-open').fadeIn();
    }

    $('#h-open').on('click', function() {
        $(this).hide();
        $('#h-card').fadeIn().css('display', 'flex');
    });
</script>

</body>
</html>
