<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>EL DIABLO</title>
<style>
body {
  margin: 0;
  background: #000;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  overflow: hidden;
}

.container {
  position: relative;
  width: 1308px;
  height: 484px;
}

/* ===== VIDEO LATERALI (9:16) ===== */
.video-wrapper {
  position: absolute;
  width: 270px;
  height: 484px;
  overflow: hidden;
  z-index: 1;
  background: transparent;
  border-radius: 20px;
}
.left { left: 0; }
.right { right: 0; }

.side-video {
  width: 100%;
  height: 100%;
  object-fit: cover;
  border-radius: 16px;
}

/* ===== AREA CENTRALE (16:9) ===== */
.center-area {
  position: absolute;
  left: 280px;  
  right: 280px; 
  top: 0;
  bottom: 0;
  display: flex;
  justify-content: center;
  align-items: center;
  z-index: 2; 
}

.center-box {
  position: relative;
  width: 100%; 
  height: 420px;
}

.center-box video {
  width: 100%;
  height: 100%;
  object-fit: contain; 
  border-radius: 12px;
  background: #000;
}
</style>
</head>
<body>

<div class="container">

  <!-- VIDEO SINISTRO (9:16) -->
  <div class="video-wrapper left">
    <video class="side-video" autoplay loop muted playsinline>
      <source src="https://peppeagosto.github.io/immaggini/patrizia33.mp4" type="video/mp4">
    </video>
  </div>

  <!-- VIDEO DESTRO (9:16) -->
  <div class="video-wrapper right">
    <video class="side-video" autoplay loop muted playsinline>
      <source src="https://peppeagosto.github.io/immaggini/patrizia33.mp4" type="video/mp4">
    </video>
  </div>

  <div class="center-area">
  <div class="center-box">
    <img src="https://xatimg.com/image/bJdlkqXzm3ui.png" alt="Ragazza sulla spiaggia" style="width: 100%; height: 100%; object-fit: cover; display: block;">
  </div>
</div>

</div>

</body>
</html>
